name: API Flag Probe

# Weekly probe of the live Pulse STT WebSocket API for behavior changes.
# Compares observable shape (param accepted? response field present?
# transcript garbled?) against scripts/probes/baseline-pulse-stt.json.
# Posts to Slack only when something diverges from baseline.
#
# Manual run: Actions tab -> "API Flag Probe" -> "Run workflow".
# Schedule: Mondays 03:30 UTC = 09:00 IST.
#
# Why this exists: docs lag the live API silently when params are
# accepted-but-ignored or default behavior shifts. Two real cases caught
# manually before this workflow existed:
#   1. full_transcript=true accepted but field never returned.
#   2. format=false documented to cascade to ITN, but ITN still ran.
# A weekly probe surfaces the next one of these without anyone needing
# to remember to look.

on:
  workflow_dispatch:
  schedule:
    - cron: '30 3 * * 1'

jobs:
  probe-pulse-stt:
    name: Probe Pulse STT for behavior changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests websockets

      - name: Run Pulse STT probe + diff against baseline
        id: probe
        env:
          SMALLEST_API_KEY: ${{ secrets.SMALLEST_API_KEY }}
        run: |
          set -e
          python3 scripts/probes/pulse_stt.py --out /tmp/live-pulse-stt.json
          set +e
          python3 scripts/probes/diff.py \
            scripts/probes/baseline-pulse-stt.json \
            /tmp/live-pulse-stt.json --markdown > /tmp/diff-report.md
          DIFF_RC=$?
          set -e
          case "$DIFF_RC" in
            0) echo "diff_found=false" >> "$GITHUB_OUTPUT"; echo "✅ No behavior change vs baseline." ;;
            1) echo "diff_found=true"  >> "$GITHUB_OUTPUT"; echo "⚠️ Diffs detected — see job summary." ;;
            *) echo "diff_found=error" >> "$GITHUB_OUTPUT"; echo "❌ diff.py failed with code $DIFF_RC"; exit $DIFF_RC ;;
          esac

      - name: Job summary
        if: always()
        run: |
          if [ -f /tmp/diff-report.md ]; then
            cat /tmp/diff-report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload live probe results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-pulse-stt-probe
          path: /tmp/live-pulse-stt.json
          retention-days: 30

      - name: Build Slack payload (only when diff found)
        if: steps.probe.outputs.diff_found == 'true'
        run: |
          # Slack expects JSON; embed the markdown report as the text body.
          # Truncated to 2900 chars to fit Slack's 3000-char text limit
          # with margin for the wrapper.
          REPORT=$(head -c 2900 /tmp/diff-report.md)
          jq -n \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg body "$REPORT" \
            '{
              text: "Pulse STT probe — behavior change detected",
              blocks: [
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: $body
                  }
                },
                {
                  type: "context",
                  elements: [
                    {
                      type: "mrkdwn",
                      text: ("Run: <" + $run_url + "|view logs>")
                    }
                  ]
                }
              ]
            }' > /tmp/slack-payload.json

      - name: Notify Slack on behavior change
        if: steps.probe.outputs.diff_found == 'true'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: /tmp/slack-payload.json
