name: API Flag Probe

# Weekly probe of the live Smallest AI APIs for behavior changes:
#   - Pulse STT WebSocket  → scripts/probes/pulse_stt.py
#   - Lightning v3.1 TTS   → scripts/probes/lightning_tts.py (sync REST + SSE)
#
# Compares observable shape (param accepted? response field present?
# size class right? SSE stream complete?) against committed baselines.
# Both diffs are fed to a Claude classifier; only NEWSWORTHY verdicts
# ping Slack. NOISE/NONE keeps the workflow silent.
#
# Manual run: Actions tab -> "API Flag Probe" -> "Run workflow".
# Schedule: Mondays 03:30 UTC = 09:00 IST.
#
# Why this exists: docs lag the live API silently when params are
# accepted-but-ignored or default behavior shifts. Real cases caught
# manually before this workflow existed:
#   1. full_transcript=true accepted but field never returned.
#   2. format=false documented to cascade to ITN, but ITN still ran.
#   3. Lightning TTS SSE doc snippet wrote empty WAVs because the
#      response shape silently changed.

on:
  workflow_dispatch:
  schedule:
    - cron: '30 3 * * 1'

jobs:
  probe-and-classify:
    name: Probe Pulse STT + Lightning TTS, classify, notify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests websockets

      - name: Run Pulse STT probe + diff against baseline
        id: probe
        env:
          SMALLEST_API_KEY: ${{ secrets.SMALLEST_API_KEY }}
        run: |
          set -e
          python3 scripts/probes/pulse_stt.py --out /tmp/live-pulse-stt.json
          set +e
          python3 scripts/probes/diff.py \
            scripts/probes/baseline-pulse-stt.json \
            /tmp/live-pulse-stt.json --markdown > /tmp/diff-report.md
          DIFF_RC=$?
          set -e
          case "$DIFF_RC" in
            0) echo "stt_diff_found=false" >> "$GITHUB_OUTPUT"; echo "✅ Pulse STT: no behavior change vs baseline." ;;
            1) echo "stt_diff_found=true"  >> "$GITHUB_OUTPUT"; echo "⚠️ Pulse STT: diffs detected." ;;
            *) echo "stt_diff_found=error" >> "$GITHUB_OUTPUT"; echo "❌ Pulse STT diff.py failed with code $DIFF_RC"; exit $DIFF_RC ;;
          esac

      - name: Run Lightning TTS probe + diff against baseline
        id: probe_tts
        env:
          SMALLEST_API_KEY: ${{ secrets.SMALLEST_API_KEY }}
        run: |
          set -e
          python3 scripts/probes/lightning_tts.py --out /tmp/live-lightning-tts.json
          set +e
          python3 scripts/probes/diff.py \
            scripts/probes/baseline-lightning-tts.json \
            /tmp/live-lightning-tts.json --markdown > /tmp/diff-tts-report.md
          DIFF_RC=$?
          set -e
          case "$DIFF_RC" in
            0) echo "tts_diff_found=false" >> "$GITHUB_OUTPUT"; echo "✅ Lightning TTS: no behavior change vs baseline." ;;
            1) echo "tts_diff_found=true"  >> "$GITHUB_OUTPUT"; echo "⚠️ Lightning TTS: diffs detected." ;;
            *) echo "tts_diff_found=error" >> "$GITHUB_OUTPUT"; echo "❌ Lightning TTS diff.py failed with code $DIFF_RC"; exit $DIFF_RC ;;
          esac

      - name: Run Atoms probe + diff against baseline
        id: probe_atoms
        env:
          SMALLEST_API_KEY: ${{ secrets.SMALLEST_API_KEY }}
        run: |
          set -e
          python3 scripts/probes/atoms.py --out /tmp/live-atoms.json
          set +e
          python3 scripts/probes/diff.py \
            scripts/probes/baseline-atoms.json \
            /tmp/live-atoms.json --markdown > /tmp/diff-atoms-report.md
          DIFF_RC=$?
          set -e
          case "$DIFF_RC" in
            0) echo "atoms_diff_found=false" >> "$GITHUB_OUTPUT"; echo "✅ Atoms: no behavior change vs baseline." ;;
            1) echo "atoms_diff_found=true"  >> "$GITHUB_OUTPUT"; echo "⚠️ Atoms: diffs detected." ;;
            *) echo "atoms_diff_found=error" >> "$GITHUB_OUTPUT"; echo "❌ Atoms diff.py failed with code $DIFF_RC"; exit $DIFF_RC ;;
          esac

      # Atoms spec diff: testAutomation (source of truth for the Atoms API
      # surface) vs Fern OpenAPI. Catches new endpoints shipped in
      # testAutomation but never added to OpenAPI/docs/SDK, and
      # endpoints removed from testAutomation that still appear in
      # OpenAPI. Read-only: clones testAutomation via UPSTREAM_PR_READ_TOKEN
      # (same PAT used by the cross-repo PR drift detector). Diffs against
      # a committed baseline so previously-known drift doesn't fire every
      # week — only NEW drift since the baseline produces a NEWSWORTHY
      # signal.
      - name: Atoms spec diff (testAutomation ↔ Fern OpenAPI)
        id: probe_atoms_spec
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_PR_READ_TOKEN }}
        run: |
          set -e
          # Clone testAutomation read-only into a tmp dir.
          gh repo clone smallest-inc/testAutomation /tmp/testAutomation -- --depth 1 --quiet
          set +e
          python3 scripts/probes/atoms_spec_diff.py \
            --testautomation /tmp/testAutomation \
            --openapi fern/apis/atoms/openapi/openapi.yaml \
            --baseline scripts/probes/baseline-atoms-spec-diff.json \
            --markdown > /tmp/diff-atoms-spec-report.md
          DIFF_RC=$?
          set -e
          case "$DIFF_RC" in
            0) echo "atoms_spec_diff_found=false" >> "$GITHUB_OUTPUT"; echo "✅ Atoms spec diff: no NEW drift since baseline." ;;
            1) echo "atoms_spec_diff_found=true"  >> "$GITHUB_OUTPUT"; echo "⚠️ Atoms spec diff: NEW drift detected." ;;
            *) echo "atoms_spec_diff_found=error" >> "$GITHUB_OUTPUT"; echo "❌ atoms_spec_diff.py failed with code $DIFF_RC"; exit $DIFF_RC ;;
          esac

      - name: Set combined diff_found output
        id: combined
        run: |
          if [ "${{ steps.probe.outputs.stt_diff_found }}" = "true" ] \
             || [ "${{ steps.probe_tts.outputs.tts_diff_found }}" = "true" ] \
             || [ "${{ steps.probe_atoms.outputs.atoms_diff_found }}" = "true" ] \
             || [ "${{ steps.probe_atoms_spec.outputs.atoms_spec_diff_found }}" = "true" ]; then
            echo "diff_found=true" >> "$GITHUB_OUTPUT"
          else
            echo "diff_found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Job summary
        if: always()
        run: |
          {
            if [ -f /tmp/diff-report.md ]; then
              echo "## Pulse STT"
              cat /tmp/diff-report.md
              echo ""
            fi
            if [ -f /tmp/diff-tts-report.md ]; then
              echo "---"
              echo ""
              echo "## Lightning TTS"
              cat /tmp/diff-tts-report.md
              echo ""
            fi
            if [ -f /tmp/diff-atoms-report.md ]; then
              echo "---"
              echo ""
              echo "## Atoms (live probe)"
              cat /tmp/diff-atoms-report.md
              echo ""
            fi
            if [ -f /tmp/diff-atoms-spec-report.md ]; then
              echo "---"
              echo ""
              echo "## Atoms (spec diff vs testAutomation)"
              cat /tmp/diff-atoms-spec-report.md
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Pulse STT live probe results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-pulse-stt-probe
          path: /tmp/live-pulse-stt.json
          retention-days: 30

      - name: Upload Lightning TTS live probe results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-lightning-tts-probe
          path: /tmp/live-lightning-tts.json
          retention-days: 30

      - name: Upload Atoms live probe results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-atoms-probe
          path: /tmp/live-atoms.json
          retention-days: 30

      # ─── AI classifier ───
      # Reads the diff markdown and asks Claude whether it matches one of
      # the team's NEWSWORTHY criteria (PR #116 British flags wired,
      # format=false→ITN cascade, etc.) or it's just NOISE
      # (test-clip variance, lang-detection wobble, ITN-token drift).
      #
      # Result drives the Slack step below: only NEWSWORTHY pings the
      # team. NOISE/NONE keeps the workflow silent — the diff is still
      # in the job summary + artifact for anyone curious.

      - name: Classify diffs (Claude)
        if: steps.combined.outputs.diff_found == 'true'
        id: classify
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Both diff files exist by this point — STT from probe step,
          # TTS from probe_tts step. classify.py treats either as
          # optional, so passing both real files is the canonical call.
          python3 scripts/probes/classify.py \
            --stt-diff /tmp/diff-report.md \
            --tts-diff /tmp/diff-tts-report.md \
            --atoms-diff /tmp/diff-atoms-report.md \
            --atoms-spec-diff /tmp/diff-atoms-spec-report.md \
            --out-json /tmp/classification.json \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          VERDICT=$(jq -r '.verdict' /tmp/classification.json)
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "classifier verdict: $VERDICT"
          {
            echo ""
            echo "---"
            echo ""
            echo "## Classifier verdict: \`$VERDICT\`"
            echo ""
            jq -r '.summary' /tmp/classification.json
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build Slack payload (newsworthy only)
        if: steps.classify.outputs.verdict == 'NEWSWORTHY'
        run: |
          SUMMARY=$(jq -r '.summary' /tmp/classification.json)
          SIGNALS=$(jq -r '.newsworthy_signals | map("• " + .) | join("\n")' /tmp/classification.json)
          FILES=$(jq -r '.doc_files_to_audit | map("• `" + . + "`") | join("\n")' /tmp/classification.json)
          # Slack's 3000-char text limit per section. Combine STT + TTS
          # diffs with a header each, and truncate the whole thing with
          # margin so we don't blow the limit.
          STT_REPORT=$(head -c 1000 /tmp/diff-report.md 2>/dev/null || echo "(no STT diff)")
          TTS_REPORT=$(head -c 1000 /tmp/diff-tts-report.md 2>/dev/null || echo "(no TTS diff)")
          # API-probe pings: Pulse covers atoms+waves shared surface, so
          # default to Abhishek (Waves owner) and let Sumit follow up on
          # Atoms-side fallout. We could split per-signal later if useful.
          PING="<@U0A5SG1LM1C>"
          jq -n \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg summary "$SUMMARY" \
            --arg signals "$SIGNALS" \
            --arg files "$FILES" \
            --arg stt_report "$STT_REPORT" \
            --arg tts_report "$TTS_REPORT" \
            --arg ping "$PING" \
            --arg channel "${{ vars.DOCS_CI_FEED_CHANNEL_ID || 'C0B5Q3EHU07' }}" \
            '{
              channel: $channel,
              text: ("API probe — newsworthy behavior change — cc " + $ping),
              blocks: [
                { type: "header", text: { type: "plain_text", text: ":rotating_light: API probe — newsworthy change" } },
                { type: "section", text: { type: "mrkdwn", text: ($summary + "\n\ncc " + $ping) } },
                { type: "section", text: { type: "mrkdwn", text: ("*Signals:*\n" + $signals) } },
                { type: "section", text: { type: "mrkdwn", text: ("*Doc files to audit:*\n" + $files) } },
                { type: "section", text: { type: "mrkdwn", text: ("*Pulse STT diff (truncated):*\n```\n" + $stt_report + "\n```") } },
                { type: "section", text: { type: "mrkdwn", text: ("*Lightning TTS diff (truncated):*\n```\n" + $tts_report + "\n```") } },
                { type: "context", elements: [ { type: "mrkdwn", text: ("Run: <" + $run_url + "|view logs>") } ] }
              ]
            }' > /tmp/slack-payload.json

      # Prefer SLACK_BOT_TOKEN (lets us post to #feed-doc-ci-change-detection
      # via chat.postMessage with channel ID); fall back to the legacy
      # SLACK_DM_WEBHOOK_URL / SLACK_WEBHOOK_URL if no token is set.
      - name: Notify Slack — channel post via bot token (preferred)
        if: steps.classify.outputs.verdict == 'NEWSWORTHY' && env.SLACK_BOT_TOKEN != ''
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload-file-path: /tmp/slack-payload.json

      - name: Notify Slack — webhook fallback (legacy DM path)
        if: steps.classify.outputs.verdict == 'NEWSWORTHY' && env.SLACK_BOT_TOKEN == ''
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_DM_WEBHOOK_URL || secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: /tmp/slack-payload.json
