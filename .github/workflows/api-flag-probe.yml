name: API Flag Probe

# Weekly probe of the live Pulse STT WebSocket API for behavior changes.
# Compares observable shape (param accepted? response field present?
# transcript garbled?) against scripts/probes/baseline-pulse-stt.json.
# Posts to Slack only when something diverges from baseline.
#
# Manual run: Actions tab -> "API Flag Probe" -> "Run workflow".
# Schedule: Mondays 03:30 UTC = 09:00 IST.
#
# Why this exists: docs lag the live API silently when params are
# accepted-but-ignored or default behavior shifts. Two real cases caught
# manually before this workflow existed:
#   1. full_transcript=true accepted but field never returned.
#   2. format=false documented to cascade to ITN, but ITN still ran.
# A weekly probe surfaces the next one of these without anyone needing
# to remember to look.

on:
  workflow_dispatch:
  schedule:
    - cron: '30 3 * * 1'

jobs:
  probe-pulse-stt:
    name: Probe Pulse STT for behavior changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests websockets

      - name: Run Pulse STT probe + diff against baseline
        id: probe
        env:
          SMALLEST_API_KEY: ${{ secrets.SMALLEST_API_KEY }}
        run: |
          set -e
          python3 scripts/probes/pulse_stt.py --out /tmp/live-pulse-stt.json
          set +e
          python3 scripts/probes/diff.py \
            scripts/probes/baseline-pulse-stt.json \
            /tmp/live-pulse-stt.json --markdown > /tmp/diff-report.md
          DIFF_RC=$?
          set -e
          case "$DIFF_RC" in
            0) echo "diff_found=false" >> "$GITHUB_OUTPUT"; echo "✅ No behavior change vs baseline." ;;
            1) echo "diff_found=true"  >> "$GITHUB_OUTPUT"; echo "⚠️ Diffs detected — running classifier." ;;
            *) echo "diff_found=error" >> "$GITHUB_OUTPUT"; echo "❌ diff.py failed with code $DIFF_RC"; exit $DIFF_RC ;;
          esac

      - name: Job summary
        if: always()
        run: |
          if [ -f /tmp/diff-report.md ]; then
            cat /tmp/diff-report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload live probe results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-pulse-stt-probe
          path: /tmp/live-pulse-stt.json
          retention-days: 30

      # ─── AI classifier ───
      # Reads the diff markdown and asks Claude whether it matches one of
      # the team's NEWSWORTHY criteria (PR #116 British flags wired,
      # format=false→ITN cascade, etc.) or it's just NOISE
      # (test-clip variance, lang-detection wobble, ITN-token drift).
      #
      # Result drives the Slack step below: only NEWSWORTHY pings the
      # team. NOISE/NONE keeps the workflow silent — the diff is still
      # in the job summary + artifact for anyone curious.

      - name: Classify diff (Claude)
        if: steps.probe.outputs.diff_found == 'true'
        id: classify
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          touch /tmp/diff-tts-report.md   # placeholder until TTS probe lands
          python3 scripts/probes/classify.py \
            --stt-diff /tmp/diff-report.md \
            --tts-diff /tmp/diff-tts-report.md \
            --out-json /tmp/classification.json \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          VERDICT=$(jq -r '.verdict' /tmp/classification.json)
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "classifier verdict: $VERDICT"
          {
            echo ""
            echo "---"
            echo ""
            echo "## Classifier verdict: \`$VERDICT\`"
            echo ""
            jq -r '.summary' /tmp/classification.json
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build Slack payload (newsworthy only)
        if: steps.classify.outputs.verdict == 'NEWSWORTHY'
        run: |
          SUMMARY=$(jq -r '.summary' /tmp/classification.json)
          SIGNALS=$(jq -r '.newsworthy_signals | map("• " + .) | join("\n")' /tmp/classification.json)
          FILES=$(jq -r '.doc_files_to_audit | map("• `" + . + "`") | join("\n")' /tmp/classification.json)
          # Truncate report to fit Slack's 3000-char text limit with margin.
          REPORT=$(head -c 2200 /tmp/diff-report.md)
          jq -n \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg summary "$SUMMARY" \
            --arg signals "$SIGNALS" \
            --arg files "$FILES" \
            --arg report "$REPORT" \
            '{
              text: "Pulse STT probe — newsworthy behavior change",
              blocks: [
                { type: "header", text: { type: "plain_text", text: ":rotating_light: Pulse STT — newsworthy change" } },
                { type: "section", text: { type: "mrkdwn", text: $summary } },
                { type: "section", text: { type: "mrkdwn", text: ("*Signals:*\n" + $signals) } },
                { type: "section", text: { type: "mrkdwn", text: ("*Doc files to audit:*\n" + $files) } },
                { type: "section", text: { type: "mrkdwn", text: ("*Diff (truncated):*\n```\n" + $report + "\n```") } },
                { type: "context", elements: [ { type: "mrkdwn", text: ("Run: <" + $run_url + "|view logs>") } ] }
              ]
            }' > /tmp/slack-payload.json

      # SLACK_DM_WEBHOOK_URL preferred (binds to a personal DM channel).
      # Falls back to SLACK_WEBHOOK_URL (channel) if the DM webhook isn't
      # configured. Either way, the payload is the same.
      - name: Notify Slack (newsworthy only)
        if: steps.classify.outputs.verdict == 'NEWSWORTHY'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_DM_WEBHOOK_URL || secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: /tmp/slack-payload.json
