name: API Spec Live Test

# Runs on PRs that change one of the API spec files. For each spec area
# that changed, hits the live Smallest AI API and verifies that what we
# document is actually what the platform implements.
#
#   - Atoms (fern/apis/atoms/**)        → scripts/spec-live-tests/atoms_live_test.py
#   - Waves TTS Lightning v3.1          → scripts/spec-live-tests/waves_tts_live_test.py
#   - Waves STT Pulse                   → scripts/spec-live-tests/waves_stt_live_test.py
#
# Why: PR #121 added 14 documented fields to CreateAgentRequest. `fern
# check` validated YAML, but only a live PATCH against the platform
# proved each field is actually accepted and persists. This workflow
# catches the same class of drift on every future spec change without
# anyone having to remember to test.
#
# Required repo secret: SMALLEST_API_KEY (test-tenant key, NOT prod).
#
# Atoms test creates a real agent on the test tenant and archives it
# at the end. A janitor sweep at the start removes any leftover
# `CI-spec-test-*` agents from prior crashed runs.

on:
  pull_request:
    paths:
      - 'fern/apis/atoms/**'
      - 'fern/apis/waves/openapi/lightning-v3.1*'
      - 'fern/apis/waves/openapi/pulse-stt*'
      - 'fern/apis/waves/asyncapi/lightning-v3.1*'
      - 'fern/apis/waves/asyncapi/pulse-stt*'
      - 'fern/apis/waves/asyncapi/stream-tts-ws*'
      - 'scripts/spec-live-tests/**'
      - '.github/workflows/api-spec-live-test.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write   # atoms-ws-live-test posts a PR comment on backend-bug-suspected failures

jobs:
  detect-changes:
    name: Detect which spec areas changed
    runs-on: ubuntu-latest
    outputs:
      atoms: ${{ steps.filter.outputs.atoms }}
      atoms_ws: ${{ steps.filter.outputs.atoms_ws }}
      tts: ${{ steps.filter.outputs.tts }}
      stt: ${{ steps.filter.outputs.stt }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            atoms:
              - 'fern/apis/atoms/openapi/**'
              - 'scripts/spec-live-tests/atoms_live_test.py'
              - '.github/workflows/api-spec-live-test.yml'
            atoms_ws:
              - 'fern/apis/atoms/asyncapi/**'
              - 'scripts/spec-live-tests/atoms_ws_live_test.py'
              - '.github/workflows/api-spec-live-test.yml'
            tts:
              - 'fern/apis/waves/openapi/lightning-v3.1*'
              - 'fern/apis/waves/asyncapi/lightning-v3.1*'
              - 'fern/apis/waves/asyncapi/stream-tts-ws*'
              - 'scripts/spec-live-tests/waves_tts_live_test.py'
              - '.github/workflows/api-spec-live-test.yml'
            stt:
              - 'fern/apis/waves/openapi/pulse-stt*'
              - 'fern/apis/waves/asyncapi/pulse-stt*'
              - 'scripts/spec-live-tests/waves_stt_live_test.py'
              - '.github/workflows/api-spec-live-test.yml'

  atoms-live-test:
    name: Atoms — live PATCH all CreateAgentRequest fields
    needs: detect-changes
    if: (needs.detect-changes.outputs.atoms == 'true' && github.event.pull_request.head.repo.full_name == github.repository) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run Atoms live test
        env:
          SMALLEST_API_KEY: ${{ secrets.SMALLEST_API_KEY }}
        run: python3 scripts/spec-live-tests/atoms_live_test.py

  atoms-ws-live-test:
    name: Atoms WS — agent/connect handshake + documented event types
    needs: detect-changes
    if: (needs.detect-changes.outputs.atoms_ws == 'true' && github.event.pull_request.head.repo.full_name == github.repository) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install websockets
        # Pin to a known-good range. The `additional_headers` kwarg the
        # tests use was introduced in websockets 14.0 (rename from
        # `extra_headers`). 13.x and earlier raise TypeError on it.
        # Local dev tested on 15.x; cap at <16 to avoid silent breakage
        # from a future major release.
        run: pip install --quiet 'websockets>=14.0,<16.0'
      - name: Run Atoms WS live test
        id: atoms_ws
        env:
          SMALLEST_API_KEY: ${{ secrets.SMALLEST_API_KEY }}
          # Optional: when set, the test connects to this pre-configured
          # agent (fixture mode → hard pass/fail) instead of creating a
          # bare per-run agent. Create the fixture on the same tenant
          # as SMALLEST_API_KEY, then add this as a repo secret.
          ATOMS_WS_TEST_AGENT_ID: ${{ secrets.ATOMS_WS_TEST_AGENT_ID }}
        run: |
          set +e
          python3 scripts/spec-live-tests/atoms_ws_live_test.py 2>&1 | tee /tmp/atoms_ws.log
          rc=${PIPESTATUS[0]}
          # signal whether the failure (if any) is the backend-bug-suspected pattern
          if [ "$rc" -ne 0 ] && grep -q "HARD FAIL: endpoint returned 5xx after 3 retries" /tmp/atoms_ws.log; then
            echo "backend_bug_suspected=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend_bug_suspected=false" >> "$GITHUB_OUTPUT"
          fi
          exit $rc
      - name: Resolve PR comment on success
        # Counterpart to the backend-bug-suspected comment: when the test
        # passes (e.g. backend bug fixed, or fixture mode flipped on),
        # remove any stale comment so reviewers don't see a misleading
        # "backend bug" notice on a now-green PR.
        if: success() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          marker='<!-- atoms-ws-backend-bug-suspected -->'
          # Filter by both marker AND author — review bots (entelligence-ai
          # etc.) quote our marker comment verbatim in their summaries, so
          # marker-only matching would risk updating/deleting a bot's
          # review by mistake.
          existing_id=$(gh api --paginate \
            "/repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
            --jq ".[] | select(.user.login == \"github-actions[bot]\") | select(.body | contains(\"$marker\")) | .id" \
            | head -1)
          if [ -n "$existing_id" ]; then
            echo "atoms WS test passing — deleting stale backend-bug comment $existing_id"
            gh api --method DELETE \
              "/repos/${{ github.repository }}/issues/comments/$existing_id"
          else
            echo "no stale comment to clean up"
          fi

      - name: Comment on PR (backend-bug-suspected)
        if: failure() && steps.atoms_ws.outputs.backend_bug_suspected == 'true' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # Idempotent: find an existing marker comment, update if present, else create.
          # Marker is an HTML comment so it doesn't render but lets us locate the comment.
          marker='<!-- atoms-ws-backend-bug-suspected -->'
          body=$(cat <<EOF
          $marker
          ⚠️ **Atoms WS live test failed with HTTP 5xx after retries — likely upstream platform issue.**

          **What's verified:** auth + endpoint reachability + routing (no 4xx, request reached server).
          **What failed:** session bootstrap on \`WSS /atoms/v1/agent/connect\`.

          **Action:** share this run's URL with the platform team for investigation against their request logs and monitoring. Force-merge is allowed when this is the only red check and the platform team has acknowledged the issue.

          [Run log]($RUN_URL) · last updated $(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF
          )

          # List PR comments via REST (returns integer IDs we can PATCH); find
          # the one carrying the marker and update it. If none, create a new one.
          # Filter by both marker AND author — review bots (entelligence-ai
          # etc.) quote our marker comment verbatim in their summaries, so
          # marker-only matching would risk updating/deleting a bot's
          # review by mistake.
          existing_id=$(gh api --paginate \
            "/repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
            --jq ".[] | select(.user.login == \"github-actions[bot]\") | select(.body | contains(\"$marker\")) | .id" \
            | head -1)

          if [ -n "$existing_id" ]; then
            echo "updating existing comment $existing_id"
            gh api --method PATCH \
              "/repos/${{ github.repository }}/issues/comments/$existing_id" \
              -f body="$body" >/dev/null
          else
            echo "posting new comment on PR #$PR_NUMBER"
            gh pr comment "$PR_NUMBER" --body "$body"
          fi

  tts-live-test:
    name: Waves TTS — Lightning v3.1 REST + WS smoke test
    needs: detect-changes
    if: (needs.detect-changes.outputs.tts == 'true' && github.event.pull_request.head.repo.full_name == github.repository) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install websockets
        # Pin to a known-good range. The `additional_headers` kwarg the
        # tests use was introduced in websockets 14.0 (rename from
        # `extra_headers`). 13.x and earlier raise TypeError on it.
        # Local dev tested on 15.x; cap at <16 to avoid silent breakage
        # from a future major release.
        run: pip install --quiet 'websockets>=14.0,<16.0'
      - name: Run TTS live test
        env:
          SMALLEST_API_KEY: ${{ secrets.SMALLEST_API_KEY }}
        run: python3 scripts/spec-live-tests/waves_tts_live_test.py

  spec-enum-vs-api-check:
    name: Spec enums match live API
    needs: detect-changes
    if: (needs.detect-changes.outputs.tts == 'true' || needs.detect-changes.outputs.stt == 'true' || needs.detect-changes.outputs.atoms == 'true' || needs.detect-changes.outputs.atoms_ws == 'true') && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pyyaml
        run: pip install --quiet 'pyyaml>=6.0,<7.0'
      - name: Run spec-vs-live-API enum check
        env:
          SMALLEST_API_KEY: ${{ secrets.SMALLEST_API_KEY }}
        run: python3 scripts/spec-live-tests/spec_enum_vs_api_check.py

  spec-drift-check:
    name: Waves spec drift — base vs v4 docs overrides
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pyyaml
        run: pip install --quiet 'pyyaml>=6.0,<7.0'
      - name: Run spec drift check
        run: python3 scripts/spec-live-tests/spec_drift_check.py

  v4-mirror-check:
    name: v4 docs mirror — pages/ vs versions/
    # PR-scoped check — needs github.base_ref. Skip on workflow_dispatch
    # (no base_ref → script would hard-fail on missing ref). Manual audits
    # can run locally with `python3 scripts/spec-live-tests/v4_mirror_check.py --all`.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history to diff against base
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Ensure base ref is fetched
        run: git fetch origin ${{ github.base_ref }}
      - name: Run mirror check (PR-scoped)
        run: python3 scripts/spec-live-tests/v4_mirror_check.py --base origin/${{ github.base_ref }}

  stt-live-test:
    name: Waves STT — Pulse WS smoke test
    needs: detect-changes
    if: (needs.detect-changes.outputs.stt == 'true' && github.event.pull_request.head.repo.full_name == github.repository) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install websockets
        # Pin to a known-good range. The `additional_headers` kwarg the
        # tests use was introduced in websockets 14.0 (rename from
        # `extra_headers`). 13.x and earlier raise TypeError on it.
        # Local dev tested on 15.x; cap at <16 to avoid silent breakage
        # from a future major release.
        run: pip install --quiet 'websockets>=14.0,<16.0'
      - name: Run STT live test
        env:
          SMALLEST_API_KEY: ${{ secrets.SMALLEST_API_KEY }}
        run: python3 scripts/spec-live-tests/waves_stt_live_test.py
