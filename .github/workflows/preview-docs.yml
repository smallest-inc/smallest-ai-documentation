name: Preview Docs

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches:
      - main

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Fern CLI
        uses: fern-api/setup-fern-cli@v1

      - name: Generate preview URL
        id: generate-docs
        env:
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          OUTPUT=$(fern generate --docs --preview --id "$HEAD_REF" 2>&1) || true
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oP 'Published docs to \K.*(?= \()')
          echo "preview_url=$URL" >> $GITHUB_OUTPUT
          echo "Preview URL: $URL"

      - name: Get page links for changed MDX files
        id: page-links
        env:
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}
        run: |
          PREVIEW_URL="${{ steps.generate-docs.outputs.preview_url }}"
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD -- '*.md' '*.mdx' 2>/dev/null || echo "")

          if [ -z "$CHANGED_FILES" ] || [ -z "$PREVIEW_URL" ]; then
            echo "page_links=" >> $GITHUB_OUTPUT; exit 0
          fi

          BASE_URL=$(echo "$PREVIEW_URL" | grep -oP 'https?://[^/]+')

          FILES_PARAM=$(echo "$CHANGED_FILES" | tr '\n' ',' | sed 's/,$//')
          RESPONSE=$(curl -sf -H "FERN_TOKEN: $FERN_TOKEN" "${PREVIEW_URL}/api/fern-docs/get-slug-for-file?files=${FILES_PARAM}" 2>/dev/null) || {
            echo "page_links=" >> $GITHUB_OUTPUT; exit 0
          }

          PAGE_LINKS=$(echo "$RESPONSE" | jq -r --arg url "$BASE_URL" \
            '.mappings[] | ($url + (if (.slug == null or .slug == "") then "" else "/" + .slug end)) | "- [\(.)](\(.))"')

          if [ -n "$PAGE_LINKS" ]; then
            { echo "page_links<<EOF"; echo "$PAGE_LINKS"; echo "EOF"; } >> $GITHUB_OUTPUT
          else
            echo "page_links=" >> $GITHUB_OUTPUT
          fi

      - name: Get page links for changed JSON files
        id: api-page-links
        run: |
          PREVIEW_URL="${{ steps.generate-docs.outputs.preview_url }}"
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD -- '*.json' 2>/dev/null | grep -v 'fern.config.json' || echo "")

          if [ -z "$CHANGED_FILES" ] || [ -z "$PREVIEW_URL" ]; then
            echo "page_links=" >> $GITHUB_OUTPUT; exit 0
          fi

          PAGE_LINKS=$(echo "$CHANGED_FILES" | while read -r file; do
            [ -f "$file" ] || continue
            spec_name=$(basename "$file" .json | sed 's/_out$//' | sed 's/_/-/g')
            jq -r --arg url "$PREVIEW_URL" --arg spec "$spec_name" '
              .paths | to_entries[] | .value | to_entries[] |
              . as $e |
              ($e.value.tags[0] // "default" | ascii_downcase | gsub(" "; "-")) as $tag |
              ($e.value.operationId // ($e.value.summary | ascii_downcase | gsub(" "; "-"))) as $endpoint_url |
              "- [\($e.value.summary)](\($url)/rest-api-reference/\($spec)/\($tag)/\($endpoint_url))"
            ' "$file"
          done)

          if [ -n "$PAGE_LINKS" ]; then
            { echo "page_links<<EOF"; echo "$PAGE_LINKS"; echo "EOF"; } >> $GITHUB_OUTPUT
          else
            echo "page_links=" >> $GITHUB_OUTPUT
          fi

      - name: Create comment content
        env:
          PREVIEW_URL: ${{ steps.generate-docs.outputs.preview_url }}
          PAGE_LINKS: ${{ steps.page-links.outputs.page_links }}
          API_PAGE_LINKS: ${{ steps.api-page-links.outputs.page_links }}
        run: |
          echo ":herb: **Preview your docs:** <$PREVIEW_URL>" > comment.md

          if [ -n "$PAGE_LINKS" ]; then
            echo "" >> comment.md
            echo "Here are the markdown pages you've updated:" >> comment.md
            echo "$PAGE_LINKS" >> comment.md
          fi

          if [ -n "$API_PAGE_LINKS" ]; then
            echo "" >> comment.md
            echo "Here are the API spec pages you've updated:" >> comment.md
            echo "$API_PAGE_LINKS" >> comment.md
          fi

      - name: Post PR comment
        uses: thollander/actions-comment-pull-request@v2.4.3
        with:
          filePath: comment.md
          comment_tag: preview-docs
          mode: upsert