name: llms.txt drift

# Catches when fern/llms.txt is out of sync with the committed pages.
# Our custom llms.txt is served at https://docs.smallest.ai/llms.txt (overrides
# Fern's auto-gen via the `agents.llms-txt:` config in fern/docs.yml). It's
# generated by scripts/build_llms_txt.py from the atoms + waves nav YAMLs and
# each page's `description:` frontmatter.
#
# Without this check, a contributor can add a new MDX page, update the nav,
# forget to re-run the generator, and silently ship a stale llms.txt that
# misses their new page. AI agents that read llms.txt to discover docs would
# never see it.
#
# Behavior:
#   - PR touches a page MDX, nav YAML, or the generator itself → CI regenerates
#     fern/llms.txt and fails the PR if the result differs from what was
#     committed.
#   - Failure message includes the exact command the author should run to fix.
#
# Why no auto-commit: keeping the check read-only avoids a bot identity, push
# permissions on PR branches, and the rebase/force-push edge cases. The fix
# is one command for the author.

on:
  pull_request:
    branches: [main]
    paths:
      - 'fern/products/**/*.mdx'
      - 'fern/products/atoms.yml'
      - 'fern/products/waves/versions/v4.0.0.yml'
      - 'fern/llms.txt'
      - 'scripts/build_llms_txt.py'
      - '.github/workflows/llms-txt-drift.yml'

jobs:
  drift-check:
    name: fern/llms.txt is up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Regenerate fern/llms.txt
        run: python3 scripts/build_llms_txt.py

      - name: Verify no drift vs committed file
        run: |
          if git diff --quiet -- fern/llms.txt; then
            echo "✓ fern/llms.txt is in sync with the generator."
            exit 0
          fi

          echo "::error file=fern/llms.txt::fern/llms.txt is out of date."
          echo ""
          echo "─────────────────────────────────────────────────────────────"
          echo " fern/llms.txt is stale relative to your page or nav changes."
          echo ""
          echo " Fix locally:"
          echo "   python3 scripts/build_llms_txt.py"
          echo "   git add fern/llms.txt"
          echo "   git commit -m 'docs(llms): regenerate fern/llms.txt'"
          echo "   git push"
          echo ""
          echo " The generator reads the atoms + waves nav YAMLs and each"
          echo " page's description: frontmatter, then emits the file Fern"
          echo " serves at https://docs.smallest.ai/llms.txt."
          echo "─────────────────────────────────────────────────────────────"
          echo ""
          echo "Diff vs committed:"
          git --no-pager diff -- fern/llms.txt
          exit 1
