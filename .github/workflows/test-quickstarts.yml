name: Test Quickstart Code Samples

on:
  push:
    branches: [main]
    paths:
      - 'fern/products/waves/pages/v4.0.0/**/*.mdx'
      - 'fern/products/atoms/pages/**/*.mdx'
  pull_request:
    paths:
      - 'fern/products/waves/pages/v4.0.0/**/*.mdx'
      - 'fern/products/atoms/pages/**/*.mdx'
  schedule:
    # Weekly Monday 9am UTC — catch API breaking changes
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  test-api-samples:
    name: Verify API code samples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install requests websockets smallestai aiofiles

      # ─── TTS Tests ───
      # Waves lightning-v3.1 occasionally returns a transient 503 under load.
      # Each TTS step retries up to 3x with 5s / 10s backoff before failing.

      - name: "TTS: Sync synthesis"
        run: |
          for attempt in 1 2 3; do
            response=$(curl -s -o /tmp/tts-sync.wav -w "%{http_code}" \
              -X POST "https://api.smallest.ai/waves/v1/lightning-v3.1/get_speech" \
              -H "Authorization: Bearer ${{ secrets.SMALLEST_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d '{"text":"Hello from Smallest AI.","voice_id":"magnus","sample_rate":24000,"output_format":"wav"}')
            size=$(stat -c%s /tmp/tts-sync.wav)
            echo "attempt $attempt: HTTP $response, $size bytes"
            if [ "$response" = "200" ] && [ "$size" -gt 1000 ]; then
              echo "ok on attempt $attempt"
              break
            fi
            [ $attempt -lt 3 ] && sleep $((attempt * 5))
          done
          [ "$response" = "200" ] || exit 1
          [ "$(stat -c%s /tmp/tts-sync.wav)" -gt 1000 ] || exit 1

      - name: "TTS: SSE streaming"
        run: |
          for attempt in 1 2 3; do
            response=$(curl -s -o /tmp/tts-sse.raw -w "%{http_code}" \
              -X POST "https://api.smallest.ai/waves/v1/lightning-v3.1/stream" \
              -H "Authorization: Bearer ${{ secrets.SMALLEST_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d '{"text":"Hello from streaming.","voice_id":"magnus","sample_rate":24000}')
            echo "attempt $attempt: HTTP $response, $(stat -c%s /tmp/tts-sse.raw) bytes"
            if [ "$response" = "200" ]; then
              echo "ok on attempt $attempt"
              break
            fi
            [ $attempt -lt 3 ] && sleep $((attempt * 5))
          done
          [ "$response" = "200" ] || exit 1

      - name: "TTS: Python SDK-style call"
        run: |
          python3 -c "
          import os, time, requests
          url = 'https://api.smallest.ai/waves/v1/lightning-v3.1/get_speech'
          headers = {'Authorization': 'Bearer ${{ secrets.SMALLEST_API_KEY }}', 'Content-Type': 'application/json'}
          body = {'text': 'Modern problems require modern solutions.', 'voice_id': 'magnus', 'sample_rate': 24000, 'output_format': 'wav'}
          last = None
          for attempt in (1, 2, 3):
              r = requests.post(url, headers=headers, json=body)
              print(f'attempt {attempt}: HTTP {r.status_code}, {len(r.content)} bytes')
              if r.status_code == 200 and len(r.content) > 1000:
                  print(f'OK on attempt {attempt}')
                  last = r
                  break
              last = r
              if attempt < 3:
                  time.sleep(attempt * 5)
          assert last.status_code == 200, f'Expected 200, got {last.status_code}: {last.text}'
          assert len(last.content) > 1000, f'Audio too small: {len(last.content)} bytes'
          "

      # ─── STT Tests ───

      - name: "STT: Download sample audio"
        run: |
          curl -sL -o /tmp/audio.wav \
            "https://github.com/smallest-inc/cookbook/raw/main/speech-to-text/getting-started/samples/audio.wav"
          size=$(stat -c%s /tmp/audio.wav)
          echo "Downloaded $size bytes"
          [ "$size" -gt 1000 ] || exit 1

      # Pulse STT occasionally returns a transient "Service temporarily
      # unavailable" on the first request (upstream model warm-up). Retry
      # up to 3x with exponential backoff before failing the workflow.

      - name: "STT: Pre-recorded (file upload)"
        run: |
          for attempt in 1 2 3; do
            result=$(curl -s -X POST "https://api.smallest.ai/waves/v1/pulse/get_text?language=en" \
              -H "Authorization: Bearer ${{ secrets.SMALLEST_API_KEY }}" \
              -H "Content-Type: audio/wav" \
              --data-binary "@/tmp/audio.wav")
            if echo "$result" | grep -q '"status":"success"' && echo "$result" | grep -q '"transcription"'; then
              echo "ok on attempt $attempt"
              break
            fi
            echo "attempt $attempt failed: $result"
            [ $attempt -lt 3 ] && sleep $((attempt * 5))
          done
          echo "$result" | grep -q '"status":"success"' || exit 1
          echo "$result" | grep -q '"transcription"' || exit 1

      - name: "STT: Pre-recorded (URL)"
        run: |
          for attempt in 1 2 3; do
            result=$(curl -s -X POST "https://api.smallest.ai/waves/v1/pulse/get_text?language=en" \
              -H "Authorization: Bearer ${{ secrets.SMALLEST_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d '{"url":"https://github.com/smallest-inc/cookbook/raw/main/speech-to-text/getting-started/samples/audio.wav"}')
            if echo "$result" | grep -q '"status":"success"'; then
              echo "ok on attempt $attempt"
              break
            fi
            echo "attempt $attempt failed: $result"
            [ $attempt -lt 3 ] && sleep $((attempt * 5))
          done
          echo "$result" | grep -q '"status":"success"' || exit 1

      - name: "STT: Pre-recorded with features (timestamps + diarize)"
        run: |
          for attempt in 1 2 3; do
            result=$(curl -s -X POST "https://api.smallest.ai/waves/v1/pulse/get_text?language=en&word_timestamps=true&diarize=true" \
              -H "Authorization: Bearer ${{ secrets.SMALLEST_API_KEY }}" \
              -H "Content-Type: audio/wav" \
              --data-binary "@/tmp/audio.wav")
            if echo "$result" | grep -q '"status":"success"' && echo "$result" | grep -q '"words"'; then
              echo "ok on attempt $attempt"
              break
            fi
            echo "attempt $attempt failed (first 500 chars): $(echo "$result" | head -c 500)"
            [ $attempt -lt 3 ] && sleep $((attempt * 5))
          done
          echo "$result" | grep -q '"status":"success"' || exit 1
          echo "$result" | grep -q '"words"' || exit 1

      - name: "STT: Python URL-based call (as documented in quickstart)"
        run: |
          python3 -c "
          import requests, time
          last_err = None
          for attempt in (1, 2, 3):
              try:
                  r = requests.post(
                      'https://api.smallest.ai/waves/v1/pulse/get_text',
                      params={'language': 'en'},
                      headers={'Authorization': 'Bearer ${{ secrets.SMALLEST_API_KEY }}', 'Content-Type': 'application/json'},
                      json={'url': 'https://github.com/smallest-inc/cookbook/raw/main/speech-to-text/getting-started/samples/audio.wav'},
                      timeout=120,
                  )
                  r.raise_for_status()
                  result = r.json()
                  if result.get('status') == 'success':
                      print(f'OK on attempt {attempt}: {result[\"transcription\"][:80]}...')
                      break
                  last_err = result
              except Exception as e:
                  last_err = e
              print(f'attempt {attempt} failed: {last_err}')
              if attempt < 3:
                  time.sleep(attempt * 5)
          else:
              raise SystemExit(f'STT still failing after 3 attempts: {last_err}')
          "

      # ─── Other Endpoints ───

      - name: "Voices: Get voice list"
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.smallest.ai/waves/v1/lightning-v3.1/get_voices" \
            -H "Authorization: Bearer ${{ secrets.SMALLEST_API_KEY }}")
          echo "HTTP $response"
          [ "$response" = "200" ] || exit 1

      # ─── External URLs ───

      # ─── Pulse STT — embedded Python snippets ───
      # Extract every ```python block from the WS reference, the realtime
      # quickstart, and the realtime code-examples page. Run each against
      # the live API. Microphone-dependent blocks (`import pyaudio`) are
      # skipped automatically — those cannot be exercised on CI runners.
      - name: "STT: Embedded Python WS snippets (extract-and-run)"
        run: |
          python3 scripts/run_doc_python_snippets.py \
            fern/products/waves/pages/v4.0.0/api-references/pulse-stt-ws.mdx \
            fern/products/waves/pages/v4.0.0/speech-to-text/realtime/quickstart.mdx \
            fern/products/waves/pages/v4.0.0/speech-to-text/realtime/code-examples.mdx
        env:
          SMALLEST_API_KEY: ${{ secrets.SMALLEST_API_KEY }}

      # Phase 2 of docs-launch/snippets-overhaul.md — same harness for the
      # Lightning TTS pages. Runs the synchronous + SSE + WebSocket samples
      # plus the SDK-based variants. Fragment-only blocks are tagged
      # `# ci:skip` inside the snippet itself so they stay in the docs as
      # documentation fragments while opting out of execution.
      - name: "TTS: Embedded Python snippets (extract-and-run)"
        run: |
          python3 scripts/run_doc_python_snippets.py \
            fern/products/waves/pages/v4.0.0/text-to-speech/quickstart.mdx \
            fern/products/waves/pages/v4.0.0/text-to-speech/how-to-tts.mdx \
            fern/products/waves/pages/v4.0.0/text-to-speech/stream-tts.mdx
        env:
          SMALLEST_API_KEY: ${{ secrets.SMALLEST_API_KEY }}

      - name: "External: Cookbook audio sample accessible"
        run: |
          response=$(curl -sL -o /dev/null -w "%{http_code}" \
            "https://github.com/smallest-inc/cookbook/raw/main/speech-to-text/getting-started/samples/audio.wav")
          echo "HTTP $response"
          [ "$response" = "200" ] || exit 1

      # ─── Slack Notification on Failure ───

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Docs code sample tests failed — cc <!subteam^S0A7UU11WUC>",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Docs Code Sample Tests Failed* :x:\n\nOne or more API code samples in the documentation are broken.\n\n*Trigger:* `${{ github.event_name }}` on `${{ github.ref_name }}`\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>\n\ncc <!subteam^S0A7UU11WUC>"
                  }
                }
              ]
            }
