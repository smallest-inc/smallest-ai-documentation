name: Link Check

on:
  # Run on PR comments (to catch fern preview URL)
  issue_comment:
    types: [created]

jobs:
  link-check:
    # Only run when fern bot posts a preview URL on a PR
    if: >-
      github.event.issue.pull_request &&
      contains(github.event.comment.body, 'docs.buildwithfern.com')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head

      - name: Extract preview URL
        id: preview
        # Pass comment body via env var, never interpolate ${{ }} into
        # an inline shell command — a malicious commenter could break
        # out of the string and run arbitrary shell. See:
        # https://docs.github.com/en/actions/reference/security/secure-use#good-practices-for-mitigating-script-injection-attacks
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          URL=$(printf '%s' "$COMMENT_BODY" | grep -oP 'https://[a-z0-9-]+\.docs\.buildwithfern\.com' | head -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $URL"

      - name: Install lychee
        run: |
          curl -sLO https://github.com/lycheeverse/lychee/releases/latest/download/lychee-x86_64-unknown-linux-gnu.tar.gz
          tar xzf lychee-x86_64-unknown-linux-gnu.tar.gz
          chmod +x lychee
          sudo mv lychee /usr/local/bin/

      - name: Check links
        id: lychee
        continue-on-error: true
        run: |
          lychee \
            --no-progress \
            --base '${{ steps.preview.outputs.url }}' \
            --scheme https \
            --exclude 'localhost|example\.com|api\.smallest\.ai/waves/v1|youtube\.com/embed|wss://|ws://|your_api_key|YOUR_API_KEY' \
            --format markdown \
            --output lychee-report.md \
            'fern/products/waves/pages/v4.0.0/**/*.mdx' \
            'fern/products/atoms/**/*.mdx'

      - name: Post results
        if: steps.lychee.outcome == 'failure'
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('lychee-report.md', 'utf8');
            const lines = report.split('\n').filter(l => l.includes('[404]'));
            if (lines.length === 0) return;

            const body = `### 🔗 Link Check Results\n\n` +
              `Found **${lines.length}** broken links against preview:\n` +
              `\`${process.env.PREVIEW_URL}\`\n\n` +
              `<details><summary>Broken links</summary>\n\n` +
              lines.map(l => `- ${l}`).join('\n') +
              `\n\n</details>`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
