name: Weekly Site Audit

# Full-site audit against docs.smallest.ai. The PR-level nav-check only sees
# changed files; this job catches rot — links that break because the TARGET
# page was renamed/removed in a different PR, not the one that introduced
# the link.
#
# Runs every Monday at 04:00 UTC (09:30 IST). Opens a GitHub Issue on
# failure so nothing gets silently lost.

on:
  schedule:
    - cron: '0 4 * * 1'  # Monday 04:00 UTC
  workflow_dispatch:      # also allow manual trigger from the Actions UI

jobs:
  full-link-check:
    name: All internal links resolve
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pyyaml
        # check_links.py imports yaml for the registered-only filter the
        # weekly audit relies on. Without this, yaml imports fail, the
        # filter silently returns empty, and the audit becomes a no-op.
        run: pip install pyyaml

      - name: Run full-site link check
        id: check
        continue-on-error: true
        run: |
          python3 scripts/check_links.py 2>&1 | tee /tmp/link-check-report.txt
          # Preserve exit code separately for the report step
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"

      # Cookbook URLs are external — link-check.py only audits internal
      # slugs against docs.smallest.ai, so a renamed/moved cookbook sample
      # would silently rot. This step issues a small GET against every
      # github.com/smallest-inc/cookbook/* URL referenced in v4 MDX and
      # appends the report to the same report file.
      - name: Run cookbook URL audit
        id: cookbook
        continue-on-error: true
        run: |
          {
            echo ""
            echo "===== Cookbook URL audit ====="
          } >> /tmp/link-check-report.txt
          python3 scripts/check_cookbook_links.py --fail-on-broken 2>&1 | tee -a /tmp/link-check-report.txt
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"

      - name: Combine audit exit codes
        id: combined
        run: |
          if [ "${{ steps.check.outputs.exit_code }}" != "0" ] || [ "${{ steps.cookbook.outputs.exit_code }}" != "0" ]; then
            echo "exit_code=1" >> "$GITHUB_OUTPUT"
          else
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue on broken links
        id: open_issue
        if: steps.combined.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/link-check-report.txt', 'utf8');
            const title = `Weekly site audit: broken links on docs.smallest.ai or cookbook (${new Date().toISOString().slice(0, 10)})`;
            const body = [
              `The scheduled weekly site audit found broken links.`,
              ``,
              `Two checks run: (1) internal slugs on \`docs.smallest.ai\`, and (2) external \`github.com/smallest-inc/cookbook/*\` URLs referenced from v4 MDX. Either failing will open this issue. PR-level checks don't catch this: docs slugs can break when the target page is renamed in a different PR, and cookbook URLs can break when a sample is moved/renamed in the cookbook repo.`,
              ``,
              `<details><summary>Full audit output</summary>`,
              ``,
              '```',
              report.slice(0, 60000),
              '```',
              ``,
              `</details>`,
              ``,
              `Workflow run: ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['docs', 'link-rot'],
              assignees: ['abhishekmishragithub'],
            });
            core.setOutput('issue_number', issue.data.number);
            core.setOutput('issue_url', issue.data.html_url);

      # Notify on Slack when an issue is created. Pings the docs owner so
      # the alert lands in their notifications even if the GitHub issue
      # email gets buried. Uses the same SLACK_WEBHOOK_URL the api-flag-probe
      # workflow uses (channel-bound), with an @-mention to ensure the
      # owner gets pinged in their notifications view.
      - name: Notify Slack on broken links
        if: steps.combined.outputs.exit_code != '0'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Weekly site audit — broken links on docs.smallest.ai or cookbook (cc <@U0A5SG1LM1C>)",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":warning: *Weekly site audit — broken links found*\n\nIssue: <${{ steps.open_issue.outputs.issue_url }}|#${{ steps.open_issue.outputs.issue_number }}> (assigned to <@U0A5SG1LM1C>)\nRun: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|view logs>\n\ncc <@U0A5SG1LM1C>"
                  }
                }
              ]
            }

      # Weekly audit is informational. The issue is the signal — we don't
      # fail the workflow because that just creates a "ignored red check"
      # on main. PR-level nav-check.yml remains strict and blocks new rot.
