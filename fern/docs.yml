# yaml-language-server: $schema=https://schema.buildwithfern.dev/docs-yml.json

instances:
  - url: smallest-ai.docs.buildwithfern.com
    custom-domain: docs.smallest.ai

integrations:
  context7: ./context7.json

title: Smallest AI Docs

ai-search:
  location:
    - docs

analytics:
  posthog:
    api-key: phc_sPVVNGLTV6b6CDMbmxkUjwNB6NvmEJKMcgT6EsN8m96j
    endpoint: https://us.i.posthog.com

css:
  - docs/assets/styles/global-styling.css

js:
  - docs/assets/scripts/analytics.js

layout:
  searchbar-placement: header
  page-width: full
  tabs-placement: header

redirects:
  # Browser SDK was renamed WebSocket SDK; the section also moved from
  # the Developer Guide tab to Atoms Platform.
  - source: /atoms/developer-guide/integrate/browser-sdk
    destination: /atoms/atoms-platform/integrate/web-socket-sdk
    permanent: true
  - source: /atoms/developer-guide/integrate/websocket-sdk
    destination: /atoms/atoms-platform/integrate/web-socket-sdk
    permanent: true
  - source: /atoms/developer-guide/integrate/web-socket-sdk
    destination: /atoms/atoms-platform/integrate/web-socket-sdk
    permanent: true
  - source: /atoms/developer-guide/integrate/embed-a-voice-agent
    destination: /atoms/atoms-platform/integrate/embed-a-voice-agent
    permanent: true
  - source: /atoms/developer-guide/integrate/mobile/react-native
    destination: /atoms/atoms-platform/integrate/mobile-integrations/react-native
    permanent: true
  - source: /atoms/developer-guide/integrate/mobile/ios-swift
    destination: /atoms/atoms-platform/integrate/mobile-integrations/i-os-swift
    permanent: true
  - source: /atoms/developer-guide/integrate/mobile/android-kotlin
    destination: /atoms/atoms-platform/integrate/mobile-integrations/android-kotlin
    permanent: true
  - source: /atoms/developer-guide/integrate/mobile/flutter
    destination: /atoms/atoms-platform/integrate/mobile-integrations/flutter
    permanent: true

products:
  - display-name: Voice Agents
    path: ./products/atoms.yml
    icon: fa-solid fa-robot
    slug: atoms
  - display-name: Models
    path: ./products/waves/versions/v4.0.0.yml
    icon: fa-solid fa-waveform-lines
    slug: waves
    versions:
      - display-name: v4.0.0
        path: ./products/waves/versions/v4.0.0.yml
      - display-name: v3.0.1
        path: ./products/waves/versions/v3.0.1.yml
      - display-name: v2.2.0
        path: ./products/waves/versions/v2.2.0.yml

colors:
  accentPrimary:
    dark: '#2A9D8F'
    light: '#083b4d'
  background:
    dark: '#000000'
    light: '#FFFFFF'

theme:
  page-actions: toolbar
  footer-nav: minimal
  product-switcher: toggle


logo:
  dark: docs/assets/logo_light.png
  light: docs/assets/logo_dark.png
  height: 51

favicon: docs/assets/favicon.svg

default-language: python
