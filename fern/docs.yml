  # Tab-level catches for URL spaces that don't line up with v4.0.0.
  # - v3.0.1 + v2.2.0 had `api-reference` tabs that auto-generated
  #   pages from a Lightning-v1/v2/large-focused OpenAPI. v4 renders
  #   a completely different unified OpenAPI, so most auto-generated
  #   slugs (e.g. /api-reference/lightning-v-2/
  #   text-to-speech-sse) don't exist in v4. Land them on the v4
  #   API-ref auth page (first entry in the tab).
  # - v3.0.1 + v2.2.0 had `changelog` tabs whose per-version entries
  #   were deleted along with this PR. The default /changelog slug
  #   307s to /changelog/general in Fern, so we skip a hop by pointing
  #   directly at it.
  # NOTE on client-libraries: v3.0.1 and v4.0.0 both have a
  # `client-libraries` tab with matching slug shape
  # (/client-libraries/overview), so the tail
  # wildcard maps them correctly without an explicit fallback here.
  # Placed after the explicit page-level redirects above so Fern
  # matches those first; placed before the tail wildcards below so
  # unknown tab-scoped paths land on a real page instead of 404'ing.
  # Model-name-based API-ref pages (Lightning v3.1 HTTP + WS, Lightning v2 HTTP + WS)
  # were removed from the v4 nav — their specs are deleted; the unified
  # /waves/v1/tts endpoint replaces all of them. Bookmarks and search-indexed
  # slugs for the retired pages redirect to the current unified TTS reference.
  # Placed before the tab-scoped wildcards so specific slugs match first.
  - source: /waves/v-4-0-0/api-references/lightning-v3.1
    destination: /models/api-reference/text-to-speech/synthesize-speech
    permanent: true
  - source: /waves/v-4-0-0/api-references/lightning-v3.1-stream
    destination: /models/api-reference/text-to-speech/stream-speech-sse
    permanent: true
  - source: /waves/v-4-0-0/api-references/lightning-v3.1-ws
    destination: /models/api-reference/text-to-speech/stream-speech-web-socket
    permanent: true
  - source: /waves/v-4-0-0/api-references/lightning-v2
    destination: /models/api-reference/text-to-speech/synthesize-speech
    permanent: true
  - source: /waves/v-4-0-0/api-references/lightning-v2-stream
    destination: /models/api-reference/text-to-speech/stream-speech-sse
    permanent: true
  - source: /waves/v-4-0-0/api-references/lightning-v2-ws
    destination: /models/api-reference/text-to-speech/stream-speech-web-socket
    permanent: true
  # Also cover the /models/-prefixed shape (in case the top-level product
  # wildcard has already mapped /waves/v-4-0-0 → /models before these fire).
  - source: /models/api-references/lightning-v3.1
    destination: /models/api-reference/text-to-speech/synthesize-speech
    permanent: true
  - source: /models/api-references/lightning-v3.1-stream
    destination: /models/api-reference/text-to-speech/stream-speech-sse
    permanent: true
  - source: /models/api-references/lightning-v3.1-ws
    destination: /models/api-reference/text-to-speech/stream-speech-web-socket
    permanent: true
  - source: /models/api-references/lightning-v2
    destination: /models/api-reference/text-to-speech/synthesize-speech
    permanent: true
  - source: /models/api-references/lightning-v2-stream
    destination: /models/api-reference/text-to-speech/stream-speech-sse
    permanent: true
  - source: /models/api-references/lightning-v2-ws
    destination: /models/api-reference/text-to-speech/stream-speech-web-socket
    permanent: true

  - source: /waves/v-3-0-1/api-reference/:path*
    destination: /models/api-reference/authentication
    permanent: true
  - source: /waves/v-2-2-0/api-reference/:path*
    destination: /models/api-reference/authentication
    permanent: true
  - source: /waves/v-3-0-1/changelog/:path*
    destination: /models/changelog/general
    permanent: true
  - source: /waves/v-2-2-0/changelog/:path*
    destination: /models/changelog/general
    permanent: true

  # Tail wildcards catch pages that kept their slug shape into v4 plus
  # anything not covered by the explicit block above. Placed last so
  # Fern matches most-specific-first.
  - source: /waves/v-2-2-0/:path*
    destination: /models/:path*
    permanent: true
  - source: /waves/v-3-0-1/:path*
    destination: /models/:path*
    permanent: true

  # URL slug migration (2026-07-18): atoms → voice-agents, waves → models.
  # Every old-shape URL 301s to its new equivalent. Ordered
  # most-specific-first: platform / version-flat first, generic
  # atoms|waves prefix second. Existing per-page redirects above cover
  # the pages that got renamed as part of prior restructures; these
  # wildcards catch every OTHER old URL — bookmarks, external links,
  # SEO-indexed pages, /atoms/api-reference/*, /atoms/developer-guide/*,
  # /atoms/mcp/*, /waves/documentation/*, /waves/model-cards/*, etc.
  - source: /atoms/atoms-platform/:path*
    destination: /voice-agents/platform/:path*
    permanent: true
  - source: /waves/v-4-0-0/:path*
    destination: /models/:path*
    permanent: true
  - source: /atoms/:path*
    destination: /voice-agents/:path*
    permanent: true
  - source: /waves/:path*
    destination: /models/:path*
    permanent: true

