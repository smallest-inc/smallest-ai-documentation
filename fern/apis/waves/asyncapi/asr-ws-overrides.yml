# Override file for asr-ws.json
# Restructures the spec to avoid $ref to #/channels/ locations which Fern doesn't support
# Specifies waves server for all endpoints

channels:
  /api/v1/asr:
    x-fern-server-name: waves
    x-fern-audiences:
      - v4
    x-fern-sdk-group-name: Speech to Text
    title: ASR WebSocket

# Override operations to remove channel refs and use component message refs
operations:
  audioRequest:
    channel: null
    messages:
      - $ref: "#/components/messages/AudioRequest"
  transcriptionResponse:
    channel: null
    messages:
      - $ref: "#/components/messages/TranscriptionResponse"

# Add messages to components
components:
  messages:
    AudioRequest:
      name: AudioRequest
      contentType: application/octet-stream
      payload:
        type: string
        format: binary
        description: Raw audio data in the specified encoding format
    TranscriptionResponse:
      name: TranscriptionResponse
      contentType: application/json
      payload:
        type: object
        properties:
          text:
            type: string
            description: The transcribed text content
          isEndOfTurn:
            type: boolean
            description: Indicates if this marks the end of a speech turn
