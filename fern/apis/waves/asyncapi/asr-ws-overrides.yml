# Override file for asr-ws.yaml
# Adds unique type names to prevent collisions with other AsyncAPI files
# Maps server reference to match generators.yml environment URLs

servers:
  waves-ws:
    host: waves-api.smallest.ai
    pathname: /api/v1/asr
    protocol: wss

channels:
  /api/v1/asr:
    x-fern-sdk-group-name: ASR Streaming
    parameters:
      Authorization:
        description: "Bearer token for authentication (e.g., Bearer YOUR_API_KEY)"
        location: $message.header#/Authorization
    servers:
      - $ref: "#/servers/waves-ws"
    messages:
      audioRequest.message:
        x-fern-type-name: AsrAudioRequest
        name: AsrAudioRequest
      transcriptionResponse.message:
        x-fern-type-name: AsrTranscriptionResponse
        name: AsrTranscriptionResponse

operations:
  audioRequest:
    action: send
  transcriptionResponse:
    action: receive
