# Override file for pulse-stt-ws.yaml
# Adds unique type names to prevent collisions with other AsyncAPI files
# Maps server reference to match generators.yml environment URLs

servers:
  waves-ws:
    host: waves-api.smallest.ai
    pathname: /api/v1/pulse/get_text
    protocol: wss

channels:
  /api/v1/pulse/get_text:
    x-fern-sdk-group-name: Pulse STT Streaming
    parameters:
      Authorization:
        description: "Bearer token for authentication (e.g., Bearer YOUR_API_KEY)"
        location: $message.header#/Authorization
    servers:
      - $ref: "#/servers/waves-ws"
    messages:
      audioData.message:
        x-fern-type-name: PulseAudioData
        name: PulseAudioData
      endSignal.message:
        x-fern-type-name: PulseEndSignal
        name: PulseEndSignal
      transcriptionResponse.message:
        x-fern-type-name: PulseTranscriptionResponse
        name: PulseTranscriptionResponse

operations:
  sendAudioData:
    action: send
  sendEndSignal:
    action: send
  receiveTranscription:
    action: receive
