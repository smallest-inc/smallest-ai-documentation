# Override file for pulse-stt-ws.yaml
# Adds unique type names to prevent collisions with other AsyncAPI files
# Maps server reference to match generators.yml environment URLs

servers:
  waves-ws:
    host: api.smallest.ai
    pathname: /waves/v1/pulse/get_text
    protocol: wss

channels:
  pulseStream:
    x-fern-sdk-group-name: Pulse STT Streaming
    servers:
      - $ref: "#/servers/waves-ws"
    messages:
      audioData.message:
        x-fern-type-name: PulseAudioData
        name: PulseAudioData
      endSignal.message:
        x-fern-type-name: PulseEndSignal
        name: PulseEndSignal
      transcriptionResponse:
        x-fern-type-name: PulseTranscriptionResponse
        name: PulseTranscriptionResponse

operations:
  sendAudioData:
    action: send
    x-fern-sdk-method-name: transcribe_streaming_pulse_send_audio
  sendEndSignal:
    action: send
    x-fern-sdk-method-name: transcribe_streaming_pulse_send_end_signal
  receiveTranscription:
    action: receive
    x-fern-sdk-method-name: receive_transcribe_streaming_pulse
