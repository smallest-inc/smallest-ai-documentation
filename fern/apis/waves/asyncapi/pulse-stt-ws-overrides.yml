# Override file for pulse-stt-ws.yaml
# Adds unique type names to prevent collisions with other AsyncAPI files
# Maps server reference to match generators.yml environment URLs

servers:
  waves:
    host: waves-api.smallest.ai
    pathname: /api/v1/pulse/get_text
    protocol: wss

channels:
  /api/v1/pulse/get_text:
    x-fern-sdk-group-name: Speech to Text Streaming
    servers:
      - $ref: "#/servers/waves"
    messages:
      audioData.message:
        payload:
          title: PulseAudioData
      endSignal.message:
        payload:
          title: PulseEndSignal
      transcriptionResponse.message:
        payload:
          title: PulseTranscriptionResponse
