# Override file for pulse-stt-ws.yaml
# Adds unique type names to prevent collisions with other AsyncAPI files
# Maps server reference to match generators.yml environment URLs

servers:
  waves-ws:
    host: api.smallest.ai
    pathname: /waves/v1/pulse/get_text
    protocol: wss
    bindings:
      ws:
        query:
          type: object
          properties:
            language:
              type: string
              enum:
                - it
                - es
                - en
                - pt
                - hi
                - de
                - fr
                - uk
                - ru
                - kn
                - ml
                - pl
                - mr
                - gu
                - cs
                - sk
                - te
                - or
                - nl
                - bn
                - lv
                - et
                - ro
                - pa
                - fi
                - sv
                - bg
                - ta
                - hu
                - da
                - lt
                - mt
                - multi
                - multi-eu
              default: multi-eu
              description: |
                Language code for transcription. Set explicitly to the known language for best accuracy. Use `multi-eu` for unknown European-language audio (auto-detects across de, en, fr, it, nl, pt, ru, es). Use `multi` for full multilingual auto-detection. Omitting `language` routes to `multi-eu`, which can mis-detect on non-European audio.
            encoding:
              type: string
              enum:
                - linear16
                - linear32
                - alaw
                - mulaw
                - opus
                - ogg_opus
              default: linear16
              description: Audio encoding format
            sample_rate:
              type: integer
              description: "Audio sample rate in Hz. Supported values: 8000, 16000, 22050, 24000, 44100, 48000"
              default: 16000
            word_timestamps:
              type: string
              enum:
                - "true"
                - "false"
              default: "true"
              description: Include word-level timestamps in transcription
            sentence_timestamps:
              type: string
              enum:
                - "true"
                - "false"
              default: "false"
              description: Include sentence-level timestamps (utterances) in transcription
            redact_pii:
              type: string
              enum:
                - "true"
                - "false"
              default: "false"
              description: Redact personally identifiable information (name, surname, address, etc)
            redact_pci:
              type: string
              enum:
                - "true"
                - "false"
              default: "false"
              description: Redact payment card information (credit card, CVV, zip, account number, etc)
            numerals:
              type: string
              enum:
                - "true"
                - "false"
                - auto
              default: auto
              description: Convert spoken numerals into digit form (e.g., 'twenty five' to '25') and `auto` enables automatic detection based on context.
            diarize:
              type: string
              enum:
                - "true"
                - "false"
              default: "false"
              description: Enable speaker diarization to identify different speakers in the audio.
            format:
              type: string
              enum:
                - "true"
                - "false"
              default: "true"
              description: Enable punctuation and capitalization formatting in transcript responses.
            eou_timeout_ms:
              type: integer
              minimum: 100
              maximum: 10000
              default: 800
              description: Time in milliseconds to wait after speech ends before flushing the transcript.
            keywords:
              type: string
              description: "Comma-separated list of words/phrases to boost, each optionally followed by :INTENSIFIER (e.g. NVIDIA:5,Jensen). Intensifier defaults to 1.0 if omitted. Max 100 keywords per session."
            itn_normalize:
              type: string
              enum:
                - "true"
                - "false"
              default: "false"
              description: "Enable Inverse Text Normalization to convert spoken-form entities (numbers, dates, currencies, phone numbers, etc.) into written form in finalized transcripts."
            finalize_on_words:
              type: string
              enum:
                - "true"
                - "false"
              default: "true"
              description: "When false, disables automatic word-count-based finalization. Use with itn_normalize for agentic pipelines where you control finalization via the finalize message."
            max_words:
              type: integer
              description: "Maximum number of words before forced finalization. Useful for keeping ITN chunks short and accurate."

channels:
  pulseStream:
    x-fern-sdk-group-name: Pulse STT Streaming
    servers:
      - $ref: "#/servers/waves-ws"
    messages:
      audioData.message:
        x-fern-type-name: PulseAudioData
        name: PulseAudioData
      endSignal.message:
        x-fern-type-name: PulseEndSignal
        name: PulseEndSignal
      transcriptionResponse:
        x-fern-type-name: PulseTranscriptionResponse
        name: PulseTranscriptionResponse

operations:
  sendAudioData:
    action: send
    x-fern-sdk-method-name: transcribe_streaming_pulse_send_audio
  sendEndSignal:
    action: send
    x-fern-sdk-method-name: transcribe_streaming_pulse_send_end_signal
  receiveTranscription:
    action: receive
    x-fern-sdk-method-name: receive_transcribe_streaming_pulse
