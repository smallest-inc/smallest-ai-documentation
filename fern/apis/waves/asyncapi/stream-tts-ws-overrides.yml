# Override file for stream-tts-ws.yaml
# Adds unique type names to prevent collisions with other AsyncAPI files
# Maps server reference to match generators.yml environment URLs

servers:
  waves-ws:
    host: waves-api.smallest.ai
    pathname: /api/v1/streaming-tts/stream
    protocol: wss

channels:
  /api/v1/streaming-tts/stream:
    x-fern-sdk-group-name: Streaming TTS
    servers:
      - $ref: "#/servers/waves-ws"
    messages:
      streamingTTSRequest.message:
        name: StreamTtsRequest
      streamingTTSResponse.message:
        name: StreamTtsResponse

operations:
  streamingTTSRequest:
    action: send
  streamingTTSResponse:
    action: receive
