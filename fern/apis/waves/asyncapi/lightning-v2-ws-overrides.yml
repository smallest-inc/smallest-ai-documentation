# Override file for lightning-v2-ws.yaml
# Adds unique type names to prevent collisions with other AsyncAPI files
# Maps server reference to match generators.yml environment URLs

servers:
  waves-ws:
    host: waves-api.smallest.ai
    pathname: /api/v1/lightning-v2/get_speech/stream
    protocol: wss

channels:
  /api/v1/lightning-v2/get_speech/stream:
    x-fern-sdk-group-name: Lightning V2 TTS
    description: |
      The Lightning v2 WebSocket API delivers state-of-the-art text-to-speech synthesis through a persistent WebSocket connection, providing ultra-low latency audio streaming for applications that demand real-time voice generation. Unlike traditional HTTP-based TTS APIs, this WebSocket implementation streams audio chunks as they're processed, significantly reducing perceived latency and enabling seamless user experiences.

      ## Key Benefits

      - **Ultra-Low Latency**: Audio chunks are delivered as soon as they're generated, enabling near-instantaneous playback
      - **Real-Time Streaming**: Continuous audio delivery without waiting for complete text processing
      - **High-Quality Synthesis**: Advanced neural voice models with natural-sounding speech output
      - **Persistent Connection**: Maintains connection for multiple requests, reducing connection overhead
      - **Interactive Applications**: Perfect for chatbots, voice assistants, and live communication systems

      ## Use Cases

      - **Voice Assistants**: Real-time response generation for conversational AI
      - **Interactive Chatbots**: Immediate audio feedback for user interactions
      - **Live Streaming**: Real-time narration and commentary
      - **Accessibility Tools**: Screen readers and text-to-speech applications
      - **Gaming**: Dynamic voice generation for characters and narration
      - **Customer Service**: Automated voice responses with natural speech patterns

      ## Concurrency and Rate Limits

      This WebSocket API is subject to concurrency limits to ensure optimal performance for all users. Here's how it works:

      - **1 Concurrency Unit** = 1 active TTS request that can be processed at any given time
      - **5 WebSocket Connections** can be established per concurrency unit
      - **Total Connections** = Your concurrency limit x 5

      **Examples:**

      - **1 concurrency** = Up to 5 WebSocket connections, but only 1 active request
      - **3 concurrency** = Up to 15 WebSocket connections, but only 3 active requests simultaneously
      - **5 concurrency** = Up to 25 WebSocket connections, but only 5 active requests simultaneously

      While you can maintain multiple WebSocket connections, only your concurrency limit number of requests can be actively processed at once. Additional requests sent through any connection while at the concurrency limit will be rejected with an error.

      For detailed information about concurrency limits, rate limiting, and best practices for handling these constraints, see our [Concurrency and Limits](/waves/api-reference/api-references/concurrency-and-limits) documentation.
    servers:
      - $ref: "#/servers/waves-ws"
    messages:
      ttsRequest.message:
        name: LightningV2TtsRequest
      ttsResponse.message:
        name: LightningV2TtsResponse

operations:
  ttsRequest:
    action: send
  ttsResponse:
    action: receive
