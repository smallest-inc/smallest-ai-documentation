# Override file for lightning-v2-ws.yaml
# Adds unique type names to prevent collisions with other AsyncAPI files
# Maps server reference to match generators.yml environment URLs

servers:
  waves-ws:
    host: api.smallest.ai
    pathname: /waves/v1/lightning-v2/get_speech/stream
    protocol: wss

channels:
  lightningV2Stream:
    x-fern-audiences:
      - v2
      - v3
      - v4
    x-fern-sdk-group-name: Lightning V2 TTS
    servers:
      - $ref: "#/servers/waves-ws"
    parameters:
      Authorization:
    messages:
      lightningV2TtsRequest:
        name: LightningV2TtsRequest
      lightningV2TtsResponse:
        name: LightningV2TtsResponse

operations:
  LightningV2TtsRequest:
    action: send
    x-fern-sdk-method-name: synthesize_streaming_lightning_v2
  LightningV2TtsResponse:
    action: receive
    x-fern-sdk-method-name: receive_synthesize_streaming_lightning_v2
