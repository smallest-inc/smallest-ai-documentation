asyncapi: 3.0.0
info:
  title: Waves TTS WebSocket API
  version: 1.0.0
  description: |
    Model-agnostic streaming text-to-speech WebSocket API. The model is
    selected via the `model` field in the request payload.

    Supersedes `/waves/v1/lightning-v3.1/get_speech/stream`. That route still
    works but is deprecated; new integrations should connect to
    `/waves/v1/tts/live` and pick the model via the body parameter.
  contact:
    name: Waves API Support
    email: support@smallest.ai
  license:
    name: Proprietary
servers:
  production:
    host: api.smallest.ai
    pathname: /waves/v1/tts/live
    protocol: wss
    description: Production WebSocket TTS endpoint
    security:
    - $ref: '#/components/securitySchemes/bearerAuth'
channels:
  ttsStream:
    address: /waves/v1/tts/live
    parameters:
      Authorization:
        description: 'Bearer token for authentication. Format: Bearer YOUR_API_KEY'
        location: $message.header#/Authorization
    servers:
    - $ref: '#/servers/production'
    messages:
      ttsRequest.message:
        name: TtsRequest
        contentType: application/json
        payload:
          type: object
          required:
          - voice_id
          - text
          properties:
            voice_id:
              type: string
              description: The ID of the voice to use. See the model card for available voices per model.
            text:
              type: string
              description: The text to convert to speech.
            model:
              type: string
              description: |
                TTS model to route the request to. Controls which model pool
                serves this synthesis.

                - `lightning_v3.1` (default) — standard Lightning v3.1.
                - `lightning_v3.1_pro` — Lightning v3.1 Pro pool with a
                  curated voice catalog. See the
                  [Pro model card](/waves/model-cards/text-to-speech/lightning-v-3-1-pro).

                Same concurrency and latency profile across both. Other
                request fields behave identically.
              enum:
              - lightning_v3.1
              - lightning_v3.1_pro
              default: lightning_v3.1
            max_buffer_flush_ms:
              type: integer
              description: The maximum time (in ms) to wait for more input before generating output. It flushes when either this time is reached or enough input is received for optimal output—whichever comes first. This is useful for input streams. Defaults to 0
              default: 0
              maximum: 1000
              minimum: 0
            continue:
              type: boolean
              description: This setting controls whether the system should buffer and wait for more input after receiving the current one. If not set, it assumes no more input is coming.
              default: false
            flush:
              type: boolean
              description: This setting controls whether the system should flush the current buffer.
              default: false
            complete_backoff_ms:
              type: number
              description: The time in ms to wait after the last chunk is sent before sending the complete response. Default is 4000ms. Maximum is 10000ms.
              default: 4000
              minimum: 0
              maximum: 10000
            language:
              type: string
              description: |
                Language code for synthesis. Influences pronunciation,
                number/date normalization, and phoneme selection.

                Behavior depends on the chosen `model`:
                - `lightning_v3.1` — full language set (see model card).
                - `lightning_v3.1_pro` — English (`en`) and Hindi (`hi`) only;
                  pass `auto` for code-switching between them.
              default: en
              enum:
              - auto
              - en
              - hi
              - mr
              - kn
              - ta
              - bn
              - gu
              - te
              - ml
              - pa
              - or
              - es
            sample_rate:
              type: integer
              description: 'Audio sample rate in Hz. Supported values: 8000, 16000, 24000, 44100'
              default: 44100
            speed:
              type: number
              description: Speaking speed multiplier
              minimum: 0.5
              maximum: 2.0
              default: 1
            session_id:
              type: string
              description: Optional client-provided session identifier for correlation. Only alphanumeric characters, hyphens, underscores, and dots allowed. Max 128 characters. Echoed back in responses as `external_session_id`.
              maxLength: 128
              pattern: ^[a-zA-Z0-9_\-.]+$
            request_id:
              type: string
              description: Optional client-provided request identifier for correlation. Only alphanumeric characters, hyphens, underscores, and dots allowed. Max 128 characters. Echoed back in responses as `external_request_id`.
              maxLength: 128
              pattern: ^[a-zA-Z0-9_\-.]+$
            word_timestamps:
              type: boolean
              default: false
              description: |
                Opt in to per-word timing events for the synthesized audio. When `true`, the server interleaves `status: "word_timestamp"` frames with the audio `chunk` frames; each carries `data: { id, word, start, end }` where `start`/`end` are floats in seconds relative to the start of the audio stream, and `word` is verbatim from the input text (un-normalized — `"$100"` stays `"$100"`, not `"one hundred dollars"`). Supported on base-queue English + Hindi voices (`meher`, `devansh`, `kartik`, `maithili`, `liam`, `avery`); other voice families silently emit no word events (audio still works). Defaults to `false` so existing integrations see no change.
        examples:
        - name: basicTts
          payload:
            voice_id: magnus
            text: Hello, this is a sample text to convert to speech.
            sample_rate: 24000
            language: en
            speed: 1
        - name: proTts
          payload:
            voice_id: meher
            text: Hello from the Lightning v3.1 Pro pool.
            model: lightning_v3.1_pro
            sample_rate: 24000
            language: en
            speed: 1
      ttsResponse.message:
        name: TtsResponse
        contentType: application/json
        payload:
          type: object
          properties:
            session_id:
              type: string
              description: Internal session identifier (system-generated, stable for the WebSocket connection lifetime).
            request_id:
              type: string
              description: Internal request identifier (system-generated UUID, unique per TTS synthesis).
            external_session_id:
              type: string
              description: Echoed client-provided session_id (omitted if not provided).
            external_request_id:
              type: string
              description: Echoed client-provided request_id (omitted if not provided).
            status:
              type: string
              enum:
              - chunk
              - word_timestamp
              - complete
              description: |
                Frame type discriminator:
                - `chunk` — base64-encoded audio chunk in `data.audio`.
                - `word_timestamp` — per-word timing event in `data.{id,word,start,end}`. Only emitted when the request set `word_timestamps: true` and the voice family supports it.
                - `complete` — terminal frame; the server closes the WebSocket after this.
            data:
              type: object
              description: Frame-specific payload. Shape depends on `status` — see the per-frame examples below.
              properties:
                audio:
                  type: string
                  description: 'Base64-encoded audio chunk (present on `status: "chunk"` frames).'
                id:
                  type: integer
                  description: '0-indexed position of the word within the input text (present on `status: "word_timestamp"` frames).'
                word:
                  type: string
                  description: 'Exact substring from the input text, un-normalized — `"$100"` stays `"$100"`, `"25th"` stays `"25th"` (present on `status: "word_timestamp"` frames).'
                start:
                  type: number
                  description: 'Start of the word in seconds, relative to the start of the audio stream (present on `status: "word_timestamp"` frames).'
                end:
                  type: number
                  description: 'End of the word in seconds, relative to the start of the audio stream (present on `status: "word_timestamp"` frames).'
        examples:
        - name: audioChunk
          payload:
            session_id: ws_550e8400-e29b
            request_id: task_6ba7b810-9dad
            external_session_id: my-session-123
            external_request_id: my-request-456
            status: chunk
            data:
              audio: SGVsbG8gV29ybGQ=
        - name: wordTimestampEvent
          payload:
            session_id: ws_550e8400-e29b
            request_id: task_6ba7b810-9dad
            external_session_id: my-session-123
            external_request_id: my-request-456
            status: word_timestamp
            data:
              id: 2
              word: "$100"
              start: 1.12
              end: 1.92
        - name: completionStatus
          payload:
            session_id: ws_550e8400-e29b
            request_id: task_6ba7b810-9dad
            external_session_id: my-session-123
            external_request_id: my-request-456
            status: complete
    description: |
      # Live TTS WebSocket — `/waves/v1/tts/live`

      Real-time text-to-speech over a persistent WebSocket connection. The
      `model` field in the request payload selects which Lightning pool serves
      the synthesis.

      ## When to use this

      - **Use this** when text arrives incrementally (LLM token streams, live
        captioning, conversational pipelines where playback should start as
        soon as the first chunk is ready).
      - POST to `/waves/v1/tts/live` (SSE) when you have the full text up
        front but still want chunked playback. (Same URL, different
        protocol — HTTP POST gets you SSE; WSS connect gets you WebSocket.)
      - Use `/waves/v1/tts` (sync) when total latency doesn't matter.

      ## Selecting the model

      Pass `"model": "lightning_v3.1"` (default) or
      `"model": "lightning_v3.1_pro"` on each request. Concurrency and latency
      are identical across both. Voice catalogs differ — see the
      [Lightning v3.1](/waves/model-cards/text-to-speech/lightning-v-3-1) and
      [Lightning v3.1 Pro](/waves/model-cards/text-to-speech/lightning-v-3-1-pro)
      model cards for the per-model catalog.

      ## Optional features

      Set `word_timestamps: true` to receive per-word timing events
      interleaved with the audio chunks (`status: "word_timestamp"`).
      Supported on English + Hindi base-queue voices. See
      [Word-level timestamps](/waves/documentation/text-to-speech-lightning/word-timestamps).

      ## Migrating from `/waves/v1/lightning-v3.1/get_speech/stream`

      Same protocol, same payload shape — only the URL changes. Existing
      clients should:

      1. Update the WebSocket URL to `wss://api.smallest.ai/waves/v1/tts/live`.
      2. Optionally add `"model": "lightning_v3.1_pro"` to route to the Pro
         pool. Omitting `model` keeps the existing standard-pool behavior.

      Voice IDs, sample rates, auth, and the response/streaming format are
      unchanged, so downstream audio handling, jitter buffers, and barge-in
      logic stay the same.
operations:
  TtsRequest:
    action: send
    channel:
      $ref: '#/channels/ttsStream'
    summary: Send text-to-speech request
    description: Send a JSON message with `voice_id`, `text`, and optional parameters (including `model`) to generate speech audio.
    messages:
    - $ref: '#/channels/ttsStream/messages/ttsRequest.message'
  TtsResponse:
    action: receive
    channel:
      $ref: '#/channels/ttsStream'
    summary: Receive audio stream chunks
    description: Receive audio data chunks and completion status from the server.
    messages:
    - $ref: '#/channels/ttsStream/messages/ttsResponse.message'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token authentication
  schemas:
    AudioChunk:
      type: object
      properties:
        data:
          type: object
          properties:
            audio:
              type: string
              description: Base64-encoded audio chunk
    CompletionStatus:
      type: object
      properties:
        session_id:
          type: string
          description: Internal session identifier (system-generated).
        request_id:
          type: string
          description: Internal request identifier (system-generated).
        external_session_id:
          type: string
          description: Echoed client-provided session_id.
        external_request_id:
          type: string
          description: Echoed client-provided request_id.
        status:
          type: string
          enum:
          - complete
          description: Indicates that the streaming is complete
    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          enum:
          - error
        error:
          type: object
          properties:
            message:
              type: string
            code:
              type: string
