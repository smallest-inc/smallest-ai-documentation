asyncapi: 3.0.0
info:
  title: Waves Text-to-Speech API
  version: 1.0.0
  description:
    WebSocket-based streaming text-to-speech API for generating realistic
    voices
  contact:
    name: Waves API Support
    url: https://waves-api.smallest.ai/support
    email: support@smallest.ai
  license:
    name: Proprietary
servers:
  production:
    host: waves-api.smallest.ai
    pathname: /api/v1/lightning-v2/get_speech/stream
    protocol: wss
    description: Production WebSocket API endpoint
    security:
      - $ref: "#/components/securitySchemes/bearerAuth"
channels:
  lightningV2Stream:
    address: /api/v1/lightning-v2/get_speech/stream
    parameters:
      Authorization:
        description: "Bearer token for authentication. Format: Bearer YOUR_API_KEY"
        location: $message.header#/Authorization
      voice_id:
        description: The ID of the voice to use
        location: $message.payload#/voice_id
        schema:
          type: string
      text:
        description: The text to convert to speech
        location: $message.payload#/text
        schema:
          type: string
      max_buffer_flush_ms:
        description: The maximum time (in ms) to wait for more input before generating output. Defaults to 0
        location: $message.payload#/max_buffer_flush_ms
        required: false
        schema:
          type: integer
          default: 0
          minimum: 0
          maximum: 1000
      continue:
        description: This setting controls whether the system should buffer and wait for more input after receiving the current one. If not set, it assumes no more input is coming.
        location: $message.payload#/continue
        required: false
        schema:
          type: boolean
          default: false
      flush:
        description: This setting controls whether the system should flush the current buffer.
        location: $message.payload#/flush
        required: false
        schema:
          type: boolean
          default: false
      complete_backoff_ms:
        description: The time in ms to wait after the last chunk is sent before sending the complete response. Default is 4000ms. Maximum is 10000ms.
        location: $message.payload#/complete_backoff_ms
        required: false
        schema:
          type: number
          default: 4000
          minimum: 0
          maximum: 10000
      language:
        description: "The language code, available options: en, hi, mr, kn, ta, bn, gu, de, fr, es, it, pl, nl, ru, ar, he"
        location: $message.payload#/language
        required: false
        schema:
          type: string
          default: en
      sample_rate:
        description: Audio sample rate in Hz
        location: $message.payload#/sample_rate
        required: false
        schema:
          type: integer
          default: 24000
      speed:
        description: Speaking speed multiplier
        location: $message.payload#/speed
        required: false
        schema:
          type: number
          default: 1
          minimum: 0.1
          maximum: 5
      consistency:
        description: Voice consistency parameter
        location: $message.payload#/consistency
        required: false
        schema:
          type: number
          default: 0.5
          minimum: 0
          maximum: 1
      enhancement:
        description: Audio enhancement level
        location: $message.payload#/enhancement
        required: false
        schema:
          type: integer
          default: 1
          minimum: 0
          maximum: 2
      similarity:
        description: Voice similarity parameter
        location: $message.payload#/similarity
        required: false
        schema:
          type: number
          default: 0
          minimum: 0
          maximum: 1
    servers:
      - $ref: "#/servers/production"
    messages:
      ttsRequest:
        name: LightningV2TtsRequest
        contentType: application/json
        payload:
          type: object
          required:
            - voice_id
            - text
          properties:
            voice_id:
              type: string
              description: The ID of the voice to use
            text:
              type: string
              description: The text to convert to speech
            max_buffer_flush_ms:
              type: integer
              description:
                The maximum time (in ms) to wait for more input before
                generating output. It flushes when either this time is reached or
                enough input is received for optimal output—whichever comes first.
                This is useful for input streams. Deafults to 0
              default: 0
              maximum: 1000
              minimum: 0
            continue:
              type: boolean
              description:
                This setting controls whether the system should buffer
                and wait for more input after receiving the current one. If not set,
                it assumes no more input is coming.
              default: false
            flush:
              type: boolean
              description:
                This setting controls whether the system should flush the
                current buffer.
              default: false
            complete_backoff_ms:
              type: number
              description:
                The time in ms to wait after the last chunk is sent before
                sending the complete response. Default is 4000ms. Maximum is 10000ms.
              default: 4000
              minimum: 0
              maximum: 10000
            language:
              type: string
              description:
                "The language code, available options: `en`, `hi`, `mr`,
                `kn`, `ta`, `bn`, `gu`, `de`, `fr`, `es`, `it`, `pl`, `nl`, `ru`,
                `ar`, `he`"
              default: en
            sample_rate:
              type: integer
              description: Audio sample rate in Hz
              default: 24000
            speed:
              type: number
              description: Speaking speed multiplier
              minimum: 0.1
              maximum: 5
              default: 1
            consistency:
              type: number
              description: Voice consistency parameter
              minimum: 0
              maximum: 1
              default: 0.5
            enhancement:
              type: integer
              description: Audio enhancement level
              minimum: 0
              maximum: 2
              default: 1
            similarity:
              type: number
              description: Voice similarity parameter
              minimum: 0
              maximum: 1
              default: 0
        examples:
          - name: basicTts
            payload:
              voice_id: ryan
              text: Hello, this is a sample text to convert to speech.
              sample_rate: 24000
              language: en
              speed: 1
              consistency: 0.5
              enhancement: 1
              similarity: 0
      ttsResponse:
        name: LightningV2TtsResponse
        contentType: application/json
        payload:
          type: object
          properties:
            request_id:
              type: string
              description: Unique identifier for the TTS request
            status:
              type: string
              enum:
                - chunk
                - complete
              description:
                Status of the TTS request, `chunk` indicates incoming audio
                chunk, `complete` indicates completion.
            data:
              type: object
              properties:
                audio:
                  type: string
                  description: Base64-encoded audio chunk
        examples:
          - name: audioChunk
            payload:
              request_id: req_abc123
              status: chunk
              data:
                audio: SGVsbG8gV29ybGQ=
          - name: completionStatus
            payload:
              request_id: req_abc123
              status: complete
operations:
  ttsRequest:
    action: send
    channel:
      $ref: "#/channels/lightningV2Stream"
    summary: Send text-to-speech request
    description: Send a JSON message with voice_id, text, and optional parameters to generate speech audio.
    messages:
      - $ref: "#/channels/lightningV2Stream/messages/ttsRequest"
  ttsResponse:
    action: receive
    channel:
      $ref: "#/channels/lightningV2Stream"
    summary: Receive audio stream chunks
    description: Receive audio data chunks and completion status from the server.
    messages:
      - $ref: "#/channels/lightningV2Stream/messages/ttsResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token authentication
  schemas:
    AudioChunk:
      type: object
      properties:
        data:
          type: object
          properties:
            audio:
              type: string
              description: Base64-encoded audio chunk
    CompletionStatus:
      type: object
      properties:
        request_id:
          type: string
          description: Unique identifier for the TTS request
        status:
          type: string
          enum:
            - complete
          description: Indicates that the streaming is complete
    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - error
        error:
          type: object
          properties:
            message:
              type: string
            code:
              type: string
