asyncapi: 3.0.0
info:
  title: Waves Pulse STT (Speech-to-Text) API
  version: 1.0.0
  description: WebSocket-based streaming automatic speech recognition API for real-time speech transcription using the Pulse STT model
  contact:
    name: Waves API Support
    email: support@smallest.ai
  license:
    name: Proprietary
servers:
  production:
    host: api.smallest.ai
    pathname: /waves/v1/pulse/get_text
    protocol: wss
    description: Production WebSocket Pulse STT endpoint
    x-fern-server-name: waves-ws
    security:
    - $ref: '#/components/securitySchemes/bearerAuth'
    bindings:
      ws:
        query:
          type: object
          properties:
            language:
              type: string
              enum:
              - en
              - hi
              - de
              - es
              - ru
              - it
              - fr
              - nl
              - pt
              - zh
              - yue
              - ja
              - ko
              - gu
              - mr
              - or
              - bn
              - north_indic
              - multi-asian
              description: |
                Language code for transcription. Streaming supports 17 single-language codes and 2 regional aggregators.

                Single-language codes: `en`, `hi`, `de`, `es`, `ru`, `it`, `fr`, `nl`, `pt`, `zh`, `yue`, `ja`, `ko`, `gu`, `mr`, `or`, `bn`.

                Regional auto-detect aggregators for unknown audio:

                - `north_indic` — auto-detects across `en`, `hi`, `gu`, `mr`, `bn`, `or`.
                - `multi-asian` — auto-detects across `zh`, `yue`, `ko`, `ja`, `en`. Available on the US region only; contact sales for access in the India region.

                Set `language` explicitly to the known code for best accuracy.

                **Region note:** `zh`, `yue`, `ja`, `ko`, and the `multi-asian` aggregator are served from the US region only — connect to `wss://api.us.smallest.ai/waves/v1/pulse/get_text` for these. The default `wss://api.smallest.ai/...` host closes the connection without a transcription frame when an East Asian language is requested.

            encoding:
              type: string
              enum:
              - linear16
              - linear32
              - alaw
              - mulaw
              - opus
              - ogg_opus
              default: linear16
              description: Audio encoding format
            sample_rate:
              type: integer
              enum:
              - 8000
              - 16000
              - 22050
              - 24000
              - 44100
              - 48000
              description: 'Audio sample rate in Hz. Supported values: 8000, 16000, 22050, 24000, 44100, 48000.'
              default: 16000
            word_timestamps:
              type: string
              enum:
              - 'true'
              - 'false'
              default: 'true'
              description: Include word-level timestamps in transcription
            sentence_timestamps:
              type: string
              enum:
              - 'true'
              - 'false'
              default: 'false'
              description: Include sentence-level timestamps (utterances) in transcription
            redact_pii:
              type: string
              enum:
              - 'true'
              - 'false'
              default: 'false'
              description: Redact personally identifiable information (name, surname, address, etc)
            redact_pci:
              type: string
              enum:
              - 'true'
              - 'false'
              default: 'false'
              description: Redact payment card information (credit card, CVV, zip, account number, etc)
            format:
              type: string
              enum:
              - 'true'
              - 'false'
              default: 'true'
              description: 'Master formatting switch for transcript responses. When `false`,

                forces `punctuate=false`, `capitalize=false`, and also disables

                Inverse Text Normalization (ITN) so it cannot silently

                reintroduce punctuation or casing.


                When `true`, the `punctuate` and `capitalize` params take effect

                independently. Leave `format=true` and use those two to fine-tune.

                '
            punctuate:
              type: string
              enum:
              - 'true'
              - 'false'
              default: 'true'
              description: 'When `false`, strips end-of-sentence punctuation (`.`, `,`, `?`, `!`)

                from the final transcript, `words[].word`, and

                `utterances[].transcript`. Does not affect casing — use `capitalize`

                for that.


                Overridden to `false` when `format=false`.

                '
            capitalize:
              type: string
              enum:
              - 'true'
              - 'false'
              default: 'true'
              description: 'When `false`, lowercases the entire transcript output (final

                transcript, `words[].word`, and `utterances[].transcript`).

                Does not affect punctuation — use `punctuate` for that.


                Overridden to `false` when `format=false`.

                '
            eou_timeout_ms:
              type: integer
              minimum: 100
              maximum: 10000
              default: 800
              description: Time in milliseconds to wait after speech ends before flushing the transcript.
            diarize:
              type: string
              enum:
              - 'true'
              - 'false'
              default: 'false'
              description: Enable speaker diarization to identify different speakers in the audio.
            keywords:
              type: string
              description: 'Boost recognition of specific words or phrases for this session.

                Useful for product names, jargon, proper nouns, and other

                domain-specific terms the model might otherwise mis-transcribe.

                **Streaming (WebSocket) only** — not supported on the HTTP

                `/pulse/get_text` endpoint.


                **Format:** a single comma-separated string (not a JSON array).

                Each entry is a word or phrase, optionally followed by

                `:INTENSIFIER` — a numeric boost multiplier. Defaults to `1.0`

                when omitted.


                **Example:** `I:20,smiling:26`


                - Phrases can include spaces (`small language model:3.5`).

                - Intensifier accepts integers or decimals (`2`, `2.5`, `0.5`).

                - Mixing entries with and without intensifiers is fine.

                - Maximum 100 keywords per session.


                **INTENSIFIER range:** `0` to `20`. Recommended value is `6`.

                Higher values bias recognition more aggressively toward the

                keyword, but also **increase the risk of hallucination and

                repetition** in the transcript. Values of `10` or above are

                not recommended — the model may insert the keyword even when

                it was not spoken. Start around `3–6` and tune from there.

                '
              example: I:20,smiling:26
            itn_normalize:
              type: string
              enum:
              - 'true'
              - 'false'
              default: 'false'
              description: Enable Inverse Text Normalization to convert spoken-form entities (numbers, dates, currencies, phone numbers, etc.) into written form in finalized transcripts.
            finalize_on_words:
              type: string
              enum:
              - 'true'
              - 'false'
              default: 'true'
              description: When false, disables automatic word-count-based finalization. Use with itn_normalize for agentic pipelines where you control finalization via the finalize message.
            max_words:
              type: integer
              description: Maximum number of words before forced finalization. Useful for keeping ITN chunks short and accurate.
channels:
  pulseStream:
    address: /waves/v1/pulse/get_text
    parameters:
      Authorization:
        description: 'Bearer token for authentication. Format: Bearer YOUR_API_KEY'
        location: $message.header#/Authorization
    messages:
      pulseAudioData.message:
        name: PulseAudioData
        contentType: application/octet-stream
        payload:
          type: string
          format: binary
          description: Raw audio data chunk, transmitted in binary format using the selected encoding
          examples:
          - Binary audio data chunk (4096 bytes recommended)
      pulseFinalizeSignal.message:
        name: PulseFinalizeSignal
        contentType: application/json
        payload:
          type: object
          required:
          - type
          properties:
            type:
              type: string
              enum:
              - finalize
              description: Flush current audio buffer and force an immediate is_final transcript. The session remains open for more audio.
          examples:
          - type: finalize
      pulseCloseStreamSignal.message:
        name: PulseCloseStreamSignal
        contentType: application/json
        payload:
          type: object
          required:
          - type
          properties:
            type:
              type: string
              enum:
              - close_stream
              description: Signal the end of the audio stream. The server flushes remaining audio, delivers final transcripts, and responds with is_last=true.
          examples:
          - type: close_stream
      pulseTranscriptionResponse.message:
        name: PulseTranscriptionResponse
        contentType: application/json
        payload:
          type: object
          required:
          - session_id
          properties:
            session_id:
              type: string
              description: Unique identifier for the transcription session
            transcript:
              type: string
              description: Partial or complete transcription text for the current segment
            is_final:
              type: boolean
              default: false
              description: Indicates if this is the final transcription for the current segment
            is_last:
              type: boolean
              default: false
              description: Indicates if this is the last transcription in the session
            from_finalize:
              type: boolean
              default: false
              description: True when this final transcript was triggered by a manual finalize message rather than automatic finalization
            words:
              type: array
              description: Word-level timestamps (when word_timestamps=true)
              items:
                type: object
                properties:
                  word:
                    type: string
                    description: The transcribed word
                  start:
                    type: number
                    description: Start time in seconds
                  end:
                    type: number
                    description: End time in seconds
                  confidence:
                    type: number
                    description: Confidence score for the word (0.0 to 1.0)
                  speaker:
                    type: integer
                    description: Speaker label (when diarization is enabled)
                  speaker_confidence:
                    type: number
                    description: Confidence score for the speaker assignment (0.0 to 1.0)
            utterances:
              type: array
              description: Sentence-level timestamps (when sentence_timestamps=true)
              items:
                type: object
                properties:
                  text:
                    type: string
                    description: The transcribed sentence
                  start:
                    type: number
                    description: Start time in seconds
                  end:
                    type: number
                    description: End time in seconds
                  speaker:
                    type: integer
                    description: Speaker label (when diarization is enabled)
            language:
              type: string
              description: Detected primary language code, only returned when `is_final=True`
            languages:
              type: array
              description: List of codes of languages detected in the audio, only returned when `is_final=True`
              items:
                type: string
            redacted_entities:
              type: array
              description: List of redacted entity placeholders (when redact_pii or redact_pci is enabled)
              items:
                type: string
          examples:
          - session_id: sess_12345abcde
            transcript: Hello, how are you?
            is_final: true
            is_last: false
            language: en
          - session_id: session_id_12346abcde
            transcript: I paid using my card [CREDITCARDCVV_1] with expiry [TIME_2].
            is_final: true
            is_last: true
            language: en
            languages:
            - en
            words:
            - word: I
              start: 0.0
              end: 0.2
              confidence: 0.98
              speaker: 0
              speaker_confidence: 0.95
            - word: paid
              start: 0.2
              end: 0.5
              confidence: 1.0
              speaker: 0
              speaker_confidence: 0.59
            - word: using
              start: 0.5
              end: 0.8
              confidence: 0.73
              speaker: 0
              speaker_confidence: 0.74
            - word: my
              start: 0.8
              end: 1.0
              confidence: 0.88
              speaker: 0
              speaker_confidence: 0.92
            - word: card
              start: 1.0
              end: 1.3
              confidence: 0.95
              speaker: 0
              speaker_confidence: 0.91
            - word: '[creditcardcvv_1]'
              start: 1.3
              end: 1.8
              confidence: 0.99
              speaker: 0
              speaker_confidence: 0.85
            - word: with
              start: 1.8
              end: 2.0
              confidence: 0.85
              speaker: 0
              speaker_confidence: 0.87
            - word: expiry
              start: 2.0
              end: 2.4
              confidence: 0.9
              speaker: 0
              speaker_confidence: 0.67
            - word: '[time_2]'
              start: 2.4
              end: 2.7
              confidence: 0.97
              speaker: 0
              speaker_confidence: 0.76
            utterances:
            - text: Hello, my name is [FIRSTNAME_1] [FIRSTNAME_2].
              start: 0.0
              end: 2.2
              speaker: 0
            - text: I paid using my card [CREDITCARDCVV_1] with expiry [TIME_2].
              start: 2.2
              end: 5.0
              speaker: 0
            redacted_entities:
            - '[FIRSTNAME_1]'
            - '[FIRSTNAME_2]'
            - '[CREDITCARDCVV_1]'
            - '[TIME_2]'
    description: |
      Transcribe audio in real time over a persistent WebSocket. The fit-for-purpose path for live captioning, voice agents, and any flow where you need partial transcripts as the user is still speaking.

      ## When to use this

      - **Use this** for live audio: microphone input, voice-agent turns, simultaneous interpretation, low-latency captioning. Partial results stream back while audio is still arriving.
      - **Use the pre-recorded REST endpoint** (`POST /waves/v1/pulse/get_text`) when you have a complete file. Single request, single response, less plumbing.

      ## How it works

      1. Open a WebSocket to `wss://api.smallest.ai/waves/v1/pulse/get_text` with `Authorization: Bearer <key>` and the session params (`language`, `sample_rate`, `encoding`, etc.) as query string.
      2. Stream raw PCM (or your chosen `encoding`) over the socket as binary frames.
      3. The server pushes back JSON `transcriptionResponse` messages — partial results (`is_final: false`) as you speak, finalized text (`is_final: true`) when an utterance closes.
      4. Send a `finalize` message to force end-of-utterance, or `close_stream` to end the session.

      ## Examples

      **Python** (real-time mic input)
      ```python
      import asyncio, json, websockets, pyaudio

      URL = "wss://api.smallest.ai/waves/v1/pulse/get_text?language=en&sample_rate=16000&encoding=linear16&word_timestamps=true"
      HEADERS = {"Authorization": f"Bearer {API_KEY}"}

      async def stream_mic():
          pa = pyaudio.PyAudio()
          stream = pa.open(format=pyaudio.paInt16, channels=1, rate=16000, input=True, frames_per_buffer=320)
          async with websockets.connect(URL, additional_headers=HEADERS) as ws:
              async def send_audio():
                  while True:
                      await ws.send(stream.read(320))
              async def recv_transcripts():
                  async for msg in ws:
                      data = json.loads(msg)
                      tag = "FINAL " if data.get("is_final") else "partial"
                      print(f"[{tag}] {data.get('transcript')}")
              await asyncio.gather(send_audio(), recv_transcripts())

      asyncio.run(stream_mic())
      ```

      **JavaScript / TypeScript** (using `ws`)
      ```typescript
      import WebSocket from "ws";
      import { readFileSync } from "node:fs";

      const params = new URLSearchParams({
        language: "en", sample_rate: "16000", encoding: "linear16", word_timestamps: "true",
      });
      const ws = new WebSocket(`wss://api.smallest.ai/waves/v1/pulse/get_text?${params}`, {
        headers: { Authorization: `Bearer ${process.env.SMALLEST_API_KEY}` },
      });

      ws.on("open", () => {
        const audio = readFileSync("./call.pcm"); // 16-bit mono PCM at 16 kHz
        for (let i = 0; i < audio.length; i += 3200) {
          ws.send(audio.subarray(i, i + 3200));
        }
        ws.send(JSON.stringify({ type: "finalize" }));
      });

      ws.on("message", (raw) => {
        const data = JSON.parse(raw.toString());
        const tag = data.is_final ? "FINAL " : "partial";
        console.log(`[${tag}] ${data.transcript}`);
        if (data.is_last) ws.close();
      });
      ```

      ## Common gotchas

      - **Match `sample_rate` to your audio.** The server will not resample for you — sending 44.1 kHz audio with `sample_rate=16000` produces garbage transcripts.
      - **`finalize` vs `close_stream`**: `finalize` ends the current utterance and triggers a final transcript without closing the session. `close_stream` ends the session entirely.
      - **`keywords` is WebSocket-only.** Pass them on connect for proper-noun / jargon boosting; not available on the REST endpoint.
      - **`format`/`punctuate`/`capitalize`** are accepted at the wire level today. They currently return the same transcript regardless of value — pass them in your integration so it works as the behavior changes.
      - **PII/PCI redaction (`redact_pii`, `redact_pci`)** runs server-side on finalized transcripts only — partials may show the unredacted text briefly before being replaced.
      - **JavaScript / TypeScript**: the official `smallestai` npm package predates the Pulse model, so connect with the `ws` library directly as shown above.
operations:
  sendAudioData:
    action: send
    channel:
      $ref: '#/channels/pulseStream'
    summary: Send audio data for transcription
    description: Stream audio data in chunks for real-time transcription
    messages:
    - $ref: '#/channels/pulseStream/messages/pulseAudioData.message'
  sendFinalizeSignal:
    action: send
    channel:
      $ref: '#/channels/pulseStream'
    summary: 'Turn-boundary signal — flush the current buffer, emit `is_final`, keep the session open'
    description: 'Flush the current audio buffer, run ITN over the accumulated utterance, and emit one `is_final` transcript. The WebSocket stays open and accepts audio for the next user turn. Send this once per turn in any multi-turn flow.'
    messages:
    - $ref: '#/channels/pulseStream/messages/pulseFinalizeSignal.message'
  sendCloseStreamSignal:
    action: send
    channel:
      $ref: '#/channels/pulseStream'
    summary: 'Session-end signal — flush remaining audio, emit `is_last`, close the socket'
    description: 'Flush any remaining buffered audio, emit the terminal `is_final` + `is_last` transcript, then close the WebSocket. Send this once at the actual end of the session — end of call, app shutdown, or after the entire buffer of a single-shot transcription is streamed.'
    messages:
    - $ref: '#/channels/pulseStream/messages/pulseCloseStreamSignal.message'
  receiveTranscription:
    action: receive
    channel:
      $ref: '#/channels/pulseStream'
    summary: Receive transcription results
    description: Get real-time transcription results as audio is processed
    messages:
    - $ref: '#/channels/pulseStream/messages/pulseTranscriptionResponse.message'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token authentication using Smallest AI API key
  schemas:
    TranscriptionResult:
      type: object
      properties:
        session_id:
          type: string
          description: Unique identifier for the transcription session
        transcript:
          type: string
          description: Transcribed text
        is_final:
          type: boolean
          description: Final transcription flag
        is_last:
          type: boolean
          description: Last transcription flag
    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          enum:
          - error
        error:
          type: object
          properties:
            message:
              type: string
            code:
              type: string
