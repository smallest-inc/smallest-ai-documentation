# Override file for lightning-v3.1-ws.yaml
# Adds unique type names to prevent collisions with other AsyncAPI files
# Maps server reference to match generators.yml environment URLs

servers:
  waves-ws:
    host: waves-api.smallest.ai
    pathname: /api/v1/lightning-v3.1/get_speech/stream
    protocol: wss
  production:
    x-fern-server-name: waves

channels:
  lightningV31Stream:
    x-fern-sdk-group-name: Lightning V3.1 TTS
    servers:
      - $ref: "#/servers/waves-ws"
    messages:
      lightningV31TtsRequest:
        name: LightningV31TtsRequest
      lightningV31TtsResponse:
        name: LightningV31TtsResponse

operations:
  "Lightning v3.1 Tts Request":
    action: send
  "Lightning v3.1 Tts Response":
    action: receive
