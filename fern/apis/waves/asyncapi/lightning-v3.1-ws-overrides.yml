# Override file for lightning-v3.1-ws.yaml
# Adds unique type names to prevent collisions with other AsyncAPI files
# Maps server reference to match generators.yml environment URLs

servers:
  waves-ws:
    host: api.smallest.ai
    pathname: /waves/v1/lightning-v3.1/get_speech/stream
    protocol: wss
  production:
    x-fern-server-name: waves

channels:
  lightningV31Stream:
    x-fern-sdk-group-name: Lightning V3.1 TTS
    servers:
      - $ref: "#/servers/waves-ws"
    messages:
      lightningV31TtsRequest.message:
        name: LightningV31TtsRequest
      lightningV31TtsResponse.message:
        name: LightningV31TtsResponse

operations:
  LightningV31TtsRequest:
    action: send
    x-fern-sdk-method-name: synthesize_streaming_lightning_v3_1
  LightningV31TtsResponse:
    action: receive
    x-fern-sdk-method-name: receive_synthesize_streaming_lightning_v3_1
