# Override file for lightning-asr-ws.yaml
# Adds unique type names to prevent collisions with other AsyncAPI files
# Maps server reference to match generators.yml environment URLs

servers:
  waves-ws:
    host: api.smallest.ai
    pathname: /waves/v1/lightning/get_text
    protocol: wss

channels:
  /waves/v1/lightning/get_text:
    x-fern-sdk-group-name: Lightning ASR Streaming
    servers:
      - $ref: "#/servers/waves-ws"
    messages:
      audioData.message:
        x-fern-type-name: LightningAudioData
        name: LightningAudioData
      endSignal.message:
        x-fern-type-name: LightningEndSignal
        name: LightningEndSignal
      transcriptionResponse.message:
        x-fern-type-name: LightningTranscriptionResponse
        name: LightningTranscriptionResponse

operations:
  sendAudioData:
    action: send
    x-fern-sdk-method-name: transcribe_streaming_lightning_send_audio
  sendEndSignal:
    action: send
    x-fern-sdk-method-name: transcribe_streaming_lightning_send_end_signal
  receiveTranscription:
    action: receive
    x-fern-sdk-method-name: receive_transcribe_streaming_lightning
