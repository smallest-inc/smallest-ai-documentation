asyncapi: 3.0.0
info:
  title: Lightning V3.1 Text-to-Speech WebSocket API
  version: 3.1.0
  description: WebSocket-based streaming text-to-speech API for Lightning V3.1 model
  contact:
    name: Waves API Support
    email: support@smallest.ai
  license:
    name: Proprietary
servers:
  production:
    host: api.smallest.ai
    pathname: /waves/v1/lightning-v3.1/get_speech/stream
    protocol: wss
    description: Production WebSocket API endpoint
    security:
    - $ref: '#/components/securitySchemes/bearerAuth'
channels:
  lightningV31Stream:
    address: /waves/v1/lightning-v3.1/get_speech/stream
    parameters:
      Authorization:
        description: 'Bearer token for authentication. Format: Bearer YOUR_API_KEY'
        location: $message.header#/Authorization
    servers:
    - $ref: '#/servers/production'
    messages:
      lightningV31TtsRequest.message:
        name: LightningV31TtsRequest
        contentType: application/json
        payload:
          type: object
          required:
          - voice_id
          - text
          properties:
            voice_id:
              type: string
              description: The ID of the voice to use
            text:
              type: string
              description: The text to convert to speech
            max_buffer_flush_ms:
              type: integer
              description: The maximum time (in ms) to wait for more input before generating output. It flushes when either this time is reached or enough input is received for optimal output—whichever comes first. This is useful for input streams. Defaults to 0
              default: 0
              maximum: 1000
              minimum: 0
            continue:
              type: boolean
              description: This setting controls whether the system should buffer and wait for more input after receiving the current one. If not set, it assumes no more input is coming.
              default: false
            flush:
              type: boolean
              description: This setting controls whether the system should flush the current buffer.
              default: false
            complete_backoff_ms:
              type: number
              description: The time in ms to wait after the last chunk is sent before sending the complete response. Default is 4000ms. Maximum is 10000ms.
              default: 4000
              minimum: 0
              maximum: 10000
            language:
              type: string
              description: |
                Language code for synthesis. Influences pronunciation, number/date
                normalization, and phoneme selection.

                - Indian: `en`, `hi`, `mr`, `kn`, `ta`, `bn`, `gu`, `te`, `ml`, `pa`, `or`
                - European: `es` (Spanish)
                - `auto` — auto-detect from input text
              default: en
              enum:
              - auto
              - en
              - hi
              - mr
              - kn
              - ta
              - bn
              - gu
              - te
              - ml
              - pa
              - or
              - es
            sample_rate:
              type: integer
              description: 'Audio sample rate in Hz. Supported values: 8000, 16000, 24000, 44100'
              default: 44100
            speed:
              type: number
              description: Speaking speed multiplier
              minimum: 0.5
              maximum: 2.0
              default: 1
            session_id:
              type: string
              description: Optional client-provided session identifier for correlation. Only alphanumeric characters, hyphens, underscores, and dots allowed. Max 128 characters. Echoed back in responses as `external_session_id`.
              maxLength: 128
              pattern: ^[a-zA-Z0-9_\-.]+$
            request_id:
              type: string
              description: Optional client-provided request identifier for correlation. Only alphanumeric characters, hyphens, underscores, and dots allowed. Max 128 characters. Echoed back in responses as `external_request_id`.
              maxLength: 128
              pattern: ^[a-zA-Z0-9_\-.]+$
        examples:
        - name: basicTts
          payload:
            voice_id: ryan
            text: Hello, this is a sample text to convert to speech.
            sample_rate: 24000
            language: en
            speed: 1
      lightningV31TtsResponse.message:
        name: LightningV31TtsResponse
        contentType: application/json
        payload:
          type: object
          properties:
            session_id:
              type: string
              description: Internal session identifier (system-generated, stable for the WebSocket connection lifetime).
            request_id:
              type: string
              description: Internal request identifier (system-generated UUID, unique per TTS synthesis).
            external_session_id:
              type: string
              description: Echoed client-provided session_id (omitted if not provided).
            external_request_id:
              type: string
              description: Echoed client-provided request_id (omitted if not provided).
            status:
              type: string
              enum:
              - chunk
              - complete
              description: Status of the TTS request, `chunk` indicates incoming audio chunk, `complete` indicates completion.
            data:
              type: object
              properties:
                audio:
                  type: string
                  description: Base64-encoded audio chunk
        examples:
        - name: audioChunk
          payload:
            session_id: ws_550e8400-e29b
            request_id: task_6ba7b810-9dad
            external_session_id: my-session-123
            external_request_id: my-request-456
            status: chunk
            data:
              audio: SGVsbG8gV29ybGQ=
        - name: completionStatus
          payload:
            session_id: ws_550e8400-e29b
            request_id: task_6ba7b810-9dad
            external_session_id: my-session-123
            external_request_id: my-request-456
            status: complete
    description: |
      # Lightning v3.1 WebSocket

      Synthesize speech over a persistent WebSocket. Audio chunks come back as text arrives — the fit-for-purpose path when *text itself* is streaming, like LLM token output.

      ## When to use this

      - **Use this** when text is generated incrementally and you want audio to start playing as soon as the first words are produced — LLM streaming, live captioning, voice agents.
      - **Use SSE streaming** when you have the full text up front but want low-latency playback.
      - **Use sync `/get_speech`** when latency isn't critical and a single buffer is easier to handle.

      ## How it works

      1. Open a WebSocket to `wss://api.smallest.ai/waves/v1/lightning-v3.1/get_speech/stream` with `Authorization: Bearer <key>`.
      2. Send a JSON message per text chunk: `{ "voice_id": "magnus", "text": "...", "continue": true, "flush": false, ... }`. Set `continue: true` to keep the session open between sends.
      3. The server pushes back JSON messages with `data.audio` (base64 PCM) and a `status` field (`chunk`, `complete`).
      4. When you're done sending text, push one final message with `flush: true` and an empty `text` — the server finishes the buffer and sends `status: "complete"`.

      ## Concurrency and rate limits

      - 1 concurrency unit = 1 active TTS request at a time.
      - You can open up to 5 WebSocket connections per concurrency unit.
      - Requests beyond your concurrency limit are rejected with an error — queue on your side.

      Examples: 3 concurrency = up to 15 open sockets, but only 3 active synth requests at once.

      ## Examples

      **Python** (using `smallestai>=4.4.0` — the 4.3.1 compatibility shim):
      ```python
      from smallestai.waves import WavesStreamingTTS, TTSConfig

      config = TTSConfig(voice_id="magnus", api_key="YOUR_API_KEY", sample_rate=24000)
      tts = WavesStreamingTTS(config)

      def text_chunks():
          # Pretend this is your LLM streaming tokens.
          for word in ["Hello,", " I am", " streaming", " speech."]:
              yield word

      with open("speech.pcm", "wb") as out:
          for audio_chunk in tts.synthesize_streaming(text_chunks(), continue_stream=True, auto_flush=True):
              out.write(audio_chunk)
      ```

      For new code, you can also use the namespaced Fern client: `client.waves.lightning_v31tts.connect(...)` which returns a typed socket you drive yourself.

      **JavaScript / TypeScript** (using `ws`)
      ```typescript
      import WebSocket from "ws";

      const ws = new WebSocket("wss://api.smallest.ai/waves/v1/lightning-v3.1/get_speech/stream", {
        headers: { Authorization: `Bearer ${process.env.SMALLEST_API_KEY}` },
      });

      ws.on("open", () => {
        for (const text of ["Hello,", " I am", " streaming", " speech."]) {
          ws.send(JSON.stringify({
            voice_id: "magnus",
            text,
            sample_rate: 24000,
            continue: true,
            flush: false,
          }));
        }
        // Final flush
        ws.send(JSON.stringify({ voice_id: "magnus", text: "", flush: true }));
      });

      ws.on("message", (raw) => {
        const msg = JSON.parse(raw.toString());
        if (msg.status === "complete") return ws.close();
        const pcm = Buffer.from(msg.data.audio, "base64");
        // … hand pcm to your audio pipeline
      });
      ```

      ## Common gotchas

      - **`continue: true` keeps the session alive.** Without it, the server closes after the first chunk. Send `flush: true` with empty `text` when you're done.
      - **44.1 kHz is supported but most pipelines want 24 kHz.** Match your downstream sample rate to avoid resampling.
      - **Backpressure**: if you push text faster than the server can synthesize, audio chunks queue server-side. Watch for `complete_backoff_ms` in responses.
      - **One concurrency unit = one in-flight synth.** Holding 5 sockets open doesn't get you 5× throughput unless you upgrade concurrency.
      - **JavaScript / TypeScript**: the official `smallestai` npm package predates Lightning v3.1, so connect with the `ws` library directly as shown above.
operations:
  LightningV31TtsRequest:
    action: send
    channel:
      $ref: '#/channels/lightningV31Stream'
    summary: Send text-to-speech request
    description: Send a JSON message with voice_id, text, and optional parameters to generate speech audio.
    messages:
    - $ref: '#/channels/lightningV31Stream/messages/lightningV31TtsRequest.message'
  LightningV31TtsResponse:
    action: receive
    channel:
      $ref: '#/channels/lightningV31Stream'
    summary: Receive audio stream chunks
    description: Receive audio data chunks and completion status from the server.
    messages:
    - $ref: '#/channels/lightningV31Stream/messages/lightningV31TtsResponse.message'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token authentication
  schemas:
    AudioChunk:
      type: object
      properties:
        data:
          type: object
          properties:
            audio:
              type: string
              description: Base64-encoded audio chunk
    CompletionStatus:
      type: object
      properties:
        session_id:
          type: string
          description: Internal session identifier (system-generated).
        request_id:
          type: string
          description: Internal request identifier (system-generated).
        external_session_id:
          type: string
          description: Echoed client-provided session_id.
        external_request_id:
          type: string
          description: Echoed client-provided request_id.
        status:
          type: string
          enum:
          - complete
          description: Indicates that the streaming is complete
    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          enum:
          - error
        error:
          type: object
          properties:
            message:
              type: string
            code:
              type: string
