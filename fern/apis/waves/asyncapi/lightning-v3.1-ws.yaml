asyncapi: 3.0.0
info:
  title: Lightning V3.1 Text-to-Speech WebSocket API
  version: 3.1.0
  description: WebSocket-based streaming text-to-speech API for Lightning V3.1 model
  contact:
    name: Waves API Support
    email: support@smallest.ai
  license:
    name: Proprietary
servers:
  production:
    host: api.smallest.ai
    pathname: /waves/v1/lightning-v3.1/get_speech/stream
    protocol: wss
    description: Production WebSocket API endpoint
    security:
    - $ref: '#/components/securitySchemes/bearerAuth'
channels:
  lightningV31Stream:
    address: /waves/v1/lightning-v3.1/get_speech/stream
    parameters:
      Authorization:
        description: 'Bearer token for authentication. Format: Bearer YOUR_API_KEY'
        location: $message.header#/Authorization
    servers:
    - $ref: '#/servers/production'
    messages:
      lightningV31TtsRequest.message:
        name: LightningV31TtsRequest
        contentType: application/json
        payload:
          type: object
          required:
          - voice_id
          - text
          properties:
            voice_id:
              type: string
              description: The ID of the voice to use
            text:
              type: string
              description: The text to convert to speech
            max_buffer_flush_ms:
              type: integer
              description: The maximum time (in ms) to wait for more input before generating output. It flushes when either this time is reached or enough input is received for optimal output—whichever comes first. This is useful for input streams. Defaults to 0
              default: 0
              maximum: 1000
              minimum: 0
            continue:
              type: boolean
              description: This setting controls whether the system should buffer and wait for more input after receiving the current one. If not set, it assumes no more input is coming.
              default: false
            flush:
              type: boolean
              description: This setting controls whether the system should flush the current buffer.
              default: false
            complete_backoff_ms:
              type: number
              description: The time in ms to wait after the last chunk is sent before sending the complete response. Default is 4000ms. Maximum is 10000ms.
              default: 4000
              minimum: 0
              maximum: 10000
            language:
              type: string
              description: |
                Language code for synthesis. Influences pronunciation, number/date
                normalization, and phoneme selection.

                Indian: `en`, `hi`, `mr`, `kn`, `ta`, `bn`, `gu`.
                European: `de`, `fr`, `es`, `it`, `pl`, `nl`, `ru`.
                MENA: `ar`.
              default: en
              enum:
              - en
              - hi
              - mr
              - kn
              - ta
              - bn
              - gu
              - de
              - fr
              - es
              - it
              - pl
              - nl
              - ru
              - ar
            sample_rate:
              type: integer
              description: 'Audio sample rate in Hz. Supported values: 8000, 16000, 24000, 44100'
              default: 44100
            speed:
              type: number
              description: Speaking speed multiplier
              minimum: 0.5
              maximum: 2.0
              default: 1
            session_id:
              type: string
              description: Optional client-provided session identifier for correlation. Only alphanumeric characters, hyphens, underscores, and dots allowed. Max 128 characters. Echoed back in responses as `external_session_id`.
              maxLength: 128
              pattern: ^[a-zA-Z0-9_\-.]+$
            request_id:
              type: string
              description: Optional client-provided request identifier for correlation. Only alphanumeric characters, hyphens, underscores, and dots allowed. Max 128 characters. Echoed back in responses as `external_request_id`.
              maxLength: 128
              pattern: ^[a-zA-Z0-9_\-.]+$
        examples:
        - name: basicTts
          payload:
            voice_id: ryan
            text: Hello, this is a sample text to convert to speech.
            sample_rate: 24000
            language: en
            speed: 1
      lightningV31TtsResponse.message:
        name: LightningV31TtsResponse
        contentType: application/json
        payload:
          type: object
          properties:
            session_id:
              type: string
              description: Internal session identifier (system-generated, stable for the WebSocket connection lifetime).
            request_id:
              type: string
              description: Internal request identifier (system-generated UUID, unique per TTS synthesis).
            external_session_id:
              type: string
              description: Echoed client-provided session_id (omitted if not provided).
            external_request_id:
              type: string
              description: Echoed client-provided request_id (omitted if not provided).
            status:
              type: string
              enum:
              - chunk
              - complete
              description: Status of the TTS request, `chunk` indicates incoming audio chunk, `complete` indicates completion.
            data:
              type: object
              properties:
                audio:
                  type: string
                  description: Base64-encoded audio chunk
        examples:
        - name: audioChunk
          payload:
            session_id: ws_550e8400-e29b
            request_id: task_6ba7b810-9dad
            external_session_id: my-session-123
            external_request_id: my-request-456
            status: chunk
            data:
              audio: SGVsbG8gV29ybGQ=
        - name: completionStatus
          payload:
            session_id: ws_550e8400-e29b
            request_id: task_6ba7b810-9dad
            external_session_id: my-session-123
            external_request_id: my-request-456
            status: complete
    description: "# Lightning v3.1 WebSocket\n\nThe Lightning v3.1 WebSocket API provides real-time text-to-speech streaming capabilities with natural, expressive voice synthesis. This API uses WebSocket to deliver audio chunks as they're generated, enabling low-latency audio playback without waiting for the entire audio file to process.\n\n## Overview\n\nThe Lightning v3.1 WebSocket API delivers state-of-the-art text-to-speech synthesis through a persistent WebSocket connection, providing ultra-low latency audio streaming for applications that demand real-time voice generation. Unlike traditional HTTP-based TTS APIs, this WebSocket implementation streams audio chunks as they're processed, significantly reducing perceived latency and enabling seamless user experiences.\n\nLightning v3.1 is a 44 kHz model that produces natural, expressive, and realistic speech, with support for voice cloning.\n\n## Key Benefits\n\n* **Ultra-Low Latency**: Audio chunks delivered as soon as they're generated\n* **Real-Time Streaming**: Continuous audio delivery without waiting for complete text processing\n* **Natural Speech**: Expressive synthesis that sounds realistic\n* **Voice Cloning Support**: Compatible with cloned voices\n* **Persistent Connection**: Maintains connection for multiple requests, reducing connection overhead\n* **Interactive Applications**: Perfect for chatbots, voice assistants, and live communication systems\n\n## Use Cases\n\n* **Voice Assistants**: Real-time response generation for conversational AI\n* **Interactive Chatbots**: Immediate audio feedback for user interactions\n* **Live Streaming**: Real-time narration and commentary\n* **Accessibility Tools**: Screen readers and text-to-speech applications\n* **Gaming**: Dynamic voice generation for characters and narration\n* **Customer Service**: Automated voice responses with natural speech patterns\n\n## Concurrency and Rate Limits\n\nThis WebSocket API is subject to concurrency limits to ensure optimal performance for all users. Here's how it works:\n\n* **1 Concurrency Unit** = 1 active TTS request that can be processed at any given time\n* **5 WebSocket Connections** can be established per concurrency unit\n* **Total Connections** = Your concurrency limit × 5\n\n**Examples:**\n\n* **1 concurrency** = Up to 5 WebSocket connections, but only 1 active request\n* **3 concurrency** = Up to 15 WebSocket connections, but only 3 active requests simultaneously\n* **5 concurrency** = Up to 25 WebSocket connections, but only 5 active requests simultaneously\n\nWhile you can maintain multiple WebSocket connections, only your concurrency limit number of requests can be actively processed at once. Additional requests sent through any connection while at the concurrency limit will be rejected with an error.\n\nFor detailed information about concurrency limits, rate limiting, and best practices for handling these constraints, see our [Concurrency and Limits](/waves/api-reference/api-references/concurrency-and-limits) documentation.\n\n<Note>\n  When multiple requests are sent simultaneously beyond your concurrency limit,\n  additional requests will be rejected with an error. Implement proper error\n  handling and request queuing to manage concurrency effectively.\n</Note>\n"
operations:
  LightningV31TtsRequest:
    action: send
    channel:
      $ref: '#/channels/lightningV31Stream'
    summary: Send text-to-speech request
    description: Send a JSON message with voice_id, text, and optional parameters to generate speech audio.
    messages:
    - $ref: '#/channels/lightningV31Stream/messages/lightningV31TtsRequest.message'
  LightningV31TtsResponse:
    action: receive
    channel:
      $ref: '#/channels/lightningV31Stream'
    summary: Receive audio stream chunks
    description: Receive audio data chunks and completion status from the server.
    messages:
    - $ref: '#/channels/lightningV31Stream/messages/lightningV31TtsResponse.message'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token authentication
  schemas:
    AudioChunk:
      type: object
      properties:
        data:
          type: object
          properties:
            audio:
              type: string
              description: Base64-encoded audio chunk
    CompletionStatus:
      type: object
      properties:
        session_id:
          type: string
          description: Internal session identifier (system-generated).
        request_id:
          type: string
          description: Internal request identifier (system-generated).
        external_session_id:
          type: string
          description: Echoed client-provided session_id.
        external_request_id:
          type: string
          description: Echoed client-provided request_id.
        status:
          type: string
          enum:
          - complete
          description: Indicates that the streaming is complete
    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          enum:
          - error
        error:
          type: object
          properties:
            message:
              type: string
            code:
              type: string
