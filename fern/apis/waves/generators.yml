# yaml-language-server: $schema=https://schema.buildwithfern.dev/generators-yml.json
# NOTE: SDK generation for waves is now handled by the unified config (fern/apis/unified/generators.yml).
# This file only retains the API definition for reference by the unified config and docs.

api:
  default-environment: Production
  default-url: waves
  environments:
    Production:
      urls:
        waves: https://api.smallest.ai
        waves-ws: wss://api.smallest.ai
  specs:
    # OpenAPI specs - REST endpoints
    - openapi: openapi/waves-api.yaml
      overrides: openapi/waves-api-overrides.yaml
    - openapi: openapi/get-voices-openapi.yaml
      overrides: openapi/get-voices-openapi-overrides.yaml
    - openapi: openapi/voice-cloning-openapi.yaml
      overrides: openapi/voice-cloning-openapi-overrides.yaml
    - openapi: openapi/add-voice-openapi.yaml
      overrides: openapi/add-voice-openapi-overrides.yaml
    - openapi: openapi/get-cloned-voices-openapi.yaml
      overrides: openapi/get-cloned-voices-openapi-overrides.yaml
    - openapi: openapi/delete-cloned-voice-openapi.yaml
      overrides: openapi/delete-cloned-voice-openapi-overrides.yaml
    - openapi: openapi/asr-openapi.yaml
      overrides: openapi/asr-openapi-overrides.yaml
    - openapi: openapi/lightning-v3.1-openapi.yaml
      overrides: openapi/lightning-v3.1-openapi-overrides.yaml
    - openapi: openapi/pulse-stt-openapi.yaml
      overrides: openapi/pulse-stt-openapi-overrides.yaml

    # AsyncAPI specs - WebSocket streaming
    - asyncapi: asyncapi/stream-tts-ws.yaml
      overrides: asyncapi/stream-tts-ws-overrides.yml
    - asyncapi: asyncapi/asr-ws.yaml
      overrides: asyncapi/asr-ws-overrides.yml
    - asyncapi: asyncapi/lightning-v2-ws.yaml
      overrides: asyncapi/lightning-v2-ws-overrides.yml
    - asyncapi: asyncapi/lightning-v3.1-ws.yaml
      overrides: asyncapi/lightning-v3.1-ws-overrides.yml
    - asyncapi: asyncapi/pulse-stt-ws.yaml
      overrides: asyncapi/pulse-stt-ws-overrides.yml
