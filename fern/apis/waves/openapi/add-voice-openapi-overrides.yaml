paths:
  /waves/v1/lightning-large/add_voice:
    post:
      operationId: add_voice
      deprecated: true
      x-fern-sdk-method-name: add_voice
      x-fern-server-name: waves
      x-fern-audiences:
        - v2
        - v3
        - v4
      summary: Add your Voice (Deprecated)
      description: |
        **Deprecated** — use `POST /waves/v1/voice-cloning` instead. The new
        endpoint defaults to `lightning-v3.1`, supports optional metadata
        (description, accent, tags, language), and returns pre-generated
        sample clips in the response.

        This endpoint only creates voices on the `lightning-large` model.
        Voices cloned here are not directly usable on `lightning-v3.1` — it
        returns an empty audio response for them. Still live for backward
        compatibility; new integrations should use the unified endpoint.
