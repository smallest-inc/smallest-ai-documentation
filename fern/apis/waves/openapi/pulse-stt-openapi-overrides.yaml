# Override file for pulse-stt-openapi.yaml
# Ensures proper grouping under Speech to Text section
# Specifies waves server for all endpoints
# Assigns unique operationId to avoid naming conflict with lightning endpoint

paths:
  /waves/v1/pulse/get_text:
    post:
      x-fern-server-name: waves
      x-fern-audiences:
        - v4
      x-fern-sdk-method-name: transcribe_pulse
      operationId: transcribe_pulse
      tags:
        - Speech to Text
      summary: Pulse (Pre-Recorded)
