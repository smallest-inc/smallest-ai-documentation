# Override file for asr-openapi.yaml
# Renames the 'transcription' property to 'text' in SpeechToTextResponse
# Specifies waves server for all endpoints
# Groups under Speech to Text sub-client with method name 'lightning'
# Assigns unique operationId to avoid naming conflict with pulse endpoint
# Fixes 413/429 examples to match the merged ErrorResponse schema

paths:
  /waves/v1/lightning/get_text:
    post:
      x-fern-server-name: waves
      x-fern-audiences:
        - v4
      x-fern-sdk-method-name: transcribe_lightning
      operationId: transcribe_lightning
      responses:
        "200":
          content:
            application/json:
              schema:
                properties:
                  transcription:
                    x-fern-property-name: text
        "413":
          content:
            application/json:
              example:
                error:
                  code: "413"
                  message: "File size exceeds maximum limit of 25MB"
                status: error
        "429":
          content:
            application/json:
              example:
                error:
                  code: "429"
                  message: "Rate limit exceeded. Please try again later."
                status: error
