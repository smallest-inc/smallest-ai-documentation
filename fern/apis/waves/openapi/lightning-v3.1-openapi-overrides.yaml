# Override file for lightning-v3.1-openapi.yaml
# Changes tag to Text to Speech for proper grouping
# Fixes output_format enum and sample_rate enum to match backend

paths:
  /api/v1/lightning-v3.1/get_speech:
    post:
      tags:
        - Text to Speech
      summary: Generate speech (Lightning v3.1)
  /api/v1/lightning-v3.1/stream:
    post:
      tags:
        - Text to Speech
      summary: Stream speech (Lightning v3.1 SSE)

components:
  schemas:
    LightningV31Request:
      properties:
        # The following are the correct enum values for the output_format
        output_format:
          enum:
            - mp3
            - pcm
            - wav
            - ulaw
            - alaw
        sample_rate:
          enum:
            - 8000
            - 16000
            - 24000
