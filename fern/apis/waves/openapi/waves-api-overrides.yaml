      x-fern-audiences:
        - v2
        - v3
        - v4
      tags:
        - Lightning Large
      summary: Text to Speech
      description: Get speech for given text using the Waves API
      requestBody:
        content:
          application/json:
            schema:
              properties:
                output_format:
                  enum:
                    - pcm
