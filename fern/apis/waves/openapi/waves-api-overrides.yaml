# Override file for waves-api.yaml
# Reorganizes tags to match desired section structure
# Fixes output_format enum to match backend (pcm, wav, ulaw, alaw instead of pcm, mp3, wav, mulaw)
# Specifies waves server for all endpoints

paths:
  /api/v1/pronunciation-dicts:
    get:
      x-fern-server-name: waves
      x-fern-audiences:
        - v4
      tags:
        - Pronunciation Dictionaries
    post:
      x-fern-server-name: waves
      x-fern-audiences:
        - v4
      tags:
        - Pronunciation Dictionaries
    put:
      x-fern-server-name: waves
      x-fern-audiences:
        - v4
      tags:
        - Pronunciation Dictionaries
    delete:
      x-fern-server-name: waves
      x-fern-audiences:
        - v4
      tags:
        - Pronunciation Dictionaries
  /api/v1/lightning/get_speech:
    post:
      x-fern-server-name: waves
      tags:
        - Lightning
      summary: Generate speech (Lightning)
      requestBody:
        content:
          application/json:
            schema:
              properties:
                output_format:
                  enum:
                    - pcm
                    - wav
                    - ulaw
                    - alaw
  /api/v1/lightning-large/get_speech:
    post:
      x-fern-server-name: waves
      tags:
        - Lightning Large
      summary: Generate speech (Lightning Large)
      requestBody:
        content:
          application/json:
            schema:
              properties:
                output_format:
                  enum:
                    - pcm
                    - wav
                    - ulaw
                    - alaw
  /api/v1/lightning-large/stream:
    post:
      x-fern-server-name: waves
      tags:
        - Lightning Large
      summary: Stream speech (Lightning Large SSE)
      requestBody:
        content:
          application/json:
            schema:
              properties:
                output_format:
                  enum:
                    - pcm
                    - wav
                    - ulaw
                    - alaw
  /api/v1/lightning-v2/get_speech:
    post:
      x-fern-server-name: waves
      tags:
        - Lightning v2
      summary: Generate speech (Lightning v2)
      requestBody:
        content:
          application/json:
            schema:
              properties:
                output_format:
                  enum:
                    - pcm
                    - wav
                    - ulaw
                    - alaw
  /api/v1/lightning-v2/stream:
    post:
      x-fern-server-name: waves
      tags:
        - Lightning v2
      summary: Stream speech (Lightning v2 SSE)
      requestBody:
        content:
          application/json:
            schema:
              properties:
                output_format:
                  enum:
                    - pcm
                    - wav
                    - ulaw
                    - alaw
