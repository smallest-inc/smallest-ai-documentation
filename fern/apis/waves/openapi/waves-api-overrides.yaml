# Override file for waves-api.yaml
# Reorganizes tags to match desired section structure
# Fixes output_format enum to match backend (pcm, wav, ulaw, alaw instead of pcm, mp3, wav, mulaw)

paths:
  /api/v1/pronunciation-dicts:
    get:
      tags:
        - Pronunciation Dictionaries
    post:
      tags:
        - Pronunciation Dictionaries
    put:
      tags:
        - Pronunciation Dictionaries
    delete:
      tags:
        - Pronunciation Dictionaries
  /api/v1/lightning/get_speech:
    post:
      tags:
        - Text to Speech
      summary: Generate speech (Lightning)
      requestBody:
        content:
          application/json:
            schema:
              properties:
                output_format:
                  enum:
                    - pcm
                    - wav
                    - ulaw
                    - alaw
  /api/v1/lightning-large/get_speech:
    post:
      tags:
        - Text to Speech
      summary: Generate speech (Lightning Large)
      requestBody:
        content:
          application/json:
            schema:
              properties:
                output_format:
                  enum:
                    - pcm
                    - wav
                    - ulaw
                    - alaw
  /api/v1/lightning-large/stream:
    post:
      tags:
        - Text to Speech
      summary: Stream speech (Lightning Large SSE)
      requestBody:
        content:
          application/json:
            schema:
              properties:
                output_format:
                  enum:
                    - pcm
                    - wav
                    - ulaw
                    - alaw
  /api/v1/lightning-v2/get_speech:
    post:
      tags:
        - Text to Speech
      summary: Generate speech (Lightning v2)
      requestBody:
        content:
          application/json:
            schema:
              properties:
                output_format:
                  enum:
                    - pcm
                    - wav
                    - ulaw
                    - alaw
  /api/v1/lightning-v2/stream:
    post:
      tags:
        - Text to Speech
      summary: Stream speech (Lightning v2 SSE)
      requestBody:
        content:
          application/json:
            schema:
              properties:
                output_format:
                  enum:
                    - pcm
                    - wav
                    - ulaw
                    - alaw
