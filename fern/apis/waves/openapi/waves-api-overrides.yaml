# Override file for waves-api.yaml
# Reorganizes tags to match desired section structure
# Fixes output_format enum to match backend (pcm, wav, ulaw, alaw instead of pcm, mp3, wav, mulaw)
# Specifies waves server for all endpoints

paths:
  /waves/v1/pronunciation-dicts:
    get:
      operationId: get_pronunciation_dicts
      x-fern-sdk-method-name: get_pronunciation_dicts
      x-fern-server-name: waves
      x-fern-audiences:
        - v4
      tags:
        - Pronunciation Dictionaries
    post:
      operationId: create_pronunciation_dict
      x-fern-sdk-method-name: create_pronunciation_dict
      x-fern-server-name: waves
      x-fern-audiences:
        - v4
      tags:
        - Pronunciation Dictionaries
    put:
      operationId: update_pronunciation_dict
      x-fern-sdk-method-name: update_pronunciation_dict
      x-fern-server-name: waves
      x-fern-audiences:
        - v4
      tags:
        - Pronunciation Dictionaries
    delete:
      operationId: delete_pronunciation_dict
      x-fern-sdk-method-name: delete_pronunciation_dict
      x-fern-server-name: waves
      x-fern-audiences:
        - v4
      tags:
        - Pronunciation Dictionaries
  /waves/v1/lightning/get_speech:
    post:
      operationId: synthesize_lightning
      x-fern-sdk-method-name: synthesize_lightning
      x-fern-server-name: waves
      x-fern-audiences:
        - v2
        - v3
        - v4
      tags:
        - Lightning
      summary: Text to speech
      description: Get speech for given text using the Waves API
      requestBody:
        content:
          application/json:
            schema:
              properties:
                output_format:
                  enum:
                    - pcm
                    - wav
                    - ulaw
                    - alaw
  /waves/v1/lightning-large/get_speech:
