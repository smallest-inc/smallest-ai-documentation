paths:
  /api/v1/lightning-large:
    delete:
      x-fern-examples:
        - request:
            voiceId: a1b2c3d4-e5f6-7890-ab12-cd34ef567890
          response:
            body:
              success: true
              voiceId: a1b2c3d4-e5f6-7890-ab12-cd34ef567890
  /api/v1/lightning-large/stream:
    post:
      x-fern-examples:
        - request:
            text: Welcome to the Waves API. This is a demonstration of real-time text-to-speech streaming using the Lightning Large model.
            voice_id: en_us_male_01
  /api/v1/lightning-v2/stream:
    post:
      x-fern-examples:
        - request:
            text: Welcome to the Waves Lightning v2 text-to-speech streaming API. This service provides real-time audio synthesis for your applications.
            voice_id: en_us_male_01
  /api/v1/lightning/get_speech:
    post:
      x-fern-examples:
        - request:
            text: Welcome to the Waves text-to-speech API. This is a sample sentence to demonstrate speech synthesis.
            voice_id: lightning_en_us_male_01
            sample_rate: 22050
            speed: 1
            language: en
            output_format: wav
  /api/v1/lightning/get_voices:
    get:
      x-fern-examples:
        - path-parameters:
            model: lightning
          response:
            body:
              voices:
                - voiceId: wave-voice-1234
                  displayName: Emma
                  tags:
                    language:
                      - en-US
                    accent: American
                    gender: female
  /api/v1/lightning-large/add_voice:
    post:
      x-fern-examples:
        - request:
            displayName: John Doe Voice Sample
            file: john_doe_sample.wav
          response:
            body:
              message: Voice successfully added.
              data:
                voiceId: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                model: lightning-large-v1
                status: processing
  /api/v1/lightning-v2/get_speech:
    post:
      x-fern-examples:
        - request:
            text: Hello, welcome to the Waves text-to-speech API. This is a sample sentence to demonstrate speech synthesis.
            voice_id: en_us_001
            sample_rate: 22050
            speed: 1.1
            consistency: 0.6
            similarity: 0.3
            enhancement: 1
            language: en
            output_format: wav
            pronunciation_dicts:
              - dict_english_us
  /api/v1/lightning-large/get_cloned_voices:
    get:
      x-fern-examples:
        - response:
            body:
              voices:
                - displayName: Emma Johnson
                  accent: British English
                  tags:
                    - friendly
                    - professional
                    - clear
                  voiceId: voice_123abc456def
                  model: neural-tts-v2
                  status: active
                  createdAt: '2024-01-15T09:30:00Z'
  /api/v1/lightning-large/get_speech:
    post:
      x-fern-examples:
        - request:
            text: Welcome to the Waves text-to-speech API. This is a sample sentence to demonstrate speech synthesis.
            voice_id: en_us_001
            sample_rate: 22050
            speed: 1.1
            consistency: 0.6
            similarity: 0.3
            enhancement: 1
            language: en
            output_format: wav
            pronunciation_dicts:
              - tech_terms_v1
              - brand_names_2024
          response:
            body: UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YQAAAAA=
  /api/v1/pronunciation-dicts:
    delete:
      x-fern-examples:
        - request:
            id: 64f9a3b2c1d4e5f67890abcd
          response:
            body:
              id: 64f9a3b2c1d4e5f67890abcd
              deleted: true
  /api/v1/lightning-v3.1/stream:
    post:
      x-fern-examples:
        - request:
            text: Welcome to our virtual assistant. How can I help you today?
            voice_id: lightning_v3_1_female_en_us_001
  /api/v1/lightning-v3.1/get_speech:
    post:
      x-fern-examples:
        - request:
            text: Hello, welcome to our text-to-speech service. How can I assist you today?
            voice_id: lightning_v3.1_en_us_female_01
          response:
            body:
              audio_url: https://api.example.com/audio/123e4567-e89b-12d3-a456-426614174000.mp3
              format: mp3
              sample_rate: 44100
              duration_seconds: 5.2
              success: true
