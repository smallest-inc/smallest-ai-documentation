# Override file for get-voices-openapi.yaml
# Adds lightning-v3.1 to the model enum so SDK users can discover voices for that model
# Specifies waves server for all endpoints

paths:
  /api/v1/{model}/get_voices:
    get:
      x-fern-server-name: waves
      description: |
        Get voices supported for a given model using the new Waves API.
      parameters:
        - in: path
          name: model
          schema:
            enum:
              - lightning
              - lightning-large
              - lightning-v2
              - lightning-v3.1
