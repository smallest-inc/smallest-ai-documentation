# Override file for get-voices-openapi.yaml
# Adds lightning-v3.1 to the model enum so SDK users can discover voices for that model

paths:
  /api/v1/{model}/get_voices:
    get:
      parameters:
        - in: path
          name: model
          schema:
            enum:
              - lightning
              - lightning-large
              - lightning-v2
              - lightning-v3.1
