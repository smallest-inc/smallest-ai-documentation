paths:
  /waves/v1/lightning-large:
    delete:
      operationId: delete_voice
      x-fern-sdk-method-name: delete_voice
      x-fern-server-name: waves
      x-fern-audiences:
        - v2
        - v3
        - v4
      summary: Delete a Voice Clone
      description: |
        Delete a voice clone by `voiceId`. Despite the `/lightning-large/`
        path, this endpoint is model-agnostic — it deletes any voice clone
        on the authenticated organization, including clones created with
        the unified `POST /waves/v1/voice-cloning` endpoint (which default
        to `lightning-v3.1`).
