# yaml-language-server: $schema=https://schema.buildwithfern.dev/generators-yml.json
# Unified SDK configuration that combines both atoms and waves APIs as sub-resources
autorelease: true

replay:
  enabled: true

auth-schemes:
  bearer-auth:
    scheme: bearer
    token:
      env: SMALLEST_AI_TOKEN

api:
  auth: bearer-auth
  default-environment: Production
  default-url: atoms
  environments:
    Production:
      urls:
        atoms: https://api.smallest.ai/atoms/v1
        waves: https://waves-api.smallest.ai
        waves-ws: wss://waves-api.smallest.ai
  specs:
    # Atoms API - Agent Management
    - namespace: atoms
      openapi: ../atoms/openapi/openapi.yaml
      overrides: ../atoms/openapi/openapi-overrides.yaml

    # Waves API - Speech/TTS endpoints
    - namespace: waves
      openapi: ../waves/openapi/waves-api.yaml
      overrides: ../waves/openapi/waves-api-overrides.yaml
    - namespace: waves
      openapi: ../waves/openapi/get-voices-openapi.yaml
      overrides: ../waves/openapi/get-voices-openapi-overrides.yaml
    - namespace: waves
      openapi: ../waves/openapi/add-voice-openapi.yaml
      overrides: ../waves/openapi/add-voice-openapi-overrides.yaml
    - namespace: waves
      openapi: ../waves/openapi/get-cloned-voices-openapi.yaml
      overrides: ../waves/openapi/get-cloned-voices-openapi-overrides.yaml
    - namespace: waves
      openapi: ../waves/openapi/delete-cloned-voice-openapi.yaml
      overrides: ../waves/openapi/delete-cloned-voice-openapi-overrides.yaml
    - namespace: waves
      openapi: ../waves/openapi/asr-openapi.yaml
      overrides: ../waves/openapi/asr-openapi-overrides.yaml
    - namespace: waves
      openapi: ../waves/openapi/lightning-v3.1-openapi.yaml
      overrides: ../waves/openapi/lightning-v3.1-openapi-overrides.yaml
    - namespace: waves
      openapi: ../waves/openapi/pulse-stt-openapi.yaml
      overrides: ../waves/openapi/pulse-stt-openapi-overrides.yaml

    # Waves AsyncAPI specs - WebSocket streaming
    - namespace: waves
      asyncapi: ../waves/asyncapi/stream-tts-ws.yaml
      overrides: ../waves/asyncapi/stream-tts-ws-overrides.yml
    - namespace: waves
      asyncapi: ../waves/asyncapi/asr-ws.yaml
      overrides: ../waves/asyncapi/asr-ws-overrides.yml
    - namespace: waves
      asyncapi: ../waves/asyncapi/lightning-asr-ws.yaml
      overrides: ../waves/asyncapi/lightning-asr-ws-overrides.yml
    - namespace: waves
      asyncapi: ../waves/asyncapi/lightning-v2-ws.yaml
      overrides: ../waves/asyncapi/lightning-v2-ws-overrides.yml
    - namespace: waves
      asyncapi: ../waves/asyncapi/lightning-v3.1-ws.yaml
      overrides: ../waves/asyncapi/lightning-v3.1-ws-overrides.yml
    - namespace: waves
      asyncapi: ../waves/asyncapi/pulse-stt-ws.yaml
      overrides: ../waves/asyncapi/pulse-stt-ws-overrides.yml

groups:
  python-sdk:
    generators:
      - name: fernapi/fern-python-sdk
        version: 4.61.3
        output:
          location: pypi
          package-name: smallestai
        github:
          repository: fern-demo/smallest-ai-python-sdk
          mode: pull-request
        config:
          package_name: smallestai
          enable_wire_tests: true
          client:
            class_name: SmallestAI
            filename: client.py
          pydantic_config:
            skip_validation: true
          exclude_types_from_init_exports: true
          should_generate_websocket_clients: true
          extra_dependencies:
            fastapi: ">=0.115.0"
            uvicorn: ">=0.32.0"
            loguru: ">=0.7.0"
            openai: ">=2.0.0"
            python-dotenv: ">=1.0.0"
          mypy_exclude:
            - src/smallest_ai/atoms/agent
            - src/smallest_ai/atoms/helpers
            - src/smallest_ai/waves/text_to_speech/client.py
            - src/smallest_ai/waves/text_to_speech/raw_client.py
          additional_init_exports:
            - from: atoms.client
              imports:
                - AtomsClient
                - AsyncAtomsClient
            - from: waves.client
              imports:
                - WavesClient
                - AsyncWavesClient

  ts-sdk:
    generators:
      - name: fernapi/fern-typescript-node-sdk
        version: 3.53.3
        output:
          location: npm
          package-name: smallestai
        github:
          repository: fern-demo/smallest-ai-ts-sdk
        config:
          namespaceExport: SmallestAI
          packageManager: yarn
          testFramework: jest
          generateSubpackageExports: true

  go-sdk:
    generators:
      - name: fernapi/fern-go-sdk
        version: 1.26.1
        github:
          repository: fern-demo/smallest-ai-go-sdk
        config:
          packageName: smallestai
