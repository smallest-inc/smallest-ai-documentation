# yaml-language-server: $schema=https://schema.buildwithfern.dev/generators-yml.json
# Unified SDK configuration that combines both atoms and waves APIs as sub-resources
replay:
  enabled: true

auth-schemes:
  bearer-auth:
    scheme: bearer
    token:
      # Name the SDK constructor parameter `api_key` (Python) / `apiKey` (TS) —
      # NOT the Fern default `token`. This preserves the 4.4.7 surface where
      # customers write `SmallestAI(api_key=...)`; without this the 5.0.0
      # regen would silently break to `SmallestAI(token=...)`.
      name: api_key
      # Match the env var name used by the hand-written helpers
      # (smallestai.atoms.helpers.{call,campaign,audience,kb}) and the
      # cookbook .env.sample files — see app.smallest.ai/dashboard/api-keys.
      env: SMALLEST_API_KEY

api:
  auth: bearer-auth
  default-environment: Production
  default-url: atoms
  environments:
    Production:
      urls:
        atoms: https://api.smallest.ai/atoms/v1
        waves: https://api.smallest.ai
        waves-ws: wss://api.smallest.ai
  specs:
    # Atoms API - Agent Management
    - namespace: atoms
      openapi: ../atoms/openapi/openapi.yaml
      overrides: ../atoms/openapi/openapi-overrides.yaml

    # Waves API - Speech/TTS endpoints
    - namespace: waves
      openapi: ../waves/openapi/waves-api.yaml
      overrides: ../waves/openapi/waves-api-overrides.yaml
    - namespace: waves
      openapi: ../waves/openapi/get-voices-openapi.yaml
      overrides: ../waves/openapi/get-voices-openapi-overrides.yaml
    - namespace: waves
      openapi: ../waves/openapi/tts-openapi.yaml
      overrides: ../waves/openapi/tts-openapi-overrides.yaml
    # Unified STT — POST /waves/v1/stt/?model=pulse|pulse-pro. Supersedes
    # pulse-stt-openapi.yaml (POST /waves/v1/pulse/get_text), which had no
    # model param and could not reach Pulse Pro. The retired spec stays in
    # the repo for docs / API-ref rendering but no longer feeds SDK gen.
    - namespace: waves
      openapi: ../waves/openapi/stt-openapi.yaml
    - namespace: waves
      openapi: ../waves/openapi/voice-cloning-openapi.yaml
      overrides: ../waves/openapi/voice-cloning-openapi-overrides.yaml
    # Electron LLM — OpenAI-compatible chat completions at
    # POST /waves/v1/chat/completions with model=electron.
    - namespace: waves
      openapi: ../waves/openapi/electron-openapi.yaml

    # Waves AsyncAPI specs - WebSocket streaming
    - namespace: waves
      asyncapi: ../waves/asyncapi/tts-ws.yaml
      overrides: ../waves/asyncapi/tts-ws-overrides.yml
    - namespace: waves
      asyncapi: ../waves/asyncapi/stream-tts-ws.yaml
      overrides: ../waves/asyncapi/stream-tts-ws-overrides.yml
    # Unified STT WebSocket — WSS /waves/v1/stt/live?model=pulse.
    # Supersedes pulse-stt-ws.yaml. Legacy WS wiring dropped alongside the
    # REST swap above.
    - namespace: waves
      asyncapi: ../waves/asyncapi/stt-live-ws.yaml
    - namespace: waves
      asyncapi: ../waves/asyncapi/hydra-ws.yaml
      overrides: ../waves/asyncapi/hydra-ws-overrides.yml

groups:
  python-sdk:
    generators:
      - name: fernapi/fern-python-sdk
        # Kept on 5.12.12 — the version 5.0.0 shipped on, CI-green.
        #
        # PR #262 attempted a downgrade to 4.61.3 to "restore" sub-package
        # __init__ type exports under `exclude_types_from_init_exports: true`.
        # Empirical regen test showed this was the wrong fix:
        #   - 4.61.3's `core/` is missing helpers (`encode_path_param`,
        #     `_make_default_async_client`) that our preserved/.fernignore'd
        #     files import from → mypy failures on regen.
        #   - 4.61.3 also did NOT restore the sub-package type exports — the
        #     empty `__init__` symptom that motivated the downgrade reproduces
        #     on it.
        # So the downgrade broke `core/` API compatibility AND didn't achieve
        # its goal. Reverted here.
        #
        # The real fix for the sub-package import surface lives SDK-side:
        # `.fernignore` the 3 sub-package __init__s (waves already is; add
        # webhooks + prompt_scoring) so the hand-written type exports
        # persist across regens. That keeps us on a coherent 5.12.12 `core/`
        # with no version skew.
        version: 5.12.12
        # PyPI publishing is handled by the canonical
        # `smallest-inc/smallest-python-sdk` repo's own ci.yml — Fern just
        # opens a regen PR against that repo. The previous `output.location:
        # pypi` block here would double-publish whenever a regen merged, so
        # it is intentionally removed.
        github:
          repository: smallest-inc/smallest-python-sdk
          mode: pull-request
        config:
          package_name: smallestai
          enable_wire_tests: true
          client:
            class_name: SmallestAI
            filename: client.py
          pydantic_config:
            skip_validation: true
          # Flipped from true to false 2026-07-23. The stopgap that kept this
          # true was to work around missing sub-package __init__ type exports;
          # the SDK-side .fernignore additions for webhooks + prompt_scoring
          # made the workaround unnecessary. Confirmed safe on a box-verified
          # regen ahead of 5.2.0 (no manual __init__ patches needed).
          exclude_types_from_init_exports: false
          should_generate_websocket_clients: true
          extra_dependencies:
            fastapi: ">=0.115.0"
            uvicorn: ">=0.32.0"
            loguru: ">=0.7.0"
            openai: ">=2.0.0"
            python-dotenv: ">=1.0.0"
            # Used by smallestai.atoms.helpers.{call,kb,audience,campaign} at runtime.
            # Was previously only a dev dep; promoted here so a clean regen keeps it.
            requests: ">=2.31.0"
          mypy_exclude:
            - src/smallestai/atoms/agent
            - src/smallestai/atoms/helpers
            - src/smallestai/waves/text_to_speech/client.py
            - src/smallestai/waves/text_to_speech/raw_client.py
          additional_init_exports:
            - from: atoms.client
              imports:
                - AtomsClient
                - AsyncAtomsClient
            - from: waves.client
              imports:
                - WavesClient
                - AsyncWavesClient

  ts-sdk:
    generators:
      - name: fernapi/fern-typescript-node-sdk
        version: 3.53.3
        output:
          location: npm
          package-name: smallestai
        github:
          repository: smallest-inc/smallest-ai-ts-sdk
        config:
          namespaceExport: SmallestAI
          packageManager: yarn
          testFramework: jest
          generateSubpackageExports: true

  go-sdk:
    generators:
      - name: fernapi/fern-go-sdk
        version: 1.26.1
        github:
          repository: smallest-inc/smallest-ai-go-sdk
        config:
          packageName: smallestai
