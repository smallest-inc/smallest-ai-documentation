  /agent/{id}/branches/{branchId}/revisions/{revisionId}/restore:
    post:
      operationId: restoreRevision
      summary: Restore a revision
      x-fern-sdk-group-name: agent_versioning_revisions
      x-fern-sdk-method-name: restore
      description: |
        Republish an older revision as a new revision at the head of this branch. Restore does not overwrite history; the older revision keeps its ID, and a new revision is committed on top.

        The response mirrors `POST /agent/{id}/branches/{branchId}/draft/publish`: `200 committed` if the scan is synchronous, `202 scanning` if deferred. Only one publish or restore can be in flight per branch at a time.
      tags:
        - Agent Versioning - Revisions
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/BranchId"
        - $ref: "#/components/parameters/RevisionId"
      responses:
        "200":
          description: Restored synchronously.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/RestoreRevisionResult"
        "202":
          description: Security scan queued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/RestoreRevisionResult"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          description: Forbidden. Source revision has not passed its security scan, or the caller lacks write access.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "404":
          $ref: "#/components/responses/NotFoundErrorResponse"
        "409":
          $ref: "#/components/responses/ConflictErrorResponse"
        "423":
          $ref: "#/components/responses/LockedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

