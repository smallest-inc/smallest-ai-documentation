openapi: 3.0.0
info:
  title: Agent Management API
  version: 1.0.0
  description: API for managing agents, their templates, and call logs

paths:
  /user:
    get:
      summary: Get user details
      tags:
        - User
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      _id:
                        type: string
                        description: The ID of the user
                      firstName:
                        type: string
                        description: The first name of the user
                      lastName:
                        type: string
                        description: The last name of the user
                      userEmail:
                        type: string
                        description: The email of the user
                      authProvider:
                        type: string
                        description: The authentication provider of the user
                      isEmailVerified:
                        type: boolean
                        description: Whether the user's email is verified
                      organizationId:
                        type: string
                        description: The organization ID of the user

        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /organization:
    get:
      summary: Get organization details
      tags:
        - Organization
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      _id:
                        type: string
                        description: The organization ID
                      name:
                        type: string
                        description: The organization name
                      members:
                        type: array
                        items:
                          type: object
                          properties:
                            _id:
                              type: string
                              description: The member ID
                            userEmail:
                              type: string
                              description: The member email
                      subscription:
                        type: object
                        properties:
                          planId:
                            type: string
                            description: The subscription plan ID

        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/template:
    get:
      summary: Get agent templates
      x-fern-sdk-group-name: agent_templates
      x-fern-sdk-method-name: list_agent_templates
      tags:
        - Agent Templates
      security:
        - BearerAuth: []
      parameters:
        - name: region
          in: query
          required: false
          description: Filter templates by region. Omit to return all templates.
          schema:
            type: string
            enum:
              - us
              - in
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                          description: Stable unique identifier for the template (24-character hex string, e.g. `6942a64ac74fc65e7bc94e47`). Surfaced as `object_id` in the generated SDK to keep it distinct from the human-readable `id` slug.
                          x-fern-property-name: object_id
                        id:
                          type: string
                          description: Human-readable slug for the agent template (e.g. `sp-medical-centre-receptionist-in`). Distinct from `_id`.
                        name:
                          type: string
                          description: The name of the agent template
                        description:
                          type: string
                          description: The description of the agent template
                        avatarUrl:
                          type: string
                          description: The avatar URL of the agent template
                        referenceUrl:
                          type: string
                          description: The docs URL of the agent template
                        industry:
                          type: string
                          description: The industry the template is designed for (e.g. "Finance", "Healthcare")
                        useCase:
                          type: string
                          description: The use case the template addresses (e.g. "Lead Generation")
                        callType:
                          type: string
                          description: The type of calls the template handles
                          enum:
                            - Inbound
                            - Outbound
                            - Both
                        workflowType:
                          type: string
                          description: The workflow architecture of the template
                          enum:
                            - SINGLE_PROMPT
                            - WORKFLOW_GRAPH
                        region:
                          type: string
                          description: Human-readable region the template is available in
                          enum:
                            - India
                            - US
                        trending:
                          type: boolean
                          description: Whether the template is featured or trending
                        defaultLanguage:
                          type: string
                          description: The default language configured in the template
                          enum:
                            - English
                            - Hindi
                            - Marathi
                            - Gujarati
                        singlePromptConfig:
                          type: object
                          description: Configuration for single-prompt agents
                          properties:
                            _id:
                              type: string
                              description: Auto-generated unique identifier for the embedded single-prompt config (24-character hex string). Always present when `singlePromptConfig` is set. Surfaced as `object_id` in the generated SDK.
                              x-fern-property-name: object_id
                            prompt:
                              type: string
                              description: The system prompt used by the agent
                            tools:
                              type: array
                              description: Tools available to the agent
                              items:
                                type: object
                                properties:
                                  type:
                                    type: string
                                    description: The tool type — drives runtime dispatch.
                                    enum:
                                      - end_call
                                      - transfer_call
                                      - api_call
                                      - extract_dynamic_variables
                                      - knowledge_base_search
                                  name:
                                    type: string
                                    description: The name of the tool
                                  description:
                                    type: string
                                    description: What the tool does
                                  input_schema:
                                    type: object
                                    description: JSON Schema describing the tool's input parameters

        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/from-template:
    post:
      summary: Create agent from template
      tags:
        - Agent Templates
      security:
        - BearerAuth: []
      description: We have created templates for some common use cases. You can use these templates to create an agent. For getting list of templates, you can use the /agent/template endpoint. It will give you the list of templates with their description and id. You can pass the id of the template in the request body to create an agent from the template.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentFromTemplateRequest"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: string
                    example: "60d0fe4f5311236168a109ca"
                    description: The ID of the created agent
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent:
    post:
      summary: Create a new agent
      x-fern-sdk-group-name: agents
      x-fern-sdk-method-name: create_agent
      tags:
        - Agents
      security:
        - BearerAuth: []
      description: |
        Create a new agent by passing the agent name in the request body.

        New agents have versioning enabled by default. To set the prompt,
        `firstMessage`, tools, or any runtime config, fork a draft from the
        auto-created initial version, edit it, publish, and activate — see
        the [Versioning Lifecycle](/atoms/developer-guide/build/agents/versioning-lifecycle)
        guide for the full flow.

        The legacy `PATCH /workflow/{workflowId}` endpoint writes directly to
        the underlying workflow document and bypasses the version lifecycle;
        edits made that way are not captured as a version and may not
        propagate to live calls. Use the drafts flow above.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentRequest"
      responses:
        "201":
          description: Agent created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: string
                    example: "60d0fe4f5311236168a109ca"
                    description: The ID of the created agent

        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

    get:
      summary: Get all agents
      x-fern-sdk-group-name: agents
      x-fern-sdk-method-name: list_agents
      tags:
        - Agents
      security:
        - BearerAuth: []
      description: Agents are the main entities in the system. Agents are used to create conversations. You can create workflow for an agent and configure it for different use cases. You can also create custom workflows for an agent. This API will give you the list of agents created by organization you are a part of.
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
            description: Page number
        - in: query
          name: offset
          schema:
            type: integer
            default: 10
            description: Number of items to return per page
        - in: query
          name: search
          schema:
            type: string
            description: Search query
        - in: query
          name: type
          required: false
          schema:
            type: string
            enum:
              - single_prompt
              - workflow_graph
          description: Filter agents by workflow type
        - in: query
          name: sortField
          required: false
          schema:
            type: string
            default: createdAt
            enum:
              - createdAt
              - updatedAt
              - totalCalls
              - name
              - workflowType
          description: Field to sort results by
        - in: query
          name: sortOrder
          required: false
          schema:
            type: string
            default: desc
            enum:
              - asc
              - desc
          description: Sort direction
        - in: query
          name: archived
          required: false
          schema:
            type: boolean
            default: false
          description: When true, returns only archived agents. Omit or set to false to return active agents.
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      agents:
                        type: array
                        items:
                          $ref: "#/components/schemas/AgentDTO"
                      total:
                        type: number
                        description: Total number of agents

        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
  /agent/with-ai:
    post:
      operationId: createAgentWithAi
      summary: Create agent with AI
      x-fern-ignore: true
      description: |
        Creates a new agent using AI generation. Accepts either a guided questionnaire (array of Q&A pairs) or a free-text description. The AI generates the agent's prompt and configuration. A security check is run on the generated prompt before the agent is persisted. Deducts credits on success.

        **Rules:**
        - Either `questions` (non-empty array) or `description` must be provided — not both.
        - `emotiveToggle`, `voiceId`, and `voiceModel` must either all be present or all be absent.
        - When `emotiveToggle=true`, `voiceModel` must be `GPT_REALTIME`.
        - When `emotiveToggle=false`, `voiceModel` cannot be `GPT_REALTIME`.
      tags:
        - Agents
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 50
                  description: Agent name. Auto-generated if omitted.
                description:
                  type: string
                  maxLength: 15000
                  description: Free-text description. Required if `questions` not given.
                questions:
                  type: array
                  description: Guided Q&A pairs. Required if `description` not given.
                  items:
                    type: object
                    required: [question, answer]
                    properties:
                      question:
                        type: string
                        minLength: 1
                        maxLength: 2000
                      answer:
                        type: string
                        minLength: 50
                        maxLength: 15000
                type:
                  type: string
                  enum: [single_prompt]
                  description: Workflow type. Only `single_prompt` is supported.
                emotiveToggle:
                  type: boolean
                  description: Enable emotive (GPT Realtime) mode. Must be given with `voiceId` and `voiceModel`.
                voiceId:
                  type: string
                  description: Voice ID. Must be given together with `emotiveToggle` and `voiceModel`.
                voiceModel:
                  type: string
                  description: Voice model. Must be given together with `emotiveToggle` and `voiceId`.
                knowledgeBaseId:
                  type: string
                  description: Knowledge base to attach (must belong to the organization).
      responses:
        "201":
          description: Agent created — returns the new agent's ObjectId
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: string
                    description: MongoDB ObjectId of the created agent
        "400":
          description: Invalid request body, or the generated prompt failed the security check
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestErrorResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          description: Organization lacks access to the requested workflow type or model (WORKFLOW_GRAPH, GPT 5.2, Electron Kogta)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
        "503":
          description: Security check service temporarily unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /agent/{id}/duplicate:
    post:
      summary: Duplicate agent to another organization
      x-fern-sdk-group-name: agents
      x-fern-sdk-method-name: duplicate_agent
      description: |
        Duplicates a SINGLE_PROMPT agent's live active version into a target organization
        (can also be the same organization). Copies all versioned configuration but strips
        organization-specific resources: knowledge base tools are removed, default variable
        values are blanked, and a new avatar is generated. The duplicate starts with a
        published V1 as its active version.

        **400 is returned when:**
        - The source agent is archived (`"Cannot duplicate an archived agent"`)
        - The agent has no `activeVersionId` (`"This agent has no active version and cannot be duplicated"`)
        - The active version exists but is not published/active (`"This agent has no active published version and cannot be duplicated"`)
        - The agent is not `SINGLE_PROMPT` workflow type
      tags:
        - Agents
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The ID of the source agent to duplicate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - targetOrganizationId
              properties:
                targetOrganizationId:
                  type: string
                  pattern: "^[a-fA-F0-9]{24}$"
                  description: |
                    MongoDB ObjectId of the target organization. Must be a 24-character hex string.
                    The authenticated user must be a member of this organization.
                  example: "60d0fe4f5311236168a109ca"
      responses:
        "201":
          description: Agent duplicated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      _id:
                        type: string
                        example: "60d0fe4f5311236168a109cb"
                        description: The ID of the newly created agent
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          description: Forbidden — authenticated user is not a member of the target organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestErrorResponse"
        "404":
          description: |
            Not found. Possible messages:
            - `"Agent not found"` — source agent doesn't exist or doesn't belong to the caller's org
            - `"Target organization not found"` — the `targetOrganizationId` doesn't exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  # ── Deprecated: Workflow endpoints (still live) ────────────────────────
  # Both still work in production and are actively used by customers, but
  # they bypass the versioning system. Prefer PATCH /agent/{id}/drafts/{draftId}/config
  # for writes and GET /agent/{id} for reads.

  /agent/{id}:
    get:
      summary: Get agent by ID
      x-fern-sdk-group-name: agents
      x-fern-sdk-method-name: get_agent
      description: |
        Returns the agent document merged with the resolved config of the active version
        under `_resolvedConfig`. Non-versioned fields (name, telephonyProductId, allowInboundCall,
        etc.) sit at the top level; versioned fields (prompt, tools, language, synthesizer,
        post-call analytics, …) are resolved from the target version and exposed under `_resolvedConfig`.

        **Previewing a draft or specific version**

        Pass `?draftId=<id>` to resolve config from a specific draft instead of the active version.
        Pass `?versionId=<id>` to resolve config from a specific published version.
        When either param is used, the response includes `_configSource: "draft" | "version" | "active"`
        indicating which config was resolved.

        Notable resolved fields in `_resolvedConfig`:

        - `prompt` — active version's single-prompt text
        - `tools` — configured tools on the resolved version
        - `postCallAnalyticsConfig` — disposition metrics + analytics model flags
        - `modelName` — LLM model name on the resolved version
        - `defaultLanguage`, `supportedLanguages` — active language config
        - `firstMessage`, `globalPrompt` — active messaging config
        - `workflowGraph` — full node graph for `workflow_graph` agents

        To read prompt + tools alone, use `GET /agent/{id}/workflow` (deprecated for
        new integrations but still live). To inspect a specific non-active version,
        use `GET /agent/{id}/versions/{versionId}`.

        **400 — also used for "not found":** if the agent ID does not exist in the
        organization, the API returns 400 with `errors: ["No agent found"]` rather than 404.
      tags:
        - Agents
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            minLength: 1
            description: |
              Agent identifier (Mongo ObjectId string). Must be non-empty.
              An empty `id` would resolve to `GET /agent/`, which is the list
              endpoint — Fern adds the `minLength: 1` guard so the generated
              SDK raises locally rather than silently calling the wrong route.
        - in: query
          name: draftId
          required: false
          schema:
            type: string
          description: Resolve `_resolvedConfig` from this draft instead of the active version. Sets `_configSource` to `"draft"` in the response.
        - in: query
          name: versionId
          required: false
          schema:
            type: string
          description: Resolve `_resolvedConfig` from this published version instead of the active version. Sets `_configSource` to `"version"` in the response.
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/AgentDTO"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    patch:
      summary: Update agent metadata
      x-fern-sdk-group-name: agents
      x-fern-sdk-method-name: update_agent
      description: |
        Update agent fields. Behavior depends on whether the agent has versioning enabled:

        **Versioned agents** (have an active published version): only metadata fields are accepted —
        `name`, `description`, `avatarUrl`, `telephonyProductId`, `allowInboundCall`, `visibleToEveryone`.
        Submitting any config-level field returns 400 with
        `"Agent has versioning enabled. Config changes must be made through drafts."`.
        Use `PATCH /agent/{id}/drafts/{draftId}/config` instead.

        **Non-versioned agents** (no active version): all configuration fields are accepted,
        the same full set as `POST /agent`.

        **400 is also returned when:**
        - The agent is locked (`"Agent is locked, please unlock it to update"`)
        - Cross-field constraint violated (e.g. `north_indic` language requires `transcriberType: pulse`)

        **403** is returned when selecting a gated model (`gpt-5.2`, `electron-kogta`, `electron-kogta-v2`)
        without org-level access.
      tags:
        - Agents
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentRequest"
      responses:
        "200":
          description: Agent updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: string
                    example: "60d0fe4f5311236168a109ca"
                    description: The ID of the updated agent
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          description: Agent not found
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/prompt-config:
    get:
      operationId: getAgentPromptConfig
      summary: Get AI creation questionnaire config
      x-fern-ignore: true
      description: |
        Returns the questionnaire configuration used by the "Create with AI" flow — the list of guided questions, their types, available options, and pre-filled example answers per label. Only a user token is required; no organization auth needed.
      tags:
        - Agents
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Questionnaire configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      questions:
                        type: array
                        description: Ordered list of questions shown in the agent creation wizard
                        items:
                          type: object
                          properties:
                            text:
                              type: string
                            type:
                              type: string
                              description: "Question input type (e.g. `text`, `select`)"
                            options:
                              type: array
                              items:
                                type: string
                            examples:
                              type: object
                              description: Pre-filled sample answers keyed by label. `"default"` is always present.
                              additionalProperties:
                                type: string
                      exampleLabels:
                        type: array
                        description: Labels other than `"default"` that example answer sets exist for
                        items:
                          type: string
                      defaultLabel:
                        type: string
                        example: default
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/{id}/widget-config:
    get:
      operationId: getAgentWidgetConfig
      summary: Get widget configuration
      description: Returns the current web widget configuration for the agent. Also includes `assistantId` (same as the agent ID) as a convenience field for the widget embed code.
      tags:
        - Agents
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Agent ObjectId
      responses:
        "200":
          description: Widget configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    description: All fields may be absent if not yet configured
                    properties:
                      assistantId:
                        type: string
                        description: Same as the agent ID — convenience field for the widget embed code
                      position:
                        type: string
                        enum: [bottom-right, bottom-left, top-right, top-left]
                      size:
                        type: string
                        enum: [tiny, compact, full]
                      borderRadius:
                        type: number
                      mode:
                        type: string
                        enum: [chat, voice]
                      theme:
                        type: string
                        enum: [light, dark]
                      baseColor:
                        type: string
                      accentColor:
                        type: string
                      title:
                        type: string
                      startButtonText:
                        type: string
                      endButtonText:
                        type: string
                      avatarUrl:
                        type: string
                        nullable: true
                      voiceShowTranscript:
                        type: boolean
                      consentRequired:
                        type: boolean
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "404":
          description: Agent not found
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    patch:
      operationId: updateAgentWidgetConfig
      summary: Update widget configuration
      description: |
        Updates the web widget configuration for the agent. Only provided fields are updated (partial update). When `avatarUrl` is changed, the old CDN avatar is automatically deleted from S3. The `avatarUrl` must be a URL from the platform's CDN domain — use `POST /agent/{id}/avatar/presigned-url` to upload first.
      tags:
        - Agents
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
