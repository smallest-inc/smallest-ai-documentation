      tags:
        - Phone Numbers
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      telephonyProducts:
                        type: array
                        items:
                          $ref: "#/components/schemas/Product"
                      customProducts:
                        type: array
                        items:
                          $ref: "#/components/schemas/Product"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /product/get-available-numbers:
    get:
      summary: Search rentable phone numbers in inventory
      x-fern-sdk-group-name: phone_numbers
      x-fern-sdk-method-name: search_rentable
      description: |
        Searches the telephony provider's inventory for available numbers matching the requested country (and optional area code). Returns up to 5 candidates per call.

        Use the returned `phoneNumber` value in [`POST /product/rent-number`](#operation/rentPhoneNumber) to actually rent it.
      tags:
        - Phone Numbers
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: countryCode
          required: true
          schema:
            type: string
          example: "US"
          description: ISO 3166-1 alpha-2 country code (e.g. `US`, `IN`, `GB`).
        - in: query
          name: provider
          required: true
          schema:
            type: string
            enum: [plivo, twilio]
          description: Telephony provider to search.
        - in: query
          name: areaCode
          required: false
          schema:
            type: string
          description: Optional area-code / region filter — provider-dependent (US area codes for plivo/twilio, etc.).
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        phoneNumber:
                          type: string
                          description: E.164-style number without the leading `+`. Pass exactly this value to `POST /product/rent-number`.
                          example: "13183747513"
                        countryCode:
                          type: string
                          example: "US"
                        provider:
                          type: string
                          enum: [plivo, twilio]
                          example: "plivo"
                        areaCode:
                          type: string
                          description: Region / state / area-code label returned by the provider.
                          example: "Louisiana"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /product/proration-amount:
    get:
      summary: Preview prorated rental cost for renting a phone number today
      description: |
        Returns the immediate prorated charge for renting one phone number from today through the end of the current billing cycle, plus the recurring monthly rate. Use this to show a "you'll be charged $X today" preview before calling [`POST /product/rent-number`](#operation/rentPhoneNumber).

        Returns `400` if the organization doesn't have the phone-numbers feature configured (contact support) or if the org is currently locked (e.g. unpaid invoices — call [`GET /product/unpaid-invoices`](#operation/getUnpaidInvoices) first to check).
      tags:
        - Phone Numbers
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      immediateCharge:
                        type: number
                        format: float
                        description: Amount that will be charged today (USD).
                        example: 5.3
                      perNumberRecurringAmount:
                        type: number
                        format: float
                        description: Monthly per-number recurring charge after the prorated first period (USD).
                        example: 10
                      monthlyRate:
                        type: number
                        format: float
                        example: 10
                      prorationAmount:
                        type: number
                        format: float
                        example: 5.3
                      daysRemaining:
                        type: integer
                        example: 16
                      daysInMonth:
                        type: integer
                        example: 30
                      proratedValue:
                        type: number
                        format: float
                        description: Fraction of the month remaining (`daysRemaining / daysInMonth`).
                        example: 0.53
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /product/rent-number:
    post:
      summary: Rent a phone number from the telephony inventory
      x-fern-sdk-group-name: phone_numbers
      x-fern-sdk-method-name: rent
      description: |
        Rents an available number returned by [`GET /product/get-available-numbers`](#operation/searchAvailablePhoneNumbers). Charges the organization the prorated amount returned by [`GET /product/proration-amount`](#operation/getProrationAmount) immediately, then the monthly rate on each billing cycle.

        Always call `GET /product/proration-amount` first to surface the immediate charge to your customer. The endpoint may return `200` with a body containing `requiresAction: true` when payment requires customer interaction (3-D Secure, etc.) — handle that branch in your client.

        Released later via [`POST /product/release-number`](#operation/releasePhoneNumber).
      tags:
        - Phone Numbers
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phoneNumber, provider]
              properties:
                phoneNumber:
                  type: string
                  description: The number to rent — exactly as returned by `GET /product/get-available-numbers` (no leading `+`).
                  example: "13183747513"
                provider:
                  type: string
                  enum: [plivo, twilio]
      responses:
        "200":
          description: Rental processed. Inspect `data.requiresAction` to determine whether the customer needs to complete a payment-method action.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      requiresAction:
                        type: boolean
                        description: If `true`, payment requires further customer action (3-D Secure / SCA). Surface the client-secret flow.
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /product/release-number:
    post:
      summary: Release a rented phone number
      x-fern-sdk-group-name: phone_numbers
      x-fern-sdk-method-name: release
      description: |
        Releases a phone number previously rented via `POST /product/rent-number`. The number goes back into provider inventory and recurring charges stop.

        Returns `400` if the number is still assigned to an agent — detach it from the agent first (`PATCH /agent/{agentId}` with `productId: null`).
      tags:
        - Phone Numbers
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId]
              properties:
                productId:
                  type: string
                  description: 24-char hex MongoDB ObjectId of the phone-number product to release (the `_id` value returned by `GET /product/phone-numbers`).
                  example: "6969109c84c74bed175f02a7"
      responses:
        "200":
          description: Number released
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                        example: true
        "400":
          description: |
            Number is still assigned to an agent (detach it first), or invalid product ID format.
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /product/manage-subscription:
    get:
      summary: Get Stripe Customer Portal URL
      description: |
        Returns a time-limited Stripe Customer Portal URL the user can open to manage their subscription (update payment method, view invoices, etc.). Returns an empty object if the organization isn't on a Stripe-backed plan.
      tags:
        - Phone Numbers
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      url:
                        type: string
                        format: uri
                        description: Time-limited Stripe Customer Portal URL. Empty object if not applicable.
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /product/unpaid-invoices:
    get:
      summary: Check whether the organization has unpaid invoices
      description: |
        Returns whether the org has unpaid invoices that would block destructive actions (renting numbers, etc.). Call this before any billable mutation to surface the "Pay outstanding balance" flow.
      tags:
        - Phone Numbers
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      paymentRequired:
                        type: boolean
                        description: When `true`, the org has at least one unpaid invoice. Surface a "Pay balance" CTA before allowing further billable actions.
                        example: false
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /product/import-phone-number:
    post:
      summary: Import a SIP phone number
      x-fern-sdk-group-name: phone_numbers
      x-fern-sdk-method-name: import_sip
      description: |
        Bring your own SIP trunk by importing an existing phone number with its SIP termination URL.
        Atoms creates both inbound and outbound SIP trunks so your number works for making and receiving calls through the platform.

        If `name` is omitted, a name is auto-generated from the phone number and user ID.
      tags:
        - Phone Numbers
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phoneNumber
                - sipTerminationUrl
              properties:
                phoneNumber:
                  type: string
                  description: Your existing phone number. E.164 format is recommended but not enforced server-side — any non-empty string is accepted.
                  example: "+14155551234"
                sipTerminationUrl:
                  type: string
                  description: Your SIP provider's termination host — a hostname or IP address, optionally with a port (e.g. "sip.your-provider.com:5060"). Full SIP URIs ("sip:" / "sips:") are also accepted and automatically normalized to the bare host.
                  example: "trunk.your-provider.com"
                name:
                  type: string
                  description: A friendly display name for this number
                  example: "Main Support Line"
                sipUsername:
                  type: string
                  description: Username for SIP authentication (if your trunk requires it)
                  example: "my-sip-user"
                sipPassword:
                  type: string
                  description: Password for SIP authentication (if your trunk requires it)
                  example: "my-sip-password"
            example:
              phoneNumber: "+14155551234"
              sipTerminationUrl: "trunk.your-provider.com"
              name: "Main Support Line"
              sipUsername: ""
              sipPassword: ""
      responses:
        "200":
          description: Phone number imported successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      _id:
                        type: string
                        description: Unique identifier of the created product
                        example: "507f1f77bcf86cd799439011"
                      productType:
                        type: string
                        enum: [custom]
                        description: The type of product created — always `custom` for imported SIP numbers
                        example: "custom"
                      isActive:
                        type: boolean
                        description: Whether the number is active and ready to use
                        example: true
                      attributes:
                        type: object
                        properties:
                          name:
                            type: string
                            description: Display name for the number
                            example: "Main Support Line"
                          phoneNumber:
                            type: string
                            description: The imported phone number
                            example: "+14155551234"
                          outboundSipTrunkId:
                            type: string
                            description: Identifier for the outbound SIP trunk created
                            example: "ST_xxxxxxxxxxxx"
                          inboundSipTrunkId:
                            type: string
                            description: Identifier for the inbound SIP trunk created
                            example: "ST_xxxxxxxxxxxx"
                      agentId:
                        type: string
                        nullable: true
                        description: ID of the agent assigned to this number (null if unassigned)
                        example: null
                      createdAt:
                        type: string
                        format: date-time
                        description: Timestamp when the product was created
                        example: "2026-03-16T12:00:00.000Z"
                      updatedAt:
                        type: string
                        format: date-time
                        description: Timestamp when the product was last updated
                        example: "2026-03-16T12:00:00.000Z"
        "400":
          description: |
            Bad request — missing required fields or phone number already imported.
            Exact error when a duplicate number is submitted: `"Number already present"`
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  errors:
                    type: array
                    items:
                      type: string
                    description: List of validation error messages
                    example: ["Phone number is required"]
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /compliance/status:
    get:
      summary: Get compliance status
      description: |
        Returns the current compliance status for a given country, number type, and user type.
        This is the single endpoint the frontend uses to determine which step to render
        (form, submitted, accepted, rejected, expired, or suspended).
      tags:
        - Compliance
      security:
        - BearerAuth: []
      parameters:
        - name: countryIso
          in: query
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 2
          description: |
            ISO 3166-1 alpha-2 country code. Must be exactly 2 characters (e.g. "IN", "US"). Sending 3+ characters returns 400.
          example: "IN"
        - name: numberType
          in: query
          required: true
          schema:
            type: string
            enum: [local, mobile, tollfree]
          description: The type of phone number
          example: "local"
        - name: userType
          in: query
          required: true
          schema:
            type: string
            enum: [individual, business]
          description: The type of end user
          example: "business"
      responses:
        "200":
          description: Compliance status retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      step:
                        type: string
                        enum: [form, submitted, accepted, rejected, expired, suspended]
                        description: |
                          The current compliance step:
                          - `form` — no application exists, user should submit one
                          - `submitted` — application is under review
                          - `accepted` — approved, user can rent numbers
                          - `rejected` — rejected, user can resubmit with corrected documents
                          - `expired` — compliance expired
                          - `suspended` — compliance suspended
                        example: "form"
                      application:
                        nullable: true
                        description: The existing compliance application, or null if none exists
                        $ref: "#/components/schemas/ComplianceApplication"
                      requiredDocuments:
                        type: array
                        description: Document types required for this country/numberType/userType combination
                        items:
                          $ref: "#/components/schemas/RequiredDocumentType"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
        "502":
          description: Bad gateway — Plivo's compliance API returned an error or is unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestErrorResponse"

  /compliance/requirements:
    get:
      summary: Get compliance requirements
      description: |
        Discover what documents are required for a given country, number type, and user type.
        Results are cached for 1 hour. Returns an empty `documentTypes` array if no compliance
        is needed for the given combination.
      tags:
        - Compliance
      security:
        - BearerAuth: []
      parameters:
        - name: countryIso
          in: query
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 2
          description: |
            ISO 3166-1 alpha-2 country code. Must be exactly 2 characters (e.g. "IN", "US"). Sending 3+ characters returns 400.
          example: "IN"
        - name: numberType
          in: query
          required: true
          schema:
            type: string
            enum: [local, mobile, tollfree]
          description: The type of phone number
          example: "local"
        - name: userType
          in: query
          required: true
          schema:
            type: string
            enum: [individual, business]
          description: The type of end user
          example: "business"
      responses:
        "200":
          description: Requirements retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/ComplianceRequirement"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
        "502":
          description: Bad gateway — Plivo's compliance API returned an error or is unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestErrorResponse"

  /compliance/applications:
    post:
      summary: Submit a compliance application
      x-fern-sdk-group-name: compliance
      x-fern-sdk-method-name: submit
      description: |
        Submit a new compliance application with end-user details and supporting documents.
        One application is allowed per organization per country per number type per user type.

        The request uses `multipart/form-data` because documents are uploaded inline.
        The `endUser` and `documents` fields are JSON strings embedded in the form data.
      tags:
        - Compliance
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - countryIso
                - numberType
                - userType
                - endUser
                - documents
                - files
              properties:
                countryIso:
                  type: string
                  minLength: 2
                  maxLength: 2
                  description: ISO 3166-1 alpha-2 country code
                  example: "IN"
                numberType:
                  type: string
                  enum: [local, mobile, tollfree]
                  description: The type of phone number
                  example: "local"
                userType:
                  type: string
                  enum: [individual, business]
                  description: The type of end user
                  example: "business"
                endUser:
                  type: string
                  description: |
                    JSON-stringified end-user details. `name` is required; all other fields are optional
                    but may be required by Plivo depending on country/numberType. Accepted fields:

                    - `name` (required) — full name or business name
                    - `lastName` — last name
                    - `email` — email address
                    - `addressLine1` — street address line 1
                    - `addressLine2` — street address line 2
                    - `city` — city
                    - `state` — state or province
                    - `postalCode` — postal/ZIP code
                    - `country` — ISO country code; defaults to `countryIso` if omitted
                    - `registrationNumber` — business registration number (required for some business applications)
                  example: '{"name":"Acme Corp","email":"legal@acme.com","addressLine1":"123 Main St","city":"Mumbai","state":"MH","postalCode":"400001","country":"IN"}'
                documents:
                  type: string
                  description: |
                    JSON string containing an array of document metadata. Each entry must have a
                    `documentTypeId` (from the requirements endpoint) and optional `dataFields`.
                    Example:
                    ```json
                    [{"documentTypeId": "dt_123", "dataFields": {"business_name": "Acme Corp"}}]
                    ```
                  example: '[{"documentTypeId": "dt_123", "dataFields": {"business_name": "Acme Corp"}}]'
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: |
                    Document files in the same order as the `documents` metadata array.
                    Accepted formats: PDF, JPEG, PNG. Maximum 5 MB per file, up to 10 files.
      responses:
        "201":
          description: Application submitted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/ComplianceApplication"
        "400":
          description: Validation error — invalid JSON, unsupported file type, or file count mismatch (`"Expected X files, got Y"`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestErrorResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "409":
          description: |
            A compliance application already exists for this country/numberType combination.
            Exact message: `"A compliance application already exists for {countryIso}/{numberType}. Status: {status}"`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
        "502":
          description: Bad gateway — Plivo's compliance API returned an error or is unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestErrorResponse"

  /compliance/applications/{id}:
    patch:
      summary: Resubmit a rejected compliance application
      x-fern-sdk-group-name: compliance
      x-fern-sdk-method-name: resubmit
      description: |
        Resubmit a previously rejected compliance application with corrected documents.
        Only applications in `rejected` status can be resubmitted. All documents must be
        re-uploaded — partial updates are not supported.

        File/document count must match exactly. Mismatch returns 400 with message `"Expected X files, got Y"`.
      tags:
        - Compliance
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The compliance application ID
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - documents
                - files
              properties:
                documents:
                  type: string
                  description: |
                    JSON string containing an array of document metadata. Same format as
                    the create endpoint.
                  example: '[{"documentTypeId": "dt_123", "dataFields": {"business_name": "Acme Corp"}}]'
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: |
                    Replacement document files. Must match the length of the `documents` array.
                    Accepted formats: PDF, JPEG, PNG. Maximum 5 MB per file.
      responses:
        "200":
          description: Application resubmitted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/ComplianceApplication"
        "400":
          description: Application is not in rejected status, file count mismatch, or other validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestErrorResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "404":
          description: Application not found or does not belong to this organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
        "502":
          description: Bad gateway — Plivo's compliance API returned an error or is unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestErrorResponse"

  /compliance/applications/{id}/refresh:
    post:
      summary: Refresh compliance application status
      description: |
        Manually poll Plivo for the latest status of a compliance application.
        Use this as a fallback when webhooks are delayed. The frontend enforces a
        60-second cooldown between refreshes.
      tags:
        - Compliance
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The compliance application ID
      responses:
        "200":
          description: Application status refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/ComplianceApplication"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "404":
          description: Application not found or does not belong to this organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
        "502":
          description: Bad gateway — Plivo's compliance API returned an error or is unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestErrorResponse"

  /webhook:
    get:
      summary: Get webhooks
      description: Retrieve all webhooks for the organization or a specific webhook by ID
      tags:
        - Webhooks
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: webhookId
          schema:
            type: string
          description: Optional MongoDB ObjectId (24-char hex) of a specific webhook to retrieve. If omitted, returns all webhooks for the organization.
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    oneOf:
                      - $ref: "#/components/schemas/Webhook"
                      - type: array
                        items:
                          $ref: "#/components/schemas/Webhook"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    post:
      summary: Create a webhook
      x-fern-sdk-group-name: webhooks
      x-fern-sdk-method-name: create
      description: |
        Create a new webhook with subscriptions for specific agents and events.

        **400 is also returned when the endpoint URL is already registered:**
        `"A webhook with this URL has already been registered"`
      tags:
        - Webhooks
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                endpoint:
                  type: string
                  description: The webhook endpoint URL
                  example: "https://example.com/webhook"
                description:
                  type: string
                  description: The description of the webhook
                  example: "Webhook for conversation events"
                events:
                  type: array
                  description: Array of events to subscribe to
                  items:
                    type: object
                    required:
                      - agentId
                      - eventType
                    properties:
                      agentId:
                        type: string
                        description: The ID of the agent
                        example: "60d0fe4f5311236168a109ca"
                      eventType:
                        type: string
                        enum: [pre-conversation, post-conversation, analytics-completed]
                        description: The type of event to subscribe to
                        example: "post-conversation"
              required:
                - endpoint
                - description
                - events
      responses:
        "201":
          description: Webhook created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: string
                    description: The ID of the created webhook
                    example: "60d0fe4f5311236168a109ca"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
  /webhook-events/pre-conversation:
    post:
      x-fern-webhook: true
      tags:
        - Webhooks
      summary: pre-conversation
      operationId: webhookEventPreConversation
      description: |
        Fired **before** the agent begins speaking. Use this to enrich CRM
        data, log call attempts, or gate outbound calls.

        Does **not** contain `callData`, `transcript`, `variables`, `analytics`,
        or `recordingUrl`. `callData` is on `post-conversation` and
        `analytics-completed`; `transcript`, `variables`, and `recordingUrl`
        are only on `post-conversation`; `analytics` is only on
        `analytics-completed`.

        For the full field-level reference, see the [Webhooks guide](/atoms/atoms-platform/features/webhooks).
      requestBody:
        description: Event body delivered to your configured webhook URL.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookEventPreConversation"
      responses:
        "2XX":
          description: Your endpoint should return a 2XX status to acknowledge receipt.

  /webhook-events/post-conversation:
    post:
      x-fern-webhook: true
      tags:
        - Webhooks
      summary: post-conversation
      operationId: webhookEventPostConversation
      description: |
        Fired **after** the call ends. Contains the full transcript, call
        metadata, recording URL, and all agent variables that were in scope
        during the conversation.

        For the full field-level reference, see the [Webhooks guide](/atoms/atoms-platform/features/webhooks).
      requestBody:
        description: Event body delivered to your configured webhook URL.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookEventPostConversation"
      responses:
        "2XX":
          description: Your endpoint should return a 2XX status to acknowledge receipt.

  /webhook-events/analytics-completed:
    post:
      x-fern-webhook: true
      tags:
        - Webhooks
      summary: analytics-completed
      operationId: webhookEventAnalyticsCompleted
      description: |
        Fired **after** Atoms finishes running the configured disposition and
        success metrics on the transcript. Arrives some time after
        `post-conversation`.

        For the full field-level reference, see the [Webhooks guide](/atoms/atoms-platform/features/webhooks).
      requestBody:
        description: Event body delivered to your configured webhook URL.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookEventAnalyticsCompleted"
      responses:
        "2XX":
          description: Your endpoint should return a 2XX status to acknowledge receipt.

  /webhook/{id}:
    delete:
      summary: Delete a webhook
      x-fern-sdk-group-name: webhooks
      x-fern-sdk-method-name: delete
      description: |
        Delete a webhook by its ID.

        **400 is returned when the webhook still has active agent subscriptions:**
        `"Cannot delete webhook: It is currently assigned to one or more agents. Please remove all agent assignments first."`
        Call `DELETE /agent/{agentId}/webhook-subscriptions` for each assigned agent before deleting.

        **400 is also returned for an invalid webhook ID format:**
        `"The provided Webhook ID is invalid."`
      tags:
        - Webhooks
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: The ID of the webhook to delete
          schema:
            type: string
      responses:
        "200":
          description: Webhook deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: string
                    description: Success message
                    example: "Webhook deleted successfully"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "404":
          description: Webhook not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  errors:
                    type: array
                    items:
                      type: string
                    example: ["Webhook not found"]
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/{agentId}/webhook-subscriptions:
    get:
      summary: Get webhook subscriptions for an agent
      description: Retrieve webhook subscriptions for a given agent ID
      tags:
        - Webhooks
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: agentId
          required: true
          description: The ID of the agent
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/WebhookSubscription"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  errors:
                    type: array
                    items:
                      type: string
                    example: ["Agent not found"]
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    post:
      summary: Replace webhook subscriptions for an agent
      description: |
        **Replaces** all existing webhook subscriptions for the agent with the provided event types.
        Any previously configured subscriptions for this agent are deleted before the new ones are created.
        To add subscriptions without removing existing ones, retrieve current subscriptions first and include them in the request.
      tags:
        - Webhooks
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: agentId
          required: true
          description: The ID of the agent to create subscriptions for
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                eventTypes:
                  type: array
                  description: Array of event types to subscribe to
                  items:
                    type: string
                    enum: [pre-conversation, post-conversation, analytics-completed]
                    description: The type of event to subscribe to
                    example: "post-conversation"
                webhookId:
                  type: string
                  description: The ID of the webhook to subscribe to
                  example: "60d0fe4f5311236168a109ca"
              required:
                - eventTypes
                - webhookId
      responses:
        "201":
          description: Subscriptions created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: string
                    description: Success message
                    example: "Subscriptions created successfully"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  errors:
                    type: array
                    items:
                      type: string
                    example: ["Agent not found"]
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    delete:
      summary: Delete webhook subscriptions for an agent
      description: |
        Deletes **all** webhook subscriptions for the agent, regardless of which webhook they belong to.
        If the agent has subscriptions across multiple webhooks, all of them are removed in a single call.
      tags:
        - Webhooks
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: agentId
          required: true
          description: The ID of the agent to filter subscriptions by
          schema:
            type: string
      responses:
        "200":
          description: Subscriptions deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: string
                    description: Success message
                    example: "Subscriptions deleted successfully"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  errors:
                    type: array
                    items:
                      type: string
                    example: ["Agent not found"]
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /audience:
    get:
      summary: Get all audiences
      x-fern-sdk-group-name: audience
      x-fern-sdk-method-name: list
      description: Retrieve all audiences created by the authenticated user. Users can only access audiences they have created.
      tags:
        - Audience
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Successfully retrieved audiences
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                          description: The unique identifier for the audience
                          example: "60d0fe4f5311236168a109ca"
                        name:
                          type: string
                          description: The name of the audience
                          example: "My Customer List"
                        description:
                          type: string
                          description: The description of the audience
                          example: "List of customers for marketing campaign"
                        phoneNumberColumnName:
                          type: string
                          description: The name of the column in the CSV that contains phone numbers
                          example: "phoneNumber"
                        organization:
                          type: string
                          description: The organization ID
                          example: "60d0fe4f5311236168a109cb"
                        createdBy:
                          type: string
                          description: The user ID who created the audience
                          example: "60d0fe4f5311236168a109cc"
                        createdAt:
                          type: string
                          format: date-time
                          description: The date and time when the audience was created
                          example: "2025-01-15T10:30:00.000Z"
                        updatedAt:
                          type: string
                          format: date-time
                          description: The date and time when the audience was last updated
                          example: "2025-01-15T10:30:00.000Z"
                        memberCount:
                          type: number
                          description: Current number of members in the audience
                        hasCampaigns:
                          type: boolean
                          description: Whether any campaigns are currently using this audience
                        campaigns:
                          type: array
                          description: Active campaigns using this audience
                          items:
                            type: object
                            properties:
                              _id:
                                type: string
                              name:
                                type: string
                              status:
                                type: string
                              createdAt:
                                type: string
                                format: date-time
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

    post:
      summary: Create audience with CSV upload
      description: |
        Create a new audience by uploading a CSV file containing phone numbers.
        Only CSV text files are accepted — binary files will produce malformed data.

        **Additional 400 cases:**
        - Duplicate phone numbers in the CSV: `"Some phone numbers in your CSV already exist in this audience. Please remove duplicate entries and try again."`
        - Member limit exceeded: `"Audience cannot exceed X members"`
      tags:
        - Audience
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: The name of the audience
                  example: "test_audience"
                description:
                  type: string
                  description: Optional description of the audience
                  example: "List of customers for marketing campaign"
                phoneNumberColumnName:
                  type: string
                  description: The name of the column in the CSV that contains phone numbers
                  example: "phoneNumber"
                identifierColumnName:
                  type: string
                  description: The name of the column in the CSV that contains identifiers (e.g., names)
                  example: "Name"
                file:
                  type: string
                  format: binary
                  description: CSV file containing phone numbers and identifiers (max 5MB)
                  example: "audience_template.csv"
              required:
                - name
                - phoneNumberColumnName
                - file

      responses:
        "200":
          description: Audience created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      _id:
                        type: string
                        description: The unique identifier for the audience
                        example: "60d0fe4f5311236168a109ca"
                      name:
                        type: string
                        description: The name of the audience
                        example: "My Customer List"
                      description:
                        type: string
                        description: The description of the audience
                        example: "List of customers for marketing campaign"
                      phoneNumberColumnName:
                        type: string
                        description: The name of the column in the CSV that contains phone numbers
                        example: "phoneNumber"
                      identifierColumnName:
                        type: string
                        description: The name of the column in the CSV that contains identifiers
                        example: "Name"
                      organization:
                        type: string
                        description: The organization ID
                        example: "60d0fe4f5311236168a109cb"
                      createdBy:
                        type: string
                        description: The user ID who created the audience
                        example: "60d0fe4f5311236168a109cc"
                      createdAt:
                        type: string
                        format: date-time
                        description: The date and time when the audience was created
                        example: "2025-01-15T10:30:00.000Z"
                      updatedAt:
                        type: string
                        format: date-time
                        description: The date and time when the audience was last updated
                        example: "2025-01-15T10:30:00.000Z"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  errors:
                    type: array
                    items:
                      type: string
                    example:
                      [
                        "CSV file is required",
                        "Some phone numbers in your CSV already exist in this audience. Please remove duplicate entries and try again.",
                      ]
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /audience/{id}:
    get:
      summary: Get audience by ID
      x-fern-sdk-group-name: audience
      x-fern-sdk-method-name: get
      description: |
        Retrieve a specific audience by its ID.
        Note: if the audience belongs to a different organization, the API returns 404 (not 403) — ownership is deliberately obscured.
      tags:
        - Audience
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the audience
          schema:
            type: string
            example: "60d0fe4f5311236168a109ca"
      responses:
        "200":
          description: Successfully retrieved audience
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      _id:
                        type: string
                        description: The unique identifier for the audience
                        example: "60d0fe4f5311236168a109ca"
                      name:
                        type: string
                        description: The name of the audience
                        example: "My Customer List"
                      description:
                        type: string
                        description: The description of the audience
                        example: "List of customers for marketing campaign"
                      phoneNumberColumnName:
                        type: string
                        description: The name of the column in the CSV that contains phone numbers
                        example: "phoneNumber"
                      organization:
                        type: string
                        description: The organization ID
                        example: "60d0fe4f5311236168a109cb"
                      createdBy:
                        type: string
                        description: The user ID who created the audience
                        example: "60d0fe4f5311236168a109cc"
                      createdAt:
                        type: string
                        format: date-time
                        description: The date and time when the audience was created
                        example: "2025-01-15T10:30:00.000Z"
                      updatedAt:
                        type: string
                        format: date-time
                        description: The date and time when the audience was last updated
                        example: "2025-01-15T10:30:00.000Z"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  errors:
                    type: array
                    items:
                      type: string
                    example: ["Audience ID missing"]
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "404":
          description: Audience not found (also returned when audience belongs to a different organization)
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

    delete:
      summary: Delete audience
      description: |
        Delete a specific audience by its ID. Users can only delete audiences they created.

        **400 is returned if the audience is used by an active campaign:**
        `"can't delete audience, campaign with this audience <id> exists"`
        Remove the campaign first, then retry deletion.

        On success, `data` is always an empty array `[]`.
      tags:
        - Audience
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the audience to delete
          schema:
            type: string
            example: "60d0fe4f5311236168a109ca"
      responses:
        "200":
          description: Audience deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: array
                    example: []
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  errors:
                    type: array
                    items:
                      type: string
                    example:
                      ["can't delete audience, campaign with this audience 60d0fe4f5311236168a109ca exists"]
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "404":
          description: Audience not found
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /audience/{id}/members:
    get:
      summary: Get audience members
      description: Retrieve members of a specific audience with pagination support. Users can only access members of audiences they created.
      tags:
        - Audience
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the audience
          schema:
            type: string
            example: "60d0fe4f5311236168a109ca"
        - name: page
          in: query
          required: false
          description: Page number for pagination (default is 1)
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
        - name: offset
          in: query
          required: false
          description: |
            Number of items per page (default is 5).
            Note: this parameter is named "offset", not "limit" — sending ?limit=N is silently ignored.
          schema:
            type: integer
            minimum: 1
            default: 5
            example: 10
      responses:
        "200":
          description: Successfully retrieved audience members
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      members:
                        type: array
                        items:
                          type: object
                          properties:
                            _id:
                              type: string
                              description: The unique identifier for the audience member
                              example: "60d0fe4f5311236168a109cd"
                            data:
                              type: object
                              description: Dynamic data from CSV, structure depends on uploaded file
                              example:
                                phoneNumber: "+1234567890"
                                name: "John Doe"
                                email: "john@example.com"
                      totalCount:
                        type: integer
                        description: Total number of members in the audience
                        example: 150
                      totalPages:
                        type: integer
                        description: Total number of pages available
                        example: 15
                      hasMore:
                        type: boolean
                        description: Whether there are more pages available
                        example: true
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  errors:
                    type: array
                    items:
                      type: string
                    example: ["Audience ID is required"]
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          description: Forbidden — audience belongs to a different organization
        "404":
          description: Audience not found
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  errors:
                    type: array
                    items:
                      type: string
                    example: ["Failed to fetch audience members"]

    post:
      summary: Add audience members
      description: |
        Add new members to an existing audience.

        Each member object must include a key matching the audience's `phoneNumberColumnName`.
        If it's missing, the API returns 400: `"Each member must have a <phoneNumberColumnName> field"`.
        Adding members that would exceed the audience limit also returns 400.

        Note: if the audience belongs to a different organization, the API returns 404 (not 403).
      tags:
        - Audience
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the audience
          schema:
            type: string
            example: "60d0fe4f5311236168a109ca"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                members:
                  type: array
                  description: Array of member objects with dynamic structure based on audience configuration
                  items:
                    type: object
                    description: Member data with keys matching the audience's CSV structure. Must include the phone number column.
                    example:
                      phoneNumber: "+1234567890"
                      name: "John Doe"
                      email: "john@example.com"
              required:
                - members
      responses:
        "200":
          description: Members added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        message:
                          type: string
                          example: "5 members added successfully"
                        data:
                          type: object
                          properties:
                            added:
                              type: integer
                              description: Number of members successfully added
                              example: 5
                            skipped:
                              type: integer
                              description: Number of members skipped (e.g., duplicates)
                              example: 2
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  errors:
                    type: array
                    items:
                      type: string
                    example:
                      [
                        "Each member must have a phoneNumber field",
                        "Cannot add 15 members. You currently have 9990 members in this audience. The maximum limit is 10000 members. You can add up to 10 more members.",
                      ]
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "404":
          description: Audience not found (also returned when audience belongs to a different organization)
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

    delete:
      summary: Delete audience members
      description: Remove specific members from an audience by their member IDs. Users can only delete members from audiences they created.
      tags:
        - Audience
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the audience
          schema:
            type: string
            example: "60d0fe4f5311236168a109ca"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                memberIds:
                  type: array
                  description: Array of member IDs to delete
                  items:
                    type: string
                    example: "60d0fe4f5311236168a109cd"
              required:
                - memberIds
      responses:
        "200":
          description: Members deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      deletedCount:
                        type: integer
                        description: Number of members successfully deleted
                        example: 3
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  errors:
                    type: array
                    items:
                      type: string
                    example: ["Audience ID missing"]
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "404":
          description: Audience not found (also returned when audience belongs to a different organization)
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /audience/{id}/members/search:
    get:
      summary: Search audience members
      description: |
        Search for members within a specific audience using flexible search parameters. Users can only search members of audiences they created.

        **Search Types:**
        - **General Search** (`query`): Searches across all fields in the audience member data
        - **Field-Specific Search**: Use any field name as a parameter (e.g., `firstName=john`, `phoneNumber=123456`, `email=test@example.com`)

        **Examples:**
        - `?query=john` - General search across all fields
        - `?firstName=john` - Search specifically in firstName field
        - `?phoneNumber=555-1234` - Search specifically in phoneNumber field
        - `?firstName=john&lastName=doe` - Search for members matching both criteria

        **Note:** When using phoneNumber field, do not use quotes around the phone number. You can use either a general search OR field-specific searches, but not both simultaneously.
      tags:
        - Audience
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the audience
          schema:
            type: string
            example: "60d0fe4f5311236168a109ca"
        - name: query
          in: query
          required: false
          description: General search term that searches across all fields in audience member data
          schema:
            type: string
            example: "john"
        - name: "*"
          in: query
          required: false
          description: |
            Any field name can be used as a query parameter for field-specific searches.
            Examples: firstName, lastName, phoneNumber, email, etc.
            The parameter name becomes the field to search in, and the value is the search term.
            When using phoneNumber field, do not use quotes around the phone number.
          schema:
            type: string
            example: "field_value"
      responses:
        "200":
          description: Search results returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      members:
                        type: array
                        items:
                          type: object
                          properties:
                            _id:
                              type: string
                              description: The unique identifier for the audience member
                              example: "60d0fe4f5311236168a109cd"
                            data:
                              type: object
                              description: Dynamic data from CSV, structure depends on uploaded file
                              example:
                                phoneNumber: "+1234567890"
                                name: "John Doe"
                                email: "john@example.com"
                      searchInfo:
                        type: object
                        description: Information about the search performed
                        properties:
                          searchType:
                            type: string
                            description: The type of search performed
                            enum: ["general", "multiple"]
                            example: "multiple"
                          searchTerm:
                            type: string
                            description: The search term(s) used
                            example: "john"
                          searchFields:
                            type: array
                            items:
                              type: string
                            description: The specific fields searched (for field-specific searches)
                            example: ["firstName", "lastName"]
                          totalResults:
                            type: integer
                            description: The number of results returned
                            example: 5
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  errors:
                    type: array
                    items:
                      type: string
                    example:
                      [
                        "At least one search parameter is required. Use 'query' for general search across all fields, or use field-specific searches like 'firstName=john' or 'phoneNumber=123456'.",
                      ]
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "404":
          description: Audience not found
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  errors:
                    type: array
                    items:
                      type: string
                    example: ["Failed to search audience members"]

