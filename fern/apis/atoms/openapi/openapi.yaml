        - Analytics
      security:
        - BearerAuth: []
      parameters:
        - name: agentId
          in: query
          schema:
            type: string
          description: Comma-separated agent IDs to filter results
        - name: campaignId
          in: query
          schema:
            type: string
          description: Campaign ID to filter results
        - name: callType
          in: query
          schema:
            type: string
          description: "Type of call to filter (e.g. `inbound`, `outbound`)"
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
          description: Start of date range (ISO 8601)
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
          description: End of date range (ISO 8601)
      responses:
        "200":
          description: Attempt cohort data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      orgId:
                        type: string
                      cohorts:
                        type: array
                        items:
                          type: object
                          properties:
                            attemptNumber:
                              type: number
                            totalCalls:
                              type: number
                            answeredCalls:
                              type: number
                            pickupRate:
                              type: number
                            cumulativeAnswered:
                              type: number
                            cumulativeRate:
                              type: number
                            marginalGain:
                              type: number
                      totalUniqueNumbers:
                        type: number
                      maxAttemptsSeen:
                        type: number
                      avgAttemptsToPickup:
                        type: number
                      period:
                        $ref: "#/components/schemas/AnalyticsDateRange"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /call-actions:
    post:
      operationId: createCallAction
      summary: Create a call action
      description: |
        Creates a new call action for an agent. Call actions define automated behaviors that fire at specific points in a call lifecycle.

        - **`trigger`** actions fire to initiate an outbound call and require `config.phoneNumberFieldName`.
        - **`post-call`** actions fire after a call ends (e.g. to update a CRM record).
      tags:
        - Call Actions
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agentId, category, provider, config]
              properties:
                agentId:
                  type: string
                  description: Agent this action belongs to (ObjectId)
                category:
                  type: string
                  enum: [trigger, post-call]
                  description: When the action fires
                provider:
                  type: string
                  description: "Integration provider (e.g. `hubspot`, `salesforce`)"
                action_type:
                  type: string
                  enum: [create, update]
                  description: The operation to perform on the provider object
                object:
                  type: string
                  description: "Provider object type to act on (e.g. `contact`, `deal`)"
                config:
                  type: object
                  required: []
                  properties:
                    phoneNumberFieldName:
                      type: string
                      description: "Provider field name that contains the phone number. Required when `category` is `trigger`."
                    conditions:
                      type: array
                      description: Filter conditions — action only fires when all conditions match
                      items:
                        $ref: "#/components/schemas/CallActionCondition"
                    body:
                      type: string
                      description: Request body template or payload for the provider action
      responses:
        "201":
          description: Call action created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/CallAction"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    get:
      operationId: listCallActions
      summary: List call actions
      description: Returns a paginated list of call actions for the organization, filtered by agent. Optionally filter by category or provider.
      tags:
        - Call Actions
      security:
        - BearerAuth: []
      parameters:
        - name: agentId
          in: query
          required: true
          schema:
            type: string
          description: Filter by agent (ObjectId)
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number (default 1)
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
          description: Records per page (default 10)
        - name: category
          in: query
          schema:
            type: string
            enum: [trigger, post-call]
          description: Filter by category
        - name: provider
          in: query
          schema:
            type: string
          description: Filter by provider name
      responses:
        "200":
          description: Paginated list of call actions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      callActions:
                        type: array
                        items:
                          $ref: "#/components/schemas/CallAction"
                      totalCount:
                        type: number
                      page:
                        type: number
                      limit:
                        type: number
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /call-actions/{id}:
    get:
      operationId: getCallAction
      summary: Get a call action
      description: Returns a single call action by ID. Scoped to the authenticated organization.
      tags:
        - Call Actions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Call action ObjectId
      responses:
        "200":
          description: Call action
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/CallAction"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "404":
          description: Call action not found
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    put:
      operationId: updateCallAction
      summary: Update a call action
      description: Updates an existing call action. All body fields are optional — only provided fields are updated.
      tags:
        - Call Actions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Call action ObjectId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                category:
                  type: string
                  enum: [trigger, post-call]
                  description: Change when the action fires
                provider:
                  type: string
                  description: Change the integration provider
                action_type:
                  type: string
                  enum: [create, update]
                  description: Change the operation type
                object:
                  type: string
                  description: Change the provider object type
                config:
                  type: object
                  properties:
                    phoneNumberFieldName:
                      type: string
                      description: Update the phone number field mapping
                    conditions:
                      type: array
                      description: Replace the full conditions array
                      items:
                        $ref: "#/components/schemas/CallActionCondition"
                    body:
                      type: string
                      description: Update the payload body
      responses:
        "200":
          description: Updated call action
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/CallAction"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "404":
          description: Call action not found
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    delete:
      operationId: deleteCallAction
      summary: Delete a call action
      description: Permanently deletes a call action. Scoped to the authenticated organization.
      tags:
        - Call Actions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Call action ObjectId
      responses:
        "200":
          description: Call action deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Call action deleted successfully
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "404":
          description: Call action not found
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /integration/modify-webengage-integration:
    post:
      operationId: modifyWebEngageIntegration
      summary: Create or update WebEngage integration
      description: |
        Creates or updates the WebEngage integration for the organization. Replaces the existing integration configuration with the provided credential set(s).

        **Note:** This endpoint returns a direct JSON response — not the standard `{ success, data }` wrapper used by other endpoints.
      tags:
        - Integrations
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [integrationSets]
              properties:
                integrationSets:
                  type: array
                  minItems: 1
                  description: One or more WebEngage credential sets
                  items:
                    $ref: "#/components/schemas/WebEngageIntegrationSet"
      responses:
        "200":
          description: Integration created or updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Integration created successfully
                  data:
                    type: object
                    description: Integration details object
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "404":
          description: Organization not found
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /integration/get-webengage-details:
    get:
      operationId: getWebEngageDetails
      summary: Get WebEngage integration details
      description: |
        Returns the current WebEngage integration configuration for the organization.

        **Note:** This endpoint returns a direct JSON response — not the standard `{ success, data }` wrapper used by other endpoints.
      tags:
        - Integrations
      security:
        - BearerAuth: []
      responses:
        "200":
          description: WebEngage integration details
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Integration details retrieved successfully
                  data:
                    type: object
                    description: Integration details object
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /concurrency:
    get:
      operationId: getConcurrency
      summary: Get concurrency limits
      description: |
        Returns the organization's overall concurrency limit, how much is reserved across all agents, the remaining unreserved pool, and the per-agent reservation breakdown per call channel.
      tags:
        - Concurrency
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Concurrency overview
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      orgLimit:
                        type: number
                        description: Total concurrent calls allowed for this organization
                      totalReserved:
                        type: number
                        description: Sum of all agent reservations across all channels
                      unreservedPool:
                        type: number
                        description: orgLimit minus totalReserved — capacity available to any agent
                      agents:
                        type: array
                        items:
                          type: object
                          properties:
                            agentId:
                              type: string
                              description: Agent ObjectId
                            agentName:
                              type: string
                            avatarUrl:
                              type: string
                              nullable: true
                            webcall:
                              type: number
                              description: Reserved webcall slots
                            outbound:
                              type: number
                              description: Reserved outbound call slots
                            inbound:
                              type: number
                              description: Reserved inbound call slots
                            chat:
                              type: number
                              description: Reserved chat slots
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /concurrency/reservations:
    put:
      operationId: updateConcurrencyReservations
      summary: Update concurrency reservations
      description: |
        Updates concurrency reservations for one or more agents in a single request. Replaces the existing reservation values for each specified agent. **Admin role required.**
      tags:
        - Concurrency
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reservations]
              properties:
                reservations:
                  type: array
                  minItems: 1
                  description: Array of agent reservations to update
                  items:
                    type: object
                    required: [agentId, webcall, outbound, inbound, chat]
                    properties:
                      agentId:
                        type: string
                        description: Agent ObjectId
                      webcall:
                        type: integer
                        minimum: 0
                        description: Reserved webcall slots
                      outbound:
                        type: integer
                        minimum: 0
                        description: Reserved outbound call slots
                      inbound:
                        type: integer
                        minimum: 0
                        description: Reserved inbound call slots
                      chat:
                        type: integer
                        minimum: 0
                        description: Reserved chat slots
      responses:
        "200":
          description: Reservations updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      updated:
                        type: number
                        description: Count of agent reservations updated
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          description: Admin role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /disposition-metric-templates:
    get:
      operationId: listDispositionMetricTemplates
      summary: List disposition metric templates
      description: |
        Returns all available disposition metric templates. These reusable definitions are used to populate the post-call analytics metric picker when configuring an agent's `postCallAnalyticsConfig`. Only a user token is required — no organization context needed.
      tags:
        - Disposition Metric Templates
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Array of disposition metric templates
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        identifier:
                          type: string
                          description: Unique snake_case key (lowercase letters, digits, and underscores only)
                          example: call_resolved
                        dispositionMetricPrompt:
                          type: string
                          description: AI prompt used to extract this metric from the call transcript
                        dispositionMetricType:
                          type: string
                          enum: [STRING, BOOLEAN, INTEGER, ENUM, DATETIME]
                          description: |
                            How the extracted value is interpreted:
                            - `STRING` — free-text output
                            - `BOOLEAN` — true/false outcome
                            - `INTEGER` — whole number value
                            - `ENUM` — one of a predefined set of choices
                            - `DATETIME` — a date/time value
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: API key from the console ApiKey collection, sent as Bearer token. Also accepts session cookies for browser-based auth.

  parameters:
    AgentId:
      name: id
      in: path
      required: true
      description: The agent ID
      schema:
        type: string
        example: "60d0fe4f5311236168a109ca"
    DraftId:
      name: draftId
      in: path
      required: true
      description: The draft ID
      schema:
        type: string
    VersionId:
      name: versionId
      in: path
      required: true
      description: The published version ID
      schema:
        type: string
        pattern: "^[a-f\\d]{24}$"
    BranchId:
      name: branchId
      in: path
      required: true
      description: The branch ID.
      schema:
        type: string
        pattern: "^[a-f\\d]{24}$"
    RevisionId:
      name: revisionId
      in: path
      required: true
      description: The revision ID. Equal to the v1 `versionId` for revisions that were migrated from the v1 model.
      schema:
        type: string
        pattern: "^[a-f\\d]{24}$"

  schemas:
    WebEngageIntegrationSet:
      type: object
      description: A single WebEngage credential set
      required: [licenseCode, environment, apiKey]
      properties:
        licenseCode:
          type: string
          description: WebEngage license code
        environment:
          type: string
          description: WebEngage environment identifier
        apiKey:
          type: string
          description: WebEngage API key

    CallActionCondition:
      type: object
      description: A filter condition evaluated against provider record fields
      required: [field, operator, value]
      properties:
        field:
          type: string
          description: Provider record field name
        operator:
          type: string
          enum: [eq, neq, gt, gte, lt, lte, in, nin, contains, notContains, startsWith, endsWith]
          description: Comparison operator
        value:
          type: string
          description: Value to compare against

    CallAction:
      type: object
      description: A call action that fires automatically at a specific point in the call lifecycle
      properties:
        _id:
          type: string
          description: MongoDB ObjectId
        organization:
          type: string
          description: Organization ObjectId
        agentId:
          type: string
          description: Agent ObjectId this action belongs to
        category:
          type: string
          enum: [trigger, post-call]
          description: When the action fires
        provider:
          type: string
          description: "Integration provider (e.g. `hubspot`, `salesforce`)"
        action_type:
          type: string
          enum: [create, update]
          description: The operation performed on the provider object
        object:
          type: string
          description: "Provider object type (e.g. `contact`, `deal`)"
        config:
          type: object
          properties:
            phoneNumberFieldName:
              type: string
              description: "Provider field that contains the phone number (required for `trigger` actions)"
            conditions:
              type: array
              items:
                $ref: "#/components/schemas/CallActionCondition"
            body:
              type: string
              description: Request body template or payload for the provider action
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AnalyticsTrendMetric:
      type: object
      description: A metric value with current and previous period values and percent change
      properties:
        current:
          type: number
        previous:
          type: number
        percentChange:
          type: number

    AnalyticsDateRange:
      type: object
      properties:
        from:
          type: string
          format: date
        to:
          type: string
          format: date

    ApiResponse:
      type: object
      properties:
        status:
          type: boolean
        data:
          type: object
    WidgetConfig:
      type: object
      description: |
        Configuration for the embeddable web widget. Used by `GET /agent/{id}/widget-config`
        (returned with `assistantId` injected) and `PATCH /agent/{id}/widget-config`
        (merge-patched). Every field is optional — only the fields present in a PATCH
        request body are written, so partial updates are safe.
      properties:
        position:
          type: string
          enum: [bottom-right, bottom-left, top-right, top-left]
        size:
          type: string
          enum: [tiny, compact, full]
        borderRadius:
          type: number
          minimum: 0
          maximum: 50
        mode:
          type: string
          enum: [chat, voice]
        theme:
          type: string
          enum: [light, dark]
        baseColor:
          type: string
        accentColor:
          type: string
        agentBubbleColor:
          type: string
        textOnAccentColor:
          type: string
        secondaryTextColor:
          type: string
        primaryTextColor:
          type: string
        title:
          type: string
        startButtonText:
          type: string
          minLength: 1
        endButtonText:
          type: string
          minLength: 1
        ctaTitle:
          type: string
          nullable: true
        ctaSubtitle:
          type: string
          nullable: true
        ctaName:
          type: string
          nullable: true
        widgetName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
          description: |
            Must start with the CDN distribution domain prefix configured for the
            organization. Submit a non-CDN URL and the server returns 400.
        voiceEmptyMessage:
          type: string
          nullable: true
        voiceActiveEmptyMessage:
          type: string
          nullable: true
        chatEmptyMessage:
          type: string
          nullable: true
        chatFirstMessage:
          type: string
          nullable: true
        chatPlaceholder:
          type: string
          minLength: 1
        voiceShowTranscript:
          type: boolean
        consentRequired:
          type: boolean
        consentTitle:
          type: string
          minLength: 1
        consentContent:
          type: string
          minLength: 1
        consentStorageKey:
          type: string
          nullable: true
        publicKey:
          type: string
        assistantId:
          type: string
          description: Injected by `GET /agent/{id}/widget-config` (equals the agent ID).
        allowlist:
          type: array
          items:
            type: string
          description: List of origins (domains) authorized to embed this widget.
    Product:
      type: object
      description: 'A phone-number product owned by the organization — either a platform-rented number (`productType: telephony`) or a SIP-imported number (`productType: custom-telephony`).'
      properties:
        _id:
          type: string
          description: 24-char MongoDB ObjectId. Use this as `productId` when releasing, or assign to an agent via `PATCH /agent/{agentId}`.
          example: "6969109c84c74bed175f02a7"
        productType:
          type: string
          enum: [telephony, custom-telephony]
          description: |
            - `telephony` — number rented via the Atoms platform (Plivo/Twilio).
            - `custom-telephony` — number imported via `POST /product/import-phone-number` with the customer's own SIP trunk.
          example: "telephony"
        isActive:
          type: boolean
          description: Whether the number is currently billable / serving traffic.
          example: true
        attributes:
          type: object
          description: Provider-specific number metadata.
          properties:
            provider:
              type: string
              enum: [plivo, twilio]
            phoneNumber:
              type: string
              description: E.164 format including `+`.
              example: "+912268093636"
        agentId:
          type: string
          nullable: true
          description: 24-char MongoDB ObjectId of the agent this number is assigned to, if any. `null` when unassigned.
          example: "69edad34780a67ce987d3f42"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UnauthorizedErrorResponse:
      type: object
      properties:
        status:
          type: boolean
          example: false
        errors:
          type: array
          items:
            type: string
          example: ["Unauthorized: User not found"]
    InternalServerErrorResponse:
      type: object
      properties:
        status:
          type: boolean
          example: false
        errors:
          type: array
          items:
            type: string
          example: ["Internal server error"]
    BadRequestErrorResponse:
      type: object
      properties:
        status:
          type: boolean
          example: false
        errors:
          type: array
          items:
            type: string
          example: ["Invalid input"]

    CreateAgentFromTemplateRequest:
      type: object
      required:
        - agentName
        - templateId
      properties:
        agentName:
          type: string
          description: Name of the agent
        agentDescription:
          type: string
          description: Description of the agent
        templateId:
          type: string
          description: ID of the template to use. You can get the list of templates with their description and id from the /agent/template endpoint.
    CreateAgentRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
        backgroundSound:
          type: string
          enum: ["", "office", "cafe", "call_center", "static"]
          default: ""
          description: "Ambient background sound during calls. Options: '' (none), 'office', 'cafe', 'call_center', 'static'. Note: this value is currently overridden by the server default on creation; update via PATCH after creation."
        # visibleToEveryone:
        #   type: boolean
        #   default: false
        language:
          type: object
          description: |
            Language configuration for the agent.
            Cross-field rule: `default` must be one of the values in `supported`.
            Tamil (`ta`) cannot be combined with other languages in `supported`.
          properties:
            default:
              type: string
              enum: [en, hi, mr, gu, ta, es, north_indic, bn, or]
              description: "The default language of the agent. Note: `ta` cannot be combined with other languages in `supported`."
              default: en
            supported:
              type: array
              description: |
                Languages the agent understands. `default` must be one of these values.
                Tamil (`ta`) cannot be combined with other languages.
              items:
                type: string
                enum: [en, hi, mr, gu, ta, es, north_indic, bn, or]
            switching:
              type: object
              description: Language switching configuration for the agent. If enabled, the agent will be able to switch between languages based on the user's language.
              properties:
                isEnabled:
                  type: boolean
                  description: Whether to enable language switching for the agent
                  default: false
                minWordsForDetection:
                  type: number
                  minimum: 1
                  maximum: 10
                  description: Minimum number of words required for language detection
                  default: 2
                strongSignalThreshold:
                  type: number
                  minimum: 0.1
                  maximum: 0.9
                  description: Threshold for strong language signal detection (0.1 to 0.9)
                  default: 0.7
                weakSignalThreshold:
                  type: number
                  minimum: 0.1
                  maximum: 0.9
                  description: Threshold for weak language signal detection (0.1 to 0.9)
                  default: 0.3
                minConsecutiveForWeakThresholdSwitch:
                  type: number
                  minimum: 1
                  maximum: 5
                  description: Minimum consecutive detections required for weak threshold language switch
                  default: 2
        synthesizer:
          type: object
          description: |
            Synthesizer (TTS) configuration for the agent. Model
            `waves_lightning_v3_1` validates `voiceId` against the Waves
            API. `gpt-realtime` and `gpt-realtime-mini` accept any voiceId.
            Cloned voices are regular voiceIds. Use them with a compatible
            Waves model.
          properties:
            voiceConfig:
              type: object
              description: Voice configuration for the synthesizer.
              properties:
                model:
                  type: string
                  enum:
                    - waves_lightning_v3_1
                    - gpt-realtime
                    - gpt-realtime-mini
                  default: waves_lightning_v3_1
                  description: |
                    The TTS model to use. Use `waves_lightning_v3_1` for the
                    recommended Waves voice path (default), or `gpt-realtime` /
                    `gpt-realtime-mini` for OpenAI realtime models (require
                    `workflowType: single_prompt`).
                voiceId:
                  type: string
                  default: nyah
                  description: The voice ID to use. For cloned voices, pass the voiceId from the Waves platform with a compatible model.
                gender:
                  type: string
                  enum:
                    - male
                    - female
                  default: female
                  description: The gender of the voice.
              default:
                model: waves_lightning_v3_1
                voiceId: nyah
            speed:
              type: number
              minimum: 0
              maximum: 2
              default: 1.2
            consistency:
              type: number
              minimum: 0
              maximum: 1
              default: 0.5
            similarity:
              type: number
              minimum: 0
              maximum: 1
              default: 0
            enhancement:
              type: number
              enum: [0, 1, 2]
              default: 1
            sampleRate:
              type: number
              enum: [8000, 16000, 24000, 44100]
              default: 16000
              description: Output audio sample rate in Hz.
        globalKnowledgeBaseId:
          type: string
          description: The global knowledge base ID of the agent. You can create a global knowledge base by using the /knowledgebase endpoint and assign it to the agent. The agent will use this knowledge base for its responses.
        slmModel:
          type: string
          enum:
            - electron
            - electron-kogta
            - electron-kogta-v2
            - gpt-4o
            - gpt-4.1
            - gpt-5.2
            - gpt-realtime
            - gpt-realtime-mini
          default: electron
          description: |
            The LLM model to use for the agent.
            Note: `gpt-5.2`, `electron-kogta`, and `electron-kogta-v2` require org-level access and return 403 if not enabled.
            `workflowType` must be `single_prompt` to use `gpt-realtime` or `gpt-realtime-mini`.
        defaultVariables:
          type: object
          description: The default variables to use for the agent. These variables will be used if no variables are provided when initiating a conversation with the agent.
        preCallAPI:
          type: object
          description: Configuration for an API call to be made before the call starts. The response variables can be injected into the agent's prompt.
          properties:
            isEnabled:
              type: boolean
              default: false
              description: Whether the pre-call API is enabled.
            url:
              type: string
              format: uri
              description: The URL of the API endpoint to call.
            method:
              type: string
              enum: ["GET", "POST", "PUT", "DELETE", "PATCH"]
              description: The HTTP method to use for the API call.
            headers:
              type: object
              additionalProperties:
                type: string
              description: Optional HTTP headers to include in the request.
            body:
              type: object
              description: Optional request body for POST/PUT/PATCH requests.
            timeout:
              type: integer
              minimum: 1
              maximum: 30
              default: 5
              description: Timeout in seconds for the API call.
            queryParams:
              type: object
              description: Optional query parameters to include in the request URL.
            responseVariables:
              type: array
              description: List of variables to extract from the API response using JSON path expressions.
              items:
                type: object
                required:
                  - variableName
                  - jsonPath
                properties:
                  variableName:
                    type: string
                    description: The name of the variable to inject into the agent prompt.
                  jsonPath:
                    type: string
                    description: JSON path expression to extract the value from the API response.
          required:
            - url
            - method
        globalPrompt:
          type: string
          maxLength: 4000
          description: |
            Set global instructions for your agent's personality, role, and behavior throughout conversations.
            Note: Only used for workflow_graph agents. Maximum 4000 characters.
        telephonyProductId:
          type: array
          items:
            type: string
          description: IDs of telephony products (phone numbers) to associate with the agent for inbound/outbound calls.
        workflowType:
          $ref: "#/components/schemas/WorkflowType"
          default: single_prompt
          description: The type of workflow to create for the agent. Defaults to `single_prompt` if not specified. Using `workflow_graph` requires conversational agent access (403 if not enabled).
        firstMessage:
          type: string
          maxLength: 500
          description: The first message the agent sends when a conversation starts.
        muteUserUntilFirstBotResponse:
          type: boolean
          description: When true, the user's audio is muted until the agent has finished its first response.
        allowInterruptions:
          type: boolean
          description: Whether the user can interrupt the agent while it is speaking.
        waitForUserToSpeakFirst:
          type: boolean
          description: When true, the agent waits for the user to speak before sending the first message.
        interruptionBackoffTimer:
          type: number
          minimum: 0
          maximum: 10
          description: Seconds the agent waits after being interrupted before resuming speech.
        smartTurnConfig:
          type: object
          description: Smart turn-detection configuration. When enabled, the agent uses an additional model to decide whether the user has finished a turn.
          properties:
            isEnabled:
              type: boolean
            waitTimeInSecs:
              type: number
              minimum: 0
              maximum: 10
              description: How long to wait after the user stops speaking before responding.
        voiceDetectionConfig:
          type: object
          description: Voice activity detection (VAD) configuration. Controls how the agent decides when speech is present.
          properties:
            confidence:
              type: number
              minimum: 0
              maximum: 1
              description: Minimum VAD confidence threshold to register speech.
            minVolume:
              type: number
              minimum: 0
              maximum: 1
              description: Minimum input volume threshold to register speech.
            triggerTimeInSecs:
              type: number
              minimum: 0
              maximum: 10
              description: How long sustained speech must be detected before turning the VAD on.
            releaseTimeInSecs:
              type: number
              minimum: 0
              maximum: 10
              description: How long after silence before the VAD turns off.
        voiceMailDetectionConfig:
          type: object
          description: Voicemail-detection configuration. When the call hits a voicemail tone, the agent plays `endText` and ends the call.
          properties:
            enabled:
              type: boolean
            endText:
              type: string
              maxLength: 200
              description: Message played before hanging up when voicemail is detected.
        denoisingConfig:
          type: object
          description: Background-noise denoising configuration for the agent's input audio.
          properties:
            isEnabled:
              type: boolean
        redactionConfig:
          type: object
          description: PII redaction configuration. When enabled, personally identifiable information is redacted from transcripts before storage.
          properties:
            isEnabled:
              type: boolean
        pronunciationDicts:
          type: array
          description: Pronunciation overrides — words the TTS engine should pronounce differently from its default.
          items:
            type: object
            required:
              - word
              - pronunciation
            properties:
              word:
                type: string
                description: The word to override.
              pronunciation:
                type: string
                description: How the word should be pronounced (phonetic spelling).
        llmIdleTimeoutConfig:
          type: object
          description: Timeout configuration for the LLM stage of a conversation. Triggers a retry or call termination when the LLM does not respond within the configured window.
          properties:
            chatTimeoutTimeInSecs:
              type: number
              minimum: 1
              maximum: 300
              description: LLM idle timeout for chat conversations, in seconds.
            webcallTimeoutTimeInSecs:
              type: number
              minimum: 1
              maximum: 300
              description: LLM idle timeout for web calls, in seconds.
            telephonyTimeoutTimeInSecs:
              type: number
              minimum: 1
              maximum: 300
              description: LLM idle timeout for telephony calls, in seconds.
            maxRetries:
              type: number
              description: Maximum number of LLM-idle retries before terminating the call. System-defined min/max.
        sessionTimeoutConfig:
          type: object
          description: Maximum duration of a conversation session. The call ends after this elapsed time even if active.
          properties:
            timeoutTimeInSecs:
              type: number
              maximum: 3600
              default: 1800
              description: Maximum session duration in seconds (max 1 hour). Defaults to 1800 (30 minutes).
        timezone:
          type: object
          description: Timezone applied to scheduled actions and timestamps the agent reports to the user.
          properties:
            label:
              type: string
              description: IANA timezone label (e.g. `America/New_York`).
            offset:
              type: number
              description: UTC offset in minutes (e.g. -300 for EST).
        callDispositionConfig:
          type: string
          description: Configuration string for call disposition tracking.
        allowInboundCall:
          type: boolean
          default: true
          description: Whether the agent accepts inbound calls.
        enableStyleGuide:
          type: boolean
          default: true
          description: Whether style guide enforcement is applied to agent responses.
        speechFormatting:
          type: boolean
          description: Whether speech formatting is applied to the agent's responses.

    UpdateAgentRequest:
      type: object
      description: |
        Agent update payload. Behavior depends on whether the agent has versioning enabled:

        **Versioned agents**: only the metadata fields below are accepted. Config-level
        fields (language, synthesizer, slmModel, etc.) return 400.

        **Non-versioned agents**: all configuration fields are accepted — the same full set
        as `POST /agent` (see `CreateAgentRequest`).
      properties:
        name:
          type: string
          description: Name of the agent.
        description:
          type: string
          description: Description of the agent.
        avatarUrl:
          type: string
          description: URL of the agent's avatar image.
        telephonyProductId:
          type: array
          items:
            type: string
          description: IDs of telephony products (phone numbers) to associate with the agent.
        allowInboundCall:
          type: boolean
          description: Whether the agent accepts inbound calls.
        visibleToEveryone:
          type: boolean
          description: Whether the agent is visible to all members of the organization.

    DraftConfigRequest:
      type: object
      description: |
        Config payload for editing a draft via `PATCH /agent/{id}/drafts/{draftId}/config`.
        All fields are optional — only the fields provided are updated. A subset of
        config fields from `CreateAgentRequest` is accepted, plus two versioning-era fields.

        **Fields NOT accepted here** (use `PATCH /agent/{id}` instead):
        - `name` — agent metadata, not a config field; sending it alone returns 400 "No recognized config fields"
        - `telephonyProductId` — agent metadata, not a config field
      properties:
        singlePromptConfig:
          $ref: "#/components/schemas/SinglePromptConfig"
        postCallAnalyticsConfig:
          $ref: "#/components/schemas/PostCallAnalyticsConfig"
        language:
          type: object
          description: Language configuration. See CreateAgentRequest for full shape.
        synthesizer:
          type: object
          description: Synthesizer (TTS) configuration. See CreateAgentRequest for full shape.
        slmModel:
          type: string
          enum:
            - electron
            - electron-kogta
            - electron-kogta-v2
            - gpt-4o
            - gpt-4.1
            - gpt-5.2
            - gpt-realtime
            - gpt-realtime-mini
          description: LLM model for this draft
        transcriberType:
          type: string
          description: STT engine to use for this draft
        customLLMWebSocketUrl:
          type: string
          description: Custom LLM WebSocket URL (overrides slmModel)
        widgetConfig:
          type: object
          description: Widget configuration for chat-mode agents
        defaultVariables:
          type: object
          description: Default prompt variables
        preCallAPI:
          type: object
          description: Pre-call API configuration. See CreateAgentRequest for full shape.
        globalPrompt:
          type: string
          maxLength: 4000
          description: Global prompt for workflow_graph agents (max 4000 characters)
        globalKnowledgeBaseId:
          type: string
          description: Knowledge base ID to attach to this draft
        firstMessage:
          type: string
          description: Opening message for this draft
        allowInterruptions:
          type: boolean
        waitForUserToSpeakFirst:
          type: boolean
        muteUserUntilFirstBotResponse:
          type: boolean
        interruptionBackoffTimer:
          type: number
          minimum: 0
          maximum: 10
        backgroundSound:
          type: string
          enum: ["", "office", "cafe", "call_center", "static"]
        smartTurnConfig:
          type: object
        voiceDetectionConfig:
          type: object
        voiceMailDetectionConfig:
          type: object
        denoisingConfig:
          type: object
        redactionConfig:
          type: object
        pronunciationDicts:
          type: array
          items:
            type: object
        llmIdleTimeoutConfig:
          type: object
        sessionTimeoutConfig:
          type: object
        workflowType:
          $ref: "#/components/schemas/WorkflowType"
        timezone:
          type: object
        callDispositionConfig:
          type: string
        enableStyleGuide:
          type: boolean
        speechFormatting:
          type: boolean

    AgentDTO:
      type: object
      properties:
        _id:
          type: string
          description: The ID of the agent
        name:
          type: string
          description: The name of the agent
        description:
          type: string
          description: The description of the agent
        backgroundSound:
          type: string
          enum: ["", "office", "cafe", "call_center", "static"]
          description: "Ambient background sound during calls. Options: '' (none), 'office', 'cafe', 'call_center', 'static'."
        organization:
          type: string
          description: The organization ID of the agent
        workflowId:
          type: string
          description: The workflow ID of the agent
        workflowType:
          $ref: "#/components/schemas/WorkflowType"
          default: workflow_graph
          description: The type of workflow used by the agent
        createdBy:
          type: string
          description: The user ID of the user who created the agent
        globalKnowledgeBaseId:
          type: string
          description: The global knowledge base ID of the agent
        language:
          type: object
          description: The language configuration of the agent
          properties:
            default:
              type: string
              description: The default language of the agent
              enum: [en, hi, mr, gu, ta, es, north_indic, bn, or]
            switching:
              type: object
