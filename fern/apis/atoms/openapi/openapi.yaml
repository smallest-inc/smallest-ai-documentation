            pattern: "^[a-f\\d]{24}$"
        - name: versionB
          in: query
          required: true
          description: ID of the second version
          schema:
            type: string
            pattern: "^[a-f\\d]{24}$"
        - name: dateFrom
          in: query
          required: false
          description: Start date for the comparison range in YYYY-MM-DD format.
          schema:
            type: string
            format: date
            example: "2026-05-01"
        - name: dateTo
          in: query
          required: false
          description: End date for the comparison range in YYYY-MM-DD format.
          schema:
            type: string
            format: date
            example: "2026-05-31"
      responses:
        "200":
          description: Metrics comparison returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/AgentVersionMetricsComparison"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          $ref: "#/components/responses/WorkflowGraphAgentAccessForbiddenError"
        "404":
          description: Agent or version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/{id}/versions/{versionId}:
    get:
      summary: Get version detail
      description: |
        Returns the full detail of a specific published version (read-only).
        Published versions are config-immutable — to modify config, create a draft from
        this version and publish it as a new version.
      tags:
        - Agent Versioning - Versions
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      version:
                        $ref: "#/components/schemas/AgentVersion"
                      resolvedConfig:
                        type: object
                        description: Resolved agent configuration keyed by config section.
                        additionalProperties: true
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          $ref: "#/components/responses/WorkflowGraphAgentAccessForbiddenError"
        "404":
          description: Agent or version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

    patch:
      summary: Update version metadata (label, description, pin only)
      deprecated: true
      x-fern-availability: deprecated
      x-fern-sdk-group-name: agent_versioning_versions
      x-fern-sdk-method-name: update_version_metadata
      description: |
        **Deprecated on the v2 branch model.** Migrate to `Metadata edits removed on v2. Set `label` at publish via `POST /agent/{id}/branches/{branchId}/draft/publish`.`. When `ENABLE_BRANCH_MODEL` is on, this endpoint returns `409 versioning_v2_migration_required` with the `Deprecation: true` header. See the [migration guide](/voice-agents/api-reference/versioning-v2-migration).
        
        |
        Update a published version's label, description, or pinned status. At least one field is required.
        Published versions (both active and inactive) are config-immutable — their agent
        configuration cannot be changed. To modify config, create a new draft from the version,
        edit the draft, and publish it as a new version.
      tags:
        - Agent Versioning - Versions
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/VersionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVersionMetaRequest"
      responses:
        "200":
          description: Version metadata updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/AgentVersion"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          $ref: "#/components/responses/WorkflowGraphAgentAccessForbiddenError"
        "404":
          description: Agent or version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestErrorResponse"
        "409":
          $ref: "#/components/responses/VersioningV2MigrationRequired"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/{id}/versions/{versionId}/activate:
    patch:
      summary: Activate a version
      deprecated: true
      x-fern-availability: deprecated
      x-fern-sdk-group-name: agent_versioning_versions
      x-fern-sdk-method-name: activate_version
      description: |
        **Deprecated on the v2 branch model.** Migrate to `POST /agent/{id}/branches/{branchId}/live or POST /agent/{id}/branches/{branchId}/revisions/{revisionId}/restore`. When `ENABLE_BRANCH_MODEL` is on, this endpoint returns `409 versioning_v2_migration_required` with the `Deprecation: true` header. See the [migration guide](/voice-agents/api-reference/versioning-v2-migration).
        
        |
        Set a published version as the active version for the agent. The previously
        active version is deactivated. This does not modify the version's config — it
        only changes which version serves live traffic. Activation is idempotent: if
        the version is already active, the endpoint returns that version without
        changing config.
      tags:
        - Agent Versioning - Versions
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Version activated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/AgentVersion"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          $ref: "#/components/responses/WorkflowGraphAgentAccessForbiddenError"
        "404":
          description: Agent or version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestErrorResponse"
        "409":
          $ref: "#/components/responses/VersioningV2MigrationRequired"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/{id}/versions/{versionId}/test-call:
    post:
      summary: Test call with version config
      description: |
        Initiate a test call using a specific published version's configuration.
        The response always includes `conversationId` and `callId`. For `webcall`
        and `chat`, it also includes `token`, `roomName`, and `host`. Those fields
        are omitted for `telephony`.
      tags:
        - Agent Versioning - Versions
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/VersionId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestCallRequest"
      responses:
        "200":
          description: Test call initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    required:
                      - conversationId
                      - callId
                    properties:
                      conversationId:
                        type: string
                        description: Conversation ID created for the test call
                      callId:
                        type: string
                        description: Call ID created for the test call
                      token:
                        type: string
                        description: Returned for webcall and chat modes only
                      roomName:
                        type: string
                        description: Returned for webcall and chat modes only
                      host:
                        type: string
                        description: Returned for webcall and chat modes only
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          $ref: "#/components/responses/WorkflowGraphAgentAccessForbiddenError"
        "404":
          description: Agent or version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  # ══════════════════════════════════════════════════════════════════════
  # Agent Versioning v2: Branches, Drafts, Revisions
  # Base: /agent/{id}/branches
  # Feature-gated behind ENABLE_BRANCH_MODEL. See the migration guide at
  # /voice-agents/api-reference/versioning-v2-migration for the mapping
  # from v1 Drafts/Versions endpoints.
  # ══════════════════════════════════════════════════════════════════════

  /agent/{id}/branches:
    post:
      operationId: createBranch
      summary: Create a branch
      x-fern-sdk-group-name: agent_versioning_branches
      x-fern-sdk-method-name: create_branch
      description: |
        Fork a new branch from an existing branch. The source branch must have at least one committed revision. Branch names are unique per agent; the name `Main` is reserved for the default branch. Creating from a branch whose latest draft is still `scanning` returns `409 source_scanning`.
      tags:
        - Agent Versioning - Branches
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBranchRequest"
      responses:
        "201":
          description: Branch created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Branch"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundErrorResponse"
        "409":
          $ref: "#/components/responses/ConflictErrorResponse"
        "423":
          $ref: "#/components/responses/LockedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

    get:
      operationId: listBranches
      summary: List branches
      x-fern-sdk-group-name: agent_versioning_branches
      x-fern-sdk-method-name: list
      description: List all non-archived branches for an agent, with per-branch draft and revision counts.
      tags:
        - Agent Versioning - Branches
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      branches:
                        type: array
                        items:
                          $ref: "#/components/schemas/BranchSummary"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/{id}/branches/{branchId}:
    get:
      operationId: getBranch
      summary: Get branch
      x-fern-sdk-group-name: agent_versioning_branches
      x-fern-sdk-method-name: get
      description: Return a single branch summary, including draft state (`openDraftId`, `hasOpenDraft`) and head revision.
      tags:
        - Agent Versioning - Branches
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/BranchId"
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/BranchSummary"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

    patch:
      operationId: renameBranch
      summary: Rename a branch
      x-fern-sdk-group-name: agent_versioning_branches
      x-fern-sdk-method-name: rename
      description: Rename a non-default, non-archived branch. `Main` cannot be renamed; a name that is already in use on this agent returns `409 branch_name_exists`.
      tags:
        - Agent Versioning - Branches
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/BranchId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameBranchRequest"
      responses:
        "200":
          description: Renamed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Branch"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          description: Forbidden. Attempting to rename `Main`, or the caller lacks write access.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "404":
          $ref: "#/components/responses/NotFoundErrorResponse"
        "409":
          $ref: "#/components/responses/ConflictErrorResponse"
        "423":
          $ref: "#/components/responses/LockedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/{id}/branches/{branchId}/archive:
    post:
      operationId: archiveBranch
      summary: Archive a branch
      x-fern-sdk-group-name: agent_versioning_branches
      x-fern-sdk-method-name: archive
      description: |
        Archive a branch. `Main` cannot be archived. The live branch cannot be archived; make another branch live first. Archived branches are hidden from list views but their revisions remain queryable by ID.
      tags:
        - Agent Versioning - Branches
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/BranchId"
      responses:
        "200":
          description: Archived.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      archived:
                        type: boolean
                        example: true
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          description: Forbidden. `Main` cannot be archived, the live branch cannot be archived, or the caller lacks write access.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "404":
          $ref: "#/components/responses/NotFoundErrorResponse"
        "423":
          $ref: "#/components/responses/LockedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/{id}/branches/{branchId}/live:
    post:
      operationId: makeBranchLive
      summary: Make a branch live
      x-fern-sdk-group-name: agent_versioning_branches
      x-fern-sdk-method-name: make_live
      description: |
        Make this branch the live branch. Its `headRevisionId` becomes the config that serves production traffic. The previously-live branch becomes not-live automatically. The branch must be non-archived, must have at least one `committed` (security-passed) revision, and its head revision must have passed the security scan.
      tags:
        - Agent Versioning - Branches
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/BranchId"
      responses:
        "200":
          description: Branch is now live.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/BranchSummary"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          description: Forbidden. Branch is archived, security scan has not passed on the head revision, or the caller lacks write access.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "404":
          $ref: "#/components/responses/NotFoundErrorResponse"
        "409":
          $ref: "#/components/responses/ConflictErrorResponse"
        "423":
          $ref: "#/components/responses/LockedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/{id}/branches/{branchId}/draft:
    put:
      operationId: updateBranchDraft
      summary: Write to draft
      x-fern-sdk-group-name: agent_versioning_branches
      x-fern-sdk-method-name: update_draft
      description: |
        Upsert the open draft on this branch. If no draft is open, one is created automatically. The request body is a free-form agent config partial and must contain at least one recognized field (`prompt`, `voice`, `model`, `tools`, `post_call_analytics`, etc.); the server merges it into the existing draft and returns the resulting draft as a revision-shaped snapshot.
      tags:
        - Agent Versioning - Branches
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/BranchId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Agent config partial. Must contain at least one recognized top-level field.
              additionalProperties: true
      responses:
        "200":
          description: Draft updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Revision"
        "400":
          description: Bad request. Empty body, no recognized field, or validation error on the config partial.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestErrorResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundErrorResponse"
        "423":
          $ref: "#/components/responses/LockedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

    get:
      operationId: getBranchDraft
      summary: Get open draft
      x-fern-sdk-group-name: agent_versioning_branches
      x-fern-sdk-method-name: get_draft
      description: Return the currently-open draft on this branch, including per-edit history.
      tags:
        - Agent Versioning - Branches
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/BranchId"
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/DraftDetail"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          description: No open draft on this branch, or the branch does not exist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

    delete:
      operationId: discardBranchDraft
      summary: Discard open draft
      x-fern-sdk-group-name: agent_versioning_branches
      x-fern-sdk-method-name: discard_draft
      description: Discard the open draft on this branch. Any unpublished edits are lost. The last committed revision remains the branch head.
      tags:
        - Agent Versioning - Branches
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/BranchId"
      responses:
        "200":
          description: Discarded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      discarded:
                        type: boolean
                        example: true
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          description: No open draft on this branch, or the branch does not exist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/{id}/branches/{branchId}/draft/publish:
    post:
      operationId: publishBranchDraft
      summary: Publish draft
      x-fern-sdk-group-name: agent_versioning_branches
      x-fern-sdk-method-name: publish_draft
      description: |
        Publish the open draft on this branch as a new revision.

        The response is `200` with `state: "committed"` when the security scan finishes synchronously, and `202` with `state: "scanning"` when the scan is deferred. A `scanning` revision is visible in history but cannot be restored or made live until it becomes `committed`. If the scan fails, the revision is left in `scanning` state and this endpoint returns `409` on subsequent publishes until the scan is retried.

        Publishing on the live branch pushes to production immediately.
      tags:
        - Agent Versioning - Branches
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/BranchId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishBranchDraftRequest"
      responses:
        "200":
          description: Draft committed synchronously.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/RestoreRevisionResult"
        "202":
          description: Security scan queued. Poll `GET /agent/{id}/branches/{branchId}/revisions` until the returned revision transitions to `committed`.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/RestoreRevisionResult"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          description: Forbidden. Branch is archived or the caller lacks write access.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "404":
          description: No open draft on this branch, or the branch does not exist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestErrorResponse"
        "409":
          $ref: "#/components/responses/ConflictErrorResponse"
        "423":
          $ref: "#/components/responses/LockedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/{id}/branches/{branchId}/draft/publish/cancel:
    post:
      operationId: cancelBranchDraftPublish
      summary: Cancel in-flight publish
      x-fern-sdk-group-name: agent_versioning_branches
      x-fern-sdk-method-name: cancel_publish
      description: Cancel a publish that is currently scanning. Idempotent. Returns `200` even if no scan is active.
      tags:
        - Agent Versioning - Branches
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/BranchId"
      responses:
        "200":
          description: Cancel processed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      cancelled:
                        type: boolean
                        example: true
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/{id}/branches/{branchId}/revisions:
    get:
      operationId: listBranchRevisions
      summary: List revisions on a branch
