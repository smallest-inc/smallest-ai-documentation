            type: string
          description: 24-char hex ObjectId of the knowledge base.
        - in: path
          name: knowledgeBaseScrapedUrlsId
          required: true
          schema:
            type: string
          description: 24-char hex ObjectId of the scraped-URL row to delete (from `GET /{id}/scraped-urls`).
      responses:
        "200":
          description: URL removed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /product/phone-numbers:
    get:
      summary: Get acquired phone numbers
      x-fern-sdk-group-name: phone_numbers
      x-fern-sdk-method-name: list
      description: |
        Retrieve all platform-purchased telephony numbers (Twilio/Plivo) for the organization.

        **Note:** Imported SIP numbers added via `POST /product/import-phone-number` are **not** included
