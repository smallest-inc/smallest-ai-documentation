openapi: 3.0.0
info:
  title: Agent Management API
  version: 1.0.0
  description: API for managing agents, their templates, and call logs

paths:
  /user:
    get:
      summary: Get user details
      tags:
        - User
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      _id:
                        type: string
                        description: The ID of the user
                      firstName:
                        type: string
                        description: The first name of the user
                      lastName:
                        type: string
                        description: The last name of the user
                      userEmail:
                        type: string
                        description: The email of the user
                      authProvider:
                        type: string
                        description: The authentication provider of the user
                      isEmailVerified:
                        type: boolean
                        description: Whether the user's email is verified
                      organizationId:
                        type: string
                        description: The organization ID of the user

        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /organization:
    get:
      summary: Get organization details
      tags:
        - Organization
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      _id:
                        type: string
                        description: The organization ID
                      name:
                        type: string
                        description: The organization name
                      members:
                        type: array
                        items:
                          type: object
                          properties:
                            _id:
                              type: string
                              description: The member ID
                            userEmail:
                              type: string
                              description: The member email
                      subscription:
                        type: object
                        properties:
                          planId:
                            type: string
                            description: The subscription plan ID

        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/template:
    get:
      summary: Get agent templates
      tags:
        - Agent Templates
      security:
        - BearerAuth: []
      parameters:
        - name: region
          in: query
          required: false
          description: Filter templates by region. Omit to return all templates.
          schema:
            type: string
            enum:
              - us
              - in
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                          description: MongoDB ObjectId of the template
                        id:
                          type: string
                          description: The ID of the agent template
                        name:
                          type: string
                          description: The name of the agent template
                        description:
                          type: string
                          description: The description of the agent template
                        avatarUrl:
                          type: string
                          description: The avatar URL of the agent template
                        referenceUrl:
                          type: string
                          description: The docs URL of the agent template
                        industry:
                          type: string
                          description: The industry the template is designed for (e.g. "Finance", "Healthcare")
                        useCase:
                          type: string
                          description: The use case the template addresses (e.g. "Lead Generation")
                        callType:
                          type: string
                          description: The type of calls the template handles
                          enum:
                            - Inbound
                            - Outbound
                            - Both
                        workflowType:
                          type: string
                          description: The workflow architecture of the template
                          enum:
                            - SINGLE_PROMPT
                            - WORKFLOW_GRAPH
                        region:
                          type: string
                          description: Human-readable region the template is available in
                          enum:
                            - India
                            - US
                        trending:
                          type: boolean
                          description: Whether the template is featured or trending
                        defaultLanguage:
                          type: string
                          description: The default language configured in the template
                          enum:
                            - English
                            - Hindi
                            - Marathi
                            - Gujarati
                        singlePromptConfig:
                          type: object
                          description: Configuration for single-prompt agents
                          properties:
                            prompt:
                              type: string
                              description: The system prompt used by the agent
                            tools:
                              type: array
                              description: Tools available to the agent
                              items:
                                type: object
                                properties:
                                  name:
                                    type: string
                                    description: The name of the tool
                                  description:
                                    type: string
                                    description: What the tool does
                                  input_schema:
                                    type: object
                                    description: JSON Schema describing the tool's input parameters

        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/from-template:
    post:
      summary: Create agent from template
      tags:
        - Agent Templates
      security:
        - BearerAuth: []
      description: We have created templates for some common use cases. You can use these templates to create an agent. For getting list of templates, you can use the /agent/template endpoint. It will give you the list of templates with their description and id. You can pass the id of the template in the request body to create an agent from the template.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentFromTemplateRequest"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: string
                    example: "60d0fe4f5311236168a109ca"
                    description: The ID of the created agent
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent:
    get:
      summary: Get all agents
      tags:
        - Agents
      security:
        - BearerAuth: []
      description: Agents are the main entities in the system. Agents are used to create conversations. You can create workflow for an agent and configure it for different use cases. You can also create custom workflows for an agent. This API will give you the list of agents created by organization you are a part of.
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
            description: Page number
        - in: query
          name: offset
          schema:
            type: integer
            default: 10
            description: Number of items to return per page
        - in: query
          name: search
          schema:
            type: string
            description: Search query
        - in: query
          name: type
          required: false
          schema:
            type: string
            enum:
              - single_prompt
              - workflow_graph
          description: Filter agents by workflow type
        - in: query
          name: sortField
          required: false
          schema:
            type: string
            default: createdAt
            enum:
              - createdAt
              - updatedAt
              - totalCalls
              - name
              - workflowType
          description: Field to sort results by
        - in: query
          name: sortOrder
          required: false
          schema:
            type: string
            default: desc
            enum:
              - asc
              - desc
          description: Sort direction
        - in: query
          name: archived
          required: false
          schema:
            type: boolean
            default: false
          description: When true, returns only archived agents. Omit or set to false to return active agents.
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      agents:
                        type: array
                        items:
                          $ref: "#/components/schemas/AgentDTO"
                      total:
                        type: number
                        description: Total number of agents

        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    post:
      summary: Create a new agent
      tags:
        - Agents
      security:
        - BearerAuth: []
      description: You can create a new agent by passing the name of the agent in the request body. You can use update-workflow endpoint next to assign custom workflow to the agent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentRequest"
      responses:
        "201":
          description: Agent created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: string
                    example: "60d0fe4f5311236168a109ca"
                    description: The ID of the created agent

        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/{id}:
    get:
      summary: Get agent by ID
      description: |
        Returns the agent document merged with the resolved config of the active version
        under `_resolvedConfig`. Non-versioned fields (name, telephonyProductId, allowInboundCall,
        etc.) sit at the top level; versioned fields (prompt, tools, language, synthesizer,
        post-call analytics, …) are resolved from the target version and exposed under `_resolvedConfig`.

        **Previewing a draft or specific version**

        Pass `?draftId=<id>` to resolve config from a specific draft instead of the active version.
        Pass `?versionId=<id>` to resolve config from a specific published version.
        When either param is used, the response includes `_configSource: "draft" | "version" | "active"`
        indicating which config was resolved.

        Notable resolved fields in `_resolvedConfig`:

        - `prompt` — active version's single-prompt text
        - `tools` — configured tools on the resolved version
        - `postCallAnalyticsConfig` — disposition metrics + analytics model flags
        - `modelName` — LLM model name on the resolved version
        - `defaultLanguage`, `supportedLanguages` — active language config
        - `firstMessage`, `globalPrompt` — active messaging config
        - `workflowGraph` — full node graph for `workflow_graph` agents

        To read prompt + tools alone, use `GET /agent/{id}/workflow` (deprecated for
        new integrations but still live). To inspect a specific non-active version,
        use `GET /agent/{id}/versions/{versionId}`.

        **400 — also used for "not found":** if the agent ID does not exist in the
        organization, the API returns 400 with `errors: ["No agent found"]` rather than 404.
      tags:
        - Agents
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: draftId
          required: false
          schema:
            type: string
          description: Resolve `_resolvedConfig` from this draft instead of the active version. Sets `_configSource` to `"draft"` in the response.
        - in: query
          name: versionId
          required: false
          schema:
            type: string
          description: Resolve `_resolvedConfig` from this published version instead of the active version. Sets `_configSource` to `"version"` in the response.
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/AgentDTO"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    patch:
      summary: Update agent metadata
      description: |
        Update agent fields. Behavior depends on whether the agent has versioning enabled:

        **Versioned agents** (have an active published version): only metadata fields are accepted —
        `name`, `description`, `avatarUrl`, `telephonyProductId`, `allowInboundCall`, `visibleToEveryone`.
        Submitting any config-level field returns 400 with
        `"Agent has versioning enabled. Config changes must be made through drafts."`.
        Use `PATCH /agent/{id}/drafts/{draftId}/config` instead.

        **Non-versioned agents** (no active version): all configuration fields are accepted,
        the same full set as `POST /agent`.

        **400 is also returned when:**
        - The agent is locked (`"Agent is locked, please unlock it to update"`)
        - Cross-field constraint violated (e.g. `north_indic` language requires `transcriberType: pulse`)

        **403** is returned when selecting a gated model (`gpt-5.2`, `electron-kogta`, `electron-kogta-v2`)
        without org-level access.
      tags:
        - Agents
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentRequest"
      responses:
        "200":
          description: Agent updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: string
                    example: "60d0fe4f5311236168a109ca"
                    description: The ID of the updated agent
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          description: Agent not found
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/{id}/archive:
    delete:
      operationId: deleteAgent
      summary: Archive or unarchive an agent
      description: |
        Soft-archives the agent — it is excluded from listings and stops accepting calls,
        but all data is preserved and the operation is fully reversible.

        Pass `?on=false` to unarchive (restore) a previously archived agent.

        **409 is returned when:**
        - The agent is already in the requested state (`"Agent is already archived"` / `"Agent is already active"`)
        - The agent is linked to an active campaign (`"Agent is associated with the [status] campaign "[name]". Complete or remove the campaign before archiving."`)
      tags:
        - Agents
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: on
          required: false
          schema:
            type: boolean
            default: true
          description: |
            `true` (default) — archive the agent.
            `false` — unarchive (restore) a previously archived agent.
      responses:
        "200":
          description: Agent archived or unarchived successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        description: Human-readable outcome message
                        enum:
                          - Agent archived
                          - Agent unarchived
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          description: Agent not found
        "409":
          description: |
            Conflict — agent is already in the requested state, or is linked to an active campaign.
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/{id}/duplicate:
    post:
      summary: Duplicate agent to another organization
      description: |
        Duplicates a SINGLE_PROMPT agent's live active version into a target organization
        (can also be the same organization). Copies all versioned configuration but strips
        organization-specific resources: knowledge base tools are removed, default variable
        values are blanked, and a new avatar is generated. The duplicate starts with a
        published V1 as its active version.

        **400 is returned when:**
        - The source agent is archived (`"Cannot duplicate an archived agent"`)
        - The agent has no `activeVersionId` (`"This agent has no active version and cannot be duplicated"`)
        - The active version exists but is not published/active (`"This agent has no active published version and cannot be duplicated"`)
        - The agent is not `SINGLE_PROMPT` workflow type
      tags:
        - Agents
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The ID of the source agent to duplicate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - targetOrganizationId
              properties:
                targetOrganizationId:
                  type: string
                  pattern: "^[a-fA-F0-9]{24}$"
                  description: |
                    MongoDB ObjectId of the target organization. Must be a 24-character hex string.
                    The authenticated user must be a member of this organization.
                  example: "60d0fe4f5311236168a109ca"
      responses:
        "201":
          description: Agent duplicated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      _id:
                        type: string
                        example: "60d0fe4f5311236168a109cb"
                        description: The ID of the newly created agent
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          description: Forbidden — authenticated user is not a member of the target organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestErrorResponse"
        "404":
          description: |
            Not found. Possible messages:
            - `"Agent not found"` — source agent doesn't exist or doesn't belong to the caller's org
            - `"Target organization not found"` — the `targetOrganizationId` doesn't exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  # ── Deprecated: Workflow endpoints (still live) ────────────────────────
  # Both still work in production and are actively used by customers, but
  # they bypass the versioning system. Prefer PATCH /agent/{id}/drafts/{draftId}/config
  # for writes and GET /agent/{id} for reads.

  /agent/{id}/workflow:
    get:
      summary: Get agent workflow
      deprecated: true
      description: |
        **Deprecated** — prefer `GET /agent/{id}` (config is resolved into `_resolvedConfig`
        including prompt, tools, and post-call analytics).

        Returns the active version's prompt and tools for single-prompt agents, or the
        workflow graph data for workflow_graph agents. Customers still rely on this to
        fetch their current prompt + tools — endpoint is kept live for now.

        **Caveat:** the `versionId` query param (if passed) is silently ignored.
        The response always reflects the currently-active version. To inspect a
        non-active version, use `GET /agent/{id}/versions/{versionId}`.
      tags:
        - Agents
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: The ID of the agent
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    description: The active version's workflow.
                    properties:
                      prompt:
                        type: string
                        description: Active prompt (single-prompt agents only).
                      tools:
                        type: array
                        items:
                          $ref: "#/components/schemas/Tool"
                        description: Active tool list (single-prompt agents only).
                      type:
                        $ref: "#/components/schemas/WorkflowType"
                        description: Workflow type. Present for workflow_graph agents.
                      data:
                        oneOf:
                          - $ref: "#/components/schemas/WorkflowGraphData"
                          - $ref: "#/components/schemas/SinglePromptData"
                        description: Graph data for workflow_graph agents.
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "404":
          description: Agent not found
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /workflow/{id}:
    patch:
      summary: Update workflow configuration
      deprecated: true
      description: |
        **Deprecated** — use `PATCH /agent/{id}/drafts/{draftId}/config` instead.

        Directly mutates the legacy workflow document for an agent. This write path
        bypasses the versioning system entirely: the change is not captured as a
        new version, and future version activations may overwrite the legacy doc
        back to whatever the version snapshot contains.

        ⚠ **Writing here on a versioned agent can silently wipe tools, prompt, or
        other fields that were missing from the PATCH payload.** Only use this if
        you know the agent is not using versioning, or if you are intentionally
        hot-patching the legacy doc.
      tags:
        - Agents
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: The workflow ID (found at `agent.workflowId` on the agent document).
          schema:
            type: string
            example: "60d0fe4f5311236168a109ca"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  $ref: "#/components/schemas/WorkflowType"
                workflowGraph:
                  type: object
                  description: Required when `type = workflow_graph`. Exactly one of `workflowGraph` or `singlePromptConfig` must be provided.
                  properties:
                    nodes:
                      type: array
                      items:
                        type: object
                    edges:
                      type: array
                      items:
                        type: object
                singlePromptConfig:
                  $ref: "#/components/schemas/SinglePromptConfig"
      responses:
        "200":
          description: Workflow updated successfully.
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "404":
          description: Workflow not found.
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /conversation:
    get:
      summary: Get all conversation logs
      description: Retrieve paginated conversation logs with support for various filters. Returns call logs for agents belonging to the authenticated user's organization.
      tags:
        - Logs
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number for pagination
          example: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 5
            minimum: 1
            maximum: 500
          description: Number of items per page. Server-side cap is 500 — values above 500 are silently clamped.
          example: 10
        - in: query
          name: agentIds
          schema:
            type: string
          description: Comma-separated list of agent IDs to filter by
          example: "60d0fe4f5311236168a109ca,60d0fe4f5311236168a109cb"
        - in: query
          name: campaignIds
          schema:
            type: string
          description: Comma-separated list of campaign IDs to filter by
          example: "60d0fe4f5311236168a109ca,60d0fe4f5311236168a109cb"
        - in: query
          name: callTypes
          schema:
            type: string
            enum:
              - telephony_inbound
              - telephony_outbound
              - webcall
          description: Comma-separated list of call types to filter by
          example: "telephony_outbound,telephony_inbound"
        - in: query
          name: search
          schema:
            type: string
          description: Search query to filter by callId, fromNumber, or toNumber
          example: "+1234567890"
        - in: query
          name: statusFilter
          schema:
            type: string
          description: |
            Comma-separated list of call statuses to filter by.
            Available statuses: pending, in_progress, in_queue, processing, active, completed, failed, no_answer, cancelled
          example: "completed,failed"
        - in: query
          name: disconnectReasonFilter
          schema:
            type: string
          description: |
            Comma-separated list of disconnect reasons to filter by.
            Available reasons: user_hangup, agent_hangup, connection_error, timeout, system_error, transfer_complete
          example: "user_hangup,agent_hangup"
        - in: query
          name: callAttemptFilter
          schema:
            type: string
          description: |
            Comma-separated list of call attempt types to filter by.
            Available filters: initial (first attempt calls), retry (retry attempt calls), all (all calls)
          example: "initial"
        - in: query
          name: durationFilter
          schema:
            type: string
          description: |
            Comma-separated list of duration ranges to filter by.
            Available ranges: 0-30 (0-30 seconds), 30-60 (30-60 seconds), 1-5 (1-5 minutes), 5+ (more than 5 minutes)
          example: "0-30,30-60"
        - in: query
          name: sortBy
          required: false
          schema:
            type: string
            enum:
              - createdAt
              - updatedAt
              - callDuration
              - avgLatency
          description: Field to sort results by
        - in: query
          name: sortOrder
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
          description: Sort direction
        - in: query
          name: dateFrom
          required: false
          schema:
            type: string
            format: date-time
          description: ISO date — return calls created on or after this date
          example: "2025-01-01T00:00:00.000Z"
        - in: query
          name: dateTo
          required: false
          schema:
            type: string
            format: date-time
          description: ISO date — return calls created on or before this date
          example: "2025-01-31T23:59:59.999Z"
        - in: query
          name: versionFilter
          required: false
          schema:
            type: string
          description: Comma-separated version IDs to filter calls by the agent version that handled them
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      logs:
                        type: array
                        items:
                          type: object
                          properties:
                            _id:
                              type: string
                              description: The database ID of the call log
                              example: "60d0fe4f5311236168a109ca"
                            callId:
                              type: string
                              description: The unique call identifier
                              example: "CALL-1737000000000-abc123"
                            status:
                              type: string
                              description: The status of the call
                              enum: [pending, in_progress, in_queue, processing, active, completed, failed, no_answer, cancelled]
                              example: "completed"
                            duration:
                              type: number
                              description: The duration of the call in seconds
                              example: 120
                            from:
                              type: string
                              description: The phone number the call was made from
                              example: "+15551234567"
                            to:
                              type: string
                              description: The phone number the call was made to
                              example: "+15559876543"
                            type:
                              type: string
                              description: The type of call
                              enum: [telephony_inbound, telephony_outbound, webcall]
                              example: "telephony_outbound"
                            agentId:
                              type: string
                              description: The ID of the agent that handled the call
                              example: "60d0fe4f5311236168a109ca"
                            recordingUrl:
                              type: string
                              description: URL to the call recording (if available)
                              example: "https://storage.example.com/recordings/call-123.mp3"
                            recordingDualUrl:
                              type: string
                              description: URL to the dual-channel call recording (if available)
                              example: "https://storage.example.com/recordings/call-123-dual.mp3"
                            disconnectionReason:
                              type: string
                              description: The reason the call was disconnected
                              example: "user_hangup"
                            retryCount:
                              type: integer
                              description: Number of retry attempts for this call
                              example: 0
                            createdAt:
                              type: string
                              format: date-time
                              description: When the call was created
                              example: "2025-01-15T10:30:00.000Z"
                            dispositionMetrics:
                              type: object
                              description: Custom disposition metrics for the call
                              additionalProperties:
                                type: string
                              example:
                                interested: "yes"
                                follow_up_needed: "no"
                            agentDispositionConfig:
                              type: array
                              description: Configuration for disposition metrics
                              items:
                                type: object
                                properties:
                                  identifier:
                                    type: string
                                  type:
                                    type: string
                            callFailureReason:
                              type: string
                              description: Reason the call failed, if applicable
                            callCost:
                              type: number
                              description: Discounted total cost of the call
                            versionId:
                              type: string
                              description: ID of the agent version that handled this call
                            versionNumber:
                              type: number
                              description: Human-readable version number of the agent version used
                            isTest:
                              type: boolean
                              description: Whether this was a test call
                            retryCallId:
                              type: string
                              description: ID of the retry call if this call was retried
                            retryAttemptNumber:
                              type: number
                              description: Which retry attempt this was (0 = initial, 1 = first retry, etc.)
                            postCallAnalytics:
                              type: object
                              description: |
                                Post-call analytics results evaluated against the call transcript.
                                Contains disposition metric values with confidence scores.
                              properties:
                                summary:
                                  type: string
                                  description: Auto-generated summary of the call
                                dispositionMetrics:
                                  type: array
                                  description: Evaluated disposition metrics for this call
                                  items:
                                    type: object
                                    properties:
                                      identifier:
                                        type: string
                                        description: Metric identifier matching the agent config
                                      value:
                                        type: string
                                        description: The evaluated value for this metric
                                      confidence:
                                        type: number
                                        description: Confidence score for the evaluation (0–1)
                            turnLatencyMetrics:
                              type: object
                              description: Per-turn latency statistics for the call
                              properties:
                                avgLatency:
                                  type: number
                                  description: Average turn latency in milliseconds
                                medianLatency:
                                  type: number
                                  description: Median turn latency in milliseconds
                                turns:
                                  type: number
