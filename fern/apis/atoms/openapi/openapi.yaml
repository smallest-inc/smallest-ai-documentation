      responses:
        "202":
          description: Campaign queued for processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: "Campaign is being processed"
                      taskId:
                        type: string
                        description: Internal task identifier for the queued job
                      campaignId:
                        type: string
                        description: The ID of the campaign
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
