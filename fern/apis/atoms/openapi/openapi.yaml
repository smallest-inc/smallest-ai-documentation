              type: object
              properties:
                memberIds:
                  type: array
                  description: Array of member IDs to delete
                  items:
                    type: string
                    example: "60d0fe4f5311236168a109cd"
              required:
                - memberIds
      responses:
        "200":
          description: Members deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      deletedCount:
                        type: integer
                        description: Number of members successfully deleted
                        example: 3
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  errors:
                    type: array
                    items:
                      type: string
                    example: ["Audience ID missing"]
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          description: Forbidden - User can only modify audiences they created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  errors:
                    type: array
                    items:
                      type: string
                    example: ["Not authorized to modify this audience"]
        "404":
          description: Audience not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  errors:
                    type: array
                    items:
                      type: string
                    example: ["Audience not found"]
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /audience/{id}/members/search:
    get:
      summary: Search audience members
      description: |
        Search for members within a specific audience using flexible search parameters. Users can only search members of audiences they created.

        **Search Types:**
        - **General Search** (`query`): Searches across all fields in the audience member data
        - **Field-Specific Search**: Use any field name as a parameter (e.g., `firstName=john`, `phoneNumber=123456`, `email=test@example.com`)

        **Examples:**
        - `?query=john` - General search across all fields
        - `?firstName=john` - Search specifically in firstName field
        - `?phoneNumber=555-1234` - Search specifically in phoneNumber field
        - `?firstName=john&lastName=doe` - Search for members matching both criteria

        **Note:** When using phoneNumber field, do not use quotes around the phone number. You can use either a general search OR field-specific searches, but not both simultaneously.
      tags:
        - Audience
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the audience
          schema:
            type: string
            example: "60d0fe4f5311236168a109ca"
        - name: query
          in: query
          required: false
          description: General search term that searches across all fields in audience member data
          schema:
            type: string
            example: "john"
        - name: "*"
          in: query
          required: false
          description: |
            Any field name can be used as a query parameter for field-specific searches.
            Examples: firstName, lastName, phoneNumber, email, etc.
            The parameter name becomes the field to search in, and the value is the search term.
            When using phoneNumber field, do not use quotes around the phone number.
          schema:
            type: string
            example: "field_value"
      responses:
        "200":
          description: Search results returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      members:
                        type: array
                        items:
                          type: object
                          properties:
                            _id:
                              type: string
                              description: The unique identifier for the audience member
                              example: "60d0fe4f5311236168a109cd"
                            data:
                              type: object
                              description: Dynamic data from CSV, structure depends on uploaded file
                              example:
                                phoneNumber: "+1234567890"
                                name: "John Doe"
                                email: "john@example.com"
                      searchInfo:
                        type: object
                        description: Information about the search performed
                        properties:
                          searchType:
                            type: string
                            description: The type of search performed
                            enum: ["general", "field"]
                            example: "field"
                          searchTerm:
                            type: string
                            description: The search term(s) used
                            example: "john"
                          searchFields:
                            type: array
                            items:
                              type: string
                            description: The specific fields searched (for field-specific searches)
                            example: ["firstName", "lastName"]
                          totalResults:
                            type: integer
                            description: The number of results returned
                            example: 5
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  errors:
                    type: array
                    items:
                      type: string
                    example:
                      [
                        "At least one search parameter is required. Use 'query' for general search across all fields, or use field-specific searches like 'firstName=john' or 'phoneNumber=123456'.",
                      ]
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  errors:
                    type: array
                    items:
                      type: string
                    example: ["Failed to search audience members"]

  # ── Agent Versioning: Drafts ───────────────────────────────────────────

  /agent/{id}/drafts:
    post:
      summary: Create a draft
      description: Create a new draft from an existing published version or another draft. Exactly one of sourceVersionId or sourceDraftId is required.
      tags:
        - Agent Versioning - Drafts
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDraftRequest"
      responses:
        "201":
          description: Draft created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/AgentVersion"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

    get:
      summary: List active drafts
      description: List all active (non-discarded) drafts for an agent.
      tags:
        - Agent Versioning - Drafts
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/AgentVersion"
                        - type: object
                          properties:
                            lastEditorName:
                              type: string
                              nullable: true
                              description: Display name of the last editor
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/{id}/drafts/{draftId}:
    get:
      summary: Get draft detail
      description: Returns the latest revision of a draft along with its edit history.
      tags:
        - Agent Versioning - Drafts
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/DraftId"
        - name: limit
          in: query
          required: false
          description: Max number of edit history entries to return (1-100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      latest:
                        $ref: "#/components/schemas/AgentVersion"
                      editHistory:
                        type: array
                        items:
                          $ref: "#/components/schemas/DraftEditHistoryEntry"
                      editCount:
                        type: integer
                        description: Total number of edits on this draft
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

    patch:
      summary: Rename a draft
      description: |
        Rename a draft. For config changes, use PATCH /agent/{id}/drafts/{draftId}/config instead.
      tags:
        - Agent Versioning - Drafts
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/DraftId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - draftName
              properties:
                draftName:
                  type: string
                  maxLength: 100
                  description: New name for the draft
      responses:
        "200":
          description: Draft renamed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      draftName:
                        type: string
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

    delete:
      summary: Discard a draft
      description: Discard (soft-delete) a draft. Only the draft creator or an admin can discard.
      tags:
        - Agent Versioning - Drafts
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/DraftId"
      responses:
        "200":
          description: Draft discarded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: "null"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/{id}/drafts/{draftId}/diff:
    get:
      summary: Get draft diff
      description: Compare a draft against its source version or another specified version.
      tags:
        - Agent Versioning - Drafts
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/DraftId"
        - name: compareTo
          in: query
          required: false
          description: Version ID to compare against. If omitted, compares against the source version.
          schema:
            type: string
            pattern: "^[a-f\\d]{24}$"
      responses:
        "200":
          description: Diff returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    description: Section-by-section diff between the draft and the comparison target
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/{id}/drafts/{draftId}/publish:
    post:
      summary: Publish a draft
      description: Publish a draft as a new versioned release. Optionally activate it immediately.
      tags:
        - Agent Versioning - Drafts
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/DraftId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishDraftRequest"
      responses:
        "201":
          description: Draft published as a new version
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/AgentVersion"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/{id}/drafts/{draftId}/test-call:
    post:
      summary: Test call with draft config
      description: Initiate a test call using the draft's resolved configuration.
      tags:
        - Agent Versioning - Drafts
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/DraftId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestCallRequest"
      responses:
        "200":
          description: Test call initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    description: Test call result details
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/{id}/drafts/{draftId}/config:
    patch:
      summary: Edit draft config (prompt, tools, post-call metrics, voice, etc.)
      description: |
        Update the configuration of a draft. This single endpoint is how every
        agent-level config field is changed: prompt, tools, voice, language,
        **post-call analytics (disposition metrics)**, and more. There is no
        standalone post-call-analytics endpoint — it lives here as the
        `postCallAnalyticsConfig` body field.

        ## Post-Call Analytics

        Pass a `postCallAnalyticsConfig` object to configure disposition
        metrics (STRING, BOOLEAN, INTEGER, ENUM, DATETIME) that are
        automatically extracted from each completed call, along with the
        `useInternalAnalyticsModel` and `useReasoningModel` flags. See the
        [Post-Call Metrics guide](/atoms/atoms-platform/features/post-call-metrics) for a
        full Python walkthrough and disposition metric schema reference.

        ## Full payload

        Accepts the full agent-shaped config payload (language, synthesizer,
        slmModel, defaultVariables, preCallAPI, etc.) plus two draft-specific
        fields:

        - `singlePromptConfig` — prompt and tools (end_call, transfer_call,
          api_call, extract_dynamic_variables, knowledge_base_search).
        - `postCallAnalyticsConfig` — disposition metrics + analytics/
          reasoning model flags.

        Each PATCH increments the draft's revision counter. Config is not
        live until the draft is published and activated (see
        `/drafts/{draftId}/publish` and `/versions/{versionId}/activate`).
      tags:
        - Agent Versioning - Drafts
        - Post-Call Analytics
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/DraftId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DraftConfigRequest"
      responses:
        "200":
          description: Draft config updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/AgentVersion"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  # ── Agent Versioning: Published Versions ───────────────────────────────

  /agent/{id}/versions:
    get:
      summary: List published versions
      description: List published versions for an agent with pagination and optional pin filter.
      tags:
        - Agent Versioning - Versions
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - name: limit
          in: query
          required: false
          description: Number of versions to return (1-100, default 20)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: skip
          in: query
          required: false
          description: Number of versions to skip (default 0)
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: isPinned
          in: query
          required: false
          description: Filter by pinned status
          schema:
            type: boolean
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      versions:
                        type: array
                        items:
                          allOf:
                            - $ref: "#/components/schemas/AgentVersion"
                            - type: object
                              properties:
                                publishedByName:
                                  type: string
                                  nullable: true
                                  description: Display name of the user who published
                      total:
                        type: integer
                        description: Total count of matching versions
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/{id}/versions/diff:
    get:
      summary: Diff two versions
      description: Compare two published versions side-by-side by their IDs.
      tags:
        - Agent Versioning - Versions
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - name: versionA
          in: query
          required: true
          description: ID of the first version
          schema:
            type: string
            pattern: "^[a-f\\d]{24}$"
        - name: versionB
          in: query
          required: true
          description: ID of the second version
          schema:
            type: string
            pattern: "^[a-f\\d]{24}$"
      responses:
        "200":
          description: Diff returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    description: Section-by-section diff between the two versions
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/{id}/versions/compare-metrics:
    get:
      summary: Compare metrics between two versions
      description: Compare analytics/call metrics between two published versions over an optional date range.
      tags:
        - Agent Versioning - Versions
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - name: versionA
          in: query
          required: true
          description: ID of the first version
          schema:
            type: string
            pattern: "^[a-f\\d]{24}$"
        - name: versionB
          in: query
          required: true
          description: ID of the second version
          schema:
            type: string
            pattern: "^[a-f\\d]{24}$"
        - name: dateFrom
          in: query
          required: false
          description: Start date for the comparison range (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          required: false
          description: End date for the comparison range (ISO 8601)
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Metrics comparison returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    description: Aggregated metrics for each version
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/{id}/versions/{versionId}:
    get:
      summary: Get version detail
      description: |
        Returns the full detail of a specific published version (read-only).
        Published versions are config-immutable — to modify config, create a draft from
        this version and publish it as a new version.
      tags:
        - Agent Versioning - Versions
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      version:
                        $ref: "#/components/schemas/AgentVersion"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

    patch:
      summary: Update version metadata (label, description, pin only)
      description: |
        Update a published version's label, description, or pinned status. At least one field is required.
        Published versions (both active and inactive) are config-immutable — their agent
        configuration cannot be changed. To modify config, create a new draft from the version,
        edit the draft, and publish it as a new version.
      tags:
        - Agent Versioning - Versions
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/VersionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVersionMetaRequest"
      responses:
        "200":
          description: Version metadata updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/AgentVersion"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/{id}/versions/{versionId}/activate:
    patch:
      summary: Activate a version
      description: |
        Set a published version as the active version for the agent. The previously
        active version is deactivated. This does not modify the version's config — it
        only changes which version serves live traffic.
      tags:
        - Agent Versioning - Versions
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Version activated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/AgentVersion"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/{id}/versions/{versionId}/test-call:
    post:
      summary: Test call with version config
      description: Initiate a test call using a specific published version's configuration.
      tags:
        - Agent Versioning - Versions
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/VersionId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestCallRequest"
      responses:
        "200":
          description: Test call initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    description: Test call result details
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  # ── GET /agent/{id}/resolved-config — REMOVED ──────────────────────────
  # Unused by UI. Resolved config is served via GET /agent/{id}?draftId=X
  # which merges _resolvedConfig into the agent DTO. Marked for backend
  # removal in tasks/09-backend-misc-cleanup.md.

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: API key from the console ApiKey collection, sent as Bearer token. Also accepts session cookies for browser-based auth.

  parameters:
    AgentId:
      name: id
      in: path
      required: true
      description: The agent ID
      schema:
        type: string
        example: "60d0fe4f5311236168a109ca"
    DraftId:
      name: draftId
      in: path
      required: true
      description: The draft ID
      schema:
        type: string
    VersionId:
      name: versionId
      in: path
      required: true
      description: The published version ID
      schema:
        type: string
        pattern: "^[a-f\\d]{24}$"

  schemas:
    ApiResponse:
      type: object
      properties:
        status:
          type: boolean
        data:
          type: object
    UnauthorizedErrorResponse:
      type: object
      properties:
        status:
          type: boolean
          example: false
        errors:
          type: array
          items:
            type: string
          example: ["Unauthorized: User not found"]
    InternalServerErrorResponse:
      type: object
      properties:
        status:
          type: boolean
          example: false
        errors:
          type: array
          items:
            type: string
          example: ["Internal server error"]
    BadRequestErrorResponse:
      type: object
      properties:
        status:
          type: boolean
          example: false
        errors:
          type: array
          items:
            type: string
          example: ["Invalid input"]

    CreateAgentFromTemplateRequest:
      type: object
      required:
        - agentName
        - templateId
      properties:
        agentName:
          type: string
          description: Name of the agent
        agentDescription:
          type: string
          description: Description of the agent
        templateId:
          type: string
          description: ID of the template to use. You can get the list of templates with their description and id from the /agent/template endpoint.
    CreateAgentRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
        backgroundSound:
          type: string
          enum: ["", "office", "cafe", "call_center", "static"]
          default: ""
          description: "Ambient background sound during calls. Options: '' (none), 'office', 'cafe', 'call_center', 'static'."
        # visibleToEveryone:
        #   type: boolean
        #   default: false
        language:
          type: object
          description: Language configuration for the agent. You can enable or disable language switching for the agent. This will be used to determine the language of the agent.
          properties:
            enabled:
              type: string
              enum: [en, hi, ta]
              description: "The language of the agent. Supported: 'en' (English), 'hi' (Hindi), 'ta' (Tamil)."
              default: en
            switching:
              type: object
              description: Language switching configuration for the agent. If enabled, the agent will be able to switch between languages based on the user's language.
              properties:
                isEnabled:
                  type: boolean
                  description: Whether to enable language switching for the agent
                  default: false
                minWordsForDetection:
                  type: number
                  minimum: 1
                  maximum: 10
                  description: Minimum number of words required for language detection
                  default: 2
                strongSignalThreshold:
                  type: number
                  minimum: 0.1
                  maximum: 0.9
                  description: Threshold for strong language signal detection (0.1 to 0.9)
                  default: 0.7
                weakSignalThreshold:
                  type: number
                  minimum: 0.1
                  maximum: 0.9
                  description: Threshold for weak language signal detection (0.1 to 0.9)
                  default: 0.3
                minConsecutiveForWeakThresholdSwitch:
                  type: number
                  minimum: 1
                  maximum: 5
                  description: Minimum consecutive detections required for weak threshold language switch
                  default: 2
        synthesizer:
          type: object
          description: Synthesizer configuration for the agent. You can configure the synthesizer to use different voices and models. Currently we support 3 types of models for the synthesizer. Waves, Waves Lightning Large and Waves Lightning Large Voice Clone. You can clone your voice using waves platform https://waves.smallest.ai/voice-clone and use the voiceId for this field and select the model as waves_lightning_large_voice_clone to use your cloned voice. When updating the synthesizer configuration to voice clone model, you have to provide model and voiceId and gender all are required fields but when selecting the model as waves or waves and waves_lightning_large, you have to provide only model field and voiceId.
          properties:
            voiceConfig:
              oneOf:
                - type: object
                  properties:
                    model:
                      type: string
                      enum: [waves_lightning_large_voice_clone]
                      description: We currently support 3 types of models for the synthesizer. Waves, Waves Lightning Large and Waves Lightning Large Voice Clone. You can clone your voice using waves platform and use the voiceId for this field and select the model as waves_lightning_large_voice_clone to use your cloned voice.
                    voiceId:
                      type: string
                    gender:
                      type: string
                      enum:
                        - male
                        - female
                      description: The gender of the synthesizer. When selecting gender, you have to select the model and voiceId which are required fields.
                - type: object
                  properties:
                    model:
                      type: string
                      enum: [waves, waves_lightning_large]
                      description: We currently support 3 types of models for the synthesizer. Waves, Waves Lightning Large and Waves Lightning Large Voice Clone. You can clone your voice using waves platform and use the voiceId for this field and select the model as waves_lightning_large_voice_clone to use your cloned voice.
                    voiceId:
                      type: string
                      default: nyah
                      description: The voice ID to use
              default:
                model: waves_lightning_large
                voiceId: nyah
            speed:
              type: number
              default: 1.2
            consistency:
              type: number
              minimum: 0
              maximum: 1
              default: 0.5
            similarity:
              type: number
              minimum: 0
              maximum: 1
              default: 0
            enhancement:
              type: number
              enum: [0, 1, 2]
              default: 1
        globalKnowledgeBaseId:
          type: string
          description: The global knowledge base ID of the agent. You can create a global knowledge base by using the /knowledgebase endpoint and assign it to the agent. The agent will use this knowledge base for its responses.
        slmModel:
          type: string
          enum: ["electron", "gpt-4o"]
          default: "electron"
          description: The LLM model to use for the agent. LLM model will be used to generate the response and take decisions based on the user's query.
        defaultVariables:
          type: object
          description: The default variables to use for the agent. These variables will be used if no variables are provided when initiating a conversation with the agent.
        preCallAPI:
          type: object
          description: Configuration for an API call to be made before the call starts. The response variables can be injected into the agent's prompt.
          properties:
            isEnabled:
              type: boolean
              default: false
              description: Whether the pre-call API is enabled.
            url:
              type: string
              format: uri
              description: The URL of the API endpoint to call.
            method:
              type: string
              enum: ["GET", "POST", "PUT", "DELETE", "PATCH"]
              description: The HTTP method to use for the API call.
            headers:
              type: object
              additionalProperties:
                type: string
              description: Optional HTTP headers to include in the request.
            body:
              type: object
              description: Optional request body for POST/PUT/PATCH requests.
            timeout:
              type: integer
              minimum: 1
              maximum: 30
              default: 5
              description: Timeout in seconds for the API call.
            queryParams:
              type: object
              description: Optional query parameters to include in the request URL.
            responseVariables:
              type: array
              description: List of variables to extract from the API response using JSON path expressions.
              items:
                type: object
                required:
                  - variableName
                  - jsonPath
                properties:
                  variableName:
                    type: string
                    description: The name of the variable to inject into the agent prompt.
                  jsonPath:
                    type: string
                    description: JSON path expression to extract the value from the API response.
          required:
            - url
            - method
        globalPrompt:
          type: string
          description: |
            Set global instructions for your agent's personality, role, and behavior throughout conversations.
            Note: Only used for workflow_graph agents.
        telephonyProductId:
          type: string
          description: The telephony product ID of the agent. This is the product ID of the telephony product that will be used to make the outbound call. You can buy telephone number and assign it to the agent.
        workflowType:
          $ref: "#/components/schemas/WorkflowType"
          default: workflow_graph
          description: The type of workflow to create for the agent. Defaults to workflow_graph if not specified.

    UpdateAgentRequest:
      type: object
      description: |
        Agent metadata update payload. Accepted fields on `PATCH /agent/{id}`
        when versioning is enabled. Any config-level field (language, synthesizer,
        slmModel, prompt, tools, post-call analytics, etc.) must be updated through
        a draft and published as a new version — see `PATCH /agent/{id}/drafts/{draftId}/config`.
        Submitting config fields here returns 400 with
        `"Agent has versioning enabled. Config changes must be made through drafts."`.
      properties:
        name:
          type: string
        description:
          type: string
        telephonyProductId:
          type: string
          description: Telephony product ID to associate with the agent for outbound/inbound calls.
        allowInboundCall:
          type: boolean
          description: Whether the agent can receive inbound calls.

    DraftConfigRequest:
      description: |
        Config payload for editing a draft via `PATCH /agent/{id}/drafts/{draftId}/config`.
        Accepts the same shape as the legacy `PATCH /agent/{id}` body plus two
        versioning-era fields — `singlePromptConfig` (prompt + tools) and
        `postCallAnalyticsConfig`. All fields are optional; a draft save may update
        any subset.
      allOf:
        - $ref: "#/components/schemas/CreateAgentRequest"
        - type: object
          properties:
            singlePromptConfig:
              $ref: "#/components/schemas/SinglePromptConfig"
            postCallAnalyticsConfig:
              $ref: "#/components/schemas/PostCallAnalyticsConfig"

    AgentDTO:
      type: object
      properties:
        _id:
          type: string
          description: The ID of the agent
        name:
          type: string
          description: The name of the agent
        description:
          type: string
          description: The description of the agent
        backgroundSound:
          type: string
          enum: ["", "office", "cafe", "call_center", "static"]
          description: "Ambient background sound during calls. Options: '' (none), 'office', 'cafe', 'call_center', 'static'."
        organization:
          type: string
          description: The organization ID of the agent
        workflowId:
          type: string
          description: The workflow ID of the agent
        workflowType:
          $ref: "#/components/schemas/WorkflowType"
          default: workflow_graph
          description: The type of workflow used by the agent
        createdBy:
          type: string
          description: The user ID of the user who created the agent
        globalKnowledgeBaseId:
          type: string
          description: The global knowledge base ID of the agent
        language:
          type: object
          description: The language configuration of the agent
          properties:
            enabled:
              type: string
              description: The language of the agent
              enum: [en, hi, ta]
            switching:
              type: object
              description: Language switching configuration for the agent
              properties:
                isEnabled:
                  type: boolean
                  description: Whether language switching is enabled for the agent
                minWordsForDetection:
                  type: number
                  description: Minimum number of words required for language detection
                strongSignalThreshold:
                  type: number
                  description: Threshold for strong language signal detection
                weakSignalThreshold:
                  type: number
                  description: Threshold for weak language signal detection
                minConsecutiveForWeakThresholdSwitch:
                  type: number
                  description: Minimum consecutive detections required for weak threshold language switch
            supported:
              type: array
              items:
                type: string
              description: The supported languages of the agent
        synthesizer:
          type: object
          description: The synthesizer (TTS) configuration of the agent
          properties:
            voiceConfig:
              type: object
              description: The voice configuration of the synthesizer
              properties:
                model:
                  type: string
                  description: The model of the synthesizer
                  enum:
                    - waves
                    - waves_lightning_large
                    - waves_lightning_large_voice_clone
                  default: waves_lightning_large
                voiceId:
                  type: string
                  description: The voice ID of the synthesizer.
                  default: nyah
                gender:
                  type: string
                  enum:
                    - male
                    - female
                  default: female
            speed:
              type: number
              default: 1.2
              description: The speed of the synthesizer
            consistency:
              type: number
              default: 0.5
              description: The consistency of the synthesizer
            similarity:
              type: number
              default: 0
              description: The similarity of the synthesizer
            enhancement:
              type: number
              default: 1
              description: The enhancement of the synthesizer
        slmModel:
          type: string
          enum:
            - electron
            - gpt-4o
          description: The LLM model to use for the agent. LLM model will be used to generate the response and take decisions based on the user's query.
        defaultVariables:
          type: object
          description: The default variables to use for the agent. These variables will be used if no variables are provided when initiating a conversation with the agent.
        preCallAPI:
          type: object
          description: Configuration for an API call to be made before the call starts. The response variables can be injected into the agent's prompt.
          properties:
            isEnabled:
              type: boolean
              default: false
              description: Whether the pre-call API is enabled.
            url:
              type: string
              format: uri
              description: The URL of the API endpoint to call.
            method:
              type: string
              enum: ["GET", "POST", "PUT", "DELETE", "PATCH"]
              description: The HTTP method to use for the API call.
            headers:
              type: object
              additionalProperties:
                type: string
              description: Optional HTTP headers to include in the request.
            body:
              type: object
              description: Optional request body for POST/PUT/PATCH requests.
            timeout:
              type: integer
              minimum: 1
              maximum: 30
              default: 5
              description: Timeout in seconds for the API call.
            queryParams:
              type: object
              description: Optional query parameters to include in the request URL.
            responseVariables:
              type: array
              description: List of variables to extract from the API response using JSON path expressions.
              items:
                type: object
                required:
                  - variableName
                  - jsonPath
                properties:
                  variableName:
                    type: string
                    description: The name of the variable to inject into the agent prompt.
                  jsonPath:
                    type: string
                    description: JSON path expression to extract the value from the API response.
          required:
            - url
            - method
        createdAt:
          type: string
          format: date-time
          description: The date and time when the agent was created
        updatedAt:
          type: string
          format: date-time
          description: The date and time when the agent was last updated
        activeVersionId:
          type: string
          description: ID of the currently-active published version. Matches `versionId`.
        versionId:
          type: string
          description: Alias for `activeVersionId`.
        _resolvedConfig:
          type: object
          description: |
            The active version's config resolved into a flat shape. Populated when
            the agent has a published, activated version.
          properties:
            prompt:
              type: string
              description: Active version's single-prompt text.
            tools:
              type: array
              items:
                $ref: "#/components/schemas/Tool"
              description: Active version's configured tools.
            postCallAnalyticsConfig:
              $ref: "#/components/schemas/PostCallAnalyticsConfig"
            callDispositionConfig:
              type: string

    # ── Agent Versioning Schemas ──────────────────────────────────────────

    AgentVersion:
      type: object
      description: Represents either a draft revision or a published version of an agent's configuration.
      properties:
        _id:
          type: string
          description: Unique identifier
        agent:
          type: string
          description: The agent this version belongs to
        status:
          type: string
          enum: [published, draft, archived]
          description: Current status of the version record
        versionNumber:
          type: integer
          nullable: true
          description: Auto-incremented version number (published versions only)
        label:
          type: string
          nullable: true
          description: Human-readable label for the version
          maxLength: 200
        description:
          type: string
          nullable: true
          description: Description of what changed in this version
          maxLength: 2000
        isPinned:
          type: boolean
          default: false
          description: Whether the version is pinned for quick access
        publishedBy:
          type: string
          nullable: true
          description: User ID of who published this version
        draftId:
          type: string
          nullable: true
          description: Unique draft identifier (drafts only)
        draftName:
          type: string
          nullable: true
          description: Human-readable draft name
          maxLength: 100
        draftRevision:
          type: integer
          nullable: true
          description: Revision number within the draft (drafts only)
        sourceVersionId:
          type: string
          nullable: true
          description: The published version this draft was branched from
        blocks:
          type: object
          description: References to the 13 config section blocks
          properties:
            workflow_prompt:
              type: string
            workflow_tools:
              type: string
            workflow_graph:
              type: string
            llm:
              type: string
            voice:
              type: string
            language:
              type: string
            call_handling:
              type: string
            detection:
              type: string
            analytics:
              type: string
            timeouts:
              type: string
            audio:
              type: string
            privacy:
              type: string
            widget:
              type: string
        workflowType:
          $ref: "#/components/schemas/WorkflowType"
        parentVersion:
          type: string
          nullable: true
          description: The version this was derived from
        isActive:
          type: boolean
          description: Whether this is the currently active version for the agent
        createdBy:
          type: string
          description: User ID of who created this record
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DraftEditHistoryEntry:
      type: object
      properties:
        revision:
          type: integer
          description: Draft revision number
        changedSections:
          type: array
          items:
            type: string
          description: List of config sections that changed in this revision
        editorName:
          type: string
          nullable: true
          description: Display name of the editor
        editorId:
          type: string
          nullable: true
          description: User ID of the editor
        timestamp:
          type: string
          format: date-time
          description: When the edit was made

    CreateDraftRequest:
      type: object
      properties:
        sourceVersionId:
          type: string
          pattern: "^[a-f\\d]{24}$"
          description: ID of a published version to branch from
        sourceDraftId:
          type: string
          description: ID of an existing draft to branch from
        draftName:
          type: string
          maxLength: 100
          description: Optional name for the draft

    PublishDraftRequest:
      type: object
      properties:
        label:
          type: string
          nullable: true
          maxLength: 200
          description: Label for the published version
        description:
          type: string
          nullable: true
          maxLength: 2000
          description: Description of the published version
        activate:
          type: boolean
          description: Whether to immediately activate the version after publishing
          default: false

    UpdateVersionMetaRequest:
      type: object
      description: At least one of label, description, or isPinned must be provided.
      properties:
        label:
          type: string
          nullable: true
          maxLength: 200
          description: Version label
        description:
          type: string
          nullable: true
          maxLength: 2000
          description: Version description
        isPinned:
          type: boolean
          description: Pin or unpin the version

    TestCallRequest:
      type: object
      properties:
        mode:
          type: string
          enum: [webcall, chat, telephony]
          default: webcall
          description: Test call mode
        toPhone:
          type: string
          description: Phone number for telephony mode

    WebhookAgent:
      type: object
      properties:
        _id:
          type: string
          description: The ID of the agent
        name:
          type: string
          description: The name of the agent
        description:
          type: string
          description: The description of the agent

    WebhookSubscriptionPopulated:
      type: object
      properties:
        _id:
          type: string
          description: The unique identifier for the subscription
        webhookId:
          type: string
          description: The ID of the webhook
        agentId:
          $ref: "#/components/schemas/WebhookAgent"
          nullable: true
          description: The populated agent details, or null if not assigned
        eventType:
          type: string
          enum: [pre-conversation, post-conversation]
          description: The type of event subscribed to
        createdAt:
          type: string
          format: date-time
          description: The date and time when the subscription was created
        updatedAt:
          type: string
          format: date-time
          description: The date and time when the subscription was last updated

    Webhook:
      type: object
      properties:
        _id:
          type: string
          description: The unique identifier for the webhook
        url:
          type: string
          description: The webhook endpoint URL
        description:
          type: string
          description: The description of the webhook
        status:
          type: string
          enum: [enabled, disabled]
          description: The status of the webhook
        organizationId:
          type: string
          description: The organization ID
        createdBy:
          type: string
          description: The user ID who created the webhook
        subscriptions:
          type: array
          items:
            $ref: "#/components/schemas/WebhookSubscriptionPopulated"
          description: A list of subscriptions for the webhook with populated agent details.
        decryptedSecretKey:
          type: string
          description: The decrypted signing secret for the webhook. This is only returned when fetching a single webhook by ID.
        createdAt:
          type: string
          format: date-time
          description: The date and time when the webhook was created
        updatedAt:
          type: string
          format: date-time
          description: The date and time when the webhook was last updated

    WebhookSubscription:
      type: object
      properties:
        _id:
          type: string
          description: The unique identifier for the subscription
        webhookId:
          type: string
          description: The ID of the webhook
        agentId:
          type: string
          description: The ID of the agent
        eventType:
          type: string
          enum: [pre-conversation, post-conversation]
          description: The type of event subscribed to
        createdAt:
          type: string
          format: date-time
          description: The date and time when the subscription was created
        updatedAt:
          type: string
          format: date-time
          description: The date and time when the subscription was last updated

    KnowledgeBase:
      type: object
      properties:
        _id:
          type: string
          description: The unique identifier for the knowledge base
        name:
          type: string
          description: The name of the knowledge base
        description:
          type: string
          description: The description of the knowledge base
        organization:
          type: string
          description: The organization ID
        createdBy:
          type: string
          description: The user ID who created the knowledge base
        createdAt:
          type: string
          format: date-time
          description: The date and time when the knowledge base was created
        updatedAt:
          type: string
          format: date-time
          description: The date and time when the knowledge base was last updated
      required:
        - _id
        - name
        - organization
        - createdBy

    KnowledgeBaseItem:
      type: object
      properties:
        _id:
          type: string
          description: The unique identifier for the knowledge base item
        itemType:
          type: string
          enum: [file, text]
          description: The type of the knowledge base item
        metadata:
          type: object
          description: Additional metadata for the item
        knowledgeBaseId:
          type: string
          description: The ID of the knowledge base this item belongs to
        processingStatus:
          type: string
          enum: [pending, processing, completed, failed]
          description: The processing status of the item
        fileName:
          type: string
          description: The name of the file (for file type items)
        contentType:
          type: string
          description: The MIME type of the content
        size:
          type: number
          description: The size of the file in bytes
        key:
          type: string
          description: The storage key for the file
        title:
          type: string
          description: The title of the item
        content:
          type: string
          description: The content of the item (for text type items)
        createdAt:
          type: string
          format: date-time
          description: The date and time when the item was created
        updatedAt:
          type: string
          format: date-time
          description: The date and time when the item was last updated
      required:
        - _id
        - itemType
        - knowledgeBaseId
        - processingStatus
        - createdAt
        - updatedAt

    WebhookEvent:
      type: object
      properties:
        _id:
          type: string
          description: The unique identifier for the event
        webhookId:
          type: string
          description: The ID of the webhook
        eventType:
          type: string
          description: The type of event
        payload:
          type: object
          description: The event payload
        status:
          type: string
          description: The status of the event
        createdAt:
          type: string
          format: date-time
          description: The date and time when the event was created

    WorkflowType:
      type: string
      enum: [workflow_graph, single_prompt]
      description: The type of workflow configuration. workflow_graph uses a node-based visual workflow, single_prompt uses a simple prompt-based configuration.

    WorkflowGraphData:
      type: object
      description: Workflow configuration using a node-based graph structure
      properties:
        nodes:
          type: array
          description: Array of workflow nodes
          items:
            type: object
            properties:
              id:
                type: string
                description: Unique identifier for the node
              type:
                type: string
                description: Type of the node (e.g., default_node, end_call, pre_call_api)
              position:
                type: object
                properties:
                  x:
                    type: number
                  y:
                    type: number
              data:
                type: object
                description: Node-specific data and configuration
        edges:
          type: array
          description: Array of workflow edges connecting nodes
          items:
            type: object
            properties:
              id:
                type: string
                description: Unique identifier for the edge
              source:
                type: string
                description: ID of the source node
              target:
                type: string
                description: ID of the target node
              type:
                type: string
                description: Type of the edge

    SinglePromptData:
      type: object
      description: Workflow configuration using a simple prompt-based approach
      properties:
        prompt:
          type: string
          description: The main prompt that defines the agent's behavior and responses
        tools:
          type: array
          description: Array of tools/functions available to the agent
          items:
            type: object
            description: Tool configuration object

    SinglePromptConfig:
      type: object
      description: Configuration for single prompt workflow type
      properties:
        prompt:
          type: string
          description: The main prompt that defines the agent's behavior and responses
          example: "You are a helpful AI assistant that can help users with various tasks."
        tools:
          type: array
          description: |
            Array of tools/functions available to the agent during conversations.
            Five tool types are supported: `end_call`, `transfer_call`, `api_call`,
            `extract_dynamic_variables`, and `knowledge_base_search`. Each type has its
            own required fields — see `Tool` schema.
          items:
            $ref: "#/components/schemas/Tool"
          default: []
      required: [prompt]

    Tool:
      type: object
      description: |
        Tool (function) available to the agent. The `type` field determines which
        additional fields are required. Backend validation enforces per-type schemas.
      required: [type, name, description]
      properties:
        type:
          type: string
          enum: [end_call, transfer_call, api_call, extract_dynamic_variables, knowledge_base_search]
          description: The type of function/tool
        name:
          type: string
          description: Unique name for the function (no spaces)
          example: "end_call"
        description:
          type: string
          description: Description of what the function does
          example: "End the conversation when the user is satisfied"
        enabled:
          type: boolean
          default: true
          description: Whether the tool is enabled
        # ── Transfer Call specific fields ──
        transferNumber:
          type: string
          description: "Required for transfer_call type. Phone number to transfer the call to (E.164 format)"
          example: "+1234567890"
        transferOption:
          type: object
          description: "Required for transfer_call type. Controls cold vs warm transfer behavior."
          properties:
            type:
              type: string
              enum: [cold_transfer, warm_transfer]
              default: cold_transfer
              description: Transfer mode. `cold_transfer` hands off immediately; `warm_transfer` briefs the receiving party first.
            privateHandoffOption:
              type: object
              nullable: true
              description: Private briefing delivered to the transfer target before the caller is connected. Only used when `type = warm_transfer`.
              properties:
                type:
                  type: string
                  enum: [prompt, static]
                  description: "`prompt` generates briefing from the LLM; `static` plays fixed text."
                prompt:
                  type: string
                  description: The prompt or static text for the private handoff.
            publicHandoffOption:
              type: object
              nullable: true
              description: Message played to the caller while the transfer is being set up. Only used when `type = warm_transfer`.
              properties:
                type:
                  type: string
                  enum: [prompt, static]
                prompt:
                  type: string
        onHoldMusic:
          type: string
          enum: [ringtone, relaxing_sound, uplifting_beats, none]
          default: ringtone
          description: "Optional for transfer_call type. Audio played to the caller while the transfer is in progress."
        transferOnlyIfHuman:
          type: boolean
          default: true
          description: "Optional for transfer_call type. If true, the call is only transferred when a human is detected on the receiving end (voicemail/IVR skipped)."
        detectionTimeout:
          type: integer
          minimum: 5
          maximum: 60
          default: 30
          description: "Optional for transfer_call type. Seconds to wait for human detection before giving up (5–60)."
        # ── API Call specific fields ──
        url:
          type: string
          format: uri
          description: "Required for api_call type. The URL to make the HTTP request to."
          example: "https://api.example.com/orders"
        method:
          type: string
          enum: [GET, POST, PUT, DELETE, PATCH]
          description: "Required for api_call type. HTTP method to use."
          example: "GET"
        timeout:
          type: integer
          minimum: 1000
          maximum: 30000
          default: 5000
          description: "Optional for api_call type. Request timeout in milliseconds (1000–30000)."
        headers:
          type: object
          additionalProperties:
            type: string
          description: "Optional for api_call type. Static HTTP headers as a key/value map."
          example:
            Authorization: "Bearer TOKEN"
            Content-Type: "application/json"
        headersArray:
          type: array
          description: "Optional for api_call type. Headers as an array of key/value objects (alternative to `headers` map)."
          items:
            type: object
            required: [key, value]
            properties:
              key:
                type: string
                example: "Authorization"
              value:
                type: string
                example: "Bearer TOKEN"
        queryParams:
          type: array
          description: "Optional for api_call type. Query parameters to include in the request URL. Values support variable templating like `{{order_id}}`."
          items:
            type: object
            required: [key, value]
            properties:
              key:
                type: string
                example: "id"
              value:
                type: string
                example: "{{order_id}}"
        requestBody:
          type: string
          description: "Optional for api_call type. Raw request body as a JSON string. Supports variable templating."
          example: '{"customer_id": "{{customer_id}}"}'
        llmParameters:
          type: array
          description: "Optional for api_call type. Parameters the LLM can supply dynamically at runtime."
          items:
            type: object
            required: [name, description, type]
            properties:
              name:
                type: string
                description: Parameter name
              description:
                type: string
                description: What the parameter represents
              type:
                type: string
                enum: [text, number, boolean, enum]
              values:
                type: array
                items:
                  type: string
                description: "Required when type is `enum`. Allowed values."
              required:
                type: boolean
                default: false
        responseVariables:
          type: array
          description: "Optional for api_call type. Variables to extract from the API response into the agent's variable store."
          items:
            type: object
            required: [variableName, jsonPath]
            properties:
              variableName:
                type: string
                description: Name to store the extracted value under
                example: "orderStatus"
              jsonPath:
                type: string
                description: JSON path to extract the value from the response
                example: "$.data.status"
          default: []
        # ── Dynamic Variable Extraction specific fields ──
        variablesExtractionSchema:
          type: array
          description: "Required for extract_dynamic_variables type. Schema defining variables to extract from the conversation."
          items:
            type: object
            required: [name, description, type]
            properties:
              name:
                type: string
                description: Name of the variable to extract
                example: "customer_name"
              description:
                type: string
                description: What this variable represents
                example: "The customer's full name"
              type:
                type: string
                enum: [text, number, boolean, enum]
              values:
                type: array
                items:
                  type: string
                description: "Required when type is `enum`. List of possible values."
                example: ["satisfied", "unsatisfied", "neutral"]
          minItems: 1
        # ── Knowledge Base Search specific fields ──
        knowledgeBaseId:
          type: string
          description: "Required for knowledge_base_search type. ID of the knowledge base to search."
          example: "60d0fe4f5311236168a109ca"
        fillerPhrases:
          type: array
          description: "Optional for knowledge_base_search type. Phrases spoken while searching."
          items:
            type: string
          default: []
          example: ["Let me check that for you", "One moment please"]

    DispositionMetric:
      type: object
      description: |
        A single disposition metric captured after each call. The metric prompt
        is evaluated against the call transcript post-call, and the result is
        returned in the call log under `postCallAnalytics.dispositionMetrics`.
      required: [identifier, dispositionMetricPrompt, dispositionMetricType]
      properties:
        identifier:
          type: string
          pattern: "^[a-z0-9_]+$"
          description: Stable machine identifier. Lowercase letters, digits, and underscores only.
          example: "call_resolved"
        dispositionMetricPrompt:
          type: string
          description: Natural-language question evaluated against the transcript after the call ends.
          example: "Was the customer issue resolved by the end of the call?"
        dispositionMetricType:
          type: string
          enum: [STRING, BOOLEAN, INTEGER, ENUM, DATETIME]
          description: Data type returned by the metric.
          example: "STRING"
        choices:
          type: array
          description: "Required when `dispositionMetricType = ENUM`. Allowed values."
          items:
            type: string
          example: ["resolved", "escalated", "callback_scheduled", "no_action"]

    PostCallAnalyticsConfig:
      type: object
      description: |
        Per-agent post-call analytics configuration. Evaluated after each call ends
        and surfaced in call logs under the `postCallAnalytics` field.
      properties:
        dispositionMetrics:
          type: array
          description: Structured metrics extracted from each completed call.
          items:
            $ref: "#/components/schemas/DispositionMetric"
          default: []
        successMetrics:
          type: array
          deprecated: true
          description: |
            **Deprecated** — will be removed in a future version. Use
            `dispositionMetrics` instead. Kept here because the backend still
            accepts it on writes and returns it on reads.
          items:
            type: object
            required: [identifier, successMetricPrompt, successMetricType]
            properties:
              identifier:
                type: string
                pattern: "^[a-z0-9_]+$"
              successMetricPrompt:
                type: string
              successMetricType:
                type: string
                enum: [NUMERIC_SCALE, PERCENTAGE_SCALE, PASS_FAIL, DESCRIPTIVE_SCALE]
          default: []
        summaryPrompt:
          type: string
          deprecated: true
          description: |
            **Deprecated** — no longer used in post-call analysis and will be
            removed in a future version. Kept here because the backend still
            accepts it on writes and returns it on reads.
          default: ""
        useInternalAnalyticsModel:
          type: boolean
          default: true
          description: Use the internal analytics model. When false, falls back to the agent's own LLM.
        useReasoningModel:
          type: boolean
          default: false
          description: Route analytics evaluation through the reasoning model for higher-quality results at a latency/cost tradeoff.
  responses:
    UnauthorizedError:
      description: Access token is missing or invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiResponse"

    BadRequestError:
      description: Invalid input
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BadRequestErrorResponse"

    ForbiddenError:
      description: Forbidden access
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiResponse"

    UnauthorizedErrorResponse:
      description: Unauthorized access
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UnauthorizedErrorResponse"

    InternalServerErrorResponse:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/InternalServerErrorResponse"

tags:
  - name: Agent Templates
    description: Operations related to agent templates
  - name: Agents
    description: Operations related to agents
  # - name: Workflows  # DEPRECATED — workflow agents are being sunset
  - name: Logs
    description: Operations related to conversation logs, call history, and recordings. Supports filtering by agents, campaigns, call IDs, status, duration, and more.
  - name: Calls
    description: Operations related to initiating and managing calls
  - name: Live Transcripts
    description: Real-time streaming of call transcript events via Server-Sent Events (SSE). Subscribe to an active call to receive user speech, agent speech, and lifecycle events in real time.
  - name: Phone Numbers
    description: Operations related to phone numbers
  - name: Webhooks
    description: Operations related to webhooks and webhook subscriptions
  - name: Audience
    description: Operations related to audience management and CSV uploads
  - name: Agent Versioning - Drafts
    description: Operations for creating, editing, diffing, and publishing agent configuration drafts
  - name: Agent Versioning - Versions
    description: Operations for listing, comparing, activating, and testing published agent versions. Published versions (active or inactive) are config-immutable — only metadata (label, description, isPinned) can be updated. To change config, create a draft and publish a new version.
  - name: Post-Call Analytics
    description: |
      Configure disposition metrics that are automatically extracted from each completed call (call resolved, satisfaction score, call outcome, summary, etc.). Post-call analytics is not a standalone endpoint — it is configured through the versioning system by setting the `postCallAnalyticsConfig` field in the body of `PATCH /agent/{id}/drafts/{draftId}/config`, then publishing and activating the draft. See the [Post-Call Metrics guide](/atoms/atoms-platform/features/post-call-metrics) for the full walkthrough.

servers:
  - url: https://api.smallest.ai/atoms/v1
    description: Production server
