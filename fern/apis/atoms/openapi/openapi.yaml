              description: The speed of the synthesizer
            consistency:
              type: number
              default: 0.5
              description: The consistency of the synthesizer
            similarity:
              type: number
              default: 0
              description: The similarity of the synthesizer
            enhancement:
              type: number
              default: 1
              description: The enhancement of the synthesizer
            sampleRate:
              type: number
              description: The audio sample rate used by the synthesizer
        slmModel:
          type: string
          enum:
            - electron
            - electron-kogta
            - electron-kogta-v2
            - gpt-4o
            - gpt-4.1
            - gpt-5.2
            - gpt-realtime
            - gpt-realtime-mini
          description: The LLM model to use for the agent. LLM model will be used to generate the response and take decisions based on the user's query.
        defaultVariables:
          type: object
          description: The default variables to use for the agent. These variables will be used if no variables are provided when initiating a conversation with the agent.
        preCallAPI:
          type: object
          description: Configuration for an API call to be made before the call starts. The response variables can be injected into the agent's prompt.
          properties:
            isEnabled:
              type: boolean
              default: false
              description: Whether the pre-call API is enabled.
            url:
              type: string
              format: uri
              description: The URL of the API endpoint to call.
            method:
              type: string
              enum: ["GET", "POST", "PUT", "DELETE", "PATCH"]
              description: The HTTP method to use for the API call.
            headers:
              type: object
              additionalProperties:
                type: string
              description: Optional HTTP headers to include in the request.
            body:
              type: object
              description: Optional request body for POST/PUT/PATCH requests.
            timeout:
              type: integer
              minimum: 1
              maximum: 30
              default: 5
              description: Timeout in seconds for the API call.
            queryParams:
              type: object
              description: Optional query parameters to include in the request URL.
            responseVariables:
              type: array
              description: List of variables to extract from the API response using JSON path expressions.
              items:
                type: object
                required:
                  - variableName
                  - jsonPath
                properties:
                  variableName:
                    type: string
                    description: The name of the variable to inject into the agent prompt.
                  jsonPath:
                    type: string
                    description: JSON path expression to extract the value from the API response.
          required:
            - url
            - method
        createdAt:
          type: string
          format: date-time
          description: The date and time when the agent was created
        updatedAt:
          type: string
          format: date-time
          description: The date and time when the agent was last updated
        avatarUrl:
          type: string
          description: URL of the agent's avatar image
        firstMessage:
          type: string
          description: The opening message spoken by the agent at the start of a call
        allowInterruptions:
          type: boolean
          description: Whether the agent can be interrupted mid-speech by the caller
        waitForUserToSpeakFirst:
          type: boolean
          description: When true, the agent waits for the caller to speak before responding
        totalCalls:
          type: number
          description: Total number of calls made with this agent
        transcriberType:
          type: string
          description: The speech-to-text engine used for transcription
        globalPrompt:
          type: string
          description: A global system prompt prepended to all agent interactions
        archived:
          type: boolean
          description: Whether the agent has been archived. Archived agents are excluded from default listings.
        archivedAt:
          type: string
          format: date-time
          description: The date and time when the agent was archived
        activeVersionId:
          type: string
          description: ID of the currently-active published version. Matches `versionId`.
        versionId:
          type: string
          description: Alias for `activeVersionId`.
        allowInboundCall:
          type: boolean
          default: true
          description: Whether the agent accepts inbound calls.
        phoneNumber:
          type: array
          items:
            type: string
          description: |
            Phone numbers attached to this agent (E.164 strings). Only present when
            the agent has been linked to one or more telephony products.
        visibleToEveryone:
          type: boolean
          default: false
          description: Whether the agent is visible to all members of the organization (vs. only the creator).
        speechFormatting:
          type: boolean
          description: |
            Apply LLM-side speech formatting (e.g. expanding "$100" to "one hundred dollars")
            before passing text to the synthesizer. Boolean; no default — when unset the
            platform applies the per-organization default.
        muteUserUntilFirstBotResponse:
          type: boolean
          default: false
          description: When true, the user microphone is muted until the agent has spoken its first response.
        interruptionBackoffTimer:
          type: number
          description: Seconds to wait after an interruption before the agent resumes speaking.
        enableStyleGuide:
          type: boolean
          default: true
          description: Whether to apply the platform's style-guide post-processing on agent responses.
        callDispositionConfig:
          type: string
          default: ""
          description: Free-form prompt used for call disposition classification (separate from `postCallAnalyticsConfig.dispositionMetrics`).
        voiceMailDetectionConfig:
          type: object
          description: Voicemail detection settings.
          properties:
            enabled:
              type: boolean
              default: false
            endText:
              type: string
              default: "Terminating call, you can call us back anytime. Thank you for calling."
              description: Text spoken before the call is terminated when voicemail is detected.
        smartTurnConfig:
          type: object
          description: Smart end-of-turn detection settings.
          properties:
            isEnabled:
              type: boolean
            waitTimeInSecs:
              type: number
              minimum: 0
              maximum: 10
        voiceDetectionConfig:
          type: object
          description: VAD (voice activity detection) tuning.
          properties:
            confidence:
              type: number
              minimum: 0
              maximum: 1
            minVolume:
              type: number
              minimum: 0
              maximum: 1
            triggerTimeInSecs:
              type: number
              minimum: 0
              maximum: 10
            releaseTimeInSecs:
              type: number
              minimum: 0
              maximum: 10
        denoisingConfig:
          type: object
          description: Audio denoising settings.
          properties:
            isEnabled:
              type: boolean
        redactionConfig:
          type: object
          description: PII/PCI redaction settings applied to transcripts.
          properties:
            isEnabled:
              type: boolean
        pronunciationDicts:
          type: array
          description: Custom pronunciation dictionary applied before synthesis.
          items:
            type: object
            required: [word, pronunciation]
            properties:
              word:
                type: string
              pronunciation:
                type: string
        llmIdleTimeoutConfig:
          type: object
          description: |
            Per-channel idle timeouts (seconds) after which the LLM is nudged when the user
            stops speaking. `maxRetries` bounds how many nudges before the call ends.
          properties:
            chatTimeoutTimeInSecs:
              type: number
            webcallTimeoutTimeInSecs:
              type: number
            telephonyTimeoutTimeInSecs:
              type: number
            maxRetries:
              type: number
        sessionTimeoutConfig:
          type: object
          description: Maximum session duration before the call is automatically ended.
          properties:
            timeoutTimeInSecs:
              type: number
        timezone:
          type: object
          description: Agent timezone — used for time-of-day-sensitive prompts and analytics bucketing.
          properties:
            label:
              type: string
              default: "(GMT+0:00) UTC"
            offset:
              type: number
              default: 0
        postCallAnalyticsConfig:
          $ref: "#/components/schemas/PostCallAnalyticsConfig"
        widgetConfig:
          type: object
          description: |
            Chat-widget rendering configuration (theme, copy, consent prompt). Only relevant
            when the agent is exposed via the embeddable widget; ignored by voice-only agents.
          properties:
            position:
              type: string
              enum: [bottom-right, bottom-left, top-right, top-left]
              default: bottom-right
            size:
              type: string
              enum: [tiny, compact, full]
              default: full
            mode:
              type: string
              enum: [chat, voice]
              default: chat
            theme:
              type: string
              enum: [light, dark]
              default: light
            baseColor:
              type: string
              default: "#ffffff"
            accentColor:
              type: string
              default: "#2d9d9f"
            agentBubbleColor:
              type: string
              default: "#f3f4f6"
            textOnAccentColor:
              type: string
              default: "#FFFFFF"
            secondaryTextColor:
              type: string
              default: "#6b7280"
            primaryTextColor:
              type: string
              default: "#111827"
            startButtonText:
              type: string
              default: Start
            endButtonText:
              type: string
              default: End
            ctaName:
              type: string
              default: Talk to Atoms
            widgetName:
              type: string
              default: Atoms
            avatarUrl:
              type: string
              nullable: true
            chatPlaceholder:
              type: string
              default: "Type your message..."
            consentRequired:
              type: boolean
              default: false
            consentTitle:
              type: string
              default: "Privacy Agreement"
            consentContent:
              type: string
              description: Long-form consent body shown before the user can interact.
            assistantId:
              type: string
              nullable: true
            allowlist:
              type: array
              items:
                type: string
              description: Allowed origin hostnames for widget embedding.
        _resolvedConfig:
          type: object
          additionalProperties: true
          description: |
            The resolved config of the target version, merged into a flat shape. Not returned in
            list responses (`GET /agent`). Only populated in single-agent responses
            (`GET /agent/{id}`) when the agent has a published, activated version.
            Can contain up to ~30 fields depending on which config sections are set.
          properties:
            prompt:
              type: string
              description: Active version's single-prompt text.
            tools:
              type: array
              items:
                $ref: "#/components/schemas/Tool"
              description: Active version's configured tools.
            postCallAnalyticsConfig:
              $ref: "#/components/schemas/PostCallAnalyticsConfig"
            callDispositionConfig:
              type: string
            modelName:
              type: string
              description: LLM model name on the resolved version.
            transcriberType:
              type: string
              description: STT engine in use on the resolved version.
            defaultLanguage:
              type: string
              enum: [en, hi, mr, gu, ta, es, north_indic, bn, or]
              description: Default language set on the resolved version.
            supportedLanguages:
              type: array
              items:
                type: string
              description: Supported languages on the resolved version.
            languageSwitching:
              type: object
              description: Language-switching configuration on the resolved version.
            firstMessage:
              type: string
              description: Opening message on the resolved version.
            globalPrompt:
              type: string
              description: Global prompt on the resolved version (workflow_graph agents only).
            preCallAPI:
              type: object
              description: Pre-call API configuration on the resolved version.
            workflowGraph:
              type: object
              description: Full node graph for workflow_graph agents. Null for single_prompt agents.
            muteUserUntilFirstBotResponse:
              type: boolean
            allowInterruptions:
              type: boolean
            voiceDetectionConfig:
              type: object
            smartTurnConfig:
              type: object
            backgroundSound:
              type: string
            denoisingConfig:
              type: object
            redactionConfig:
              type: object
            llmIdleTimeoutConfig:
              type: object
            sessionTimeoutConfig:
              type: object
        _configSource:
          type: string
          enum:
            - active
            - draft
            - version
          description: |
            Only present when `?draftId` or `?versionId` query params are used.
            Indicates which config source was resolved into `_resolvedConfig`.
        _versionedWorkflow:
          type: object
          description: |
            **Deprecated — internal use only.** Legacy field present whenever `_resolvedConfig` is populated.
            Mirrors a subset of `_resolvedConfig` (`prompt`, `tools`, `workflowGraph`). Kept for backward
            compatibility with existing frontend code. Ignore in new integrations.
          properties:
            prompt:
              type: string
            tools:
              type: array
              items:
                $ref: "#/components/schemas/Tool"
            workflowGraph:
              type: object

    # ── Agent Versioning Schemas ──────────────────────────────────────────

    AgentVersion:
      type: object
      description: Represents either a draft revision or a published version of an agent's configuration.
      properties:
        _id:
          type: string
          description: Unique identifier
        agent:
          type: string
          description: The agent this version belongs to
        status:
          type: string
          enum: [published, draft, archived]
          description: Current status of the version record
        versionNumber:
          type: integer
          nullable: true
          description: Auto-incremented version number (published versions only)
        label:
          type: string
          nullable: true
          description: Human-readable label for the version
          maxLength: 200
        description:
          type: string
          nullable: true
          description: Description of what changed in this version
          maxLength: 2000
        isPinned:
          type: boolean
          default: false
          description: Whether the version is pinned for quick access
        publishedBy:
          type: string
          nullable: true
          description: User ID of who published this version
        publishedAt:
          type: string
          format: date-time
          nullable: true
          description: When this version was published
        activatedBy:
          type: string
          nullable: true
          description: User ID of who activated this version
        activatedAt:
          type: string
          format: date-time
          nullable: true
          description: When this version was activated
        draftId:
          type: string
          nullable: true
          description: Unique draft identifier (drafts only)
        draftName:
          type: string
          nullable: true
          description: Human-readable draft name
          maxLength: 100
        draftRevision:
          type: integer
          nullable: true
          description: Revision number within the draft (drafts only)
        sourceVersionId:
          type: string
          nullable: true
          description: The published version this draft was branched from
        blocks:
          type: object
          description: References to the 13 config section blocks
          properties:
            workflow_prompt:
              type: string
            workflow_tools:
              type: string
            workflow_graph:
              type: string
            llm:
              type: string
            voice:
              type: string
            language:
              type: string
            call_handling:
              type: string
            detection:
              type: string
            analytics:
              type: string
            timeouts:
              type: string
            audio:
              type: string
            privacy:
              type: string
            widget:
              type: string
        workflowType:
          $ref: "#/components/schemas/WorkflowType"
        parentVersion:
          type: string
          nullable: true
          description: The version this was derived from
        isActive:
          type: boolean
          description: Whether this is the currently active version for the agent
        createdBy:
          type: string
          description: User ID of who created this record
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AgentVersionDiff:
      type: object
      description: Section-by-section diff between two version or draft revision records.
      properties:
        unchangedSections:
          type: array
          description: Config sections that did not change.
          items:
            type: string
        diffs:
          type: array
          description: Config sections with one or more changes.
          items:
            type: object
            properties:
              section:
                type: string
                description: Config section name.
              changes:
                type: array
                items:
                  type: object
                  properties:
                    path:
                      type: string
                      description: Path to the changed value within the section.
                    oldValue:
                      nullable: true
                      description: Previous value. Can be any JSON value or null.
                      oneOf:
                        - type: string
                        - type: number
                        - type: boolean
                        - type: object
                          additionalProperties: true
                        - type: array
                          items: {}
                    newValue:
                      nullable: true
                      description: New value. Can be any JSON value or null.
                      oneOf:
                        - type: string
                        - type: number
                        - type: boolean
                        - type: object
                          additionalProperties: true
                        - type: array
                          items: {}

    AgentVersionMetrics:
      type: object
      properties:
        orgId:
          type: string
        agentId:
          type: string
        versionId:
          type: string
        totalCalls:
          type: number
        answeredCalls:
          type: number
        avgDurationMs:
          type: number
        completionRate:
          type: number
        totalCost:
          type: number
        hangupSourceDistribution:
          type: object
          additionalProperties:
            type: number
        period:
          type: object
          description: Date range used for the metric aggregation.
          additionalProperties: true

    AgentVersionMetricsComparison:
      type: object
      properties:
        configDiff:
          $ref: "#/components/schemas/AgentVersionDiff"
        metrics:
          type: object
          properties:
            versionA:
              $ref: "#/components/schemas/AgentVersionMetrics"
            versionB:
              $ref: "#/components/schemas/AgentVersionMetrics"
            deltas:
              type: object
              properties:
                totalCalls:
                  type: number
                answeredCalls:
                  type: number
                avgDurationMs:
                  type: number
                completionRate:
                  type: number
                totalCost:
                  type: number

    DraftEditHistoryEntry:
      type: object
      properties:
        revision:
          type: integer
          description: Draft revision number
        changedSections:
          type: array
          items:
            type: string
          description: List of config sections that changed in this revision
        editorName:
          type: string
          nullable: true
          description: Display name of the editor
        editorId:
          type: string
          nullable: true
          description: User ID of the editor
        timestamp:
          type: string
          format: date-time
          description: When the edit was made

    CreateDraftRequest:
      type: object
      properties:
        sourceVersionId:
          type: string
          pattern: "^[a-f\\d]{24}$"
          description: |
            ID of a published version to branch from. Must be a valid MongoDB ObjectId (24-char hex).
            Sending a non-ObjectId format returns 400.
        sourceDraftId:
          type: string
          description: ID of an existing draft to branch from
        draftName:
          type: string
          minLength: 1
          maxLength: 100
          description: Optional name for the draft (1–100 characters)

    PublishDraftRequest:
      type: object
      properties:
        label:
          type: string
          nullable: true
          maxLength: 200
          description: Label for the published version
        description:
          type: string
          nullable: true
          maxLength: 2000
          description: Description of the published version
        activate:
          type: boolean
          description: Whether to immediately activate the version after publishing
          default: false

    UpdateVersionMetaRequest:
      type: object
      description: At least one of label, description, or isPinned must be provided.
      properties:
        label:
          type: string
          nullable: true
          maxLength: 200
          description: Version label
        description:
          type: string
          nullable: true
          maxLength: 2000
          description: Version description
        isPinned:
          type: boolean
          description: Pin or unpin the version

    TestCallRequest:
      type: object
      properties:
        mode:
          type: string
          enum: [webcall, chat, telephony]
          default: webcall
          description: Test call mode. Defaults to `webcall` when omitted.
        toPhone:
          type: string
          description: |
            Phone number to call. Required only when `mode` is `telephony`. Omit for `webcall` and `chat`.

    # ── v2 branch model schemas ─────────────────────────────────────────
    Branch:
      type: object
      description: An editable copy of an agent. Each branch has its own draft state and its own revision history.
      properties:
        _id:
          type: string
          description: Branch ID (24-character MongoDB ObjectId).
        agentId:
          type: string
          description: Agent this branch belongs to.
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: Human-readable branch name. Must be unique per agent. The name `Main` is reserved for the default branch and cannot be used for new branches.
        isDefault:
          type: boolean
          description: "True for the `Main` branch. Only one branch per agent has `isDefault: true`. The default branch cannot be renamed, deleted, or archived."
        isLive:
          type: boolean
          description: "True when this branch is currently serving production traffic. Exactly one branch per agent has `isLive: true`."
        isArchived:
          type: boolean
          description: "Archived branches cannot receive new drafts or be made live. Archive is reversible via `POST /agent/{id}/branches/{branchId}/live` when `isArchived: false` and a committed revision exists."
        openDraftId:
          type: string
          nullable: true
          description: "ID of the open draft on this branch, or `null` when no draft is open."
        hasOpenDraft:
          type: boolean
          description: "Convenience mirror of `openDraftId != null`."
        headRevisionId:
          type: string
          nullable: true
          description: ID of the most recent committed revision on this branch. `null` on a freshly-created branch that has not yet published.
        createdBy:
          type: string
          description: User ID that created the branch.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BranchSummary:
      allOf:
        - $ref: "#/components/schemas/Branch"
        - type: object
          description: Adds counts to `Branch` for listing views. Returned by `GET /agent/{id}/branches` and `GET /agent/{id}/branches/{branchId}`.
          properties:
            revisionCount:
              type: integer
              description: Total number of committed revisions on this branch.
            lastPublishedAt:
              type: string
              format: date-time
              nullable: true
              description: Timestamp of the most recent committed revision, or `null` if the branch has never published.

    Revision:
      type: object
      description: An immutable snapshot of an agent's configuration, created when a draft is published on a branch. A revision's `_id` is stable and is what the v1 `versionId` maps to on migration.
      properties:
        _id:
          type: string
          description: Revision ID (equal to the v1 `versionId` for migrated versions).
        agentId:
          type: string
        branchId:
          type: string
          description: Branch this revision was committed on.
        revisionNumber:
          type: integer
          description: Monotonic revision counter per branch, starting at 1.
        label:
          type: string
          maxLength: 200
          nullable: true
          description: Optional label set at publish time. Displayed as the revision's short name in the UI (`Version 1`, `Version 2`, ...).
        state:
          type: string
          enum: [scanning, committed]
          description: |
            `scanning` means the security scan is still running. `committed` means the revision passed its scan and is available on the branch. `scanning` revisions are visible in history but cannot be restored or made live.
        publishedBy:
          type: string
          description: User ID that published the revision.
        publishedAt:
          type: string
          format: date-time
        changedSections:
          type: array
          items:
            type: string
          description: Config sections that changed between this revision and its predecessor (`prompt`, `voice`, `model`, `tools`, `post_call_analytics`, etc.). Empty on the first revision.

    DraftDetail:
      type: object
      description: Returned by `GET /agent/{id}/branches/{branchId}/draft`.
      properties:
        latest:
          type: object
          description: The current in-progress draft config. Mirrors the agent-config shape sent to `PUT /agent/{id}/branches/{branchId}/draft`.
        editHistory:
          type: array
          items:
            type: object
            properties:
              editedAt:
                type: string
                format: date-time
              editedBy:
                type: string
              changedSections:
                type: array
                items:
                  type: string
          description: Ordered list of edits on the current draft, newest first.
        editCount:
          type: integer
          description: Total number of edits on this draft.

    DiffChange:
      type: object
      properties:
        path:
          type: string
          description: JSON pointer to the changed field (e.g. `/prompt`, `/voice/id`).
        oldValue:
          nullable: true
          description: Value on side `a`.
        newValue:
          nullable: true
          description: Value on side `b`.

    DiffSection:
      type: object
      properties:
        section:
          type: string
          description: Config section the changes belong to (`prompt`, `voice`, `model`, `tools`, `post_call_analytics`, etc.).
        changes:
          type: array
          items:
            $ref: "#/components/schemas/DiffChange"

    DiffResult:
      type: object
      description: Returned by `GET /agent/{id}/diff`.
      properties:
        unchangedSections:
          type: array
          items:
            type: string
          description: Sections that are identical between the two references.
        diffs:
          type: array
          items:
            $ref: "#/components/schemas/DiffSection"

    TestCallResult:
      type: object
      description: Returned by `POST /agent/{id}/branches/{branchId}/test-call`.
      required:
        - conversationId
        - callId
      properties:
        conversationId:
          type: string
        callId:
          type: string
        token:
          type: string
          description: LiveKit access token. Returned for `webcall` and `chat` modes only.
        roomName:
          type: string
          description: Returned for `webcall` and `chat` modes only.
        host:
          type: string
          description: Returned for `webcall` and `chat` modes only.

    CreateBranchRequest:
      type: object
      required:
        - sourceBranchId
        - name
      properties:
        sourceBranchId:
          type: string
          description: Branch to fork from. Must have at least one committed revision.
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: New branch name. Must be unique per agent. `Main` is reserved.

    RenameBranchRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100

    PublishBranchDraftRequest:
      type: object
      properties:
        label:
          type: string
          maxLength: 200
          nullable: true
          description: Optional short label to attach to the resulting revision.

    RestoreRevisionResult:
      type: object
      description: Envelope returned by publish and restore.
      properties:
        state:
          type: string
          enum: [committed, scanning]
        revision:
          $ref: "#/components/schemas/Revision"

    TestCallV2Request:
      type: object
      properties:
        includeDraft:
          type: boolean
          description: When `true`, the test call uses the open draft config on the branch. Mutually exclusive with `revisionId`.
        revisionId:
          type: string
          description: "Test call against a specific committed revision on the branch. Mutually exclusive with `includeDraft: true`."
        mode:
          type: string
          enum: [webcall, chat, telephony]
          default: webcall
        toPhone:
          type: string
          description: E.164-formatted number. Required when `mode` is `telephony`; omit for `webcall` and `chat`.

    ConflictErrorResponse:
      type: object
      properties:
        status:
          type: boolean
          example: false
        error_type:
          type: string
          description: Machine-readable identifier for the conflict (e.g. `branch_name_exists`, `source_has_no_commit`, `source_scanning`, `publish_in_progress`).
        errors:
          type: array
          items:
            type: string

    LockedErrorResponse:
      type: object
      properties:
        status:
          type: boolean
          example: false
        error_type:
          type: string
          enum: [config_freeze_active]
        errors:
          type: array
          items:
            type: string

    VersioningV2MigrationRequiredResponse:
      type: object
      properties:
        status:
          type: boolean
          example: false
        error_type:
          type: string
          enum: [versioning_v2_migration_required]
        errors:
          type: array
          items:
            type: string
          example: ["This endpoint is deprecated on the v2 branch model. See the migration guide for the v2 equivalent."]
    # ── end v2 branch model schemas ─────────────────────────────────────

    WebhookAgent:
      type: object
      properties:
        _id:
          type: string
          description: The ID of the agent
        name:
          type: string
          description: The name of the agent
        description:
          type: string
          description: The description of the agent

    WebhookSubscriptionPopulated:
      type: object
      properties:
        _id:
          type: string
          description: The unique identifier for the subscription
        webhookId:
          type: string
          description: The ID of the webhook
        agentId:
          $ref: "#/components/schemas/WebhookAgent"
          nullable: true
          description: The populated agent details, or null if not assigned
        eventType:
          type: string
          enum: [pre-conversation, post-conversation, analytics-completed]
          description: The type of event subscribed to
        createdAt:
          type: string
          format: date-time
          description: The date and time when the subscription was created
        updatedAt:
          type: string
          format: date-time
          description: The date and time when the subscription was last updated

    Webhook:
      type: object
      properties:
        _id:
          type: string
          description: The unique identifier for the webhook
        url:
          type: string
          description: The webhook endpoint URL
        description:
          type: string
          description: The description of the webhook
        status:
          type: string
          enum: [enabled, disabled]
          description: The status of the webhook
        organizationId:
          type: string
          description: The organization ID
        createdBy:
          type: string
          description: The user ID who created the webhook
        subscriptions:
          type: array
          items:
            $ref: "#/components/schemas/WebhookSubscriptionPopulated"
          description: A list of subscriptions for the webhook with populated agent details.
        decryptedSecretKey:
          type: string
          description: The decrypted signing secret for the webhook. This is only returned when fetching a single webhook by ID.
        createdAt:
          type: string
          format: date-time
          description: The date and time when the webhook was created
        updatedAt:
          type: string
          format: date-time
          description: The date and time when the webhook was last updated

    WebhookSubscription:
      type: object
      properties:
        _id:
          type: string
          description: The unique identifier for the subscription
        webhookId:
          type: string
          description: The ID of the webhook
        agentId:
          type: string
          description: The ID of the agent
        eventType:
          type: string
          enum: [pre-conversation, post-conversation, analytics-completed]
          description: The type of event subscribed to
        createdAt:
          type: string
          format: date-time
          description: The date and time when the subscription was created
        updatedAt:
          type: string
          format: date-time
          description: The date and time when the subscription was last updated

    WebhookEventEnvelope:
      type: object
      description: |
        Common envelope shared by every webhook event Atoms delivers to your
        endpoint. The `metadata` field's shape varies by event type — see the
        per-event schemas (`WebhookEventPreConversation`,
        `WebhookEventPostConversation`, `WebhookEventAnalyticsCompleted`).
      properties:
        url:
          type: string
          description: The webhook URL endpoint that received the event.
          example: "https://example.com/webhook"
        description:
          type: string
          description: Human-readable label configured on the webhook (e.g. "Debt Collection Agent's Endpoint").
        event:
          type: string
          description: "Event identifier in the form `{agentId}.{eventType}`."
          example: "69fc7dd072a0c1d28d948ace.post-conversation"
        id:
          type: string
          description: Unique webhook delivery ID (separate from `metadata.callId`).
          example: "69fd96118fd277fc807e4c23"
      required:
        - url
        - description
        - event
        - id

    WebhookEventPreConversation:
      type: object
      description: |
        Fired **before** the agent begins speaking. Use this to enrich CRM data,
        log call attempts, or gate outbound calls.

        Does **not** contain `callData`, `transcript`, `variables`, `analytics`,
        or `recordingUrl`. `callData` is on `post-conversation` and
        `analytics-completed`; `transcript`, `variables`, and `recordingUrl`
        are only on `post-conversation`; `analytics` is only on
        `analytics-completed`.
      allOf:
        - $ref: "#/components/schemas/WebhookEventEnvelope"
        - type: object
          required: [metadata]
          properties:
            metadata:
              type: object
              required: [agentId, eventType, conversationType, toPhone, fromPhone, callId]
              properties:
                agentId:
                  type: string
                  description: The Atoms agent ID that handled the call.
                  example: "69fc7dd072a0c1d28d948ace"
                eventType:
                  type: string
                  enum: [pre-conversation]
                  example: "pre-conversation"
                conversationType:
                  type: string
                  description: "Channel type. Known values: `telephonyOutbound`, `telephonyInbound`."
                  example: "telephonyOutbound"
                toPhone:
                  type: string
                  description: Destination phone number in E.164 format.
                  example: "+916296641821"
                fromPhone:
                  type: string
                  description: Originating phone number in E.164 format.
                  example: "+918035317096"
                callId:
                  type: string
                  description: Unique call identifier.
                  example: "CALL-1778226705739-7e4c17"

    WebhookEventTranscriptTurn:
      type: object
      description: One speaking turn in a `post-conversation` transcript.
      properties:
        role:
          type: string
          enum: [agent, user]
          description: Speaker role.
        content:
          type: string
          description: The spoken text for this turn.
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when this turn began (UTC).
      required: [role, content, timestamp]

    WebhookEventCallData:
      type: object
      description: |
        Call-level metadata shared by `post-conversation` and
        `analytics-completed` events. In `analytics-completed`, the
        `callDirection` field may be absent.
      properties:
        fromNumber:
          type: string
          description: Originating phone number in E.164 format.
          example: "+918035317096"
        toNumber:
          type: string
          description: Destination phone number in E.164 format.
          example: "+916296641821"
        callDuration:
          type: number
          format: float
          description: Total call duration in **seconds** (float).
          example: 49.350622
        callStatus:
          type: string
          enum: [completed, no_answer, failed, cancelled]
          description: Terminal status.
        callDirection:
          type: string
          enum: [telephony_outbound, telephony_inbound]
          description: |
            Call direction. Present on `post-conversation`; may be absent on
            `analytics-completed`.
        answerTime:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the call was answered (UTC).
        endTime:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the call ended (UTC).
      required: [fromNumber, toNumber, callDuration, callStatus, answerTime, endTime]

    WebhookEventPostConversation:
      type: object
      description: |
        Fired **after** the call ends. Contains the full transcript, call
        metadata, recording URL, and all agent variables that were in scope
        during the conversation.
      allOf:
        - $ref: "#/components/schemas/WebhookEventEnvelope"
        - type: object
          required: [metadata]
          properties:
            metadata:
              type: object
              required: [agentId, eventType, conversationType, callId, recordingUrl, callData, transcript, variables]
              properties:
                agentId:
                  type: string
                  example: "69fc7dd072a0c1d28d948ace"
                eventType:
                  type: string
                  enum: [post-conversation]
                  example: "post-conversation"
                conversationType:
                  type: string
                  example: "telephonyOutbound"
                callId:
                  type: string
                  example: "CALL-1778226705739-7e4c17"
                recordingUrl:
                  type: string
                  format: uri
                  description: URL to the composite call recording (`.wav`).
                callData:
                  $ref: "#/components/schemas/WebhookEventCallData"
                transcript:
                  type: array
                  description: Ordered list of transcript turns.
                  items:
                    $ref: "#/components/schemas/WebhookEventTranscriptTurn"
                variables:
                  type: object
                  additionalProperties: true
                  description: |
                    Flat key-value map of all agent variables in scope during the call.

                    **This object is fully dynamic.** Keys and values are entirely determined by
                    the agent's configuration; they are not fixed by the platform. New keys can
                    appear at any time. Store as JSON and iterate keys — do not hard-code column
                    mappings. Common platform keys include `agent_name`, `customer_name`,
                    `current_date`, `default_language`; domain-specific keys (e.g. `due_amount`,
                    `bank_name`) come from your agent's prompt configuration.
                  example:
                    agent_name: "Nisha"
                    customer_name: "Rahul Sharma"
                    due_amount: "29000"

    WebhookEventAnalyticsMetric:
      type: object
      description: |
        A single disposition or success metric computed by the
        `analytics-completed` event. The set of metrics is configured
        per-agent and can vary.
      properties:
        identifier:
          type: string
          description: "Machine-readable metric name (e.g. `turn_taking_balance`, `escalation_needed`)."
          example: "turn_taking_balance"
        value:
          description: |
            The evaluated result. Type depends on `dispositionMetricType`.
          oneOf:
            - type: integer
            - type: string
            - type: boolean
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Confidence score (0–1).
          example: 1
        reasoning:
          type: string
          description: LLM-generated explanation for the assigned value.
        dispositionMetricPrompt:
          type: string
          description: The prompt/question that was used to evaluate this metric.
        dispositionMetricType:
          type: string
          enum: [STRING, BOOLEAN, INTEGER, ENUM, DATETIME]
          description: Data type of `value`.
      required: [identifier, value, confidence, reasoning, dispositionMetricPrompt, dispositionMetricType]

    WebhookEventAnalyticsCompleted:
      type: object
      description: |
        Fired **after** Atoms finishes running the configured disposition and
        success metrics on the transcript. Arrives some time after
        `post-conversation`.
      allOf:
        - $ref: "#/components/schemas/WebhookEventEnvelope"
        - type: object
          required: [metadata]
          properties:
            metadata:
              type: object
              required: [agentId, eventType, conversationType, callId, analytics, callData]
              properties:
                agentId:
                  type: string
                eventType:
                  type: string
                  enum: [analytics-completed]
                  example: "analytics-completed"
                conversationType:
                  type: string
                callId:
                  type: string
                analytics:
                  type: object
                  required: [summary, dispositionMetrics, successMetrics]
                  properties:
                    summary:
                      type: string
                      description: LLM-generated plain-text summary of the call.
                    dispositionMetrics:
                      type: array
                      items:
                        $ref: "#/components/schemas/WebhookEventAnalyticsMetric"
                    successMetrics:
                      type: array
                      description: Same schema as `dispositionMetrics`. May be empty.
                      items:
                        $ref: "#/components/schemas/WebhookEventAnalyticsMetric"
                callData:
                  $ref: "#/components/schemas/WebhookEventCallData"

    KnowledgeBase:
      type: object
      properties:
        _id:
          type: string
          description: The unique identifier for the knowledge base
        name:
          type: string
          description: The name of the knowledge base
        description:
          type: string
          description: The description of the knowledge base
        organization:
          type: string
          description: The organization ID
        createdBy:
          type: string
          description: The user ID who created the knowledge base
        processingStatus:
          type: string
          enum: [pending, processing, completed, failed]
          description: The current processing status of the knowledge base
        createdAt:
          type: string
          format: date-time
          description: The date and time when the knowledge base was created
        updatedAt:
          type: string
          format: date-time
          description: The date and time when the knowledge base was last updated
      required:
        - _id
        - name
        - organization
        - createdBy

    KnowledgeBaseItem:
      type: object
      properties:
        _id:
          type: string
          description: The unique identifier for the knowledge base item
        itemType:
          type: string
          enum: [file, text]
          description: The type of the knowledge base item
        metadata:
          type: object
          description: Additional metadata for the item
        knowledgeBaseId:
          type: string
          description: The ID of the knowledge base this item belongs to
        processingStatus:
          type: string
          enum: [pending, processing, completed, failed]
          description: The processing status of the item
        fileName:
          type: string
          description: The name of the file (for file type items)
        contentType:
          type: string
          description: The MIME type of the content
        size:
          type: number
          description: The size of the file in bytes
        key:
          type: string
          description: The storage key for the file
        title:
          type: string
          description: The title of the item
        content:
          type: string
          description: The content of the item (for text type items)
        createdAt:
          type: string
          format: date-time
          description: The date and time when the item was created
        updatedAt:
          type: string
          format: date-time
          description: The date and time when the item was last updated
      required:
        - _id
        - itemType
        - knowledgeBaseId
        - processingStatus
        - createdAt
        - updatedAt

    WebhookEvent:
      type: object
      properties:
        _id:
          type: string
          description: The unique identifier for the event
        webhookId:
          type: string
          description: The ID of the webhook
        eventType:
          type: string
          description: The type of event
        payload:
          type: object
          description: The event payload
        status:
          type: string
          description: The status of the event
        createdAt:
          type: string
          format: date-time
          description: The date and time when the event was created

    WorkflowType:
      type: string
      enum: [workflow_graph, single_prompt]
      description: The type of workflow configuration. workflow_graph uses a node-based visual workflow, single_prompt uses a simple prompt-based configuration.

    WorkflowGraphData:
      type: object
      description: Workflow configuration using a node-based graph structure
      properties:
        nodes:
          type: array
          description: Array of workflow nodes
          items:
            type: object
            properties:
              id:
                type: string
                description: Unique identifier for the node
              type:
                type: string
                description: Type of the node (e.g., default_node, end_call, pre_call_api)
              position:
                type: object
                properties:
                  x:
                    type: number
                  y:
                    type: number
              data:
                type: object
                description: Node-specific data and configuration
        edges:
          type: array
          description: Array of workflow edges connecting nodes
          items:
            type: object
            properties:
              id:
                type: string
                description: Unique identifier for the edge
              source:
                type: string
                description: ID of the source node
              target:
                type: string
                description: ID of the target node
              type:
                type: string
                description: Type of the edge

    SinglePromptData:
      type: object
      description: Workflow configuration using a simple prompt-based approach
      properties:
        prompt:
          type: string
          description: The main prompt that defines the agent's behavior and responses
        tools:
          type: array
          description: Array of tools/functions available to the agent
          items:
            type: object
            description: Tool configuration object

    SinglePromptConfig:
      type: object
      description: Configuration for single prompt workflow type
      properties:
        prompt:
          type: string
          description: The main prompt that defines the agent's behavior and responses
          example: "You are a helpful AI assistant that can help users with various tasks."
        tools:
          type: array
          description: |
            Array of tools/functions available to the agent during conversations.
            Five tool types are supported: `end_call`, `transfer_call`, `api_call`,
            `extract_dynamic_variables`, and `knowledge_base_search`. Each type has its
            own required fields — see `Tool` schema.
          items:
            $ref: "#/components/schemas/Tool"
          default: []
      required: [prompt]

    Tool:
      type: object
      description: |
        Tool (function) available to the agent. The `type` field determines which
        additional fields are required. Backend validation enforces per-type schemas.
      required: [type, name, description]
      properties:
        type:
          type: string
          enum: [end_call, transfer_call, api_call, extract_dynamic_variables, knowledge_base_search]
          description: The type of function/tool
        name:
          type: string
          description: Unique name for the function (no spaces)
          example: "end_call"
        description:
          type: string
          description: Description of what the function does
          example: "End the conversation when the user is satisfied"
        enabled:
          type: boolean
          default: true
          description: Whether the tool is enabled
        # ── Transfer Call specific fields ──
        transferNumber:
          type: string
          description: "Required for transfer_call type. Phone number to transfer the call to (E.164 format)"
          example: "+1234567890"
        transferOption:
          type: object
          description: "Required for transfer_call type. Controls cold vs warm transfer behavior."
          properties:
            type:
              type: string
              enum: [cold_transfer, warm_transfer]
              default: cold_transfer
              description: Transfer mode. `cold_transfer` hands off immediately; `warm_transfer` briefs the receiving party first.
            privateHandoffOption:
              type: object
              nullable: true
              description: Private briefing delivered to the transfer target before the caller is connected. Only used when `type = warm_transfer`.
              properties:
                type:
                  type: string
                  enum: [prompt, static]
                  description: "`prompt` generates briefing from the LLM; `static` plays fixed text."
                prompt:
                  type: string
                  description: The prompt or static text for the private handoff.
            publicHandoffOption:
              type: object
              nullable: true
              description: Message played to the caller while the transfer is being set up. Only used when `type = warm_transfer`.
              properties:
                type:
                  type: string
                  enum: [prompt, static]
                prompt:
                  type: string
        onHoldMusic:
          type: string
          enum: [ringtone, relaxing_sound, uplifting_beats, none]
          default: ringtone
          description: "Optional for transfer_call type. Audio played to the caller while the transfer is in progress."
        transferOnlyIfHuman:
          type: boolean
          default: true
          description: "Optional for transfer_call type. If true, the call is only transferred when a human is detected on the receiving end (voicemail/IVR skipped)."
        detectionTimeout:
          type: integer
          minimum: 5
          maximum: 60
          default: 30
          description: "Optional for transfer_call type. Seconds to wait for human detection before giving up (5–60)."
        # ── API Call specific fields ──
        url:
          type: string
          format: uri
          description: "Required for api_call type. The URL to make the HTTP request to."
          example: "https://api.example.com/orders"
        method:
          type: string
          enum: [GET, POST, PUT, DELETE, PATCH]
          description: "Required for api_call type. HTTP method to use."
          example: "GET"
        timeout:
          type: integer
          minimum: 1000
          maximum: 30000
          default: 5000
          description: "Optional for api_call type. Request timeout in milliseconds (1000–30000)."
        headers:
          type: object
          additionalProperties:
            type: string
          description: "Optional for api_call type. Static HTTP headers as a key/value map."
          example:
            Authorization: "Bearer TOKEN"
            Content-Type: "application/json"
        headersArray:
          type: array
          description: "Optional for api_call type. Headers as an array of key/value objects (alternative to `headers` map)."
          items:
            type: object
            required: [key, value]
            properties:
              key:
                type: string
                example: "Authorization"
              value:
                type: string
                example: "Bearer TOKEN"
        queryParams:
          type: array
          description: "Optional for api_call type. Query parameters to include in the request URL. Values support variable templating like `{{order_id}}`."
          items:
            type: object
            required: [key, value]
            properties:
              key:
                type: string
                example: "id"
              value:
                type: string
                example: "{{order_id}}"
        requestBody:
          type: string
          description: "Optional for api_call type. Raw request body as a JSON string. Supports variable templating."
          example: '{"customer_id": "{{customer_id}}"}'
        llmParameters:
          type: array
          description: "Optional for api_call type. Parameters the LLM can supply dynamically at runtime."
          items:
            type: object
            required: [name, description, type]
            properties:
              name:
                type: string
                description: Parameter name
              description:
                type: string
                description: What the parameter represents
              type:
                type: string
                enum: [text, number, boolean, enum]
              values:
                type: array
                items:
                  type: string
                description: "Required when type is `enum`. Allowed values."
              required:
                type: boolean
                default: false
        responseVariables:
          type: array
          description: "Optional for api_call type. Variables to extract from the API response into the agent's variable store."
          items:
            type: object
            required: [variableName, jsonPath]
            properties:
              variableName:
                type: string
                description: Name to store the extracted value under
                example: "orderStatus"
              jsonPath:
                type: string
                description: JSON path to extract the value from the response
                example: "$.data.status"
          default: []
        # ── Dynamic Variable Extraction specific fields ──
        variablesExtractionSchema:
          type: array
          description: "Required for extract_dynamic_variables type. Schema defining variables to extract from the conversation."
          items:
            type: object
            required: [name, description, type]
            properties:
              name:
                type: string
                description: Name of the variable to extract
                example: "customer_name"
              description:
                type: string
                description: What this variable represents
                example: "The customer's full name"
              type:
                type: string
                enum: [text, number, boolean, enum]
              values:
                type: array
                items:
                  type: string
                description: "Required when type is `enum`. List of possible values."
                example: ["satisfied", "unsatisfied", "neutral"]
          minItems: 1
        # ── Knowledge Base Search specific fields ──
        knowledgeBaseId:
          type: string
          description: "Required for knowledge_base_search type. ID of the knowledge base to search."
          example: "60d0fe4f5311236168a109ca"
        fillerPhrases:
          type: array
          description: "Optional for knowledge_base_search type. Phrases spoken while searching."
          items:
            type: string
          default: []
          example: ["Let me check that for you", "One moment please"]

    DispositionMetric:
      type: object
      description: |
        A single disposition metric captured after each call. The metric prompt
        is evaluated against the call transcript post-call, and the result is
        returned in the call log under `postCallAnalytics.dispositionMetrics`.
      required: [identifier, dispositionMetricPrompt, dispositionMetricType]
      properties:
        identifier:
          type: string
          pattern: "^[a-z0-9_]+$"
          description: Stable machine identifier. Lowercase letters, digits, and underscores only.
          example: "call_resolved"
        dispositionMetricPrompt:
          type: string
          description: Natural-language question evaluated against the transcript after the call ends.
          example: "Was the customer issue resolved by the end of the call?"
        dispositionMetricType:
          type: string
          enum: [STRING, BOOLEAN, INTEGER, ENUM, DATETIME]
          description: Data type returned by the metric.
          example: "STRING"
        choices:
          type: array
          description: "Required when `dispositionMetricType = ENUM`. Allowed values."
          items:
            type: string
          example: ["resolved", "escalated", "callback_scheduled", "no_action"]

    PostCallAnalyticsConfig:
      type: object
      description: |
        Per-agent post-call analytics configuration. Evaluated after each call ends
        and surfaced in call logs under the `postCallAnalytics` field.
      properties:
        dispositionMetrics:
          type: array
          description: Structured metrics extracted from each completed call.
          items:
            $ref: "#/components/schemas/DispositionMetric"
          default: []
        successMetrics:
          type: array
          deprecated: true
          description: |
            **Deprecated** — will be removed in a future version. Use
            `dispositionMetrics` instead. Kept here because the backend still
            accepts it on writes and returns it on reads.
          items:
            type: object
            required: [identifier, successMetricPrompt, successMetricType]
            properties:
              identifier:
                type: string
                pattern: "^[a-z0-9_]+$"
              successMetricPrompt:
                type: string
              successMetricType:
                type: string
                enum: [NUMERIC_SCALE, PERCENTAGE_SCALE, PASS_FAIL, DESCRIPTIVE_SCALE]
          default: []
        summaryPrompt:
          type: string
          deprecated: true
          description: |
            **Deprecated** — no longer used in post-call analysis and will be
            removed in a future version. Kept here because the backend still
            accepts it on writes and returns it on reads.
          default: ""
        useInternalAnalyticsModel:
          type: boolean
          default: true
          description: Use the internal analytics model. When false, falls back to the agent's own LLM.
        useReasoningModel:
          type: boolean
          default: false
          description: Route analytics evaluation through the reasoning model for higher-quality results at a latency/cost tradeoff.

    ComplianceApplication:
      type: object
      description: A compliance application for a specific country, number type, and user type
      properties:
        _id:
          type: string
          description: Unique identifier
          example: "663f1a2b4c5d6e7f8a9b0c1d"
        organizationId:
          type: string
          description: The organization this application belongs to
        plivoComplianceId:
          type: string
          description: Plivo's compliance application identifier
        alias:
          type: string
          description: Auto-generated alias (orgId-countryIso-env)
          example: "663f1a2b-IN-production"
        status:
          type: string
          enum: [draft, submitted, accepted, rejected, suspended, expired]
          description: Current status of the compliance application
          example: "submitted"
        countryIso:
          type: string
          description: ISO 3166-1 alpha-2 country code
          example: "IN"
        numberType:
          type: string
          enum: [local, mobile, tollfree]
          example: "local"
        userType:
          type: string
          enum: [individual, business]
          example: "business"
        endUserName:
          type: string
          description: Legal business or individual name
          example: "Acme Corp"
        endUserLastName:
          type: string
          nullable: true
        endUserEmail:
          type: string
          nullable: true
        endUserCountry:
          type: string
          nullable: true
          example: "IN"
        documentFileNames:
          type: array
          items:
            type: string
          description: Names of uploaded document files
          example: ["certificate_of_incorporation.pdf"]
        rejectionReason:
          type: string
          nullable: true
          description: Reason for rejection, if applicable
        createdBy:
          type: string
          description: User ID of the person who created this application
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ComplianceRequirement:
      type: object
      description: Compliance requirements for a country/numberType/userType combination
      properties:
        requirementId:
          type: string
          description: Plivo's requirement identifier
        countryIso:
          type: string
          example: "IN"
        numberType:
          type: string
          example: "local"
        userType:
          type: string
          example: "business"
        documentTypes:
          type: array
          description: Required document types. Empty array means no compliance is needed.
          items:
            $ref: "#/components/schemas/RequiredDocumentType"

    RequiredDocumentType:
      type: object
      description: A document type required for compliance
      properties:
        documentTypeId:
          type: string
          description: Identifier to use when submitting this document type
          example: "dt_certificate_of_incorporation"
        name:
          type: string
          description: Human-readable name
          example: "Certificate of Incorporation"
        description:
          type: string
          description: Description of what this document should contain
          example: "A government-issued certificate proving business registration"
        proofRequired:
          type: boolean
          description: Whether a file upload is required for this document type
          example: true
        requiredFields:
          type: array
          description: Data fields that must be provided alongside the document
          items:
            type: object
            properties:
              fieldName:
                type: string
                example: "business_name"
              friendlyName:
                type: string
                example: "Business Name"
              helpText:
                type: string
                example: "Exact name as on the certificate"
              fieldType:
                type: string
                example: "string"
              required:
                type: boolean
                example: true

  responses:
    UnauthorizedError:
      description: Access token is missing or invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiResponse"

    BadRequestError:
      description: Invalid input
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BadRequestErrorResponse"

    ForbiddenError:
      description: Forbidden access
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiResponse"

    WorkflowGraphAgentAccessForbiddenError:
      description: Forbidden. Returned for workflow_graph agents when the organization lacks conversational agents access.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiResponse"

    UnauthorizedErrorResponse:
      description: Unauthorized access
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UnauthorizedErrorResponse"

    InternalServerErrorResponse:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/InternalServerErrorResponse"

    BadRequestErrorResponse:
      description: Bad request — validation failed or required field missing.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BadRequestErrorResponse"

    NotFoundErrorResponse:
      description: Resource not found. The referenced ID does not exist or does not belong to the caller's organization.
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: boolean
                example: false
              errors:
                type: array
                items:
                  type: string
                example: ["Resource not found"]

    ConflictErrorResponse:
      description: Conflict. The request cannot be completed because of the current state of the resource (name already exists, another publish or restore is in progress, the source draft failed its security scan, or a similar in-flight collision).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ConflictErrorResponse"

    LockedErrorResponse:
      description: Locked. A configuration freeze is active on this agent, or the resource is temporarily locked for another write. Retry after the freeze window ends.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/LockedErrorResponse"

    VersioningV2MigrationRequired:
      description: |
        The v1 versioning endpoint is deprecated on the branch model and will not process this request. The response body carries `error_type: "versioning_v2_migration_required"` and the response includes the `Deprecation: true` header. See the [migration guide](/voice-agents/api-reference/versioning-v2-migration) for the v2 equivalent.
      headers:
        Deprecation:
          description: Always `true` for deprecated endpoints.
          schema:
            type: string
            example: "true"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/VersioningV2MigrationRequiredResponse"

tags:
  - name: Integrations
    description: Third-party platform integrations. Currently supports WebEngage — a customer engagement platform. Credentials are stored per organization as one or more integration sets.
  - name: Concurrency
    description: Manage organization-wide concurrency limits and per-agent call slot reservations across webcall, outbound, inbound, and chat channels.
  - name: Disposition Metric Templates
    description: Reusable post-call analytics metric definitions. Each template specifies an identifier, an AI extraction prompt, and a value type (STRING, BOOLEAN, INTEGER, ENUM, DATETIME).
  - name: Call Actions
    description: Automated behaviors that fire at specific points in the call lifecycle — trigger actions initiate outbound calls, post-call actions update CRM records after a call ends.
  - name: Analytics
    description: Analytics and reporting endpoints for call metrics, trends, usage, and dashboard data.
  - name: Prompt Scoring
    description: Score and analyse agent prompts across quality dimensions
  - name: Agent Templates
    description: Operations related to agent templates
  - name: Agents
    description: Operations related to agents
  # - name: Workflows  # DEPRECATED — workflow agents are being sunset
  - name: Logs
    description: Operations related to conversation logs, call history, and recordings. Supports filtering by agents, campaigns, call IDs, status, duration, and more.
  - name: Calls
    description: Operations related to initiating and managing calls
  - name: Live Transcripts
    description: Real-time streaming of call transcript events via Server-Sent Events (SSE). Subscribe to an active call to receive user speech, agent speech, and lifecycle events in real time.
  - name: Realtime Agent
    description: Start a realtime voice or chat session with an agent over a WebSocket. Use `POST /conversation/register-call` to mint a short-lived access token, then open the Agent WebSocket with it.
  - name: Phone Numbers
    description: Operations related to phone numbers
  - name: Compliance
    description: |
      Regulatory compliance for phone number rentals. Some countries require identity verification
      and document submission before numbers can be rented. Use these endpoints to check requirements,
      submit compliance applications, and track approval status.
  - name: Webhooks
    description: Operations related to webhooks and webhook subscriptions
  - name: Audience
    description: Operations related to audience management and CSV uploads
  - name: Agent Versioning - Branches
    description: |
      Manage editable copies of an agent. Every editable copy is a branch. Each agent has a `Main` branch by default; you can create more branches from any branch that has at least one committed revision. Exactly one branch per agent is **live** and serves production traffic. `Main` cannot be renamed or deleted; the live branch cannot be deleted or archived until another branch is made live. Requires `ENABLE_BRANCH_MODEL`.
  - name: Agent Versioning - Revisions
    description: |
      Read and restore committed revisions on a branch. A revision is an immutable snapshot of an agent's configuration created when a draft is published. Revisions belong to exactly one branch. Restoring a revision republishes it as a new revision on the same branch. Requires `ENABLE_BRANCH_MODEL`.
  - name: Agent Versioning - Drafts
    description: |
      **Deprecated on the v2 branch model.** Use `PUT`/`GET`/`DELETE /agent/{id}/branches/{branchId}/draft` and `POST /agent/{id}/branches/{branchId}/draft/publish`. When `ENABLE_BRANCH_MODEL` is on, list + write endpoints under this tag return `409 versioning_v2_migration_required` with `Deprecation: true`. See the [migration guide](/voice-agents/api-reference/versioning-v2-migration).
  - name: Agent Versioning - Versions
    description: |
      **Deprecated on the v2 branch model.** Under the branch model, `activate` is gone (a branch is made live via `POST /agent/{id}/branches/{branchId}/live`) and only `label` (set at publish) is metadata-editable. When `ENABLE_BRANCH_MODEL` is on, list + write endpoints under this tag return `409 versioning_v2_migration_required` with `Deprecation: true`. By-id reads and test-calls are kept unchanged and resolve across branches (a v1 `versionId` equals its migrated `revisionId`). See the [migration guide](/voice-agents/api-reference/versioning-v2-migration).
  - name: Post-Call Analytics
    description: |
      Configure disposition metrics that are automatically extracted from each completed call (call resolved, satisfaction score, call outcome, summary, etc.). Post-call analytics is not a standalone endpoint — it is configured through the versioning system by setting the `postCallAnalyticsConfig` field in the body of `PATCH /agent/{id}/drafts/{draftId}/config`, then publishing and activating the draft. See the [Post-Call Metrics guide](/atoms/atoms-platform/features/post-call-metrics) for the full walkthrough.

