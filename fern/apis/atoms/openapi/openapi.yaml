                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      callLogs:
                        type: array
                        items:
                          type: object
                          properties:
                            callId:
                              type: string
                            callStatus:
                              type: string
                            callType:
                              type: string
                            fromNumber:
                              type: string
                            toNumber:
                              type: string
                            createdAt:
                              type: string
                              format: date-time
                            callDuration:
                              type: number
                              description: Call duration in milliseconds
                      totalCount:
                        type: number
                      page:
                        type: number
