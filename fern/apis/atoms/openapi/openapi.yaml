      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: The name of the campaign
                  example: "My Campaign"
                description:
                  type: string
                  description: The description of the campaign
                  example: "This is a campaign to test the API"
                audienceId:
                  type: string
                  description: The ID of the audience
                  example: "60d0fe4f5311236168a109ca"
                agentId:
                  type: string
                  description: The ID of the agent
                  example: "60d0fe4f5311236168a109ca"
                phoneNumberIds:
                  type: array
                  description: |
                    Optional list of caller-ID phone number IDs to rotate across
                    when placing outbound calls for this campaign. If omitted,
                    the agent's default phone number is used.
                  items:
                    type: string
                  example: ["60d0fe4f5311236168a109cb"]
                scheduledAt:
                  type: string
                  format: date-time
                  description: |
                    Optional ISO-8601 timestamp for when the campaign should
                    start dialing. Must be in the future. If provided, the
                    campaign is created in `scheduled` status; otherwise it
                    starts in `draft` status and must be started manually.
                  example: "2026-04-24T10:00:00.000Z"
                maxRetries:
                  type: integer
                  minimum: 0
                  maximum: 10
                  default: 3
                  description: |
                    Maximum number of times a failed call is retried before the
                    participant is marked as failed. `0` disables retries.
                  example: 3
                retryDelay:
                  type: integer
                  minimum: 1
                  maximum: 1440
                  default: 15
                  description: |
                    Delay in minutes between retry attempts for a failed call.
                  example: 15
              required:
                - name
                - audienceId
                - agentId
      responses:
        "201":
          description: |
            Campaign created successfully. Note: the response is the raw Mongoose document — `agentId`
            and `audienceId` are plain ObjectId strings here, not nested objects as returned by GET endpoints.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      _id:
                        type: string
                        description: The unique identifier for the campaign
                      name:
                        type: string
                        description: The name of the campaign
                      description:
                        type: string
                        description: The description of the campaign
                      organization:
                        type: string
                        description: The ID of the organization
                      agentId:
                        type: string
                        description: Raw ObjectId of the agent (not a nested object)
                      createdBy:
                        type: string
                        description: The ID of the user who created the campaign
                      audienceId:
                        type: string
                        description: Raw ObjectId of the audience (not a nested object)
                      participantsCount:
                        type: integer
                        description: The number of participants in the campaign
                      scheduledAt:
                        type: string
                        format: date-time
                        description: The scheduled start time, if provided at creation.
                      maxRetries:
                        type: integer
                        description: Maximum retries per failed call (echoes request).
                      retryDelay:
                        type: integer
                        description: Delay in minutes between retry attempts (echoes request).
                      retryAttempts:
                        type: integer
                        description: Number of retries attempted so far across the campaign.
                      status:
                        type: string
                        enum: [draft, scheduled, processing, running, paused, completed, failed]
                        description: Current campaign status.
                      createdAt:
                        type: string
                        format: date-time
                        description: The date and time when the campaign was created
                      updatedAt:
                        type: string
                        format: date-time
                        description: The date and time when the campaign was last updated
