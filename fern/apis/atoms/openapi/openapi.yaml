                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/TestCallResult"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          $ref: "#/components/responses/WorkflowGraphAgentAccessForbiddenError"
        "404":
