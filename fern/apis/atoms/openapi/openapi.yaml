  /campaign/{id}/start:
    post:
      summary: Start or resume a campaign
      description: |
        Queues the campaign for processing and returns immediately — the campaign is **not** yet
        running when the 202 is returned. Poll `GET /campaign/{id}` and watch for `status: "running"`.

        This endpoint also acts as a **resume** endpoint: if the campaign is currently paused,
        calling this endpoint resumes it (`status` transitions from `paused` → `running`).
      tags:
        - Campaigns
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: The ID of the campaign
          schema:
            type: string
      responses:
        "202":
          description: Campaign queued for processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: "Campaign is being processed"
                      taskId:
                        type: string
                        description: Internal task identifier for the queued job
                      campaignId:
                        type: string
                        description: The ID of the campaign
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "404":
          description: Campaign not found
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /campaign/{id}/pause:
    post:
      summary: Pause a campaign
      description: |
        Queues a pause task and returns immediately — the campaign is **not** immediately paused.
        Poll `GET /campaign/{id}` and watch for `status: "paused"`.
      tags:
        - Campaigns
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: The ID of the campaign
          schema:
            type: string
      responses:
        "200":
          description: Pause task queued successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

