openapi: 3.0.0
info:
  title: Agent Management API
  version: 1.0.0
  description: API for managing agents, their templates, and call logs

paths:
  /user:
    get:
      summary: Get user details
      tags:
        - User
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      _id:
                        type: string
                        description: The ID of the user
                      firstName:
                        type: string
                        description: The first name of the user
                      lastName:
                        type: string
                        description: The last name of the user
                      userEmail:
                        type: string
                        description: The email of the user
                      authProvider:
                        type: string
                        description: The authentication provider of the user
                      isEmailVerified:
                        type: boolean
                        description: Whether the user's email is verified
                      organizationId:
                        type: string
                        description: The organization ID of the user

        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /organization:
    get:
      summary: Get organization details
      tags:
        - Organization
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      _id:
                        type: string
                        description: The organization ID
                      name:
                        type: string
                        description: The organization name
                      members:
                        type: array
                        items:
                          type: object
                          properties:
                            _id:
                              type: string
                              description: The member ID
                            userEmail:
                              type: string
                              description: The member email
                      subscription:
                        type: object
                        properties:
                          planId:
                            type: string
                            description: The subscription plan ID

        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/template:
    get:
      summary: Get agent templates
      tags:
        - Agent Templates
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: The ID of the agent template
                        name:
                          type: string
                          description: The name of the agent template
                        description:
                          type: string
                          description: The description of the agent template
                        avatarUrl:
                          type: string
                          description: The avatar URL of the agent template
                        referenceUrl:
                          type: string
                          description: The docs url of the agent template
                        category:
                          type: string
                          description: The category of the agent template

        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/from-template:
    post:
      summary: Create agent from template
      tags:
        - Agent Templates
      security:
        - BearerAuth: []
      description: We have created templates for some common use cases. You can use these templates to create an agent. For getting list of templates, you can use the /agent/template endpoint. It will give you the list of templates with their description and id. You can pass the id of the template in the request body to create an agent from the template.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentFromTemplateRequest"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: string
                    example: "60d0fe4f5311236168a109ca"
                    description: The ID of the created agent
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent:
    get:
      summary: Get all agents
      tags:
        - Agents
      security:
        - BearerAuth: []
      description: Agents are the main entities in the system. Agents are used to create conversations. You can create workflow for an agent and configure it for different use cases. You can also create custom workflows for an agent. This API will give you the list of agents created by organization you are a part of.
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
            description: Page number
        - in: query
          name: offset
          schema:
            type: integer
            default: 10
            description: Number of items to return per page
        - in: query
          name: search
          schema:
            type: string
            description: Search query
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      agents:
                        type: array
                        items:
                          $ref: "#/components/schemas/AgentDTO"
                      total:
                        type: number
                        description: Total number of agents

        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    post:
      summary: Create a new agent
      tags:
        - Agents
      security:
        - BearerAuth: []
      description: You can create a new agent by passing the name of the agent in the request body. You can use update-workflow endpoint next to assign custom workflow to the agent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentRequest"
      responses:
        "201":
          description: Agent created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: string
                    example: "60d0fe4f5311236168a109ca"
                    description: The ID of the created agent

        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /agent/{id}:
    get:
      summary: Get agent by ID
      description: |
        Returns the agent document merged with the currently-active version's resolved
        config under `_resolvedConfig`. Non-versioned fields (name, telephonyProductId,
        allowInboundCall, etc.) sit at the top level; versioned fields (prompt, tools,
        language, synthesizer, post-call analytics, …) are resolved from the active
        version and exposed under `_resolvedConfig`.

        Notable resolved fields:

        - `_resolvedConfig.postCallAnalyticsConfig` — disposition metrics + analytics model flags
        - `_resolvedConfig.tools` — configured tools on the active version
        - `_resolvedConfig.prompt` — active version's prompt
        - `activeVersionId` / `versionId` — current published & active version ID

        To read prompt + tools alone, use `GET /agent/{id}/workflow` (deprecated for
        new integrations but still live). To inspect a specific non-active version,
        use `GET /agent/{id}/versions/{versionId}`.
      tags:
        - Agents
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/AgentDTO"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    patch:
      summary: Update agent metadata
      description: |
        Update non-versioned agent-level fields: name, description, telephony product, and inbound call settings.

        Agent configuration (voice, language, prompt, tools, post-call analytics, etc.) is managed through the
        versioning system. Submitting any config-level field here returns 400 with
        `"Agent has versioning enabled. Config changes must be made through drafts."`
        Use `PATCH /agent/{id}/drafts/{draftId}/config` instead.
      tags:
        - Agents
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentRequest"
      responses:
        "200":
          description: Agent updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: string
                    example: "60d0fe4f5311236168a109ca"
                    description: The ID of the updated agent
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

    delete:
      summary: Delete an agent
      tags:
        - Agents
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /agent/{id}/duplicate:
    post:
      summary: Duplicate agent to another organization
      description: |
        Duplicates a SINGLE_PROMPT agent's live active version into a target organization
        (can also be the same organization). Copies all versioned configuration but strips
        organization-specific resources: knowledge base tools are removed, default variable
        values are blanked, and a new avatar is generated. The duplicate starts with a
        published V1 as its active version.
      tags:
        - Agents
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The ID of the source agent to duplicate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - targetOrganizationId
              properties:
                targetOrganizationId:
                  type: string
                  description: The ID of the organization to duplicate the agent into. User must be a member of this organization.
                  example: "60d0fe4f5311236168a109ca"
      responses:
        "201":
          description: Agent duplicated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      _id:
                        type: string
                        example: "60d0fe4f5311236168a109cb"
                        description: The ID of the newly created agent
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          description: Not found — source agent or target organization does not exist
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  # ── Deprecated: Workflow endpoints (still live) ────────────────────────
  # Both still work in production and are actively used by customers, but
  # they bypass the versioning system. Prefer PATCH /agent/{id}/drafts/{draftId}/config
  # for writes and GET /agent/{id} for reads.

  /agent/{id}/workflow:
    get:
      summary: Get agent workflow
      deprecated: true
      description: |
        **Deprecated** — prefer `GET /agent/{id}` (config is resolved into `_resolvedConfig`
        including prompt, tools, and post-call analytics).

        Returns the active version's prompt and tools for single-prompt agents, or the
        workflow graph data for workflow_graph agents. Customers still rely on this to
        fetch their current prompt + tools — endpoint is kept live for now.

        **Caveat:** the `versionId` query param (if passed) is silently ignored.
        The response always reflects the currently-active version. To inspect a
        non-active version, use `GET /agent/{id}/versions/{versionId}`.
      tags:
        - Agents
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: The ID of the agent
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    description: The active version's workflow.
                    properties:
                      prompt:
                        type: string
                        description: Active prompt (single-prompt agents only).
                      tools:
                        type: array
                        items:
                          $ref: "#/components/schemas/Tool"
                        description: Active tool list (single-prompt agents only).
                      type:
                        $ref: "#/components/schemas/WorkflowType"
                        description: Workflow type. Present for workflow_graph agents.
                      data:
                        oneOf:
                          - $ref: "#/components/schemas/WorkflowGraphData"
                          - $ref: "#/components/schemas/SinglePromptData"
                        description: Graph data for workflow_graph agents.
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "404":
          description: Agent not found
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /workflow/{id}:
    patch:
      summary: Update workflow configuration
      deprecated: true
      description: |
        **Deprecated** — use `PATCH /agent/{id}/drafts/{draftId}/config` instead.

        Directly mutates the legacy workflow document for an agent. This write path
        bypasses the versioning system entirely: the change is not captured as a
        new version, and future version activations may overwrite the legacy doc
        back to whatever the version snapshot contains.

        ⚠ **Writing here on a versioned agent can silently wipe tools, prompt, or
        other fields that were missing from the PATCH payload.** Only use this if
        you know the agent is not using versioning, or if you are intentionally
        hot-patching the legacy doc.
      tags:
        - Agents
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: The workflow ID (found at `agent.workflowId` on the agent document).
          schema:
            type: string
            example: "60d0fe4f5311236168a109ca"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  $ref: "#/components/schemas/WorkflowType"
                workflowGraph:
                  type: object
                  description: Required when `type = workflow_graph`. Exactly one of `workflowGraph` or `singlePromptConfig` must be provided.
                  properties:
                    nodes:
                      type: array
                      items:
                        type: object
                    edges:
                      type: array
                      items:
                        type: object
                singlePromptConfig:
                  $ref: "#/components/schemas/SinglePromptConfig"
      responses:
        "200":
          description: Workflow updated successfully.
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "404":
          description: Workflow not found.
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /conversation:
    get:
      summary: Get all conversation logs
      description: Retrieve paginated conversation logs with support for various filters. Returns call logs for agents belonging to the authenticated user's organization.
      tags:
        - Logs
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number for pagination
          example: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 5
            minimum: 1
          description: Number of items per page
          example: 10
        - in: query
          name: agentIds
          schema:
            type: string
          description: Comma-separated list of agent IDs to filter by
          example: "60d0fe4f5311236168a109ca,60d0fe4f5311236168a109cb"
        - in: query
          name: campaignIds
          schema:
            type: string
          description: Comma-separated list of campaign IDs to filter by
          example: "60d0fe4f5311236168a109ca,60d0fe4f5311236168a109cb"
        - in: query
          name: callTypes
          schema:
            type: string
            enum:
              - telephony_inbound
              - telephony_outbound
              - chat
          description: Comma-separated list of call types to filter by
          example: "telephony_outbound,telephony_inbound"
        - in: query
          name: search
          schema:
            type: string
          description: Search query to filter by callId, fromNumber, or toNumber
          example: "+1234567890"
        - in: query
          name: statusFilter
          schema:
            type: string
          description: |
            Comma-separated list of call statuses to filter by.
            Available statuses: pending, in_progress, completed, failed, no_answer, cancelled, busy
          example: "completed,failed"
        - in: query
          name: disconnectReasonFilter
          schema:
            type: string
          description: |
            Comma-separated list of disconnect reasons to filter by.
            Available reasons: user_hangup, agent_hangup, connection_error, timeout, system_error, transfer_complete
          example: "user_hangup,agent_hangup"
        - in: query
          name: callAttemptFilter
          schema:
            type: string
          description: |
            Comma-separated list of call attempt types to filter by.
            Available filters: initial (first attempt calls), retry (retry attempt calls), all (all calls)
          example: "initial"
        - in: query
          name: durationFilter
          schema:
            type: string
          description: |
            Comma-separated list of duration ranges to filter by.
            Available ranges: 0-30 (0-30 seconds), 30-60 (30-60 seconds), 1-5 (1-5 minutes), 5+ (more than 5 minutes)
          example: "0-30,30-60"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      logs:
                        type: array
                        items:
                          type: object
                          properties:
                            _id:
                              type: string
                              description: The database ID of the call log
                              example: "60d0fe4f5311236168a109ca"
                            callId:
                              type: string
                              description: The unique call identifier
                              example: "CALL-1737000000000-abc123"
                            status:
                              type: string
                              description: The status of the call
                              enum: [pending, in_progress, completed, failed, no_answer, cancelled, busy]
                              example: "completed"
                            duration:
                              type: number
                              description: The duration of the call in seconds
                              example: 120
                            from:
                              type: string
                              description: The phone number the call was made from
                              example: "+15551234567"
                            to:
                              type: string
                              description: The phone number the call was made to
                              example: "+15559876543"
                            type:
                              type: string
                              description: The type of call
                              enum: [telephony_inbound, telephony_outbound, chat]
                              example: "telephony_outbound"
                            agentId:
                              type: string
                              description: The ID of the agent that handled the call
                              example: "60d0fe4f5311236168a109ca"
                            agentName:
                              type: string
                              description: The name of the agent
                              example: "Sales Agent"
                            recordingUrl:
                              type: string
                              description: URL to the call recording (if available)
                              example: "https://storage.example.com/recordings/call-123.mp3"
                            recordingDualUrl:
                              type: string
                              description: URL to the dual-channel call recording (if available)
                              example: "https://storage.example.com/recordings/call-123-dual.mp3"
                            disconnectionReason:
                              type: string
                              description: The reason the call was disconnected
                              example: "user_hangup"
                            retryCount:
                              type: integer
                              description: Number of retry attempts for this call
                              example: 0
                            createdAt:
                              type: string
                              format: date-time
                              description: When the call was created
                              example: "2025-01-15T10:30:00.000Z"
                            dispositionMetrics:
                              type: object
                              description: Custom disposition metrics for the call
                              additionalProperties:
                                type: string
                              example:
                                interested: "yes"
                                follow_up_needed: "no"
                            agentDispositionConfig:
                              type: array
                              description: Configuration for disposition metrics
                              items:
                                type: object
                                properties:
                                  identifier:
                                    type: string
                                  type:
                                    type: string
                      pagination:
                        type: object
                        properties:
                          total:
                            type: integer
                            description: Total number of matching call logs
                            example: 150
                          page:
                            type: integer
                            description: Current page number
                            example: 1
                          limit:
                            type: integer
                            description: Number of items per page (page size)
                            example: 10
                          hasMore:
                            type: boolean
                            description: Whether there are more pages available
                            example: true
                          totalPages:
                            type: integer
                            description: Total number of pages
                            example: 15
                      dispositionMetricsConfig:
                        type: array
                        description: Global disposition metrics configuration
                        items:
                          type: object
                          properties:
                            identifier:
                              type: string
                            type:
                              type: string
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /conversation/search:
    post:
      summary: Search conversation logs by call IDs
      description: |
        Fetch specific conversation logs by their callIds. This endpoint allows you to retrieve up to 100 specific calls at once.
        Only returns calls that belong to agents in your organization (security check enforced).
        Unlike the GET /conversation endpoint, this endpoint can also return retry calls (non-root calls).
      tags:
        - Logs
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - callIds
              properties:
                callIds:
                  type: array
                  items:
                    type: string
                  minItems: 1
                  maxItems: 100
                  description: Array of callIds to fetch
                  example: ["CALL-1737000000000-abc123", "CALL-1737000000001-def456"]
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      logs:
                        type: array
                        items:
                          type: object
                          description: Call log details (same structure as GET /conversation)
                      total:
                        type: integer
                        description: Number of logs returned
                        example: 2
                      requestedCount:
                        type: integer
                        description: Number of callIds requested
                        example: 3
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /conversation/{id}:
    get:
      summary: Get conversation log by ID
      description: Retrieve detailed information about a specific conversation including transcript, events, and latency metrics.
      tags:
        - Logs
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: The callId of the conversation. You can get the callId from the conversation logs endpoint.
          schema:
            type: string
          example: "CALL-1737000000000-abc123"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      _id:
                        type: string
                        description: The ID of the conversation
                        example: "abc123"
                      callId:
                        type: string
                        description: The ID of the conversation
                        example: "abc123"
                      agent:
                        $ref: "#/components/schemas/AgentDTO"
                      status:
                        type: string
                        description: The status of the conversation
                        example: "completed"
                      duration:
                        type: number
                        description: The duration of the conversation in seconds
                        example: 300
                      recordingUrl:
                        type: string
                        description: The recording URL of the conversation
                      from:
                        type: string
                        description: The phone number of the caller
                      to:
                        type: string
                        description: The phone number of the callee
                      transcript:
                        type: array
                        description: The transcript of the conversation
                      average_transcriber_latency:
                        type: number
                        description: The average time taken by the TTS to transcribe the conversation
                      average_agent_latency:
                        type: number
                        description: The average time taken by the LLM to respond to the conversation
                      average_synthesizer_latency:
                        type: number
                        description: The average time taken by the TTS to synthesize the conversation
                      type:
                        type: string
                        description: The type of the conversation
                        enum:
