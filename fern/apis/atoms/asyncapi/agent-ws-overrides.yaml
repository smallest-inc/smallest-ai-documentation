# Fern-specific overrides for agent-ws.yaml
# Adds server mapping, audience tags, and SDK group metadata that Fern uses
# but aren't part of pure AsyncAPI.

servers:
  production:
    x-fern-server-name: atoms

channels:
  agentSession:
    x-fern-server-name: atoms
    x-fern-sdk-group-name: Realtime Agent
    x-fern-audiences:
      - public
