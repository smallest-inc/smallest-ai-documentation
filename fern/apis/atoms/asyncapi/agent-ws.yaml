asyncapi: 3.0.0
info:
  title: Atoms Agent WebSocket API
  version: 1.0.0
  description: |
    WebSocket endpoint for real-time voice and text conversations with an Atoms
    agent. Designed for client-side applications (browser, React Native, mobile,
    desktop) that need a direct, persistent connection without going through
    the WebRTC-based webcall flow.

    Two transports use this endpoint under the hood:
    - The official `@smallest-ai/agent-sdk` JavaScript/TypeScript SDK wraps this
      protocol and handles mic capture, audio resampling, and event dispatch.
    - Non-JS clients (Swift, Kotlin, Python, Go) can implement the protocol
      directly — all messages are JSON, audio payloads are base64-encoded.

    All session orchestration is server-side: the backend creates the agent
    session, connects to the STT/LLM/TTS pipeline via NATS, and bridges
    transcripts and audio back over the same WebSocket.
  contact:
    name: Smallest AI Support
    email: support@smallest.ai
servers:
  production:
    host: api.smallest.ai
    pathname: /atoms/v1/agent/connect
    protocol: wss
    description: Production Agent WebSocket endpoint
    security:
      - $ref: "#/components/securitySchemes/bearerAuth"
    bindings:
      ws:
        query:
          type: object
          required:
            - token
          properties:
            token:
              type: string
              description: |
                The access token. Two forms are supported:

                - A short-lived, single-use token (prefixed `wct_`) from
                  `POST /atoms/v1/conversation/register-call` — **recommended
                  for browser / client-side** use, since your API key stays
                  server-side. With this token, `agent_id`, `mode`, and
                  `variables` are baked in, so you don't pass them on the URL.
                - A raw API key (prefixed `sk_`) — convenient for server-side
                  or trusted clients. Pair it with the `agent_id` (and optional
                  `mode` / `sample_rate` / `variables`) query params below.

                Browser WebSocket clients cannot set custom headers, so the
                token is passed as a query param rather than an `Authorization`
                header.
              example: "wct_9f8c2b1e-4d5a-4e6f-a7b8-c9d0e1f2a3b4"
            agent_id:
              type: string
              description: |
                The Atoms agent to connect to. Required when authenticating
                with a raw `sk_` API key. Ignored when using a `wct_` token
                (the agent is fixed at `register-call` time).
              example: "69da0b4c20c0e03cfa4ee258"
            mode:
              type: string
              enum:
                - webcall
                - chat
              default: webcall
              description: |
                Session mode. Used when connecting with a raw `sk_` API key —
                with a `wct_` token, set `mode` in the `register-call` request
                instead.

                - `webcall` — full voice pipeline (STT → LLM → TTS). The
                  client sends audio via `input_audio_buffer.append` and
                  receives audio via `output_audio.delta`. Text input via
                  `input_text.send` is also accepted and is routed through
                  the LLM + TTS just like transcribed speech.
                - `chat` — text-only pipeline (no STT/TTS, no audio). The
                  client sends text via `input_text.send` and receives the
                  agent's replies as `transcript` events. Works for any agent
                  — ideal for non-browser/server-side clients and automated
                  prompt testing.
            sample_rate:
              type: integer
              enum: [8000, 16000, 24000, 48000]
              default: 24000
              description: |
                Requested audio sample rate (Hz). Honored when authenticating
                with a raw `sk_` API key. With a `wct_` token the rate is fixed
                at 24000 and this param is ignored. The negotiated rate is
                always echoed in the `session.created` event. Use 8000 for
                telephony-quality audio.

channels:
  agentSession:
    address: /atoms/v1/agent/connect
    title: Agent Session
    description: |
      A bidirectional session with an Atoms agent. Mint an access token, open
      the connection with it, and the server creates a session, bridges audio
      and transcripts to the STT/LLM/TTS pipeline, and streams events back until
      the client closes or the server ends the session.

      Post-call, the full conversation (transcript + recording) is available
      at `GET /atoms/v1/conversation/{callId}` using the `call_id` from
      `session.created`.

      ## Connection

      ### Recommended: short-lived token flow

      1. **Register the call.** Call `POST /conversation/register-call`
         (see the **Register Call** reference in this section)
         with your API key in the `Authorization: Bearer <key>` header and the
         `agent_id` (plus optional `mode` and `variables`) in the body. It
         returns a short-lived, single-use `access_token` (prefixed `wct_`,
         valid for `expires_in` seconds).
      2. **Open the WebSocket** with only the token:

         ```
         wss://api.smallest.ai/atoms/v1/agent/connect?token=<access_token>
         ```

         `agent_id`, `mode`, and `variables` are already baked into the token —
         don't pass them on the URL.

      This keeps your API key server-side; the browser only ever holds the
      short-lived token.

      ### Alternative: connect with your API key directly

      You can also connect with a raw API key — `?token=<sk_key>` or
      `Authorization: Bearer <sk_key>` — plus the query params below. This is
      convenient for server-side or trusted clients. For browser / client-side
      apps, prefer the token flow above so your API key is never exposed.

      | Parameter | Required | Type | Default | Description |
      | --- | --- | --- | --- | --- |
      | `token` | Yes\* | string | — | Raw API key (`sk_…`). Alternative to the `Authorization` header. |
      | `agent_id` | Yes | string | — | The Atoms agent to connect to. |
      | `variables` | No | string | — | URL-encoded JSON object of per-call prompt variables. Overrides the agent's `defaultVariables` for this session only. Values must be `string`, `number`, or `boolean`. Reserved system-variable keys are stripped server-side (they are populated by the server): `call_id`, `conversation_type`, `agent_number`, `user_number`, `current_date`, `current_time`, `current_day`, `agent_gender`, `default_language`, `supported_languages`, `timezone`. |
      | `mode` | No | `webcall` \| `chat` | `webcall` | Session mode. `webcall` = full voice pipeline (audio in + audio out). `chat` = text-only pipeline. Invalid values are rejected with a connection error. |
      | `sample_rate` | No | integer | `24000` | Requested audio sample rate in Hz for both input and output audio. Valid values: `8000`, `16000`, `24000`, `48000`. The negotiated rate is echoed in `session.created.sample_rate`. Set to `8000` for telephony-quality audio streams. (With a `wct_` token the rate is fixed at 24000.) |

      \* `token` or `Authorization: Bearer <key>` — not both.

      ### Connection errors

      - **401 Unauthorized** — invalid or missing token/API key, expired or
        already-used `wct_` token, or `agent_id` not found.
      - **503 Service Unavailable** — server is gracefully draining. The HTTP upgrade is rejected before the WebSocket handshake completes. Clients should retry with exponential backoff.

      ### Example: register a call, then connect (recommended)

      ```javascript
      // 1. Mint a short-lived token (server-side — keeps your API key private)
      const res = await fetch(
        "https://api.smallest.ai/atoms/v1/conversation/register-call",
        {
          method: "POST",
          headers: {
            Authorization: `Bearer ${apiKey}`,
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            agent_id: agentId,
            mode: "webcall",
            variables: { customer_name: "Tanay", account_tier: "gold" },
          }),
        }
      );
      const { data } = await res.json(); // { access_token, expires_in, sample_rate }

      // 2. Open the WebSocket with the token (e.g. in the browser)
      const ws = new WebSocket(
        `wss://api.smallest.ai/atoms/v1/agent/connect?token=${data.access_token}`
      );
      ```

      ### Example: connect with your API key directly

      ```javascript
      const variables = { customer_name: "Tanay", account_tier: "gold" };
      const ws = new WebSocket(
        "wss://api.smallest.ai/atoms/v1/agent/connect" +
        `?token=${apiKey}` +
        `&agent_id=${agentId}` +
        `&mode=webcall` +
        `&variables=${encodeURIComponent(JSON.stringify(variables))}`
      );
      ```
    messages:
      inputAudioAppend:
        $ref: "#/components/messages/inputAudioAppend"
      inputAudioCommit:
        $ref: "#/components/messages/inputAudioCommit"
      inputTextSend:
        $ref: "#/components/messages/inputTextSend"
      sessionUpdate:
        $ref: "#/components/messages/sessionUpdate"
      sessionClose:
        $ref: "#/components/messages/sessionClose"
      sessionCreated:
        $ref: "#/components/messages/sessionCreated"
      sessionClosed:
        $ref: "#/components/messages/sessionClosed"
      outputAudioDelta:
        $ref: "#/components/messages/outputAudioDelta"
      transcript:
        $ref: "#/components/messages/transcript"
      transcriptDelta:
        $ref: "#/components/messages/transcriptDelta"
      agentStartTalking:
        $ref: "#/components/messages/agentStartTalking"
      agentStopTalking:
        $ref: "#/components/messages/agentStopTalking"
      interruption:
        $ref: "#/components/messages/interruption"
      error:
        $ref: "#/components/messages/error"

operations:
  sendInputAudioAppend:
    action: send
    channel:
      $ref: "#/channels/agentSession"
    summary: Stream an audio chunk from the client mic
    messages:
      - $ref: "#/channels/agentSession/messages/inputAudioAppend"
  sendInputAudioCommit:
    action: send
    channel:
      $ref: "#/channels/agentSession"
    summary: Reserved — accepted but currently a no-op
    messages:
      - $ref: "#/channels/agentSession/messages/inputAudioCommit"
  sendInputText:
    action: send
    channel:
      $ref: "#/channels/agentSession"
    summary: Send a text message to the agent (chat mode)
    messages:
      - $ref: "#/channels/agentSession/messages/inputTextSend"
  sendSessionUpdate:
    action: send
    channel:
      $ref: "#/channels/agentSession"
    summary: Reserved for session-config updates (no-op currently)
    messages:
      - $ref: "#/channels/agentSession/messages/sessionUpdate"
  sendSessionClose:
    action: send
    channel:
      $ref: "#/channels/agentSession"
    summary: End the session cleanly
    messages:
      - $ref: "#/channels/agentSession/messages/sessionClose"
  receiveSessionCreated:
    action: receive
    channel:
      $ref: "#/channels/agentSession"
    summary: Session negotiated successfully; streaming can begin
    messages:
      - $ref: "#/channels/agentSession/messages/sessionCreated"
  receiveSessionClosed:
    action: receive
    channel:
      $ref: "#/channels/agentSession"
    summary: Session ended (client-requested, server-initiated, or websocket close)
    messages:
      - $ref: "#/channels/agentSession/messages/sessionClosed"
  receiveOutputAudioDelta:
    action: receive
    channel:
      $ref: "#/channels/agentSession"
    summary: Audio chunk produced by the agent's TTS (webcall mode)
    messages:
      - $ref: "#/channels/agentSession/messages/outputAudioDelta"
  receiveTranscript:
    action: receive
    channel:
      $ref: "#/channels/agentSession"
    summary: Final transcript for a completed turn (user or assistant)
    messages:
      - $ref: "#/channels/agentSession/messages/transcript"
  receiveTranscriptDelta:
    action: receive
    channel:
      $ref: "#/channels/agentSession"
    summary: Streaming, cumulative transcript for the in-progress turn
    messages:
      - $ref: "#/channels/agentSession/messages/transcriptDelta"
  receiveAgentStartTalking:
    action: receive
    channel:
      $ref: "#/channels/agentSession"
    summary: Agent has started producing TTS audio
    messages:
      - $ref: "#/channels/agentSession/messages/agentStartTalking"
  receiveAgentStopTalking:
    action: receive
    channel:
      $ref: "#/channels/agentSession"
    summary: Agent has finished its current turn
    messages:
      - $ref: "#/channels/agentSession/messages/agentStopTalking"
  receiveInterruption:
    action: receive
    channel:
      $ref: "#/channels/agentSession"
    summary: User interrupted the agent mid-turn
    messages:
      - $ref: "#/channels/agentSession/messages/interruption"
  receiveError:
    action: receive
    channel:
      $ref: "#/channels/agentSession"
    summary: A session-level error was raised
    messages:
      - $ref: "#/channels/agentSession/messages/error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: |
        Access token for the handshake, passed as `?token=` in the URL (browser
        WebSocket clients cannot set custom headers) or as
        `Authorization: Bearer <token>`. The token is either a short-lived
        `wct_` token from `POST /conversation/register-call` (recommended for
        browser / client-side) or a raw `sk_` API key (server-side / trusted
        clients).

  messages:
    inputAudioAppend:
      name: InputAudioAppend
      title: Append audio chunk
      summary: Client sends a chunk of microphone audio.
      contentType: application/json
      payload:
        type: object
        required:
          - type
          - audio
        properties:
          type:
            type: string
            const: input_audio_buffer.append
          audio:
            type: string
            description: |
              Base64-encoded raw audio chunk. Format negotiated via the
              `sample_rate` query param at connection time and returned in
              `session.created`. Send chunks continuously while the user
              speaks — the server handles VAD and turn boundaries.
        examples:
          - summary: 40ms of PCM16 audio at 16kHz
            value:
              type: input_audio_buffer.append
              audio: "UklGRi..."

    inputAudioCommit:
      name: InputAudioCommit
      title: Commit audio buffer (reserved)
      summary: Reserved for a manual turn boundary — currently a no-op.
      description: |
        Accepted and validated by the server but currently has **no effect** —
        turn boundaries are handled entirely by server-side VAD. The message is
        reserved so clients (e.g. push-to-talk UIs) can adopt it ahead of a
        future manual-commit capability; sending it today neither flushes the
        buffer nor forces the agent to respond.
      contentType: application/json
      payload:
        type: object
        required:
          - type
        properties:
          type:
            type: string
            const: input_audio_buffer.commit

    inputTextSend:
      name: InputTextSend
      title: Send text input
      summary: Client sends text to the agent (chat mode).
      contentType: application/json
      payload:
        type: object
        required:
          - type
          - text
        properties:
          type:
            type: string
            const: input_text.send
          text:
            type: string
            minLength: 1
            description: User message text.
        examples:
          - value:
              type: input_text.send
              text: "What's my account balance?"

    sessionUpdate:
      name: SessionUpdate
      title: Session config update (reserved)
      summary: Reserved for future session-config changes — currently a no-op.
      contentType: application/json
      payload:
        type: object
        required:
          - type
        properties:
          type:
            type: string
            const: session.update

    sessionClose:
      name: SessionClose
      title: Close session
      summary: Client requests the session end.
      description: |
        Cleanly ends the session. The server responds with `session.closed`
        (reason=`client_requested`) before closing the WebSocket. If the
        client just closes the socket without sending this, the server
        treats it the same way (reason=`websocket_closed`).
      contentType: application/json
      payload:
        type: object
        required:
          - type
        properties:
          type:
            type: string
            const: session.close

    sessionCreated:
      name: SessionCreated
      title: Session created
      summary: Server confirms session is live — streaming can begin.
      contentType: application/json
      payload:
        type: object
        required:
          - type
          - session_id
          - call_id
          - sample_rate
          - channels
        properties:
          type:
            type: string
            const: session.created
          session_id:
            type: string
            description: Unique identifier for this session.
          call_id:
            type: string
            description: Call-log identifier; matches the `call_id` in conversation logs.
          sample_rate:
            type: integer
            description: Negotiated audio sample rate in Hz for both input and output audio.
          channels:
            type: integer
            description: Number of audio channels (typically 1).
        examples:
          - value:
              type: session.created
              session_id: "a65cd805-4d5e-4f6a-b7c8-d9e0f1a2b3c4"
              call_id: "CALL-1776756378884-6a553c"
              sample_rate: 24000
              channels: 1

    sessionClosed:
      name: SessionClosed
      title: Session closed
      summary: Server-side confirmation that the session has ended.
      contentType: application/json
      payload:
        type: object
        required:
          - type
          - reason
        properties:
          type:
            type: string
            const: session.closed
          reason:
            type: string
            description: |
              Why the session ended. Observed values:
              - `client_requested` — client sent `session.close`.
              - `websocket_closed` — the WebSocket dropped.
              - `ended` — the agent pipeline ended the session (e.g. the agent
                hung up or the conversation completed).

              Fatal setup/auth failures do **not** produce `session.closed` —
              the server emits an `error` and closes the socket with code 4000
              instead.
        examples:
          - value:
              type: session.closed
              reason: "client_requested"

    outputAudioDelta:
      name: OutputAudioDelta
      title: Agent audio chunk
      summary: Base64-encoded audio chunk produced by the agent's TTS.
      description: |
        Stream of audio chunks in the negotiated sample rate. Client decodes
        base64 and plays each chunk as it arrives for lowest latency. Only
        sent in `webcall` mode.
      contentType: application/json
      payload:
        type: object
        required:
          - type
          - audio
        properties:
          type:
            type: string
            const: output_audio.delta
          audio:
            type: string
            description: Base64-encoded raw audio chunk.

    transcript:
      name: Transcript
      title: Transcript (final)
      summary: Authoritative final transcript for a completed turn.
      description: |
        The **final** transcript for a turn. Emitted on turn boundaries:
        - `user` — when the user's turn is committed (the agent starts
          responding). Multi-segment speech is collapsed into a single
          final.
        - `assistant` — after the agent finishes speaking a turn. The text
          reflects exactly what was spoken (an interruption truncates it to
          what the user actually heard).

        For live, in-progress text use `transcript.delta` instead. A client
        that renders `transcript.delta` should treat the matching
        `transcript` as the authoritative replacement when the turn ends.
      contentType: application/json
      payload:
        type: object
        required:
          - type
          - role
          - text
        properties:
          type:
            type: string
            const: transcript
          role:
            type: string
            enum:
              - user
              - assistant
            description: Whose utterance this transcript is for.
          text:
            type: string
            description: The transcribed (user) or spoken (assistant) text.
        examples:
          - value:
              type: transcript
              role: user
              text: "Tell me about your pricing."
          - value:
              type: transcript
              role: assistant
              text: "We offer three plans: Starter, Pro, and Enterprise."

    transcriptDelta:
      name: TranscriptDelta
      title: Transcript (streaming delta)
      summary: Cumulative, in-progress transcript for the current turn.
      description: |
        Live streaming transcript. Each event carries the **cumulative**
        text for the current turn so far — the client should **replace**
        (not append to) the current bubble's text on every delta.

        - `assistant` — streamed at TTS pace, word by word, in sync with
          the audio the user is hearing. An interruption naturally
          truncates the stream.
        - `user` — streamed at STT pace as the user speaks; multi-segment
          speech accumulates into one growing bubble.

        The turn is finalized by a `transcript` event with the same `role`.
      contentType: application/json
      payload:
        type: object
        required:
          - type
          - role
          - text
        properties:
          type:
            type: string
            const: transcript.delta
          role:
            type: string
            enum:
              - user
              - assistant
            description: Whose utterance this delta is for.
          text:
            type: string
            description: Cumulative transcript text for the current turn.
        examples:
          - value:
              type: transcript.delta
              role: assistant
              text: "We offer three"

    agentStartTalking:
      name: AgentStartTalking
      title: Agent started talking
      summary: Signals the client that the agent has started producing TTS audio.
      description: |
        Useful for UI cues (e.g., showing a "speaking" indicator) and for
        suppressing the user's mic echo cancellation while the agent speaks.
        Fires once per agent turn, before the first `output_audio.delta` of
        that turn.
      contentType: application/json
      payload:
        type: object
        required:
          - type
        properties:
          type:
            type: string
            const: agent_start_talking
          timestamp:
            type: string
            format: date-time
            description: >
              ISO 8601 server-side timestamp of when the agent turn started,
              included with the event.
        examples:
          - value:
              type: agent_start_talking
              timestamp: "2026-07-02T10:30:45.123456"

    agentStopTalking:
      name: AgentStopTalking
      title: Agent stopped talking
      summary: Signals the client that the agent has finished its current turn.
      contentType: application/json
      payload:
        type: object
        required:
          - type
        properties:
          type:
            type: string
            const: agent_stop_talking
          timestamp:
            type: string
            format: date-time
            description: >
              ISO 8601 server-side timestamp of when the agent turn ended,
              included with the event.
        examples:
          - value:
              type: agent_stop_talking
              timestamp: "2026-07-02T10:30:47.654321"

    interruption:
      name: Interruption
      title: User interrupted the agent
      summary: Server detected that the user started speaking while the agent was talking.
      description: |
        Emitted when the server's VAD detects user speech during an active
        agent turn. The agent's current TTS output is truncated and the
        pipeline is re-primed with the user's new utterance. On receiving
        this, clients should stop playing any buffered `output_audio.delta`
        chunks from the interrupted turn.

        Typically followed by a new `agent_start_talking` once the agent
        produces its next response.
      contentType: application/json
      payload:
        type: object
        required:
          - type
        properties:
          type:
            type: string
            const: interruption

    error:
      name: Error
      title: Error
      summary: Session-level error.
      description: |
        Non-fatal session errors arrive here. For fatal errors, the server
        also emits `session.closed` and drops the connection.
      contentType: application/json
      payload:
        type: object
        required:
          - type
          - code
          - message
        properties:
          type:
            type: string
            const: error
          code:
            type: string
            description: |
              Machine-readable error code. Values emitted by the gateway:
              `invalid_event` (a client message failed validation),
              `no_session` (message received before the session was ready),
              `internal_error`, or the HTTP status code of a setup failure as a
              string (e.g. `401`, `400`, `503`).
          message:
            type: string
            description: Human-readable error message.
        examples:
          - value:
              type: error
              code: "invalid_event"
              message: "audio is required"
