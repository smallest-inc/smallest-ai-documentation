asyncapi: 3.0.0

info:
  title: Waves Pulse STT (Speech-to-Text) API
  version: 1.0.0
  description: WebSocket-based streaming automatic speech recognition API for real-time speech transcription using the Pulse STT model

defaultContentType: application/json

servers:
  production:
    host: waves-api.smallest.ai
    protocol: wss
    description: Production WebSocket Pulse STT endpoint
    x-fern-server-name: waves

channels:
  pulseGetText:
    address: /api/v1/pulse/get_text
    x-fern-server-name: waves
    x-fern-audiences:
      - v4docs
    x-fern-sdk-group-name: Speech to Text
    description: |
      ## Overview
      The Pulse STT WebSocket API provides real-time speech-to-text transcription capabilities with streaming audio input. This API uses WebSocket to deliver transcription results as audio is processed, enabling low-latency transcription without waiting for the entire audio file to upload. Perfect for live transcription, voice assistants, and real-time communication systems that require immediate speech recognition. Supports multiple languages, word-level timestamps, sentence-level timestamps (utterances), PII and PCI redaction, cumulative transcripts, and more advanced features.
    parameters:
      Authorization:
        description: "Bearer token for authentication. Format: Bearer YOUR_API_KEY"
        location: $message.header#/Authorization
      language:
        description: Language code for transcription. Use 'multi' for automatic language detection
        location: $message.payload#/language
      encoding:
        description: Audio encoding format
        location: $message.payload#/encoding
      sample_rate:
        description: Audio sample rate in Hz
        location: $message.payload#/sample_rate
      word_timestamps:
        description: Include word-level timestamps in transcription
        location: $message.payload#/word_timestamps
      full_transcript:
        description: Include cumulative transcript received till now in responses where is_final is true
        location: $message.payload#/full_transcript
      sentence_timestamps:
        description: Include sentence-level timestamps (utterances) in transcription
        location: $message.payload#/sentence_timestamps
      redact_pii:
        description: Redact personally identifiable information (name, surname, address, etc)
        location: $message.payload#/redact_pii
      redact_pci:
        description: Redact payment card information (credit card, CVV, zip, account number, etc)
        location: $message.payload#/redact_pci
      numerals:
        description: "Convert spoken numerals into digit form (e.g., 'twenty five' to '25') and `auto` enables automatic detection based on context."
        location: $message.payload#/numerals
      diarize:
        description: Enable speaker diarization to identify different speakers in the audio.
        location: $message.payload#/diarize
    servers:
      - $ref: "#/servers/production"
    messages:
      audioData:
        $ref: "#/components/messages/AudioData"
      endSignal:
        $ref: "#/components/messages/EndSignal"
      transcriptionResponse:
        $ref: "#/components/messages/TranscriptionResponse"

operations:
  sendAudioData:
    action: send
    channel:
      $ref: "#/channels/pulseGetText"
    description: Send audio data for transcription
    messages:
      - $ref: "#/channels/pulseGetText/messages/audioData"
      - $ref: "#/channels/pulseGetText/messages/endSignal"

  receiveTranscription:
    action: receive
    channel:
      $ref: "#/channels/pulseGetText"
    description: Receive transcription results
    messages:
      - $ref: "#/channels/pulseGetText/messages/transcriptionResponse"

components:
  messages:
    AudioData:
      name: AudioData
      contentType: application/octet-stream
      payload:
        type: string
        format: binary
        description: Raw audio data chunk, transmitted in binary format using the selected encoding

    EndSignal:
      name: EndSignal
      contentType: application/json
      payload:
        $ref: "#/components/schemas/EndSignalPayload"

    TranscriptionResponse:
      name: TranscriptionResponse
      contentType: application/json
      payload:
        $ref: "#/components/schemas/TranscriptionResponsePayload"

  schemas:
    EndSignalPayload:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - end
          description: Signal to indicate end of audio stream

    TranscriptionResponsePayload:
      type: object
      required:
        - session_id
      properties:
        session_id:
          type: string
          description: Unique identifier for the transcription session
        transcript:
          type: string
          description: Partial or complete transcription text for the current segment
        full_transcript:
          type: string
          description: Complete transcription text accumulated so far
        is_final:
          type: boolean
          default: false
          description: Indicates if this is the final transcription for the current segment
        is_last:
          type: boolean
          default: false
          description: Indicates if this is the last transcription in the session
        words:
          type: array
          description: Word-level timestamps (when word_timestamps=true)
          items:
            type: object
            properties:
              word:
                type: string
                description: The transcribed word
              start:
                type: number
                description: Start time in seconds
              end:
                type: number
                description: End time in seconds
              confidence:
                type: number
                description: Confidence score (0.0 to 1.0)
              speaker:
                type: integer
                description: Speaker label (when diarization is enabled)
              speaker_confidence:
                type: number
                description: Speaker confidence score (0.0 to 1.0)
        utterances:
          type: array
          description: Sentence-level timestamps (when sentence_timestamps=true)
          items:
            type: object
            properties:
              text:
                type: string
                description: The transcribed sentence
              start:
                type: number
                description: Start time in seconds
              end:
                type: number
                description: End time in seconds
              speaker:
                type: integer
                description: Speaker label (when diarization is enabled)
        language:
          type: string
          description: Detected primary language code
        languages:
          type: array
          description: List of languages detected in the audio
          items:
            type: string
        redacted_entities:
          type: array
          description: List of redacted entity placeholders
          items:
            type: string
