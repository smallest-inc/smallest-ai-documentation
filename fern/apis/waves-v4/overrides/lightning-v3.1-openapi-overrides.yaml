paths:
  /waves/v1/lightning-v3.1/get_speech:
    post:
      x-fern-server-name: waves
      x-fern-audiences:
        - v4docs
      tags:
        - Text to Speech
      summary: Lightning v3.1
      description: |
        Synthesize speech from text in a single request. The simplest way to get audio when you have the full text up front — pass `text` + `voice_id`, get back binary WAV.

        ## When to use this

        - **Use this** for short utterances you can render before playback (notifications, prompts, batch jobs, audio file generation).
        - **Use [SSE streaming](./synthesize-sse-lightning-v3-1)** when you want playback to start before the full audio is ready (long passages, latency-sensitive apps).
        - **Use the [WebSocket endpoint](./streaming-tts-stream)** when text arrives incrementally (LLM token streams, live captioning).
        - **Use [Lightning v2](./synthesize-lightning-v2)** only if you're locked to its voice catalog. v3.1 is faster, supports 44 kHz, and is the recommended path for new code.

        ## Key features

        - 44 kHz natural, expressive synthesis
        - Cloned voice IDs (`voice_*`) work — same param as catalog voices
        - 12 documented languages — see the model card for the full list
        - Output formats: `wav`, `pcm`, `mp3`, `mulaw`
        - Sample rates: 8 kHz – 44.1 kHz
        - Speed: 0.5× – 2×
        - Per-call pronunciation dictionaries via `pronunciation_dicts`

        ## Examples

        **cURL**
        ```bash
        curl -X POST "https://api.smallest.ai/waves/v1/lightning-v3.1/get_speech" \
          -H "Authorization: Bearer $SMALLEST_API_KEY" \
          -H "Content-Type: application/json" \
          -H "Accept: audio/wav" \
          -d '{
            "text": "Hello from Lightning v3.1.",
            "voice_id": "magnus",
            "sample_rate": 24000,
            "output_format": "wav"
          }' --output speech.wav
        ```

        **Python** (using `smallestai>=4.4.0`)
        ```python
        from smallestai import SmallestAI

        client = SmallestAI(token="YOUR_API_KEY")
        audio = client.waves.synthesize_lightning_v31(
            text="Hello from Lightning v3.1.",
            voice_id="magnus",
            sample_rate=24000,
            output_format="wav",
            # Optional: cloned voice support
            # voice_id="voice_FlPKRWI7DX",
            # Optional: pin pronunciations for specific words
            # pronunciation_dicts=["<your dict id>"],
        )
        with open("speech.wav", "wb") as f:
            f.write(audio)
        ```

        **JavaScript / TypeScript** (using `fetch`)
        ```typescript
        const res = await fetch("https://api.smallest.ai/waves/v1/lightning-v3.1/get_speech", {
          method: "POST",
          headers: {
            Authorization: `Bearer ${process.env.SMALLEST_API_KEY}`,
            "Content-Type": "application/json",
            Accept: "audio/wav",
          },
          body: JSON.stringify({
            text: "Hello from Lightning v3.1.",
            voice_id: "magnus",
            sample_rate: 24000,
            output_format: "wav",
          }),
        });
        const audio = Buffer.from(await res.arrayBuffer());
        require("node:fs").writeFileSync("speech.wav", audio);
        ```

        ## Common gotchas

        - **Set `Accept: audio/wav`.** Omitting it can return an empty or unplayable response.
        - **Cloned voices** (`voice_*` from `add_voice`) work on this endpoint and support `pronunciation_dicts`. Earlier docs claimed they didn't; that was stale.
        - **`pronunciation_dicts` validates IDs at request time.** Passing an unknown ID returns `Invalid input data` — create the dict first via [`POST /pronunciation-dicts`](./create-pronunciation-dict) and save the returned `id`.
        - **Pronunciation matching is case-sensitive.** Add both `Synopsis` and `synopsis` if your text uses both casings.
        - **44.1 kHz output** is supported but most playback environments are happy with 24 kHz — drop the sample rate if bandwidth matters.
        - **JavaScript SDK note**: the official `smallestai` npm package is pre-v3.1 and does not yet expose this endpoint. Use `fetch`/`axios` directly. A v2 JS SDK is on the roadmap.
  /waves/v1/lightning-v3.1/stream:
    post:
      x-fern-server-name: waves
      x-fern-audiences:
        - v4docs
      tags:
        - Text to Speech
      summary: Lightning v3.1 SSE
      description: |
        Synthesize speech and stream the audio back over Server-Sent Events. The body and parameters are identical to the [sync `/get_speech` endpoint](./synthesize-lightning-v3-1) — the difference is the response is a stream of base64-encoded PCM chunks instead of one binary blob.

        ## When to use this

        - **Use this** when you want playback to start before synthesis is complete — long passages, latency-sensitive UI, live narration. First chunk typically arrives in ~150–300 ms.
        - **Use [sync `/get_speech`](./synthesize-lightning-v3-1)** when total latency doesn't matter and you'd rather get one buffer.
        - **Use the [WebSocket endpoint](./streaming-tts-stream)** when the *text* arrives incrementally (LLM token stream). SSE assumes you have the full text up front.

        ## How it works

        1. POST your text + voice settings — same payload as `/get_speech`.
        2. The response is `Content-Type: text/event-stream`. Each event has a JSON body containing a base64-encoded audio chunk (~1024 bytes of PCM).
        3. Decode each chunk and feed it to your audio pipeline (browser `MediaSource`, ffmpeg pipe, raw PCM player, etc.).
        4. A final event with `status: "complete"` marks end of stream.

        ## Examples

        **cURL**
        ```bash
        curl -N -X POST "https://api.smallest.ai/waves/v1/lightning-v3.1/stream" \
          -H "Authorization: Bearer $SMALLEST_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{
            "text": "Streaming this paragraph chunk by chunk so playback can start sooner.",
            "voice_id": "magnus",
            "sample_rate": 24000,
            "output_format": "pcm"
          }'
        ```

        **Python**
        ```python
        from smallestai import SmallestAI

        client = SmallestAI(token="YOUR_API_KEY")
        for chunk in client.waves.synthesize_sse_lightning_v31(
            text="Streaming this paragraph chunk by chunk so playback can start sooner.",
            voice_id="magnus",
            sample_rate=24000,
            output_format="pcm",
        ):
            # `chunk` is decoded PCM bytes — pipe to your audio player.
            sys.stdout.buffer.write(chunk)
        ```

        **JavaScript / TypeScript** (using `fetch` + a reader)
        ```typescript
        const res = await fetch("https://api.smallest.ai/waves/v1/lightning-v3.1/stream", {
          method: "POST",
          headers: {
            Authorization: `Bearer ${process.env.SMALLEST_API_KEY}`,
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            text: "Streaming this paragraph chunk by chunk so playback can start sooner.",
            voice_id: "magnus",
            sample_rate: 24000,
            output_format: "pcm",
          }),
        });

        const reader = res.body!.getReader();
        const decoder = new TextDecoder();
        let buf = "";
        for (;;) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += decoder.decode(value);
          const events = buf.split("\n\n");
          buf = events.pop() ?? "";
          for (const ev of events) {
            const data = ev.replace(/^data:\s*/, "");
            if (!data) continue;
            const { data: payload, status } = JSON.parse(data);
            if (status === "complete") break;
            const pcm = Buffer.from(payload.audio, "base64");
            // … hand pcm to your audio pipeline
          }
        }
        ```

        ## Common gotchas

        - **Use a streaming-friendly client.** `curl -N`, Python `iter_lines`, or a `fetch` `ReadableStream` reader. Buffering clients will hide the latency win.
        - **Audio is base64 inside the event payload**, not the raw event bytes. Decode the `data.audio` field per event.
        - **`output_format=pcm`** gives the lowest overhead for streaming playback. `wav`/`mp3` work but add per-chunk framing bytes.
        - **First-chunk latency** is dominated by the model + network round-trip, not your client — typical 150–300 ms p50.
        - **JavaScript SDK note**: the official `smallestai` npm package does not expose this endpoint. Use `fetch` as shown. A v2 JS SDK is on the roadmap.

components:
  schemas:
    LightningV31Request:
      properties:
        output_format:
          enum:
            - mp3
            - pcm
            - wav
            - ulaw
            - alaw
        sample_rate:
          enum:
            - 8000
            - 16000
            - 24000
