# Override file for pulse-stt-ws.yaml (v4 docs)
# Adds server mapping, audience tags, unique message names, and query params as channel parameters
# Query params are in server bindings in the base spec, but Fern only extracts channel parameters

servers:
  production:
    x-fern-server-name: waves

channels:
  pulseStream:
    x-fern-server-name: waves
    x-fern-audiences:
      - v4docs
    x-fern-sdk-group-name: Speech to Text
    title: Pulse (Realtime)
    description: |
      ## Overview
      The Pulse STT WebSocket API provides real-time speech-to-text transcription capabilities with streaming audio input. This API uses WebSocket to deliver transcription results as audio is processed, enabling low-latency transcription without waiting for the entire audio file to upload. Perfect for live transcription, voice assistants, and real-time communication systems that require immediate speech recognition. Supports multiple languages, word-level timestamps, sentence-level timestamps (utterances), PII and PCI redaction, cumulative transcripts, and more advanced features.
    servers:
      - $ref: "#/servers/production"
    parameters:
      language:
        description: "Language code for transcription. Use 'multi' for automatic language detection"
        enum:
          - it
          - es
          - en
          - pt
          - hi
          - de
          - fr
          - uk
          - ru
          - kn
          - ml
          - pl
          - mr
          - gu
          - cs
          - sk
          - te
          - or
          - nl
          - bn
          - lv
          - et
          - ro
          - pa
          - fi
          - sv
          - bg
          - ta
          - hu
          - da
          - lt
          - mt
          - multi
        default: en
        required: false
        location: $message.header#/language
      encoding:
        description: "Audio encoding format"
        enum:
          - linear16
          - linear32
          - alaw
          - mulaw
          - opus
          - ogg_opus
        default: linear16
        required: false
        location: $message.header#/encoding
      sample_rate:
        description: "Audio sample rate in Hz. Supported values: 8000, 16000, 24000, 44100, 48000."
        enum:
          - "8000"
          - "16000"
          - "24000"
          - "44100"
          - "48000"
        default: "16000"
        required: false
        location: $message.header#/sample_rate
      word_timestamps:
        description: "Include word-level timestamps in transcription"
        enum:
          - "true"
          - "false"
        default: "true"
        required: false
        location: $message.header#/word_timestamps
      full_transcript:
        description: "Include cumulative transcript received till now in responses where is_final is true"
        enum:
          - "true"
          - "false"
        default: "false"
        required: false
        location: $message.header#/full_transcript
      sentence_timestamps:
        description: "Include sentence-level timestamps (utterances) in transcription"
        enum:
          - "true"
          - "false"
        default: "false"
        required: false
        location: $message.header#/sentence_timestamps
      redact_pii:
        description: "Redact personally identifiable information (name, surname, address, etc)"
        enum:
          - "true"
          - "false"
        default: "false"
        required: false
        location: $message.header#/redact_pii
      redact_pci:
        description: "Redact payment card information (credit card, CVV, zip, account number, etc)"
        enum:
          - "true"
          - "false"
        default: "false"
        required: false
        location: $message.header#/redact_pci
      numerals:
        description: "Convert spoken numerals into digit form (e.g., 'twenty five' to '25'). 'auto' enables automatic detection based on context."
        enum:
          - "true"
          - "false"
          - auto
        default: auto
        required: false
        location: $message.header#/numerals
      format:
        description: |
          Master formatting switch for transcript responses. When `false`,
          forces `punctuate=false`, `capitalize=false`, and also disables
          Inverse Text Normalization (ITN) so it cannot silently reintroduce
          punctuation or casing.

          When `true`, the `punctuate` and `capitalize` params take effect
          independently. Leave `format=true` and use those two to fine-tune.
        enum:
          - "true"
          - "false"
        default: "true"
        required: false
        location: $message.header#/format
      punctuate:
        description: |
          When `false`, strips end-of-sentence punctuation (`.`, `,`, `?`, `!`)
          from the transcript, `full_transcript`, `words[].word`, and
          `utterances[].transcript`. Does not affect casing — use `capitalize`
          for that. Overridden to `false` when `format=false`.
        enum:
          - "true"
          - "false"
        default: "true"
        required: false
        location: $message.header#/punctuate
      capitalize:
        description: |
          When `false`, lowercases the entire transcript output (final
          transcript, `full_transcript`, `words[].word`, and
          `utterances[].transcript`). Does not affect punctuation — use
          `punctuate` for that. Overridden to `false` when `format=false`.
        enum:
          - "true"
          - "false"
        default: "true"
        required: false
        location: $message.header#/capitalize
      eou_timeout_ms:
        description: "Time in milliseconds to wait after speech ends before flushing the transcript."
        default: 800
        required: false
        location: $message.header#/eou_timeout_ms
      diarize:
        description: "Enable speaker diarization to identify different speakers in the audio"
        enum:
          - "true"
          - "false"
        default: "false"
        required: false
        location: $message.header#/diarize
      keywords:
        description: |
          Boost recognition of specific words or phrases for this session.
          Useful for product names, jargon, proper nouns, and other
          domain-specific terms the model might otherwise mis-transcribe.
          **Streaming (WebSocket) only** — not supported on the HTTP
          `/pulse/get_text` endpoint.

          **Format:** a single comma-separated string (not a JSON array).
          Each entry is a word or phrase, optionally followed by
          `:INTENSIFIER` — a numeric boost multiplier. Defaults to `1.0`
          when omitted.

          **Example:** `NVIDIA:6,Jensen Huang,small language model:3.5,Waves`

          - Phrases can include spaces (`small language model:3.5`).
          - Intensifier accepts integers or decimals (`2`, `2.5`, `0.5`).
          - Mixing entries with and without intensifiers is fine.
          - Maximum 100 keywords per session.

          **INTENSIFIER range:** `0` to `20`. Recommended value is `6`.
          Higher values bias recognition more aggressively toward the
          keyword, but also **increase the risk of hallucination and
          repetition** in the transcript. Values of `10` or above are
          not recommended — the model may insert the keyword even when
          it was not spoken. Start around `3–6` and tune from there.
        example: "NVIDIA:6,Jensen Huang,small language model:3.5,Waves"
        required: false
        location: $message.header#/keywords
      itn_normalize:
        description: "Enable Inverse Text Normalization to convert spoken-form entities (numbers, dates, currencies, phone numbers, etc.) into written form in finalized transcripts."
        enum:
          - "true"
          - "false"
        default: "false"
        required: false
        location: $message.header#/itn_normalize
      finalize_on_words:
        description: "When false, disables automatic word-count-based finalization. Use with itn_normalize for agentic pipelines where you control finalization via the finalize message."
        enum:
          - "true"
          - "false"
        default: "true"
        required: false
        location: $message.header#/finalize_on_words
      max_words:
        description: "Maximum number of words before forced finalization. Useful for keeping ITN chunks short and accurate."
        schema:
          type: integer
        required: false
        location: $message.header#/max_words
    messages:
      audioData.message:
        name: V4PulseAudioData
      finalize.message:
        name: V4PulseFinalize
      closeStream.message:
        name: V4PulseCloseStream
      transcriptionResponse.message:
        name: V4PulseTranscriptionResponse

operations:
  sendAudioData:
    action: send
  sendFinalize:
    action: send
  sendCloseStream:
    action: send
  receiveTranscription:
    action: receive
