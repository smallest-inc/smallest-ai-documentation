# V4 docs render overrides for Electron (LLM) chat completions.
#
# This file is paired with `../waves/openapi/electron-openapi.yaml` via the
# generators.yml registration. Use it for v4-docs-specific decoration:
# audience filters, display names, cross-page references — anything that
# should affect how the API reference page renders without changing the
# canonical spec.

paths:
  /waves/v1/chat/completions:
    post:
      x-fern-audiences:
        - v4docs
