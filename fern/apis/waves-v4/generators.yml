# yaml-language-server: $schema=https://schema.buildwithfern.dev/generators-yml.json
# V4-only API definition for docs. No SDK generator groups - does not affect SDK generation.
api:
  auth: BearerAuth
  auth-schemes:
    BearerAuth:
      header: Authorization
      prefix: Bearer
  specs:
    # OpenAPI specs - REST endpoints
    - openapi: ../waves/openapi/waves-api.yaml
      overrides: overrides/waves-api-overrides.yaml
    - openapi: ../waves/openapi/tts-openapi.yaml
      overrides: overrides/tts-openapi-overrides.yaml
    - openapi: ../waves/openapi/lightning-v3.1-openapi.yaml
      overrides: overrides/lightning-v3.1-openapi-overrides.yaml
    - openapi: ../waves/openapi/get-voices-openapi.yaml
      overrides: overrides/get-voices-openapi-overrides.yaml
    - openapi: ../waves/openapi/voice-cloning-openapi.yaml
      overrides: overrides/voice-cloning-openapi-overrides.yaml
    - openapi: ../waves/openapi/add-voice-openapi.yaml
      overrides: overrides/add-voice-openapi-overrides.yaml
    - openapi: ../waves/openapi/get-cloned-voices-openapi.yaml
      overrides: overrides/get-cloned-voices-openapi-overrides.yaml
    - openapi: ../waves/openapi/delete-cloned-voice-openapi.yaml
      overrides: overrides/delete-cloned-voice-openapi-overrides.yaml
    - openapi: ../waves/openapi/pulse-stt-openapi.yaml
      overrides: overrides/pulse-stt-openapi-overrides.yaml
    - openapi: ../waves/openapi/electron-openapi.yaml
      overrides: overrides/electron-openapi-overrides.yaml

    # AsyncAPI 3.0.0 specs - WebSocket streaming (docs-only, uses waves/asyncapi with v4 overrides)
    - asyncapi: ../waves/asyncapi/tts-ws.yaml
      overrides: overrides/tts-ws-overrides.yml
    - asyncapi: ../waves/asyncapi/lightning-v2-ws.yaml
      overrides: overrides/lightning-v2-ws-overrides.yml
    - asyncapi: ../waves/asyncapi/lightning-v3.1-ws.yaml
      overrides: overrides/lightning-v3.1-ws-overrides.yml
    - asyncapi: ../waves/asyncapi/pulse-stt-ws.yaml
      overrides: overrides/pulse-stt-ws-overrides.yml
