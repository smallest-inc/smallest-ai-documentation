  - tab: api-reference
    layout:
      - section: API References
        skip-slug: true
        contents:
          - page: Authentication
            path: ./waves/pages/api-references/authentication.mdx
          - page: Concurrency and Limits
            path: ./waves/pages/api-references/concurrency-and-limits.mdx
      - api: API Reference
        api-name: waves-v4
        skip-slug: true
        snippets:
          python: smallestai
          typescript: smallestai
        audiences:
          - v4docs
        flattened: true
        layout:
          - section: Text to Speech
            contents:
              - endpoint: POST /waves/v1/tts
                title: "Synthesize Speech"
              - endpoint: POST /waves/v1/tts/live
                title: "Stream Speech (SSE)"
              - endpoint: WSS /waves/v1/tts/live
                title: "Stream Speech (WebSocket)"
              - endpoint: GET /waves/v1/{model}/get_voices
                title: "Get Voices"
              - endpoint: POST /waves/v1/voice-cloning
                title: "Create a Voice Clone"
              - endpoint: GET /waves/v1/voice-cloning
                title: "List Voice Clones"
              - endpoint: GET /waves/v1/pronunciation-dicts
                title: "Get Pronunciation Dictionaries"
              - endpoint: POST /waves/v1/pronunciation-dicts
                title: "Create Pronunciation Dictionary"
              - endpoint: PUT /waves/v1/pronunciation-dicts
                title: "Update Pronunciation Dictionary"
              - endpoint: DELETE /waves/v1/pronunciation-dicts
                title: "Delete Pronunciation Dictionary"
          - section: Speech to Text
            contents:
              - endpoint: POST /waves/v1/stt/
                title: "Transcribe (Pre-recorded)"
              - endpoint: WSS /waves/v1/stt/live
                title: "Transcribe (Realtime / WebSocket)"
          - section: LLM (Chat Completions)
            contents:
              - endpoint: POST /waves/v1/chat/completions
                title: "Electron — Chat Completions"
          - section: Speech to Speech
            contents:
              - endpoint: WSS /waves/v1/s2s
                title: "Hydra (Realtime / WebSocket)"

