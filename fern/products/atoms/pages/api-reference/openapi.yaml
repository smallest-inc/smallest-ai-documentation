        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                eventTypes:
                  type: array
                  description: Array of event types to subscribe to
                  items:
                    type: string
                    enum: [pre-conversation, post-conversation, analytics-completed]
                    description: The type of event to subscribe to
                    example: "post-conversation"
                webhookId:
                  type: string
                  description: The ID of the webhook to subscribe to
                  example: "60d0fe4f5311236168a109ca"
              required:
                - eventTypes
                - webhookId
      responses:
        "201":
          description: Subscriptions created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: string
