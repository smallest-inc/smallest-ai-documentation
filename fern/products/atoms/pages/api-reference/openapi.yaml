                  type: string
                  description: The name of the audience
                  example: "test_audience"
                description:
                  type: string
                  description: Optional description of the audience
                  example: "List of customers for marketing campaign"
                phoneNumberColumnName:
                  type: string
                  description: The name of the column in the CSV that contains phone numbers
                  example: "phoneNumber"
                identifierColumnName:
                  type: string
                  description: The name of the column in the CSV that contains identifiers (e.g., names)
                  example: "Name"
                file:
                  type: string
                  format: binary
                  description: CSV file containing phone numbers and identifiers (max 5MB)
                  example: "audience_template.csv"
              required:
                - name
                - phoneNumberColumnName
                - file

      responses:
        "200":
          description: Audience created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      _id:
                        type: string
                        description: The unique identifier for the audience
                        example: "60d0fe4f5311236168a109ca"
                      name:
                        type: string
                        description: The name of the audience
                        example: "My Customer List"
                      description:
                        type: string
                        description: The description of the audience
                        example: "List of customers for marketing campaign"
                      phoneNumberColumnName:
                        type: string
                        description: The name of the column in the CSV that contains phone numbers
                        example: "phoneNumber"
                      identifierColumnName:
                        type: string
                        description: The name of the column in the CSV that contains identifiers
                        example: "Name"
                      organization:
                        type: string
                        description: The organization ID
                        example: "60d0fe4f5311236168a109cb"
                      createdBy:
                        type: string
                        description: The user ID who created the audience
                        example: "60d0fe4f5311236168a109cc"
                      createdAt:
                        type: string
                        format: date-time
                        description: The date and time when the audience was created
                        example: "2025-01-15T10:30:00.000Z"
                      updatedAt:
                        type: string
                        format: date-time
                        description: The date and time when the audience was last updated
                        example: "2025-01-15T10:30:00.000Z"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  errors:
                    type: array
                    items:
                      type: string
                    example:
                      [
                        "CSV file is required",
                        "Some phone numbers in your CSV already exist in this audience. Please remove duplicate entries and try again.",
                      ]
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /audience/{id}:
    get:
      summary: Get audience by ID
      description: |
        Retrieve a specific audience by its ID.
        Note: if the audience belongs to a different organization, the API returns 404 (not 403) — ownership is deliberately obscured.
      tags:
        - Audience
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the audience
          schema:
            type: string
            example: "60d0fe4f5311236168a109ca"
      responses:
        "200":
          description: Successfully retrieved audience
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      _id:
                        type: string
                        description: The unique identifier for the audience
                        example: "60d0fe4f5311236168a109ca"
                      name:
                        type: string
                        description: The name of the audience
                        example: "My Customer List"
                      description:
                        type: string
                        description: The description of the audience
                        example: "List of customers for marketing campaign"
                      phoneNumberColumnName:
                        type: string
                        description: The name of the column in the CSV that contains phone numbers
                        example: "phoneNumber"
                      organization:
                        type: string
                        description: The organization ID
                        example: "60d0fe4f5311236168a109cb"
                      createdBy:
                        type: string
                        description: The user ID who created the audience
                        example: "60d0fe4f5311236168a109cc"
                      createdAt:
                        type: string
                        format: date-time
                        description: The date and time when the audience was created
                        example: "2025-01-15T10:30:00.000Z"
                      updatedAt:
                        type: string
                        format: date-time
                        description: The date and time when the audience was last updated
                        example: "2025-01-15T10:30:00.000Z"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  errors:
                    type: array
                    items:
                      type: string
                    example: ["Audience ID missing"]
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "404":
          description: Audience not found (also returned when audience belongs to a different organization)
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

    delete:
      summary: Delete audience
      description: |
        Delete a specific audience by its ID. Users can only delete audiences they created.

        **400 is returned if the audience is used by an active campaign:**
        `"can't delete audience, campaign with this audience <id> exists"`
        Remove the campaign first, then retry deletion.

        On success, `data` is always an empty array `[]`.
      tags:
        - Audience
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the audience to delete
          schema:
            type: string
            example: "60d0fe4f5311236168a109ca"
      responses:
        "200":
          description: Audience deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: array
                    example: []
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  errors:
                    type: array
                    items:
                      type: string
                    example:
                      ["can't delete audience, campaign with this audience 60d0fe4f5311236168a109ca exists"]
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "404":
          description: Audience not found
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /audience/{id}/members:
    get:
      summary: Get audience members
      description: Retrieve members of a specific audience with pagination support. Users can only access members of audiences they created.
      tags:
        - Audience
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the audience
          schema:
            type: string
            example: "60d0fe4f5311236168a109ca"
        - name: page
          in: query
          required: false
          description: Page number for pagination (default is 1)
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
        - name: offset
          in: query
          required: false
          description: Number of items per page (default is 5). Note: this parameter is named `offset`, not `limit` — sending `?limit=N` is silently ignored.
          schema:
            type: integer
            minimum: 1
            default: 5
            example: 10
      responses:
        "200":
          description: Successfully retrieved audience members
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      members:
                        type: array
                        items:
                          type: object
                          properties:
                            _id:
                              type: string
                              description: The unique identifier for the audience member
                              example: "60d0fe4f5311236168a109cd"
                            data:
                              type: object
                              description: Dynamic data from CSV, structure depends on uploaded file
                              example:
                                phoneNumber: "+1234567890"
                                name: "John Doe"
                                email: "john@example.com"
                      totalCount:
                        type: integer
                        description: Total number of members in the audience
                        example: 150
                      totalPages:
                        type: integer
                        description: Total number of pages available
                        example: 15
                      hasMore:
                        type: boolean
                        description: Whether there are more pages available
                        example: true
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  errors:
                    type: array
                    items:
                      type: string
                    example: ["Audience ID is required"]
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          description: Forbidden — audience belongs to a different organization
        "404":
          description: Audience not found
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  errors:
                    type: array
                    items:
                      type: string
                    example: ["Failed to fetch audience members"]

    post:
      summary: Add audience members
      description: |
        Add new members to an existing audience.

        Each member object must include a key matching the audience's `phoneNumberColumnName`.
        If it's missing, the API returns 400: `"Each member must have a <phoneNumberColumnName> field"`.
        Adding members that would exceed the audience limit also returns 400.

        Note: if the audience belongs to a different organization, the API returns 404 (not 403).
      tags:
        - Audience
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the audience
          schema:
            type: string
            example: "60d0fe4f5311236168a109ca"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                members:
                  type: array
                  description: Array of member objects with dynamic structure based on audience configuration
                  items:
                    type: object
                    description: Member data with keys matching the audience's CSV structure. Must include the phone number column.
                    example:
                      phoneNumber: "+1234567890"
                      name: "John Doe"
                      email: "john@example.com"
              required:
                - members
      responses:
        "200":
          description: Members added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        message:
                          type: string
                          example: "5 members added successfully"
                        data:
                          type: object
                          properties:
                            added:
                              type: integer
                              description: Number of members successfully added
                              example: 5
                            skipped:
                              type: integer
                              description: Number of members skipped (e.g., duplicates)
                              example: 2
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  errors:
                    type: array
                    items:
                      type: string
                    example:
                      [
                        "Each member must have a phoneNumber field",
                        "Cannot add 15 members. You currently have 9990 members in this audience. The maximum limit is 10000 members. You can add up to 10 more members.",
                      ]
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "404":
          description: Audience not found (also returned when audience belongs to a different organization)
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

    delete:
      summary: Delete audience members
      description: Remove specific members from an audience by their member IDs. Users can only delete members from audiences they created.
      tags:
        - Audience
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the audience
          schema:
            type: string
            example: "60d0fe4f5311236168a109ca"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                memberIds:
                  type: array
                  description: Array of member IDs to delete
                  items:
                    type: string
                    example: "60d0fe4f5311236168a109cd"
              required:
                - memberIds
      responses:
        "200":
          description: Members deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      deletedCount:
                        type: integer
                        description: Number of members successfully deleted
                        example: 3
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  errors:
                    type: array
                    items:
                      type: string
                    example: ["Audience ID missing"]
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "404":
          description: Audience not found (also returned when audience belongs to a different organization)
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /audience/{id}/members/search:
    get:
      summary: Search audience members
      description: |
        Search for members within a specific audience using flexible search parameters. Users can only search members of audiences they created.

        **Search Types:**
        - **General Search** (`query`): Searches across all fields in the audience member data
        - **Field-Specific Search**: Use any field name as a parameter (e.g., `firstName=john`, `phoneNumber=123456`, `email=test@example.com`)

        **Examples:**
        - `?query=john` - General search across all fields
        - `?firstName=john` - Search specifically in firstName field
        - `?phoneNumber=555-1234` - Search specifically in phoneNumber field
        - `?firstName=john&lastName=doe` - Search for members matching both criteria

        **Note:** When using phoneNumber field, do not use quotes around the phone number. You can use either a general search OR field-specific searches, but not both simultaneously.
      tags:
        - Audience
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the audience
          schema:
            type: string
            example: "60d0fe4f5311236168a109ca"
        - name: query
          in: query
          required: false
          description: General search term that searches across all fields in audience member data
          schema:
            type: string
            example: "john"
        - name: "*"
          in: query
          required: false
          description: |
            Any field name can be used as a query parameter for field-specific searches.
            Examples: firstName, lastName, phoneNumber, email, etc.
            The parameter name becomes the field to search in, and the value is the search term.
            When using phoneNumber field, do not use quotes around the phone number.
          schema:
            type: string
            example: "field_value"
      responses:
        "200":
          description: Search results returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      members:
                        type: array
                        items:
                          type: object
                          properties:
                            _id:
                              type: string
                              description: The unique identifier for the audience member
                              example: "60d0fe4f5311236168a109cd"
                            data:
                              type: object
                              description: Dynamic data from CSV, structure depends on uploaded file
                              example:
                                phoneNumber: "+1234567890"
                                name: "John Doe"
                                email: "john@example.com"
                      searchInfo:
                        type: object
                        description: Information about the search performed
                        properties:
                          searchType:
                            type: string
                            description: The type of search performed
                            enum: ["general", "multiple"]
                            example: "multiple"
                          searchTerm:
                            type: string
                            description: The search term(s) used
                            example: "john"
                          searchFields:
                            type: array
                            items:
                              type: string
                            description: The specific fields searched (for field-specific searches)
                            example: ["firstName", "lastName"]
                          totalResults:
                            type: integer
                            description: The number of results returned
                            example: 5
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  errors:
                    type: array
                    items:
                      type: string
                    example:
                      [
                        "At least one search parameter is required. Use 'query' for general search across all fields, or use field-specific searches like 'firstName=john' or 'phoneNumber=123456'.",
                      ]
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "404":
          description: Audience not found
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  errors:
                    type: array
                    items:
                      type: string
                    example: ["Failed to search audience members"]

  /prompt-scoring/score:
    post:
      summary: Score a prompt
      description: |
        Scores an agent's prompt across 11 quality dimensions using Gemini-based analysis. Requires the prompt to have changed since the last scoring.

        **Input:** Provide exactly one of `versionId` (published agent version) or `draftId` (agent draft). Providing both or neither returns a 400.

        **Credit usage:** 1 credit is deducted per successful call.

        **Idempotency:** Re-submitting the same prompt without changes returns a 400 — retrieve the cached score via the GET agent endpoint instead.

        **Supported agent types:** Only `single_prompt` agents are supported. Workflow-graph agents return a 400.

        **Scoring model:** Two sequential Gemini calls — a Platform Analyst pass followed by a Rubric Judge pass.

        ### Scored Dimensions

        | Tier | Dimension | Notes |
        |------|-----------|-------|
        | 1 | Role & Objective | |
        | 1 | Personality & Voice | |
        | 1 | Conversation Structure | |
        | 1 | Tool Integration | |
        | 1 | Constraints & Safety | |
        | 2 | Conversational Naturalness | |
        | 2 | Failure-Mode Coverage | |
        | 3 | Information Integrity | Gating — if Weak/Missing, score capped at 70 |
        | 3 | Variable & Tool Hygiene | Gating — if Weak/Missing, score capped at 50 |
        | 3 | Internal Consistency | |
        | 3 | Density | Computed from token analysis |
      tags:
        - Prompt Scoring
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Exactly one of `versionId` or `draftId` must be provided.
              oneOf:
                - required: [versionId]
                  properties:
                    versionId:
                      type: string
                      description: Published agent version ID (MongoDB ObjectId).
                      example: "6a1589b75e048394eb37bc47"
                - required: [draftId]
                  properties:
                    draftId:
                      type: string
                      description: Agent draft ID (MongoDB ObjectId).
                      example: "6a1589b75e048394eb37bc48"
      responses:
        "200":
          description: Prompt scored successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      overall_score:
                        type: integer
                        description: 0–100 quality score.
                        example: 82
                      overall_grade:
                        type: string
                        description: Human-readable grade.
                        enum: ["Excellent", "Good", "Needs Work", "Poor"]
                        example: "Good"
                      band:
                        type: string
                        description: |
                          Token density band based on prompt length:
                          - `lean` — fewer than 4K tokens
                          - `normal` — 4K–9.9K tokens
                          - `heavy` — 10K–14.9K tokens
                          - `overweight` — 15K or more tokens
                        enum: ["lean", "normal", "heavy", "overweight"]
                        example: "normal"
                      estimated_ttft_overhead_ms:
                        type: number
                        description: Estimated first-token latency overhead in milliseconds introduced by the prompt length.
                        example: 420
                      dimensions:
                        type: array
                        description: Per-dimension scoring results across 11 quality dimensions.
                        items:
                          type: object
                          properties:
                            tier:
                              type: integer
                              description: "Priority tier: 1 (highest), 2, or 3."
                              enum: [1, 2, 3]
                              example: 1
                            level:
                              type: string
                              description: Quality level for this dimension.
                              enum: ["Strong", "Adequate", "Weak", "Missing", "Not Applicable"]
                              example: "Strong"
                            evidence_span:
                              type: string
                              description: Quote from the prompt supporting the assessment. Empty string if no relevant content was found.
                              example: "You are a helpful support agent..."
                            title:
                              type: string
                              description: Short dimension name.
                              example: "Role & Objective"
                            description:
                              type: string
                              description: Explanation of the score for this dimension.
                              example: "Prompt clearly defines the agent's role and primary objective."
              example:
                status: true
                data:
                  overall_score: 56
                  overall_grade: "Needs Work"
                  band: "lean"
                  estimated_ttft_overhead_ms: 12.9
                  dimensions:
                    - tier: 1
                      level: "Adequate"
                      evidence_span: "You are a friendly and helpful weather assistant. Your role is to provide accurate, real-time weather information to users."
                      title: "Clear but basic role definition"
                      description: "The role is clearly defined but lacks specific success criteria or scope boundaries."
                    - tier: 1
                      level: "Weak"
                      evidence_span: "Use the get_weather function to fetch real-time data"
                      title: "Undeclared tool reference"
                      description: "The 'get_weather' tool is referenced but not defined, and failure paths are missing."
                    - tier: 2
                      level: "Missing"
                      evidence_span: "no relevant content found"
                      title: "No failure mode coverage"
                      description: "The prompt contains no instructions for handling errors, tool failures, or unclear user input."
        "400":
          description: |
            Bad request. Possible reasons:
            - Neither or both of `versionId`/`draftId` provided
            - Organization has no credits available
            - Agent is a conversational/workflow-graph type (not supported)
            - Prompt unchanged since last scoring — retrieve the existing score via GET agent
            - No prompt found on the version or draft
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  errors:
                    type: array
                    items:
                      type: string
                    example: ["Prompt has not changed since last scoring — retrieve the existing score via GET agent"]
        "401":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "403":
          description: Not a member of the organization or insufficient role (minimum Member required).
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  errors:
                    type: array
                    items:
                      type: string
                    example: ["You are not a member of this organization"]
        "404":
          description: Version or draft not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  errors:
                    type: array
                    items:
                      type: string
                    example: ["Version not found"]
        "429":
          description: Rate limit exceeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Rate limit exceeded"
                  rateLimit:
                    type: object
                    properties:
                      routeClass:
                        type: string
                        example: "prompt-scoring"
                      limit:
                        type: integer
                        example: 10
                      retryAfterSec:
                        type: integer
                        description: Seconds to wait before retrying.
                        example: 60
        "500":
          description: Gemini scoring failed after retries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: false
                  errors:
                    type: array
                    items:
                      type: string
                    example: ["Prompt scoring failed"]

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponse:
      type: object
      properties:
        status:
          type: boolean
        data:
          type: object
    UnauthorizedErrorResponse:
      type: object
      properties:
        status:
          type: boolean
          example: false
        errors:
          type: array
          items:
            type: string
          example: ["Unauthorized: User not found"]
    InternalServerErrorResponse:
      type: object
      properties:
        status:
          type: boolean
          example: false
        errors:
          type: array
          items:
            type: string
          example: ["Internal server error"]
    BadRequestErrorResponse:
      type: object
      properties:
        status:
          type: boolean
          example: false
        errors:
          type: array
          items:
            type: string
          example: ["Invalid input"]

    CreateAgentFromTemplateRequest:
      type: object
      required:
        - agentName
        - templateId
      properties:
        agentName:
          type: string
          description: Name of the agent
        agentDescription:
          type: string
          description: Description of the agent
        templateId:
          type: string
          description: ID of the template to use. You can get the list of templates with their description and id from the /agent/template endpoint.
    CreateAgentRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
        backgroundSound:
          type: string
          enum: ["", "office", "cafe", "call_center", "static"]
          default: ""
          description: "Ambient background sound during calls. Options: '' (none), 'office', 'cafe', 'call_center', 'static'. Note: this value is currently overridden by the server default on creation; update via PATCH after creation."
        # visibleToEveryone:
        #   type: boolean
        #   default: false
        language:
          type: object
          description: |
            Language configuration for the agent.
            Cross-field rule: `default` must be one of the values in `supported`.
            Tamil (`ta`) cannot be combined with other languages in `supported`.
          properties:
            default:
              type: string
              enum: [en, hi, mr, gu, ta, es, north_indic, bn, or]
              description: "The default language of the agent. Note: `ta` cannot be combined with other languages in `supported`."
              default: en
            supported:
              type: array
              description: |
                Languages the agent understands. `default` must be one of these values.
                Tamil (`ta`) cannot be combined with other languages.
              items:
                type: string
                enum: [en, hi, mr, gu, ta, es, north_indic, bn, or]
            switching:
              type: object
              description: Language switching configuration for the agent. If enabled, the agent will be able to switch between languages based on the user's language.
              properties:
                isEnabled:
                  type: boolean
                  description: Whether to enable language switching for the agent
                  default: false
                minWordsForDetection:
                  type: number
                  minimum: 1
                  maximum: 10
                  description: Minimum number of words required for language detection
                  default: 2
                strongSignalThreshold:
                  type: number
                  minimum: 0.1
                  maximum: 0.9
                  description: Threshold for strong language signal detection (0.1 to 0.9)
                  default: 0.7
                weakSignalThreshold:
                  type: number
                  minimum: 0.1
                  maximum: 0.9
                  description: Threshold for weak language signal detection (0.1 to 0.9)
                  default: 0.3
                minConsecutiveForWeakThresholdSwitch:
                  type: number
                  minimum: 1
                  maximum: 5
                  description: Minimum consecutive detections required for weak threshold language switch
                  default: 2
        synthesizer:
          type: object
          description: |
            Synthesizer (TTS) configuration for the agent. Model
            `waves_lightning_v3_1` validates `voiceId` against the Waves
            API. `gpt-realtime` and `gpt-realtime-mini` accept any voiceId.
            Cloned voices are regular voiceIds. Use them with a compatible
            Waves model.
          properties:
            voiceConfig:
              type: object
              description: Voice configuration for the synthesizer.
              properties:
                model:
                  type: string
                  enum:
                    - waves_lightning_v3_1
                    - gpt-realtime
                    - gpt-realtime-mini
                  default: waves_lightning_v3_1
                  description: The TTS model to use.
                voiceId:
                  type: string
                  default: nyah
                  description: The voice ID to use. For cloned voices, pass the voiceId from the Waves platform with a compatible model.
                gender:
                  type: string
                  enum:
                    - male
                    - female
                  default: female
                  description: The gender of the voice.
              default:
                model: waves_lightning_v3_1
                voiceId: nyah
            speed:
              type: number
              minimum: 0
              maximum: 2
              default: 1.2
            consistency:
              type: number
              minimum: 0
              maximum: 1
              default: 0.5
            similarity:
              type: number
              minimum: 0
              maximum: 1
              default: 0
            enhancement:
              type: number
              enum: [0, 1, 2]
              default: 1
            sampleRate:
              type: number
              enum: [8000, 16000, 24000, 44100]
              default: 16000
              description: Output audio sample rate in Hz.
        globalKnowledgeBaseId:
          type: string
          description: The global knowledge base ID of the agent. You can create a global knowledge base by using the /knowledgebase endpoint and assign it to the agent. The agent will use this knowledge base for its responses.
        slmModel:
          type: string
          enum:
            - electron
            - electron-kogta
            - electron-kogta-v2
            - gpt-4o
            - gpt-4.1
            - gpt-5.2
            - gpt-realtime
            - gpt-realtime-mini
          default: electron
          description: |
            The LLM model to use for the agent.
            Note: `gpt-5.2`, `electron-kogta`, and `electron-kogta-v2` require org-level access and return 403 if not enabled.
            `workflowType` must be `single_prompt` to use `gpt-realtime` or `gpt-realtime-mini`.
        defaultVariables:
          type: object
          description: The default variables to use for the agent. These variables will be used if no variables are provided when initiating a conversation with the agent.
        globalPrompt:
          type: string
          maxLength: 4000
          description: |
            Set global instructions for your agent's personality, role, and behavior throughout conversations.
            Note: Only used for workflow_graph agents. Maximum 4000 characters.
        telephonyProductId:
          type: array
          items:
            type: string
          description: IDs of telephony products (phone numbers) to associate with the agent for inbound/outbound calls.
        workflowType:
          $ref: "#/components/schemas/WorkflowType"
          default: single_prompt
          description: The type of workflow to create for the agent. Defaults to `single_prompt` if not specified. Using `workflow_graph` requires conversational agent access (403 if not enabled).
        callDispositionConfig:
          type: string
          description: Configuration string for call disposition tracking.
        allowInboundCall:
          type: boolean
          default: true
          description: Whether the agent accepts inbound calls.
        enableStyleGuide:
          type: boolean
          default: true
          description: Whether style guide enforcement is applied to agent responses.
        speechFormatting:
          type: boolean
          description: Whether speech formatting is applied to the agent's responses.

    UpdateAgentRequest:
      type: object
      description: |
        Agent update payload. Behavior depends on whether the agent has versioning enabled:

        **Versioned agents**: only `name`, `description`, `avatarUrl`, `telephonyProductId`,
        `allowInboundCall`, and `visibleToEveryone` are accepted. Config-level fields
        (language, synthesizer, slmModel, etc.) return 400.

        **Non-versioned agents**: all configuration fields are accepted — the same full set
        as `POST /agent`. See `CreateAgentRequest` for the complete field list.
      properties:
        name:
          type: string
          description: Name of the agent.
        description:
          type: string
          description: Description of the agent.
        avatarUrl:
          type: string
          description: URL of the agent's avatar image.
        telephonyProductId:
          type: array
          items:
            type: string
          description: IDs of telephony products (phone numbers) to associate with the agent.
        allowInboundCall:
          type: boolean
          description: Whether the agent accepts inbound calls.
        visibleToEveryone:
          type: boolean
          description: Whether the agent is visible to all members of the organization.

    AgentDTO:
      type: object
      properties:
        _id:
          type: string
          description: The ID of the agent
        name:
          type: string
          description: The name of the agent
        description:
          type: string
          description: The description of the agent
        backgroundSound:
          type: string
          enum: ["", "office", "cafe", "call_center", "static"]
          description: "Ambient background sound during calls. Options: '' (none), 'office', 'cafe', 'call_center', 'static'."
        organization:
          type: string
          description: The organization ID of the agent
        workflowId:
          type: string
          description: The workflow ID of the agent
        workflowType:
          $ref: "#/components/schemas/WorkflowType"
          default: workflow_graph
          description: The type of workflow used by the agent
        createdBy:
          type: string
          description: The user ID of the user who created the agent
        globalKnowledgeBaseId:
          type: string
          description: The global knowledge base ID of the agent
        language:
          type: object
          description: The language configuration of the agent
          properties:
            default:
              type: string
              description: The default language of the agent
              enum: [en, hi, mr, gu, ta, es, north_indic, bn, or]
            switching:
              type: object
              description: Language switching configuration for the agent
              properties:
                isEnabled:
                  type: boolean
                  description: Whether language switching is enabled for the agent
                minWordsForDetection:
                  type: number
                  description: Minimum number of words required for language detection
                strongSignalThreshold:
                  type: number
                  description: Threshold for strong language signal detection
                weakSignalThreshold:
                  type: number
                  description: Threshold for weak language signal detection
                minConsecutiveForWeakThresholdSwitch:
                  type: number
                  description: Minimum consecutive detections required for weak threshold language switch
            supported:
              type: array
              items:
                type: string
              description: The supported languages of the agent
        synthesizer:
          type: object
          description: The synthesizer (TTS) configuration of the agent
          properties:
            voiceConfig:
              type: object
              description: The voice configuration of the synthesizer
              properties:
                model:
                  type: string
                  description: The model of the synthesizer
                  enum:
                    - waves_lightning_v3_1
                    - gpt-realtime
                    - gpt-realtime-mini
                  default: waves_lightning_v3_1
                voiceId:
                  type: string
                  description: The voice ID of the synthesizer.
                  default: nyah
                gender:
                  type: string
                  enum:
                    - male
                    - female
                  default: female
            speed:
              type: number
              default: 1.2
              description: The speed of the synthesizer
            consistency:
              type: number
              default: 0.5
              description: The consistency of the synthesizer
            similarity:
              type: number
              default: 0
              description: The similarity of the synthesizer
            enhancement:
              type: number
              default: 1
              description: The enhancement of the synthesizer
            sampleRate:
              type: number
              description: The audio sample rate used by the synthesizer
        slmModel:
          type: string
          enum:
            - electron
            - electron-kogta
            - electron-kogta-v2
            - gpt-4o
            - gpt-4.1
            - gpt-5.2
            - gpt-realtime
            - gpt-realtime-mini
          description: The LLM model to use for the agent. LLM model will be used to generate the response and take decisions based on the user's query.
        defaultVariables:
          type: object
          description: The default variables to use for the agent. These variables will be used if no variables are provided when initiating a conversation with the agent.
        avatarUrl:
          type: string
          description: URL of the agent's avatar image
        firstMessage:
          type: string
          description: The opening message spoken by the agent at the start of a call
        allowInterruptions:
          type: boolean
          description: Whether the agent can be interrupted mid-speech by the caller
        waitForUserToSpeakFirst:
          type: boolean
          description: When true, the agent waits for the caller to speak before responding
        totalCalls:
          type: number
          description: Total number of calls made with this agent
        transcriberType:
          type: string
          description: The speech-to-text engine used for transcription
        globalPrompt:
          type: string
          description: A global system prompt prepended to all agent interactions
        archived:
          type: boolean
          description: Whether the agent has been archived. Archived agents are excluded from default listings.
        archivedAt:
          type: string
          format: date-time
          description: The date and time when the agent was archived
        isLocked:
          type: boolean
          description: Whether the agent is locked and cannot be edited
        createdAt:
          type: string
          format: date-time
          description: The date and time when the agent was created
        updatedAt:
          type: string
          format: date-time
          description: The date and time when the agent was last updated
        _resolvedConfig:
          type: object
          additionalProperties: true
          description: |
            The resolved config of the target version, merged into a flat shape. Not returned in
            list responses (`GET /agent`). Only populated in single-agent responses
            (`GET /agent/{id}`) when the agent has a published, activated version.
            Can contain up to ~30 fields depending on which config sections are set.
          properties:
            prompt:
              type: string
              description: Active version's single-prompt text.
            tools:
              type: array
              items:
                type: object
              description: Active version's configured tools.
            postCallAnalyticsConfig:
              type: object
              description: Disposition metrics and analytics model configuration.
            callDispositionConfig:
              type: string
            modelName:
              type: string
              description: LLM model name on the resolved version.
            transcriberType:
              type: string
              description: STT engine in use on the resolved version.
            defaultLanguage:
              type: string
              enum: [en, hi, mr, gu, ta, es, north_indic, bn, or]
              description: Default language set on the resolved version.
            supportedLanguages:
              type: array
              items:
                type: string
              description: Supported languages on the resolved version.
            languageSwitching:
              type: object
              description: Language-switching configuration on the resolved version.
            firstMessage:
              type: string
              description: Opening message on the resolved version.
            globalPrompt:
              type: string
              description: Global prompt on the resolved version (workflow_graph agents only).
            preCallAPI:
              type: object
              description: Pre-call API configuration on the resolved version.
            workflowGraph:
              type: object
              description: Full node graph for workflow_graph agents. Null for single_prompt agents.
            muteUserUntilFirstBotResponse:
              type: boolean
            allowInterruptions:
              type: boolean
            voiceDetectionConfig:
              type: object
            smartTurnConfig:
              type: object
            backgroundSound:
              type: string
            denoisingConfig:
              type: object
            redactionConfig:
              type: object
            llmIdleTimeoutConfig:
              type: object
            sessionTimeoutConfig:
              type: object
        _configSource:
          type: string
          enum:
            - active
            - draft
            - version
          description: |
            Only present when `?draftId` or `?versionId` query params are used.
            Indicates which config source was resolved into `_resolvedConfig`.
        _versionedWorkflow:
          type: object
          description: |
            **Deprecated — internal use only.** Legacy field present whenever `_resolvedConfig` is populated.
            Mirrors a subset of `_resolvedConfig` (`prompt`, `tools`, `workflowGraph`). Kept for backward
            compatibility with existing frontend code. Ignore in new integrations.
          properties:
            prompt:
              type: string
            tools:
              type: array
              items:
                type: object
            workflowGraph:
              type: object

    WebhookAgent:
      type: object
      properties:
        _id:
          type: string
          description: The ID of the agent
        name:
          type: string
          description: The name of the agent
        description:
          type: string
          description: The description of the agent

    WebhookSubscriptionPopulated:
      type: object
      properties:
        _id:
          type: string
          description: The unique identifier for the subscription
        webhookId:
          type: string
          description: The ID of the webhook
        agentId:
          $ref: "#/components/schemas/WebhookAgent"
          nullable: true
          description: The populated agent details, or null if not assigned
        eventType:
          type: string
          enum: [pre-conversation, post-conversation]
          description: The type of event subscribed to
        createdAt:
          type: string
          format: date-time
          description: The date and time when the subscription was created
        updatedAt:
          type: string
          format: date-time
          description: The date and time when the subscription was last updated

    Webhook:
      type: object
      properties:
        _id:
          type: string
          description: The unique identifier for the webhook
        url:
          type: string
          description: The webhook endpoint URL
        description:
          type: string
          description: The description of the webhook
        status:
          type: string
          enum: [enabled, disabled]
          description: The status of the webhook
        organizationId:
          type: string
          description: The organization ID
        createdBy:
          type: string
          description: The user ID who created the webhook
        subscriptions:
          type: array
          items:
            $ref: "#/components/schemas/WebhookSubscriptionPopulated"
          description: A list of subscriptions for the webhook with populated agent details.
        decryptedSecretKey:
          type: string
          description: The decrypted signing secret for the webhook. This is only returned when fetching a single webhook by ID.
        createdAt:
          type: string
          format: date-time
          description: The date and time when the webhook was created
        updatedAt:
          type: string
          format: date-time
          description: The date and time when the webhook was last updated

    WebhookSubscription:
      type: object
      properties:
        _id:
          type: string
          description: The unique identifier for the subscription
        webhookId:
          type: string
          description: The ID of the webhook
        agentId:
          type: string
          description: The ID of the agent
        eventType:
          type: string
          enum: [pre-conversation, post-conversation]
          description: The type of event subscribed to
        createdAt:
          type: string
          format: date-time
          description: The date and time when the subscription was created
        updatedAt:
          type: string
          format: date-time
          description: The date and time when the subscription was last updated

    KnowledgeBase:
      type: object
      properties:
        _id:
          type: string
          description: The unique identifier for the knowledge base
        name:
          type: string
          description: The name of the knowledge base
        description:
          type: string
          description: The description of the knowledge base
        organization:
          type: string
          description: The organization ID
        createdBy:
          type: string
          description: The user ID who created the knowledge base
        processingStatus:
          type: string
          enum: [pending, processing, completed, failed]
          description: The current processing status of the knowledge base
        createdAt:
          type: string
          format: date-time
          description: The date and time when the knowledge base was created
        updatedAt:
          type: string
          format: date-time
          description: The date and time when the knowledge base was last updated
      required:
        - _id
        - name
        - organization
        - createdBy

    KnowledgeBaseItem:
      type: object
      properties:
        _id:
          type: string
          description: The unique identifier for the knowledge base item
        itemType:
          type: string
          enum: [file, text]
          description: The type of the knowledge base item
        metadata:
          type: object
          description: Additional metadata for the item
        knowledgeBaseId:
          type: string
          description: The ID of the knowledge base this item belongs to
        processingStatus:
          type: string
          enum: [pending, processing, completed, failed]
          description: The processing status of the item
        fileName:
          type: string
          description: The name of the file (for file type items)
        contentType:
          type: string
          description: The MIME type of the content
        size:
          type: number
          description: The size of the file in bytes
        key:
          type: string
          description: The storage key for the file
        title:
          type: string
          description: The title of the item
        content:
          type: string
          description: The content of the item (for text type items)
        createdAt:
          type: string
          format: date-time
          description: The date and time when the item was created
        updatedAt:
          type: string
          format: date-time
          description: The date and time when the item was last updated
