            path: ../pages/v4.0.0/api-references/websocket.mdx
            icon: fa-solid fa-plug
      - api: API Reference
        api-name: waves-v4
        snippets:
          python: smallest-ai
          typescript: smallest-ai
        audiences:
          - v4docs
        flattened: true
        layout:
          - section: Text to Speech
            contents:
              - endpoint: POST /waves/v1/lightning-v3.1/get_speech
                title: "Lightning v3.1"
              - endpoint: POST /waves/v1/lightning-v3.1/stream
                title: "Lightning v3.1 SSE"
              - endpoint: WSS /waves/v1/lightning-v3.1/get_speech/stream
                title: "Lightning v3.1 WebSocket"
              - endpoint: POST /waves/v1/lightning-v2/get_speech
                title: "Lightning v2"
              - endpoint: POST /waves/v1/lightning-v2/stream
                title: "Lightning v2 SSE"
              - endpoint: WSS /waves/v1/lightning-v2/get_speech/stream
                title: "Lightning v2 WebSocket"
          - section: Speech to Text
            contents:
              - endpoint: POST /waves/v1/pulse/get_text
                title: "Pulse (Pre-Recorded)"
              - endpoint: WSS /waves/v1/pulse/get_text
                title: "Pulse (Realtime)"
          - section: Voices
            contents:
              - endpoint: GET /waves/v1/{model}/get_voices
                title: "Get Voices"
          - section: Voice Cloning
            contents:
              - endpoint: POST /waves/v1/lightning-large/add_voice
                title: "Add Voice"
              - endpoint: GET /waves/v1/lightning-large/get_cloned_voices
                title: "Get Cloned Voices"
              - endpoint: DELETE /waves/v1/lightning-large
                title: "Delete Cloned Voice"
          - section: Pronunciation Dictionaries
            contents:
              - endpoint: GET /waves/v1/pronunciation-dicts
                title: "Get Pronunciation Dictionaries"
              - endpoint: POST /waves/v1/pronunciation-dicts
                title: "Create Pronunciation Dictionary"
              - endpoint: PUT /waves/v1/pronunciation-dicts
                title: "Update Pronunciation Dictionary"
              - endpoint: DELETE /waves/v1/pronunciation-dicts
                title: "Delete Pronunciation Dictionary"

